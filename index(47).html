function startPoll(){stopPoll();pollTimer=setInterval(async()=>{
  if(!USE_SUPA)return;
  const before={p:allPosts().length,m:data.messages.length,s:(data.stories||[]).length};
  await syncDB();me=getUser(me.id);updateBadges();updateNotifDot();updateStreak(me.id);if(USE_SUPA)updateDB("profiles",me.id,{last_seen:new Date().toISOString()});
  const after={p:allPosts().length,m:data.messages.length,s:(data.stories||[]).length};
  if(before.m===after.m&&before.p===after.p&&before.s===after.s)return;
  if(curView==="messages"){
    refreshConvList();
    if(activeChat){refreshActiveChatBubbles();}
  }
  else if(curView!=="messages"){renderView(curView,curArg);}
},5000);}
function refreshActiveChatBubbles(){
  if(!activeChat)return;
  // CRITICAL: Update read timestamp so badge clears
  try{localStorage.setItem("rd_"+activeChat,Date.now().toString());}catch(e){}
  const msgs=getMsgs(me.id,activeChat);
  const body=document.getElementById("chatBody");
  const input=document.getElementById("msgInput");
  if(!body)return;
  const inputVal=input?input.value:"";
  const inputFocus=input?document.activeElement===input:false;
  const atBottom=body.scrollHeight-body.scrollTop-body.clientHeight<80;
  let ld=null,bs="";
  msgs.forEach((m,idx)=>{
    const dl=dayLabel(m.createdAt);
    if(dl!==ld){bs+=`<div style="text-align:center;color:var(--dim);font-size:11px;margin:6px 0">${dl}</div>`;ld=dl;}
    const mine=m.sender===me.id;
    let mc="";
    if(m.media&&m.media.type==="image")mc+=`<img src="${m.media.data}" style="max-width:200px;border-radius:8px;margin-bottom:4px">`;
    if(m.media&&m.media.type==="video")mc+=`<video src="${m.media.data}" controls style="max-width:200px;border-radius:8px;margin-bottom:4px"></video>`;
    if(m.media&&m.media.type==="file")mc+=`<a href="${m.media.data}" download="${esc(m.media.name)}" style="color:inherit;text-decoration:underline;display:block;font-size:13px;margin-bottom:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${esc(m.media.name)}</a>`;
    if(m.media&&m.media.type==="audio"){
      const dur=m.media.duration||0;let bars="";
      for(let bi=0;bi<16;bi++){bars+=`<div class="voice-bar" style="height:${(3+Math.abs(Math.sin(bi*0.7))*14)}px"></div>`;}
      mc+=`<div class="voice-msg"><button class="voice-play" onclick="event.stopPropagation();playVoice(this,'${m.media.data}')">▶</button><div class="voice-wave">${bars}</div><span class="voice-time">${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}</span></div>`;
    }
    // Reactions
    let reactionHTML="";
    if(m.reactions&&Object.keys(m.reactions).length>0){
      const counts={};
      Object.values(m.reactions).forEach(e=>{counts[e]=(counts[e]||0)+1;});
      reactionHTML=Object.entries(counts).map(([e,c])=>`<span class="msg-reaction">${e} ${c>1?c:""}</span>`).join("");
    }
    bs+=`<div class="bub ${mine?"me":"th"}" ondblclick="toggleReactionPicker(event,'${activeChat}',${idx})">${mc}${m.text?esc(m.text):""}<div class="msg-time">${new Date(m.createdAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>${reactionHTML}</div>`;
  });
  body.innerHTML=bs;
  if(input){input.value=inputVal;if(inputFocus)input.focus();}
  if(atBottom)body.scrollTop=body.scrollHeight;if(isTypingNow(activeChat)){const td=document.createElement("div");td.className="bub th";td.style.background="transparent";td.innerHTML="<div class=typing-dots><span></span><span></span><span></span></div>";body.appendChild(td);if(atBottom)body.scrollTop=body.scrollHeight;}if(isChatSeenBy(activeChat)){const st=document.createElement("div");st.style.cssText="font-size:11px;color:var(--accent);text-align:right;margin-top:2px";st.textContent="Seen";body.appendChild(st);}updateBadges();}

function votePoll(pid,optIdx){
  const p=data.posts.find(x=>x.id===pid);if(!p||!p.poll)return;
  if(!p.poll.votes)p.poll.votes={};
  // Remove previous vote by this user
  Object.keys(p.poll.votes).forEach(k=>{p.poll.votes[k]=(p.poll.votes[k]||[]).filter(u=>u!==me.id);});
  p.poll.votes[optIdx]=[...(p.poll.votes[optIdx]||[]),me.id];
  saveLocal();if(USE_SUPA)updateDB("posts",pid,{poll:p.poll});
  renderView(curView,curArg);
}

let mediaRecorder=null,audioChunks=[],recStart=0,recInterval=null,isRecording=false;
function toggleRecording(){if(isRecording){stopAndSendRecording();}else{startRecording();}}
async function startRecording(){
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});
  audioChunks=[];mediaRecorder=new MediaRecorder(s);
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
  mediaRecorder.start();isRecording=true;recStart=Date.now();
  document.getElementById("chatInputBar")?.classList.add("hidden");
  const rb=document.getElementById("recBar");if(rb)rb.classList.remove("hidden");
  recInterval=setInterval(()=>{const el=Math.floor((Date.now()-recStart)/1000);
  const e=document.getElementById("recTime");if(e)e.textContent=Math.floor(el/60)+":"+String(el%60).padStart(2,"0");
  if(el>=120)stopAndSendRecording();},200);
  }catch(e){toast("Microphone access denied.","e");}
}
function stopAndSendRecording(){
  if(!isRecording||!mediaRecorder)return;isRecording=false;clearInterval(recInterval);
  const dur=Math.floor((Date.now()-recStart)/1000);
  mediaRecorder.onstop=()=>{const blob=new Blob(audioChunks,{type:"audio/webm"});
  if(blob.size>5*1024*1024){toast("Too long (max 5MB).","e");resetRecUI();return;}
  const r=new FileReader();r.onload=ev=>{sendMsg(me.id,activeChat,"",{type:"audio",data:ev.target.result,duration:dur});showChat(activeChat);resetRecUI();};r.readAsDataURL(blob);};
  mediaRecorder.stop();
}
function cancelRecording(){if(!isRecording||!mediaRecorder)return;isRecording=false;clearInterval(recInterval);mediaRecorder.onstop=()=>{};mediaRecorder.stop();resetRecUI();}
function resetRecUI(){document.getElementById("chatInputBar")?.classList.remove("hidden");const rb=document.getElementById("recBar");if(rb)rb.classList.add("hidden");}
let currentAudio=null;
function playVoice(btn,url){if(currentAudio){currentAudio.pause();currentAudio=null;document.querySelectorAll(".voice-play").forEach(b=>b.innerHTML="▶");if(btn.dataset.p==="1"){btn.dataset.p="0";return;}}currentAudio=new Audio(url);btn.innerHTML="⏸";btn.dataset.p="1";currentAudio.play();currentAudio.onended=()=>{btn.innerHTML="▶";btn.dataset.p="0";currentAudio=null;};currentAudio.onerror=()=>{btn.innerHTML="▶";toast("Audio error.","e");currentAudio=null;};}

/* ===== VOICE MESSAGE BUBBLE RENDERING ===== */
function voiceBubble(media){
  if(!media||media.type!=="audio")return "";
  const dur=media.duration||0;let bars="";
  for(let i=0;i<16;i++){bars+='<div class="voice-bar" style="height:'+(3+Math.abs(Math.sin(i*0.7))*14)+'px"></div>';}
  return '<div class="voice-msg"><button class="voice-play" onclick="event.stopPropagation();playVoice(this,\''+media.data+'\')">▶</button><div class="voice-wave">'+bars+'</div><span class="voice-time">'+Math.floor(dur/60)+':'+String(dur%60).padStart(2,'0')+'</span></div>';
}

/* ===== ACTIVITY / NOTIFICATIONS ===== */
function allActivity(){
  const acts=[];
  allPosts().forEach(p=>{
    if(p.userId===me.id){
      (p.likes||[]).forEach(u=>{if(u!==me.id){const rawP=data.posts.find(x=>x.id===p.id);const likeTime=rawP&&rawP.likeTimestamps?rawP.likeTimestamps[u]:p.createdAt;acts.push({type:"like",userId:u,postId:p.id,text:(p.text||"").slice(0,40),createdAt:likeTime||p.createdAt});}});
      (p.comments||[]).forEach(c=>{if(c.userId!==me.id)acts.push({type:"comment",userId:c.userId,postId:p.id,text:c.text,createdAt:c.createdAt||Date.now()});});
    }
  });
  // Followers — use joinedAt as a proxy timestamp (stored on follow action)
  me.followers.forEach(fid=>{
    if(fid!==me.id){
      // Check if we have a stored follow timestamp
      const followTime=parseInt(localStorage.getItem("follow_time_"+fid)||"0",10);
      acts.push({type:"follow",userId:fid,text:"",createdAt:followTime||Date.now()-86400000});
    }
  });
  return acts.sort((a,b)=>b.createdAt-a.createdAt).slice(0,30);
}
function renderActivity(c){
  const acts=allActivity();
  let h='<div class="sh"><b style="font-size:18px">Activity</b></div>';
  if(!acts.length){h+=empty("No activity yet","Likes, comments, and follows will appear here.","");c.innerHTML=h;return;}
  acts.forEach(a=>{
    const u=getUser(a.userId);if(!u)return;
    var icHTML={"like":"<svg width='16' height='16' viewBox='0 0 24 24' fill='#F43F5E'><path d='M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7z'/></svg>","comment":"<svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z'/></svg>","follow":"<svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='12' cy='8' r='5'/><path d='M20 21a8 8 0 0 0-16 0'/></svg>"};var ic=icHTML[a.type]||"";
    const txt=a.type==="like"?"liked your post":a.type==="comment"?'commented: "'+esc(a.text.slice(0,30))+'"':"started following you";
    h+='<div class="lr" onclick="'+(a.type==="follow"?"go('profile','"+a.userId+"')":"openPostModal('"+a.postId+"');")+'">'+avatarHTML(u,40)+'<div style="flex:1"><div style="font-size:14px"><b>'+esc(u.username)+'</b> '+txt+'</div><div style="color:var(--dim);font-size:12px">'+timeAgo(a.createdAt)+'</div></div>'+ic+'</div>';
  });

  // Clear the notif dot
  try{localStorage.setItem("activity_read",Date.now().toString());}catch(e){}
  const nd=document.getElementById("notifDot");if(nd)nd.style.display="none";
}

/* ===== MESSAGE REACTIONS ===== */
function reactToMessage(convoPartnerId,msgIdx,emoji){
  const msgs=getMsgs(me.id,convoPartnerId);
  const m=msgs[msgIdx];if(!m)return;
  // Find the raw message and add reaction
  const raw=data.messages.find(x=>x.id===m.id);
  if(!raw)return;
  if(!raw.reactions)raw.reactions={};
  // Toggle reaction
  const existing=raw.reactions[me.id];
  if(existing===emoji){delete raw.reactions[me.id];}
  else{raw.reactions[me.id]=emoji;}
  saveLocal();
  if(USE_SUPA)updateDB("messages",m.id,{reactions:raw.reactions});
  showChat(convoPartnerId);
}
function toggleReactionPicker(e,convoPartnerId,msgIdx){
  // Close existing pickers
  document.querySelectorAll(".reaction-picker").forEach(p=>p.remove());
  const picker=document.createElement("div");
  picker.className="reaction-picker";
  picker.innerHTML=["Love","Haha","Wow","Sad","Like","Fire"].map(em=>'<span class="reaction-pick" onclick="reactToMessage(\''+convoPartnerId+'\','+msgIdx+',\''+em+'\')">'+em+'</span>').join("");
  e.target.parentElement.style.position="relative";
  e.target.parentElement.appendChild(picker);
  e.stopPropagation();
  setTimeout(()=>{document.addEventListener("click",function closer(){picker.remove();document.removeEventListener("click",closer);});},10);
}

/* ===== PULL TO REFRESH ===== */
let ptrStartY=0,ptrPulling=false;
function initPullToRefresh(){
  const main=document.getElementById("main");
  if(!main)return;
  main.addEventListener("touchstart",e=>{
    if(main.scrollTop<=0){ptrStartY=e.touches[0].clientY;ptrPulling=true;}
  },{passive:true});
  main.addEventListener("touchmove",e=>{
    if(!ptrPulling)return;
    const diff=e.touches[0].clientY-ptrStartY;
    if(diff>10&&diff<100){
      main.style.transform="translateY("+(diff*0.3)+"px)";
    }
  },{passive:true});
  main.addEventListener("touchend",e=>{
    if(!ptrPulling)return;
    ptrPulling=false;
    const diff=e.changedTouches[0].clientY-ptrStartY;
    main.style.transform="";
    if(diff>60){
      // Refresh
      if(USE_SUPA){toast("Refreshing...");syncDB().then(()=>{renderView(curView,curArg);toast("Updated!","ok");});}
      else{renderView(curView,curArg);}
    }
  },{passive:true});
}

/* ===== GAMIFICATION: STREAKS ===== */
function getStreak(uid){
  try{return parseInt(localStorage.getItem("streak_"+uid)||"0",10);}catch(e){return 0;}
}
function getLastActive(uid){
  try{return localStorage.getItem("lastactive_"+uid)||"";}catch(e){return"";}
}
function updateStreak(uid){
  const today=new Date().toDateString();
  const last=getLastActive(uid);
  if(last===today)return getStreak(uid);
  const yesterday=new Date(Date.now()-86400000).toDateString();
  let streak=getStreak(uid);
  if(last===yesterday){streak++;}
  else if(last!==today){streak=1;}
  try{localStorage.setItem("streak_"+uid,streak.toString());localStorage.setItem("lastactive_"+uid,today);}catch(e){}
  return streak;
}
function streakHTML(uid){
  const s=getStreak(uid);
  if(!s)return"";
  return '<span class="streak-badge" style="display:inline-flex;align-items:center;gap:4px;font-weight:700"><svg width="16" height="20" viewBox="0 0 24 30"><path d="M12 1c2 4 5 5 5 10a5 5 0 0 1-10 0c0-2 1-3 2-4 .5 1.5 1.5 1.5 2 1 .5-3-1-5 1-7z" fill="url(#flameGrad)"/></svg> '+s+' day'+(s===1?"":"s")+'</span>';
}
/* ===== STREAK CHALLENGE SYSTEM ===== */
function streakCountdown(){
  const now=new Date();
  const mid=new Date(now);mid.setHours(24,0,0,0);
  return Math.max(0,mid-now);
}
function formatCountdown(ms){
  if(ms<=0)return"00:00:00";
  var s=Math.floor(ms/1000);
  var h=String(Math.floor(s/3600)).padStart(2,"0");s%=3600;
  var m=String(Math.floor(s/60)).padStart(2,"0");s%=60;
  return h+":"+m+":"+String(s).padStart(2,"0");
}
function streakMilestone(s){
  if(s>=100)return{next:null,label:"Max streak achieved!",pct:100};
  var milestones=[3,7,30,100];
  for(var i=0;i<milestones.length;i++){
    if(s<milestones[i]){
      var prev=i>0?milestones[i-1]:0;
      var pct=Math.round((s-prev)/(milestones[i]-prev)*100);
      return{next:milestones[i],label:milestones[i]+" days",pct:pct};
    }
  }
  return{next:null,label:"Max!",pct:100};
}

  var ms=streakCountdown();

  var mile=streakMilestone(s);

    '<div class="sb-timer-row">'+

      '<span class="sb-countdown" id="streakCd">'+cd+'</span>'+
    '</div>'+

    (mile.next?'<div class="sb-milestone">Next milestone: <b>'+mile.label+'</b> — '+mile.pct+'%</div>':'<div class="sb-milestone">Legendary streak!</div>')+
  '</div>';
}

function startStreakTimer(){
  if(streakTimerInterval)clearInterval(streakTimerInterval);

/* ===== GAMIFICATION: LEADERBOARD ===== */
function getUserScore(uid){
  const u=getUser(uid);if(!u)return 0;
  const posts=allPosts().filter(p=>p.userId===uid&&!p.channelId).length;
  const likes=allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.likes||[]).length,0);
  const comments=allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.comments||[]).length,0);
  const followers=(u.followers||[]).length;
  return posts*5+likes*2+comments*3+followers*1;
}

    // Table header
    h+='<div class="lb-header"><span>#</span><span>Student</span><span class="lb-header-score">Score</span></div>';
    // Rows
    scored.forEach((entry,i)=>{
      const u=entry.user;const rank=i+1;
      const rankClass=rank<=3?"top"+rank:"";
      const barW=Math.round(entry.score/maxScore*100);
      const barColor=barColors[i%barColors.length];
      const medal="";
      h+='<div class="lb-row" onclick="go(\'profile\',\''+u.id+'\')">'+
        '<div class="lb-rank '+rankClass+'">'+(medal||rank)+'</div>'+
        '<div class="lb-user">'+avatarHTML(u,38)+

/* ===== COUNT UP ANIMATION ===== */
function countUp(el,target,duration){
  duration=duration||1000;
  const start=0;const startTime=performance.now();
  function update(now){
    const progress=Math.min((now-startTime)/duration,1);
    const eased=1-Math.pow(1-progress,3);
    el.textContent=Math.round(start+(target-start)*eased);
    if(progress<1)requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

var guideIdx=0;
function startGuide(){
  guideIdx=0;
  document.getElementById("guideCard").style.display="block";
  document.getElementById("guideOverlay").classList.add("active");
  showGuideStep(0);
}
function showGuideStep(i){
  if(i>=guideSteps.length){endGuide();return;}
  guideIdx=i;
  var step=guideSteps[i];
  var card=document.getElementById("guideCard");
  var spotlight=document.getElementById("guideSpotlight");
  
  // Build dots
  var dots="";
  for(var d=0;d<guideSteps.length;d++){dots+='<span class="guide-dot'+(d===i?" on":"")+'"></span>';}
  
  var isLast=i===guideSteps.length-1;
  card.innerHTML=
    '<div class="guide-visual" style="background:'+step.color+'">'+step.visual+'</div>'+
    '<div class="guide-body">'+
      '<div class="guide-step">Step '+(i+1)+' of '+guideSteps.length+'</div>'+
      '<div class="guide-title">'+step.title+'</div>'+
      '<div class="guide-text">'+step.text+'</div>'+
      '<div class="guide-dots">'+dots+'</div>'+
      '<div class="guide-actions">'+
        '<button class="guide-skip" onclick="endGuide()">'+(isLast?'Finish':'Skip')+'</button>'+
        '<button class="guide-btn" onclick="nextGuideStep()">'+(isLast?'Get Started':'Next')+'</button>'+
      '</div>'+
    '</div>';
  
  // Position card + spotlight
  setTimeout(function(){
    if(step.target){
      var el=document.querySelector(step.target);
      if(el&&el.offsetParent){
        var r=el.getBoundingClientRect();
        spotlight.style.left=(r.left-8)+"px";
        spotlight.style.top=(r.top-8)+"px";
        spotlight.style.width=(r.width+16)+"px";
        spotlight.style.height=(r.height+16)+"px";
        spotlight.classList.add("active");
        // Position card below target (or above if no room)
        var cardBottom=r.bottom+20+340;
        if(cardBottom>window.innerHeight){card.style.top=Math.max(20,r.top-360)+"px";}
        else{card.style.top=(r.bottom+16)+"px";}
        var cardLeft=r.left+r.width/2-170;
        cardLeft=Math.max(16,Math.min(cardLeft,window.innerWidth-356));
        card.style.left=cardLeft+"px";
      }else{
        spotlight.classList.remove("active");
        positionCardCenter(card);
      }
    }else{
      spotlight.classList.remove("active");
      positionCardCenter(card);
    }
    card.classList.add("active");
  },50);
}
function positionCardCenter(card){
  card.style.left="50%";
  card.style.top="50%";
  card.style.transform="translate(-50%,-50%)";
  setTimeout(function(){card.style.transform="translate(-50%,-50%)";},0);
}

const CHAT_THEMES={default:'Default',midnight:'Midnight',independence:'Independence DZ',desert:'Desert',ocean:'Ocean',forest:'Forest'};
function getChatTheme(otherId){try{return localStorage.getItem('chat_theme_'+me.id+'_'+otherId)||'default'}catch(e){return 'default'}}

function cycleChatTheme(otherId){const keys=Object.keys(CHAT_THEMES);const cur=getChatTheme(otherId);const next=keys[(keys.indexOf(cur)+1)%keys.length];setChatTheme(otherId,next);toast('Theme: '+CHAT_THEMES[next],'ok')}
function tickHTML(seen){return '<span class="msg-ticks '+(seen?'seen':'')+'">✓✓</span>'}
function markChatSeen(uid){
  try{localStorage.setItem('seen_'+uid,Date.now().toString())}catch(e){}
  const msgs=(data.messages||[]).filter(m=>m.sender===uid&&m.receiver===me.id);
  msgs.forEach(m=>m.seen=true);
  saveLocal();

}
function hasSeenMyMessage(uid,m){return m && m.sender===me.id && (m.seen===true || m.seen===1)}

function renderOldChatBubbles(uid){
  const msgs=getMsgs(me.id,uid);let ld=null,bs='';
  msgs.forEach((m,idx)=>{
    const dl=dayLabel(m.createdAt);if(dl!==ld){bs+=`<div style="text-align:center;color:var(--dim);font-size:11px;margin:6px 0">${dl}</div>`;ld=dl;}
    const mine=m.sender===me.id;let mc='';
    if(m.media&&m.media.type==='image')mc+=`<img src="${m.media.data}" style="max-width:200px;border-radius:8px;margin-bottom:4px">`;
    if(m.media&&m.media.type==='video')mc+=`<video src="${m.media.data}" controls style="max-width:200px;border-radius:8px;margin-bottom:4px"></video>`;
    if(m.media&&m.media.type==='file')mc+=`<a href="${m.media.data}" download="${esc(m.media.name)}" style="color:inherit;text-decoration:underline;display:block;font-size:13px;margin-bottom:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${esc(m.media.name)}</a>`;
    if(m.media&&m.media.type==='audio'){
      const dur=m.media.duration||0;let bars='';for(let bi=0;bi<16;bi++){bars+='<div class="voice-bar" style="height:'+(3+Math.abs(Math.sin(bi*0.7))*14)+'px"></div>';}
      mc+='<div class="voice-msg"><button class="voice-play" onclick="event.stopPropagation();playVoice(this,\''+m.media.data+'\')">▶</button><div class="voice-wave">'+bars+'</div><span class="voice-time">'+Math.floor(dur/60)+':'+String(dur%60).padStart(2,'0')+'</span></div>';
    }
    let reactionHTML='';
    if(m.reactions&&Object.keys(m.reactions).length>0){const counts={};Object.values(m.reactions).forEach(e=>{counts[e]=(counts[e]||0)+1});reactionHTML=Object.entries(counts).map(([e,c])=>'<span class="msg-reaction">'+e+' '+(c>1?c:'')+'</span>').join('')}
    const time=new Date(m.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  });
  return bs;
}

v style="width:10px;height:10px;border-radius:50%;background:var(--danger);animation:pulse 1s infinite"></div><span id="recTime" style="font-size:14px;font-weight:600">0:00</span><span style="flex:1;color:var(--dim);font-size:13px">Recording...</span><button onclick="cancelRecording()" style="color:var(--danger);font-weight:600">Cancel</button><button onclick="stopAndSendRecording()" style="color:var(--accent);font-weight:600">Send</button></div>`;

  function todayKey(){return new Date().toISOString().slice(0,10)}
  function ydayKey(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10)}
  function sget(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}
  function sset(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
  window.getDailyChallenges=function(){const t=todayKey();let c=sget('challenges_'+me.id+'_'+t,null);if(!c){c={date:t,msg:false,post:false,react:false,profile:false};sset('challenges_'+me.id+'_'+t,c)}return c};
  window.completeChallenge=function(type){if(!me)return;const c=getDailyChallenges();if(type in c&&!c[type]){c[type]=true;sset('challenges_'+me.id+'_'+todayKey(),c);updateStreak(me.id,true);renderStreakWidget();}};
  const oldUpdateStreak=updateStreak;
  updateStreak=function(uid,activity){
    if(uid!==me?.id)return oldUpdateStreak(uid);
    const today=todayKey(),last=localStorage.getItem('streak_last_'+uid),y=ydayKey();let st=parseInt(localStorage.getItem('streak_'+uid)||'0',10);
    if(last===today)return st;
    if(activity||!last){st=(last===y?st+1:1);localStorage.setItem('streak_'+uid,st);localStorage.setItem('streak_last_'+uid,today);localStorage.setItem('streak_updated_at_'+uid,Date.now().toString());return st;}
    return st;
  };
  function challengeHTML(){const c=getDailyChallenges();const items=[['msg','Send a DM'],['post','Post something'],['react','React to a message'],['profile','Set study status']];return `<div class="kli-streak-card" id="kliStreakWidget"><div class="kli-streak-top"><div class="kli-flame">🔥</div><div><div class="kli-streak-title">${getStreak(me.id)} day streak</div><div class="kli-streak-sub">Refreshes daily when you do one student action.</div></div></div><div class="kli-challenges">${items.map(([k,t])=>`<div class="kli-challenge ${c[k]?'done':''}"><span class="kli-check">${c[k]?'✓':'•'}</span><span>${t}</span></div>`).join('')}</div></div>`}
  window.renderStreakWidget=function(){const old=document.getElementById('kliStreakWidget');if(old)old.outerHTML=challengeHTML();}
  const oldFeed=renderFeed;renderFeed=function(c){oldFeed(c);setTimeout(()=>{const tabs=c.querySelector('.feed-tabs')||c.querySelector('.sh');if(tabs&&!document.getElementById('kliStreakWidget'))tabs.insertAdjacentHTML('afterend',challengeHTML());const bodyText=c.textContent||'';if(bodyText.includes('Following')&&bodyText.includes('No posts')){c.insertAdjacentHTML('beforeend','<div class="modern-following-empty">Follow classmates to build a smarter student feed ✨</div>')}},50)};
  const oldCreate=createPost;createPost=function(o){const r=oldCreate(o);completeChallenge('post');return r};
  const oldSendMsg=sendMsg;sendMsg=function(s,r,t,media){oldSendMsg(s,r,t,media);if(s===me?.id){completeChallenge('msg');try{localStorage.setItem('chat_streak_'+convoId(s,r)+'_last',todayKey());let n=parseInt(localStorage.getItem('chat_streak_'+convoId(s,r))||'0',10);localStorage.setItem('chat_streak_'+convoId(s,r),String(Math.max(1,n||1)))}catch(e){}}};
  const oldReact=reactToMessage; if(typeof oldReact==='function'){reactToMessage=function(a,b,c){oldReact(a,b,c);completeChallenge('react')}};
  function chatStreak(uid){try{return parseInt(localStorage.getItem('chat_streak_'+convoId(me.id,uid))||'0',10)}catch(e){return 0}}
  function statusOf(uid){try{return localStorage.getItem('study_status_'+uid)||''}catch(e){return''}}
  const oldSetStatus=window.setMyStudyStatus;window.setMyStudyStatus=function(){if(oldSetStatus)oldSetStatus();completeChallenge('profile');setTimeout(()=>{if(curView==='profile')renderView('profile',curArg)},100)};
  const oldRefresh=refreshConvList;refreshConvList=function(){oldRefresh();setTimeout(()=>{document.querySelectorAll('#convList .lr').forEach(row=>{const m=(row.getAttribute('onclick')||'').match(/openChat\('([^']+)'\)/);if(!m)return;const uid=m[1],u=getUser(uid);if(!u)return;const nick=(typeof getNickname==='function'?getNickname(uid):'')||u.username;const nameEl=row.querySelector('div:nth-child(2) div');if(nameEl){nameEl.childNodes[0]&&(nameEl.childNodes[0].textContent=nick+' ');const cs=chatStreak(uid);if(cs&&!nameEl.querySelector('.chat-streak-pill'))nameEl.insertAdjacentHTML('beforeend',`<span class="chat-streak-pill">🔥 ${cs}</span>`)}const st=statusOf(uid);const sub=row.querySelector('div:nth-child(2) div:nth-child(2)');if(st&&sub&&!sub.dataset.statusAdded){sub.dataset.statusAdded='1';sub.innerHTML=`<b style="color:var(--accent)">${esc(st)}</b> · `+sub.innerHTML}})},30)};
  const oldProfile=renderProfile;renderProfile=function(c,id){oldProfile(c,id);setTimeout(()=>{const uid=(id==='me'||!id)?me.id:id;const u=getUser(uid);if(!u)return;const st=statusOf(uid);const header=c.querySelector('[style*="font-weight:900"]')?.parentElement;if(header&&st&&!header.querySelector('.kli-status'))header.insertAdjacentHTML('beforeend',`<div class="kli-status"><span class="kli-status-dot"></span>${esc(st)}</div>`);const streakText=[...c.querySelectorAll('span')].find(x=>x.textContent.includes('day streak'));if(streakText&&!streakText.classList.contains('profile-streak-modern'))streakText.classList.add('profile-streak-modern')},80)};
})();


/* ===== ADD FEATURES 2/3/4/6/8/9 ===== */
(function(){
  function dayKey(d){return (d||new Date()).toISOString().slice(0,10)}
  function weekKey(){const d=new Date();const onejan=new Date(d.getFullYear(),0,1);const week=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);return d.getFullYear()+'-W'+week}
  function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}
  function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
  function status(uid){try{return localStorage.getItem('study_status_'+uid)||''}catch(e){return''}}
  function isExam(uid){return /exam|امتحان|اختبار|باك|final/i.test(status(uid))}
  function freezeKey(uid){return 'streak_freeze_'+uid+'_'+weekKey()}
  window.freezeLeft=function(uid){return Math.max(0,1-parseInt(localStorage.getItem(freezeKey(uid))||'0',10))};
  window.useStreakFreeze=function(uid){if(freezeLeft(uid)<=0)return false;localStorage.setItem(freezeKey(uid),String(1));return true};
  const prevUpdateStreak=updateStreak;
  updateStreak=function(uid,activity){
    if(uid!==me?.id)return prevUpdateStreak(uid,activity);
    const today=dayKey(), y=new Date();y.setDate(y.getDate()-1);const yday=dayKey(y);
    const last=localStorage.getItem('streak_last_'+uid);let st=parseInt(localStorage.getItem('streak_'+uid)||'0',10);
    if(last===today)return st;
    if(activity||!last){
      if(!last||last===yday){st=st+1||1;}
      else if(freezeLeft(uid)>0){useStreakFreeze(uid);/* keep streak alive */}
      else st=1;
      localStorage.setItem('streak_'+uid,st);localStorage.setItem('streak_last_'+uid,today);return st;
    }
    return st;
  };
  window.openStatusPresets=function(){
    const presets=[['📚 Studying','I am studying'],['🎧 Focus mode','Focus mode'],['🏫 In lecture','In lecture'],['✅ Free','Free to chat'],['🧪 Exam mode','Exam mode'],['🌙 Offline-ish','Low energy']];
    const html='<div class="status-preset-wrap">'+presets.map(([a,b])=>`<button class="status-preset" onclick="chooseStatusPreset('${b.replace(/'/g,"\\'")}')">${a}<small>${b}</small></button>`).join('')+'</div><div style="padding:0 14px 14px"><input id="customStatus" class="inp" placeholder="Custom status..."><button class="btn-f" style="width:100%;margin-top:8px" onclick="chooseStatusPreset(document.getElementById(\'customStatus\').value.trim())">Save custom</button></div>';
    modal('Set study status',html);
  };
  window.chooseStatusPreset=function(v){try{v?localStorage.setItem('study_status_'+me.id,v):localStorage.removeItem('study_status_'+me.id)}catch(e){};if(typeof completeChallenge==='function')completeChallenge('profile');closeM('genModal');toast('Status updated','ok');if(curView==='profile')renderView('profile',curArg);};
  window.setMyStudyStatus=openStatusPresets;
  function squadIds(){return lsGet('study_squad_'+me.id,[])}
  window.editStudySquad=function(){const cur=squadIds().map(id=>getUser(id)?.username).filter(Boolean).join(', ');const v=prompt('Add squad usernames separated by commas',cur);if(v===null)return;const ids=v.split(',').map(x=>x.trim().replace('@','')).filter(Boolean).map(u=>getUserByUsername(u)?.id).filter(Boolean).filter(id=>id!==me.id);lsSet('study_squad_'+me.id,[...new Set(ids)].slice(0,6));renderStudyWidgets();};
  function squadHTML(){const ids=squadIds();const users=[me,...ids.map(getUser).filter(Boolean)];const avg=Math.round(users.reduce((a,u)=>a+getStreak(u.id),0)/Math.max(1,users.length));return `<div class="kli-card"><h3>Study squad</h3><p>Shared squad streak average: <b>${avg}</b> days</p><div class="squad-members">${users.map(u=>avatarHTML(u,38)).join('')}</div><button class="btn-o" style="margin-top:12px;width:100%" onclick="editStudySquad()">Edit squad</button></div>`}
  function facultyScore(u){const start=Date.now()-7*86400000;let score=getStreak(u.id)*2;score+=(allPosts().filter(p=>p.userId===u.id&&new Date(p.createdAt||p.created_at||0).getTime()>start).length*5);score+=(u.followers||[]).length;return score}
  function leaderboardHTML(){const fac=(me.faculty||'').toLowerCase();const list=allUsers().filter(u=>u.status==='approved'&&(!fac||(u.faculty||'').toLowerCase()===fac)).map(u=>({u,score:facultyScore(u)})).sort((a,b)=>b.score-a.score).slice(0,5);return `<div class="kli-card"><h3>Weekly ${esc(me.faculty||'Faculty')} leaderboard</h3>${list.map((r,i)=>`<div class="mini-rank"><span class="rank-num ${i===0?'top':''}">${i+1}</span>${avatarHTML(r.u,30)}<div style="flex:1;font-weight:800">${esc(r.u.username)} ${isExam(r.u.id)?'<span class="exam-badge">Exam</span>':''}</div><b>${r.score}</b></div>`).join('')}</div>`}
  function achievements(uid){const posts=allPosts().filter(p=>p.userId===uid).length, st=getStreak(uid), hasStatus=!!status(uid);return [['First Post',posts>0],['7-Day Streak',st>=7],['Exam Mode',isExam(uid)],['Squad Builder',uid===me.id&&squadIds().length>0],['Status Set',hasStatus],['Faculty Top 5',uid===me.id]]}
  function achievementsHTML(uid){return `<div class="kli-card"><h3>Study achievements</h3><div class="ach-grid">${achievements(uid).map(([n,on])=>`<span class="ach-badge ${on?'unlocked':''}">${on?'✓':'○'} ${n}</span>`).join('')}</div></div>`}
  function freezeHTML(){return `<div class="kli-card"><h3>Streak freeze</h3><p><span class="freeze-pill">🧊 ${freezeLeft(me.id)} left this week</span></p><p>If you miss a day, one freeze protects your streak automatically.</p></div>`}
  window.renderStudyWidgets=function(){const old=document.getElementById('studyWidgets');if(old)old.outerHTML=widgetsHTML();}
  function widgetsHTML(){return `<div id="studyWidgets" class="kli-grid">${squadHTML()}${leaderboardHTML()}${freezeHTML()}${achievementsHTML(me.id)}</div>`}
  const oldFeed=renderFeed;renderFeed=function(c){oldFeed(c);setTimeout(()=>{if(!document.getElementById('studyWidgets')){const anchor=document.getElementById('kliStreakWidget')||c.querySelector('.feed-tabs')||c.querySelector('.sh');anchor?.insertAdjacentHTML('afterend',widgetsHTML())}},100)};
  const oldProfile=renderProfile;renderProfile=function(c,id){oldProfile(c,id);setTimeout(()=>{const uid=(id==='me'||!id)?me.id:id;const u=getUser(uid);if(!u)return;const title=[...c.querySelectorAll('div')].find(x=>x.textContent.includes('@'+u.username));if(title&&isExam(uid)&&!title.querySelector('.exam-badge'))title.insertAdjacentHTML('beforeend',' <span class="exam-badge">Exam mode</span>');if(!c.querySelector('.profile-extra-modern'))c.insertAdjacentHTML('beforeend',`<div class="profile-extra-modern">${achievementsHTML(uid)}</div>`)},120)};
  const oldRefresh=refreshConvList;refreshConvList=function(){oldRefresh();setTimeout(()=>{document.querySelectorAll('#convList .lr').forEach(row=>{const uid=(row.getAttribute('onclick')||'').match(/openChat\('([^']+)'\)/)?.[1];if(!uid)return;const name=row.querySelector('div:nth-child(2) div');if(name&&isExam(uid)&&!name.querySelector('.exam-badge'))name.insertAdjacentHTML('beforeend',' <span class="exam-badge">Exam</span>')})},60)};
})();


/* ===== UNIVERSAL SEARCH + CHAT FOLDERS ===== */
(function(){
  let usTab='all', usIndex=0, folder='all';
  const cats=['all','people','posts','chats','events','channels'];
  const iconSearch='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>';
  function ensureSearchButton(){const side=document.querySelector('.side');if(!side||side.querySelector('.universal-search-btn'))return;const b=document.createElement('button');b.className='universal-search-btn';b.innerHTML=iconSearch+'<span>Search</span><span class="us-kbd">Ctrl K</span>';b.onclick=openUniversalSearch;const first=side.querySelector('.ni')||side.children[2]||side.firstChild;side.insertBefore(b,first)}
  function ensureOverlay(){let o=document.getElementById('universalSearch');if(o)return o;o=document.createElement('div');o.id='universalSearch';o.className='universal-search-overlay';o.innerHTML=`<div class="us-box"><div class="us-head"><div class="us-icon">${iconSearch}</div><input id="usInput" class="us-input" placeholder="Search people, posts, chats, events..." autocomplete="off"><span class="us-kbd">ESC</span></div><div class="us-tabs">${cats.map(c=>`<button class="us-tab ${c==='all'?'on':''}" data-tab="${c}">${c[0].toUpperCase()+c.slice(1)}</button>`).join('')}</div><div id="usResults" class="us-results"></div><div class="us-foot"><span>Enter to open</span><span>↑ ↓ navigate</span><span>Ctrl/⌘ K search</span></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)closeUniversalSearch()});o.querySelectorAll('.us-tab').forEach(t=>t.onclick=()=>{usTab=t.dataset.tab;o.querySelectorAll('.us-tab').forEach(x=>x.classList.toggle('on',x===t));runUniversalSearch()});o.querySelector('#usInput').addEventListener('input',runUniversalSearch);o.querySelector('#usInput').addEventListener('keydown',e=>{const rows=[...document.querySelectorAll('.us-result')];if(e.key==='ArrowDown'){e.preventDefault();usIndex=Math.min(rows.length-1,usIndex+1);markUS(rows)}if(e.key==='ArrowUp'){e.preventDefault();usIndex=Math.max(0,usIndex-1);markUS(rows)}if(e.key==='Enter'&&rows[usIndex]){rows[usIndex].click()}});return o}
  window.openUniversalSearch=function(){const o=ensureOverlay();o.classList.add('on');setTimeout(()=>{o.querySelector('#usInput').focus();runUniversalSearch()},30)};
  window.closeUniversalSearch=function(){document.getElementById('universalSearch')?.classList.remove('on')};
  function markUS(rows){rows.forEach((r,i)=>r.classList.toggle('active',i===usIndex));rows[usIndex]?.scrollIntoView({block:'nearest'})}
  function addResult(arr,type,title,sub,icon,action){arr.push({type,title,sub,icon,action})}
  function collect(q){q=q.trim().toLowerCase();let out=[];const has=!q?()=>true:(txt)=>String(txt||'').toLowerCase().includes(q);
    allUsers().filter(u=>u.status==='approved'&&u.id!==me.id&&(has(u.username)||has(u.name)||has(u.faculty)||has(getNickname?.(u.id)))).slice(0,10).forEach(u=>addResult(out,'people',getNickname?.(u.id)||u.username,(u.name||'')+' · '+(u.faculty||'Student'),avatarHTML(u,42),()=>go('profile',u.id)));
    getConvos(me.id).filter(cv=>{const u=getUser(cv.other);return u&&(has(u.username)||has(u.name)||has(getNickname?.(u.id))||has(cv.last?.text))}).slice(0,10).forEach(cv=>{const u=getUser(cv.other);addResult(out,'chats',getNickname?.(u.id)||u.username,cv.last?.text||'Open chat',avatarHTML(u,42),()=>go('messages',u.id))});
    allPosts().filter(p=>has(p.text)||has(getUser(p.userId)?.username)).slice(0,12).forEach(p=>{const u=getUser(p.userId)||{};addResult(out,'posts',(p.text||'Post').slice(0,70),'Post by '+(u.username||'student'),'<div class="us-result-icon">P</div>',()=>go('profile',p.userId))});
    (data.events||[]).filter(e=>has(e.title)||has(e.description)||has(e.location)).slice(0,8).forEach(e=>addResult(out,'events',e.title,e.location||new Date(e.date).toLocaleString(),'<div class="us-result-icon">EV</div>',()=>go('events')));
    channels().filter(c=>has(c.name)||has(c.description)).slice(0,8).forEach(c=>addResult(out,'channels',c.name,(c.members||[]).length+' members','<div class="us-result-icon">#</div>',()=>go('channel',c.id)));
    return out.filter(r=>usTab==='all'||r.type===usTab);
  }
  window.runUniversalSearch=function(){const q=document.getElementById('usInput')?.value||'';const res=collect(q);usIndex=0;const box=document.getElementById('usResults');if(!box)return;if(!res.length){box.innerHTML='<div class="us-empty"><b>No results</b><br><span>Try a username, module, post text, event, or chat message.</span></div>';return}let last='';box.innerHTML=res.map((r,i)=>{const sec=(usTab==='all'&&r.type!==last)?`<div class="us-section-title">${(last=r.type)}</div>`:'';return sec+`<div class="us-result ${i===0?'active':''}" data-i="${i}"><div>${typeof r.icon==='string'&&r.icon.startsWith('<div')?r.icon:r.icon}</div><div class="us-result-main"><div class="us-result-title">${esc(r.title)}</div><div class="us-result-sub">${esc(r.sub||'')}</div></div></div>`}).join('');[...box.querySelectorAll('.us-result')].forEach((el,i)=>el.onclick=()=>{closeUniversalSearch();res[i].action()})};
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openUniversalSearch()}if(e.key==='Escape')closeUniversalSearch()});
  document.addEventListener('DOMContentLoaded',ensureSearchButton);setTimeout(ensureSearchButton,700);
  function pinned(){try{return JSON.parse(localStorage.getItem('pinned_'+me.id)||'[]')}catch(e){return[]}}
  function folderCounts(){const conv=getConvos(me.id), pin=pinned();return {all:conv.length,pinned:conv.filter(c=>pin.includes(c.other)).length,unread:conv.filter(c=>unreadCount(c.other)>0).length,study:conv.filter(c=>/study|studying|focus|lecture|exam|free/i.test(localStorage.getItem('study_status_'+c.other)||'')).length,muted:conv.filter(c=>typeof isMutedConvo==='function'&&isMutedConvo(c.other)).length}}
  function installFolders(){const c=document.getElementById('convList');if(!c||document.getElementById('chatFolders'))return;const counts=folderCounts();const html=`<div id="chatFolders" class="chat-folders">${['all','pinned','unread','study','muted'].map(f=>`<button class="chat-folder ${folder===f?'on':''}" data-folder="${f}">${f[0].toUpperCase()+f.slice(1)} <span class="count">${counts[f]||0}</span></button>`).join('')}</div>`;c.insertAdjacentHTML('afterbegin',html);document.querySelectorAll('.chat-folder').forEach(b=>b.onclick=()=>{folder=b.dataset.folder;document.querySelectorAll('.chat-folder').forEach(x=>x.classList.toggle('on',x===b));applyChatFolder()});applyChatFolder()}
  function applyChatFolder(){const pin=pinned();document.querySelectorAll('#convList .lr').forEach(r=>{const uid=(r.getAttribute('onclick')||'').match(/openChat\('([^']+)'\)/)?.[1];let show=true;if(uid){if(folder==='pinned')show=pin.includes(uid);else if(folder==='unread')show=unreadCount(uid)>0;else if(folder==='study')show=/study|studying|focus|lecture|exam|free/i.test(localStorage.getItem('study_status_'+uid)||'');else if(folder==='muted')show=typeof isMutedConvo==='function'&&isMutedConvo(uid)}r.classList.toggle('folder-hidden',!show)})}
  const oldRefresh=refreshConvList;refreshConvList=function(){oldRefresh();setTimeout(()=>{installFolders();applyChatFolder()},40)};
  const oldRender=renderMessages;renderMessages=function(c,arg){oldRender(c,arg);setTimeout(installFolders,80)};
})();


/* ===== HOME TABS: FOR YOU / FOLLOWING / FACULTY / HUB + GLOBAL/FACULTY LEADERBOARDS ===== */
(function(){
  window.homeFeedTab = window.homeFeedTab || 'foryou';
  window.leaderScope = window.leaderScope || 'global';
  function sameFaculty(u){return (u?.faculty||'').trim().toLowerCase()===(me?.faculty||'').trim().toLowerCase()}
  function recentPosts(){return allPosts().filter(p=>!p.channelId).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))}
  function postsFor(tab){let posts=recentPosts();if(tab==='following')posts=posts.filter(p=>me.following.includes(p.userId));if(tab==='faculty')posts=posts.filter(p=>sameFaculty(getUser(p.userId)));return posts}
  function dailyChallenges(){try{return getDailyChallenges?getDailyChallenges():{msg:false,post:false,react:false,profile:false}}catch(e){return{msg:false,post:false,react:false,profile:false}}}
  function facultyScore(u){const posts=allPosts().filter(p=>p.userId===u.id).length;return getStreak(u.id)*3+posts*5+(u.followers||[]).length}
  function ranked(scope){let users=allUsers().filter(u=>u.status==='approved');if(scope==='faculty')users=users.filter(sameFaculty);return users.map(u=>({u,score:facultyScore(u)})).sort((a,b)=>b.score-a.score)}

/* ===== SIMPLE HOME FIX: Home = For You, no faculty name clutter ===== */
(function(){

  function homeTabsSimple(){
    const tabs=[['foryou','For You'],['following','Following'],['hub','Hub']];
    return `<div class="home-tabs-modern simple-home-tabs">${tabs.map(([k,n])=>`<button class="home-tab-modern ${homeFeedTab===k?'active':''}" onclick="homeFeedTab='${k}';renderFeed(document.getElementById('view'))">${n}</button>`).join('')}</div>`;

  }
  function postsForSimple(tab){
    let ps=allPosts().filter(p=>!p.channelId).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    if(tab==='following')ps=ps.filter(p=>me.following.includes(p.userId));
    return ps;
  }

/* ===== FACULTY LEADERBOARD + PROFILE TRUST BADGE FIX ===== */
(function(){
  window.facultyBrowse = window.facultyBrowse || 'mine';
  window.leaderScope = window.leaderScope || 'global';
  window.leaderPeriod = window.leaderPeriod || 'week';
  function fac(u){return (u?.faculty||'').trim()}

  function sameFac(u,f){return fac(u).toLowerCase()===(f||'').trim().toLowerCase()}
  function allFaculties(){return [...new Set(allUsers().map(fac).filter(Boolean))].sort((a,b)=>a.localeCompare(b))}
  function periodStart(){const n=Date.now();return leaderPeriod==='today'?n-86400000:leaderPeriod==='week'?n-7*86400000:leaderPeriod==='month'?n-30*86400000:0}
  function userScore(u){const start=periodStart();let score=getStreak(u.id)*3+(u.followers||[]).length;allPosts().filter(p=>p.userId===u.id&&(!start||(p.createdAt||0)>start)).forEach(p=>{score+=5;score+=(p.likes||[]).length;score+=(p.comments||[]).length*2;score+=(p.helpful||[]).length*6});return score}
  function rankedUsers(){let users=allUsers().filter(u=>u.status==='approved');if(leaderScope==='faculty'){const f=selectedFaculty();users=users.filter(u=>sameFac(u,f));}return users.map(u=>({u,score:userScore(u)})).sort((a,b)=>b.score-a.score)}

  function context(u,isMe){let h='<span class="pv2-chip accent">Verified student</span>';if(u.faculty)h+=`<span class="pv2-chip">${esc(u.faculty)}</span>`;if(!isMe&&u.faculty===me.faculty)h+='<span class="pv2-chip accent">Same faculty</span>';const st=stat(u.id);if(st)h+=`<span class="pv2-chip ${isExam(u.id)?'exam':'accent'}">${esc(st)}</span>`;return h}

  function actions(u,isMe){if(isMe)return `<button class="pv2-btn primary" onclick="editProfileV2()">Edit profile</button><button class="pv2-btn" onclick="openStatusPresets&&openStatusPresets()">Status</button>`;const f=me.following.includes(u.id);return `<button class="pv2-btn primary" onclick="followUser('${u.id}',this);renderProfile(document.getElementById('view'),'${u.id}')">${f?'Following':'Follow'}</button><button class="pv2-btn" onclick="go('messages','${u.id}')">Message</button><button class="pv2-btn" onclick="profileMoreV2('${u.id}')">More</button>`}

  function tabs(){return `<div class="pv2-tabs">${[['posts','Posts'],['about','About'],['achievements','Achievements'],['media','Media']].map(([k,n])=>`<button class="pv2-tab ${profileTabV2===k?'on':''}" onclick="setProfileTabV2('${k}')">${n}</button>`).join('')}</div>`}
  function postsTab(u){const ps=allPosts().filter(p=>p.userId===u.id&&!p.channelId);return ps.length?ps.map(postCard).join(''):`<div class="pv2-empty"><b>No posts yet</b><br>${u.id===me.id?'Share something with classmates.':'This student has not posted yet.'}</div>`}
  function aboutTab(u,isMe){const m=mget(u.id);const chips=(m.modules||'').split(',').map(x=>x.trim()).filter(Boolean);const help=(m.helpWith||'').split(',').map(x=>x.trim()).filter(Boolean);return `<div class="pv2-section"><h3>Academic</h3><div class="pv2-info-grid"><div class="pv2-info"><div class="pv2-label">Faculty</div><div class="pv2-value">${esc(u.faculty||'—')}</div></div><div class="pv2-info"><div class="pv2-label">Year</div><div class="pv2-value">${esc(m.year||'—')}</div></div><div class="pv2-info"><div class="pv2-label">Group</div><div class="pv2-value">${esc(m.group||'—')}</div></div><div class="pv2-info"><div class="pv2-label">Helpful score</div><div class="pv2-value">${allPosts().filter(p=>p.userId===u.id).reduce((a,p)=>a+(p.helpful||[]).length,0)}</div></div></div>${chips.length?`<h3 style="margin-top:16px">Modules</h3><div class="pv2-token-row">${chips.map(x=>`<span class="pv2-token">${esc(x)}</span>`).join('')}</div>`:''}${help.length?`<h3 style="margin-top:16px">Can help with</h3><div class="pv2-token-row">${help.map(x=>`<span class="pv2-token on">${esc(x)}</span>`).join('')}</div>`:''}${isMe?'<button class="pv2-btn primary" style="margin-top:16px" onclick="editProfileV2()">Edit academic info</button>':''}</div>`}
  function achTab(u,isMe){const all=badgeData(u.id);const pin=pinned(u.id);return `<div class="pv2-section"><h3>Pinned badges</h3><div class="pv2-token-row">${pin.map(x=>`<span class="pv2-token on">${esc(x)}</span>`).join('')}</div>${isMe?'<button class="pv2-btn" style="margin-top:12px" onclick="editPinnedBadgesV2()">Edit pinned badges</button>':''}</div><div class="pv2-section"><h3>All achievements</h3><div class="pv2-token-row">${all.map(([n,on])=>`<span class="pv2-token ${on?'on':''}">${on?'✓':'○'} ${esc(n)}</span>`).join('')}</div></div>`}

  function content(u,isMe){if(profileTabV2==='about')return aboutTab(u,isMe);if(profileTabV2==='achievements')return achTab(u,isMe);if(profileTabV2==='media')return mediaTab(u);return postsTab(u)}
  window.renderProfile=function(c,id){const u=(id==='me'||!id)?me:getUser(id);if(!u){c.innerHTML=empty('User not found','');return}const isMe=u.id===me.id;const comp=completion(u.id);c.className='view';c.innerHTML=`<div class="profile-v2"><div class="pv2-hero"><div class="pv2-cover ${coverClass(u.id)}" ${u.banner?`style="background:url('${u.banner}') center/cover"`:''}></div><div class="pv2-main"><div class="pv2-avatar-wrap">${avatarHTML(u,104)}${isOnline(u.id)?'<span class="pv2-online"></span>':''}</div><div class="pv2-title-row"><div class="pv2-name"><h1>${esc(u.name||u.username)}</h1><div class="pv2-username">@${esc(u.username)} ${u.role==='admin'?'✓':''}</div></div><div class="pv2-actions">${actions(u,isMe)}</div></div><div class="pv2-context">${context(u,isMe)}</div>${u.bio?`<div class="pv2-bio">${esc(u.bio)}</div>`:''}${stats(u)}${isMe?`<div class="pv2-completion"><div class="pv2-completion-top"><span>Profile ${comp}% complete</span><span>${comp<100?'Add academic info + media':'Complete'}</span></div><div class="pv2-progress"><span style="width:${comp}%"></span></div></div>`:''}</div></div>${tabs()}<div class="pv2-content">${content(u,isMe)}</div></div>`}

/* ===== PRIVACY + DM REQUESTS ===== */
(function(){
  function pair(a,b){return [a,b].sort().join('_')}
  window.isPrivateAccount=function(uid){try{return localStorage.getItem('privacy_private_'+uid)==='1'}catch(e){return false}};
  window.setPrivateAccount=function(v){try{localStorage.setItem('privacy_private_'+me.id,v?'1':'0')}catch(e){};toast(v?'Private account enabled':'Public account enabled','ok');if(curView==='profile')renderProfile(document.getElementById('view'),curArg||'me')};
  window.dmAccepted=function(uid){try{return localStorage.getItem('dm_accept_'+pair(me.id,uid))==='1'}catch(e){return false}};
  function setAccepted(a,b){try{localStorage.setItem('dm_accept_'+pair(a,b),'1')}catch(e){}}
  function reqKey(to,from){return 'dm_req_'+to+'_'+from}
  function getReq(to,from){try{return JSON.parse(localStorage.getItem(reqKey(to,from))||'null')}catch(e){return null}}
  function setReq(to,from,obj){try{localStorage.setItem(reqKey(to,from),JSON.stringify(obj))}catch(e){}}
  function delReq(to,from){try{localStorage.removeItem(reqKey(to,from))}catch(e){}}
  function incoming(){let out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('dm_req_'+me.id+'_')){const from=k.split('_').slice(3).join('_');const r=getReq(me.id,from);if(r&&r.status==='pending')out.push({from,...r})}}}catch(e){}return out.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))}
  function outgoing(){let out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.endsWith('_'+me.id)&&k.startsWith('dm_req_')){const to=k.split('_')[2];const r=getReq(to,me.id);if(r&&r.status==='pending')out.push({to,...r})}}}catch(e){}return out}
  function canDM(uid){if(uid===me.id)return true;if(!isPrivateAccount(uid))return true;if(dmAccepted(uid))return true;return false}
  window.sendDMRequest=function(uid,msg){const u=getUser(uid);if(!u)return;const existing=getReq(uid,me.id);if(existing&&existing.status==='pending')return toast('Request already sent','e');setReq(uid,me.id,{status:'pending',text:msg||'Hi, I want to message you.',createdAt:Date.now()});toast('Message request sent to '+u.username,'ok');refreshConvList()};
  window.acceptDMRequest=function(from){setAccepted(me.id,from);delReq(me.id,from);toast('Request accepted','ok');refreshConvList();openChat(from)};
  window.rejectDMRequest=function(from){delReq(me.id,from);toast('Request rejected');refreshConvList()};
  const lockSVG='<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
  function requestScreen(uid){const u=getUser(uid);const sent=getReq(uid,me.id);return `<div class="request-screen"><div class="request-card"><div class="request-icon">${lockSVG}</div><h3>${esc(u?.username||'Private account')}</h3><p>This account is private. You can send a message request. If they accept, you can chat normally.</p>${sent?'<div class="privacy-pill private" style="justify-content:center;margin-bottom:12px">Request pending</div>':`<div style="display:flex;gap:8px;margin-bottom:12px"><input id="requestMsg" class="inp" placeholder="Optional request message" style="flex:1"></div>`}<div class="request-actions">${sent?'':`<button class="btn-f" onclick="sendDMRequest('${uid}',document.getElementById('requestMsg')?.value.trim())">Send request</button>`}<button class="btn-o" onclick="go('profile','${uid}')">View profile</button></div></div></div>`}
  const oldShow=showChat;
  showChat=function(uid){if(!canDM(uid)){activeChat=uid;const p=document.getElementById('chatPane');if(p){p.innerHTML=requestScreen(uid);p.classList.add('on')}refreshConvList();return}oldShow(uid)};
  const oldOpen=openChat;
  openChat=function(uid){if(!canDM(uid)){activeChat=uid;showChat(uid);return}oldOpen(uid)};
  const oldSend=sendChat;
  sendChat=function(){if(activeChat&&!canDM(activeChat)){sendDMRequest(activeChat,document.getElementById('requestMsg')?.value.trim());return}oldSend()};
  function preview(m){return m?.media?m.media.type==='audio'?'Voice message':m.media.type==='image'?'Photo':m.media.type==='video'?'Video':m.media.type==='file'?'File: '+(m.media.name||'File'):'Attachment':(m?.text||'Say hi')}
  function pins(){try{return JSON.parse(localStorage.getItem('pinned_'+me.id)||'[]')}catch(e){return[]}}
  function manualFolder(uid){try{return localStorage.getItem('chat_folder_'+me.id+'_'+uid)||''}catch(e){return''}}
  function isStudy(uid){return /study|studying|focus|lecture|exam|free|faculty/i.test((localStorage.getItem('study_status_'+uid)||'')+' '+manualFolder(uid))}
  function counts(convos){return {all:convos.length,pinned:convos.filter(c=>pins().includes(c.other)).length,unread:convos.filter(c=>unreadCount(c.other)>0).length,study:convos.filter(c=>isStudy(c.other)).length,muted:convos.filter(c=>typeof isMutedConvo==='function'&&isMutedConvo(c.other)).length,requests:incoming().length}}
  window.currentChatFolder=window.currentChatFolder||'all';
  refreshConvList=function(){
    const convos=getConvos(me.id);const c=counts(convos);const folders=['all','pinned','unread','study','muted','requests'];const bar=`<div id="chatFolders" class="chat-folders">${folders.map(f=>`<button class="chat-folder ${currentChatFolder===f?'on':''} ${f==='requests'&&c.requests?'has-requests':''}" data-f="${f}" onclick="currentChatFolder='${f}';refreshConvList()">${f[0].toUpperCase()+f.slice(1)} <span class="count">${c[f]||0}</span>${f==='requests'&&c.requests?`<span class="request-badge">${c.requests}</span>`:''}</button>`).join('')}</div>`;
    let rows='';
    if(currentChatFolder==='requests'){
      const inc=incoming();const out=outgoing();
      rows=(inc.map(r=>{const u=getUser(r.from);if(!u)return'';return `<div class="request-row"><div>${avatarHTML(u,44)}</div><div style="flex:1;min-width:0"><div style="font-weight:900">${esc(u.username)}</div><div style="color:var(--dim);font-size:13px">${esc(r.text||'Wants to message you')}</div><div class="request-row-actions"><button class="btn-f" onclick="acceptDMRequest('${r.from}')">Accept</button><button class="btn-o" onclick="rejectDMRequest('${r.from}')">Delete</button></div></div></div>`}).join('')+out.map(r=>{const u=getUser(r.to);if(!u)return'';return `<div class="request-row" onclick="go('profile','${r.to}')"><div>${avatarHTML(u,44)}</div><div style="flex:1"><div style="font-weight:900">${esc(u.username)}</div><div style="color:var(--dim);font-size:13px">Request pending</div></div></div>`}).join(''))||empty('No requests','Private account requests appear here.');
    }else{
      rows=convos.map(cv=>{const o=getUser(cv.other);if(!o)return'';let show=true;if(currentChatFolder==='pinned')show=pins().includes(cv.other);else if(currentChatFolder==='unread')show=unreadCount(cv.other)>0;else if(currentChatFolder==='study')show=isStudy(cv.other);else if(currentChatFolder==='muted')show=typeof isMutedConvo==='function'&&isMutedConvo(cv.other);const uc=unreadCount(cv.other);const nick=(typeof getNickname==='function'&&getNickname(cv.other))||o.username;return `<div class="lr conv-row ${cv.other===activeChat?'active-chat':''} ${show?'':'folder-hidden'}" onclick="openChat('${cv.other}')"><div style="position:relative">${avatarHTML(o,44)}${uc?`<span class="ub">${uc}</span>`:''}</div><div style="flex:1;min-width:0"><div style="font-weight:${uc?800:650};font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(nick)} ${isPrivateAccount(cv.other)?'<span class="privacy-pill private" style="padding:2px 6px;font-size:10px">Private</span>':''}</div><div style="color:var(--dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${preview(cv.last)}</div></div></div>`}).join('')||empty('No messages','Find students to chat.');
    }
    const el=document.getElementById('convList');if(el)el.innerHTML=bar+rows;updateBadges();
  };
  function injectPrivacyProfile(){if(curView!=='profile')return;const u=(curArg==='me'||!curArg)?me:getUser(curArg);if(!u)return;const isMe=u.id===me.id;if(document.querySelector('.privacy-card'))return;const anchor=document.querySelector('.pv2-content')||document.querySelector('.profile-v2');if(anchor&&isMe){anchor.insertAdjacentHTML('beforebegin',`<div class="privacy-card"><h3>Privacy</h3><p>${isPrivateAccount(me.id)?'Private: students must send a request before messaging you.':'Public: students can message you normally.'}</p><button class="pv2-btn ${isPrivateAccount(me.id)?'':'primary'}" onclick="setPrivateAccount(${!isPrivateAccount(me.id)})">Make account ${isPrivateAccount(me.id)?'Public':'Private'}</button></div>`)}else if(anchor&&isPrivateAccount(u.id)){anchor.insertAdjacentHTML('beforebegin','<div class="privacy-card"><h3>Private account</h3><p>This student controls who can message them.</p></div>')}
  }
  const oldProfile=renderProfile;renderProfile=function(c,id){oldProfile(c,id);setTimeout(injectPrivacyProfile,100)};
})();


/* ===== ORGANIZED SETTINGS: privacy/options moved from profile ===== */
(function(){
  function priv(){try{return localStorage.getItem('privacy_private_'+me.id)==='1'}catch(e){return false}}
  function setPriv(v){try{localStorage.setItem('privacy_private_'+me.id,v?'1':'0')}catch(e){};toast(v?'Private account enabled':'Public account enabled','ok');renderSettings(document.getElementById('view'))}
  window.togglePrivateFromSettings=function(){setPriv(!priv())};

  function fixedFolderLabels(){document.querySelectorAll('#chatFolders .chat-folder').forEach(btn=>{const f=btn.dataset.f||btn.getAttribute('onclick')?.match(/currentChatFolder='([^']+)'/)?.[1]||'';const labels={all:'All',pinned:'Pins',unread:'Unread',study:'Study',muted:'Muted',requests:'Requests'};const count=btn.querySelector('.count')?.textContent||'';const badge=btn.querySelector('.request-badge')?.outerHTML||'';if(labels[f])btn.innerHTML=labels[f]+(count?` <span class="count">${count}</span>`:'')+badge;})}

/* ===== SUPABASE REAL REQUESTS + PRIVACY FIX ===== */
(function(){
  window.requestData = window.requestData || {follow:[], dm:[]};
  window.requestTablesReady = true;
  function rowTime(r){return new Date(r.created_at||r.createdAt||Date.now()).getTime()}
  async function syncRequests(){
    if(!USE_SUPA||!me||!sp||!requestTablesReady)return;
    try{
      const [fr,dm]=await Promise.all([
        sp.from('follow_requests').select('*').or(`from_id.eq.${me.id},to_id.eq.${me.id}`).order('created_at',{ascending:false}),
        sp.from('dm_requests').select('*').or(`from_id.eq.${me.id},to_id.eq.${me.id}`).order('created_at',{ascending:false})
      ]);
      if(fr.error||dm.error){requestTablesReady=false;console.warn('Request tables missing. Run supabase_requests_privacy.sql',fr.error||dm.error);return;}
      requestData.follow=fr.data||[];
      requestData.dm=dm.data||[];
      const raw=(data.users||[]).find(u=>u.id===me.id);
      if(raw&&typeof raw.is_private!=='undefined')localStorage.setItem('privacy_private_'+me.id,raw.is_private?'1':'0');
    }catch(e){requestTablesReady=false;console.warn('Request sync failed',e)}
  }
  window.syncRequests=syncRequests;
  function localIncomingFollow(){let out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('follow_req_'+me.id+'_')){const from=k.split('_').slice(3).join('_');const r=JSON.parse(localStorage.getItem(k)||'{}');if(r.status==='pending')out.push({from_id:from,to_id:me.id,status:'pending',created_at:new Date(r.createdAt||Date.now()).toISOString(),text:r.text||''})}}}catch(e){}return out}
  function localOutgoingFollow(){let out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.endsWith('_'+me.id)&&k.startsWith('follow_req_')){const to=k.split('_')[2];const r=JSON.parse(localStorage.getItem(k)||'{}');if(r.status==='pending')out.push({from_id:me.id,to_id:to,status:'pending',created_at:new Date(r.createdAt||Date.now()).toISOString(),text:r.text||''})}}}catch(e){}return out}
  function localIncomingDM(){let out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('dm_req_'+me.id+'_')){const from=k.split('_').slice(3).join('_');const r=JSON.parse(localStorage.getItem(k)||'{}');if(r.status==='pending')out.push({from_id:from,to_id:me.id,status:'pending',text:r.text||'',created_at:new Date(r.createdAt||Date.now()).toISOString()})}}}catch(e){}return out}
  function localOutgoingDM(){let out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.endsWith('_'+me.id)&&k.startsWith('dm_req_')){const to=k.split('_')[2];const r=JSON.parse(localStorage.getItem(k)||'{}');if(r.status==='pending')out.push({from_id:me.id,to_id:to,status:'pending',text:r.text||'',created_at:new Date(r.createdAt||Date.now()).toISOString()})}}}catch(e){}return out}
  window.incomingFollowRequests=function(){return [...(requestData.follow||[]).filter(r=>r.to_id===me.id&&r.status==='pending'),...localIncomingFollow()].sort((a,b)=>rowTime(b)-rowTime(a))}
  window.outgoingFollowRequests=function(){return [...(requestData.follow||[]).filter(r=>r.from_id===me.id&&r.status==='pending'),...localOutgoingFollow()].sort((a,b)=>rowTime(b)-rowTime(a))}
  window.incomingDMRequests=function(){return [...(requestData.dm||[]).filter(r=>r.to_id===me.id&&r.status==='pending'),...localIncomingDM()].sort((a,b)=>rowTime(b)-rowTime(a))}
  window.outgoingDMRequests=function(){return [...(requestData.dm||[]).filter(r=>r.from_id===me.id&&r.status==='pending'),...localOutgoingDM()].sort((a,b)=>rowTime(b)-rowTime(a))}
  window.isPrivateAccount=function(uid){
    const raw=(data.users||[]).find(u=>u.id===uid);
    if(raw&&typeof raw.is_private!=='undefined')return !!raw.is_private;
    try{return localStorage.getItem('privacy_private_'+uid)==='1'}catch(e){return false}
  }
  window.setPrivateAccount=function(v){
    try{localStorage.setItem('privacy_private_'+me.id,v?'1':'0')}catch(e){}
    const raw=(data.users||[]).find(u=>u.id===me.id); if(raw)raw.is_private=!!v;
    if(USE_SUPA)updateDB('profiles',me.id,{is_private:!!v});
    toast(v?'Private account enabled':'Public account enabled','ok');
    if(curView==='settings')renderSettings(document.getElementById('view'));
  }
  window.dmAccepted=function(uid){
    try{if(localStorage.getItem('dm_accept_'+[me.id,uid].sort().join('_'))==='1')return true}catch(e){}
    return (requestData.dm||[]).some(r=>r.status==='accepted'&&((r.from_id===me.id&&r.to_id===uid)||(r.from_id===uid&&r.to_id===me.id)));
  }
  async function upsertRequest(table,row){
    if(USE_SUPA&&requestTablesReady){
      const res=await sp.from(table).upsert(row,{onConflict:'from_id,to_id'}).select().single();
      if(res.error){requestTablesReady=false;console.warn(res.error);return false}
      await syncRequests();return true;
    }
    return false;
  }
  window.sendFollowRequest=async function(uid){

  }
  window.sendDMRequest=async function(uid,msg){
    const u=getUser(uid);if(!u)return;
    const ok=await upsertRequest('dm_requests',{from_id:me.id,to_id:uid,text:msg||'Hi, I want to message you.',status:'pending'});
    if(!ok)localStorage.setItem('dm_req_'+uid+'_'+me.id,JSON.stringify({status:'pending',text:msg||'',createdAt:Date.now()}));

  }

  // Persistent browser notification permission prompt: stays until permission is granted.
  let notifAudioCtx=null;
  function notifIcon(){return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>'}
  function ensureNotifPrompt(){

  };

    }else ensureNotifPrompt();
  };

})();


/* ===== FINAL WORKING BROWSER NOTIFICATIONS + SOUND ===== */
(function(){
  const N={msgIds:new Set(), reqKeys:new Set(), started:false, audio:null, unlocked:false, lastSync:0};
  function icon(){return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>'}

  function beep(){
    try{
      ensureAudio(); const ctx=N.audio; if(!ctx)return;
      [0,.13].forEach((delay,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=i?660:920;g.gain.setValueAtTime(.0001,ctx.currentTime+delay);g.gain.exponentialRampToValueAtTime(.09,ctx.currentTime+delay+.02);g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+delay+.18);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+.2);});
    }catch(e){console.warn('sound blocked until user interaction',e)}
  }
  ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,ensureAudio,{once:true,passive:true}));
  window.playKoliyaNotifSound=beep;
  function prompt(){

    if(!el){el=document.createElement('div');el.id='notifSticky';el.className='notif-sticky';document.body.appendChild(el)}

  }

  window.testKoliyaNotification=function(){ensureAudio(); notifyNow('Koliya test notification','If you hear sound and see this, it works.','koliya-test')};
  function notifyNow(title,body,tag){beep(); try{if('Notification' in window&&Notification.permission==='granted')new Notification(title,{body:body||'',tag:tag||title,renotify:false});else prompt();}catch(e){console.warn(e)} if(typeof toast==='function')toast(title,'ok');}
  window.browserNotify=notifyNow;
  function initSeen(){N.msgIds=new Set((data.messages||[]).map(m=>m.id));N.reqKeys=new Set(reqKeys());}
  function reqKeys(){let arr=[];try{(window.incomingFollowRequests?incomingFollowRequests():[]).forEach(r=>arr.push('f_'+(r.id||r.from_id+'_'+r.created_at)));(window.incomingDMRequests?incomingDMRequests():[]).forEach(r=>arr.push('d_'+(r.id||r.from_id+'_'+r.created_at)));}catch(e){}return arr}
  function checkNewMessages(){(data.messages||[]).forEach(m=>{if(!N.msgIds.has(m.id)){N.msgIds.add(m.id); if(m.receiver===me.id&&m.sender!==me.id){const u=getUser(m.sender);const body=m.text||(m.media?(m.media.type==='audio'?'Voice message':m.media.type==='image'?'Photo':m.media.type==='video'?'Video':'Attachment'):'New message');notifyNow('New DM from '+(u?u.username:'student'),body,'dm-'+m.sender);}}});}
  function checkNewRequests(){const keys=reqKeys();keys.forEach(k=>{if(!N.reqKeys.has(k)){N.reqKeys.add(k); if(k.startsWith('f_'))notifyNow('New follow request','A student requested to follow you.','follow-req'); if(k.startsWith('d_'))notifyNow('New message request','A student requested to message you.','dm-req');}})}
  async function tick(){

    if(USE_SUPA&&now-N.lastSync>5500){N.lastSync=now; try{await syncDB();me=getUser(me.id); if(typeof syncRequests==='function')await syncRequests();}catch(e){}}

  }

    const img=p.image || (p.media&&p.media.type==='image'?p.media.data:null);
    const label=p.media?(' · '+p.media.type):'';
    return `<div class="share-post-preview">${img?`<img class="share-post-thumb" src="${img}">`:'<div class="share-post-thumb" style="display:grid;place-items:center;font-weight:900;color:var(--accent)">POST</div>'}<div style="min-width:0;flex:1"><div style="font-weight:900;font-size:13px">@${esc(author?author.username:'student')}${label}</div><div class="share-post-text">${esc(p.text||'Media post')}</div><div style="font-size:11px;color:var(--dim);margin-top:5px">${(p.likes||[]).length} likes · ${(p.comments||[]).length} comments</div></div></div>`;
  }
  window.sharePostToDM=function(postId){
    const pack=postSharePayload(postId); if(!pack)return;
    const convTargets=getConvos(me.id).map(cv=>cv.other);
    const followTargets=[...(me.following||[]),...(me.followers||[])];
    const ids=[...new Set([...convTargets,...followTargets])].filter(id=>id!==me.id&&getUser(id));
    const dmRows=ids.length?ids.map(id=>{const u=getUser(id);return `<div class="lr" onclick="sendShareToDM('${id}','${postId}')">${avatarHTML(u,40)}<div style="flex:1"><div style="font-weight:700;font-size:14px">${esc((typeof getNickname==='function'&&getNickname(id))||u.username)}</div><div style="color:var(--dim);font-size:12px">${esc(u.name||'Student')}</div></div></div>`}).join(''):'<div class="request-tab-note">No DM targets yet. Follow or chat with students first.</div>';
    const groups=localGroups();
    const groupRows=groups.length?groups.map(g=>`<div class="lr" onclick="sendShareToGroup('${g.id}','${postId}')"><div class="group-avatar">${esc((g.name||'G')[0])}</div><div style="flex:1"><div style="font-weight:700;font-size:14px">${esc(g.name)} <span class="share-group-badge">Group</span></div><div style="color:var(--dim);font-size:12px">${(g.members||[]).length} members</div></div></div>`).join(''):'<div class="request-tab-note">No groups yet. Create a DM group first.</div>';
    modal('Share post',`<div style="padding:0;max-height:72vh;overflow:auto">${previewHTML(pack)}<div class="share-target-tabs"><button class="share-target-tab on" onclick="document.getElementById('shareDMList').style.display='block';document.getElementById('shareGroupList').style.display='none';this.classList.add('on');this.nextElementSibling.classList.remove('on')">DMs</button><button class="share-target-tab" onclick="document.getElementById('shareDMList').style.display='none';document.getElementById('shareGroupList').style.display='block';this.classList.add('on');this.previousElementSibling.classList.remove('on')">Groups</button></div><div id="shareDMList">${dmRows}</div><div id="shareGroupList" style="display:none">${groupRows}</div></div>`);
  };
  window.sendShareToDM=function(userId,postId){
    const pack=postSharePayload(postId); if(!pack)return;
    const text=`Shared a post from @${pack.author?pack.author.username:'student'}${pack.p.text?': '+pack.p.text:''}`;
    sendMsg(me.id,userId,text,pack.shareMedia);
    closeM('genModal');toast('Post shared!','ok');go('messages',userId);
  };
  window.sendShareToGroup=function(groupId,postId){
    const pack=postSharePayload(postId); if(!pack)return;
    let groups=localGroups();const g=groups.find(x=>x.id===groupId);if(!g)return;
    g.messages=g.messages||[];
    g.messages.push({id:uid('gm'),userId:me.id,text:`Shared a post from @${pack.author?pack.author.username:'student'}${pack.p.text?': '+pack.p.text:''}`,media:pack.shareMedia,createdAt:Date.now()});
    localStorage.setItem('dm_groups_'+me.id,JSON.stringify(groups));
    closeM('genModal');toast('Post shared to group!','ok');go('messages');setTimeout(()=>openDMGroup(groupId),80);
  };
  function sharedPostHTML(m){
    const sp=m&&m.post;if(!sp)return '';
    const media=m.media;
    const mediaPart=media? (media.type==='image'?`<img src="${media.data}">`:media.type==='video'?`<video src="${media.data}" controls></video>`:media.type==='audio'?`<div style="padding:10px">${mediaHTML?mediaHTML(media):'Voice message'}</div>`:media.data?`<a class="file-inline" href="${media.data}" download="${esc(media.name||'file')}"><span class="file-inline-icon">F</span>${esc(media.name||'File')}</a>`:'') : '';
    return `<div class="shared-post-card"><div class="shared-post-head">Shared post · @${esc(sp.author||'student')} · ${sp.likes||0} likes · ${sp.comments||0} comments</div>${mediaPart}<div class="shared-post-body">${esc(sp.text||'Media post')}</div></div>`;
  }
  // Patch DM chat render after it renders: replace shared_post media blocks/add card if missing.
  const prevShow=showChat;
  showChat=function(uid){prevShow(uid);setTimeout(()=>{const body=document.getElementById('chatBody');if(!body)return;getMsgs(me.id,uid).forEach(m=>{if(m.media&&m.media.type==='shared_post'&&!document.getElementById('shared-'+m.id)){const bubbles=[...body.querySelectorAll('.bub')];const b=bubbles.find(x=>x.textContent.includes((m.text||'').slice(0,24)));if(b){const wrap=document.createElement('div');wrap.id='shared-'+m.id;wrap.innerHTML=sharedPostHTML(m.media);b.insertBefore(wrap,b.firstChild);}}})},100)};
  // Patch group renderer by overriding mediaHTML if existing local function is unavailable globally.
  const prevOpenGroup=window.openDMGroup;
  if(prevOpenGroup){window.openDMGroup=function(id){prevOpenGroup(id);setTimeout(()=>{let groups=localGroups();const g=groups.find(x=>x.id===id);const body=document.getElementById('groupBody');if(!g||!body)return;(g.messages||[]).forEach(m=>{if(m.media&&m.media.type==='shared_post'&&!document.getElementById('gshared-'+m.id)){const nodes=[...body.querySelectorAll('.group-msg')];const b=nodes.find(x=>x.textContent.includes((m.text||'').slice(0,24)));if(b){const wrap=document.createElement('div');wrap.id='gshared-'+m.id;wrap.innerHTML=sharedPostHTML(m.media);b.insertBefore(wrap,b.firstChild)}}})},100)}};
})();


/* ===== DM EDIT/UNSEND + GROUP THEME/NICKNAME PANEL ===== */
(function(){
  function canEditMsg(m){return m&&m.sender===me.id}
  window.unsendMessage=function(msgId){
    const m=(data.messages||[]).find(x=>x.id===msgId);if(!m||m.sender!==me.id)return toast('You can only unsend your messages','e');
    if(!confirm('Unsend this message?'))return;
    data.messages=data.messages.filter(x=>x.id!==msgId);saveLocal();
    if(USE_SUPA)deleteDB('messages',msgId);
    if(activeChat)showChat(activeChat);refreshConvList();toast('Message unsent');
  };
  window.editMessage=function(msgId){
    const m=(data.messages||[]).find(x=>x.id===msgId);if(!m||m.sender!==me.id)return toast('You can only edit your messages','e');
    if(m.media&&!m.text)return toast('Media-only messages cannot be edited','e');
    const txt=prompt('Edit message:',m.text||'');if(txt===null)return;
    m.text=txt.trim();m.edited=true;m.editedAt=Date.now();saveLocal();
    if(USE_SUPA)updateDB('messages',msgId,{text:m.text});
    if(activeChat)showChat(activeChat);toast('Message edited','ok');
  };
  function addEditUnsendButtons(){
    if(!activeChat)return;const body=document.getElementById('chatBody');if(!body)return;
    const msgs=getMsgs(me.id,activeChat);const bubbles=[...body.querySelectorAll('.bub')];
    bubbles.forEach((b,i)=>{const m=msgs[i];if(!m||!canEditMsg(m))return;let actions=b.querySelector('.msg-actions');if(!actions){actions=document.createElement('div');actions.className='msg-actions';b.prepend(actions)}if(!actions.querySelector('.edit-msg-btn'))actions.insertAdjacentHTML('beforeend',`<button class="msg-mini-btn edit edit-msg-btn" title="Edit" onclick="editMessage('${m.id}')">✎</button><button class="msg-mini-btn danger" title="Unsend" onclick="unsendMessage('${m.id}')">⌫</button>`);if(m.edited&&!b.querySelector('.edited-tag')){const time=b.querySelector('.msg-time');if(time)time.insertAdjacentHTML('beforeend','<span class="edited-tag">edited</span>')}});
  }
  const oldShow=showChat;showChat=function(uid){oldShow(uid);setTimeout(addEditUnsendButtons,80);setTimeout(addEditUnsendButtons,220)};

  function groups(){try{return JSON.parse(localStorage.getItem('dm_groups_'+me.id)||'[]')}catch(e){return[]}}
  function saveGroups(g){try{localStorage.setItem('dm_groups_'+me.id,JSON.stringify(g))}catch(e){}}
  function gTheme(id){try{return localStorage.getItem('group_theme_'+me.id+'_'+id)||'default'}catch(e){return'default'}}
  function setGTheme(id,t){try{localStorage.setItem('group_theme_'+me.id+'_'+id,t)}catch(e){};const p=document.getElementById('chatPane');if(p)p.setAttribute('data-theme',t);openGroupInfo(id)}
  function gAlias(id){try{return localStorage.getItem('group_alias_'+me.id+'_'+id)||''}catch(e){return''}}
  function setGAlias(id,v){try{v?localStorage.setItem('group_alias_'+me.id+'_'+id,v):localStorage.removeItem('group_alias_'+me.id+'_'+id)}catch(e){};openDMGroup(id);openGroupInfo(id);toast('Group nickname saved','ok')}
  const THEME_META={default:['Default','#efeae2','linear-gradient(135deg,#4F46E5,#7C3AED)'],midnight:['Midnight','#0b141a','#202c33'],independence:['Independence','linear-gradient(90deg,#006233 33%,#fff 33% 66%,#D21034 66%)','linear-gradient(135deg,#006233,#009543)'],desert:['Desert','#fef3c7','linear-gradient(135deg,#d97706,#f59e0b)'],ocean:['Ocean','#dbeafe','linear-gradient(135deg,#0ea5e9,#0284c7)'],forest:['Forest','#dcfce7','linear-gradient(135deg,#16a34a,#15803d)']};
  window.openGroupInfo=function(id){
    const g=groups().find(x=>x.id===id);if(!g)return;let panel=document.getElementById('groupInfoPanel');if(!panel){panel=document.createElement('div');panel.id='groupInfoPanel';panel.className='group-info-panel';document.body.appendChild(panel)}const theme=gTheme(id),alias=gAlias(id);panel.innerHTML=`<div class="group-info-card"><div class="group-info-head"><button class="btn-o" onclick="document.getElementById('groupInfoPanel').classList.remove('on')">✕</button><b style="flex:1">Group Info</b></div><div class="group-info-hero"><div class="group-info-avatar">${esc((alias||g.name||'G')[0])}</div><h2>${esc(alias||g.name)}</h2><div style="color:var(--dim);font-size:13px">${g.members.length} members</div></div><div class="group-info-section"><div class="group-info-title">Nickname</div><div class="group-nick-row"><input id="groupAliasInput" class="inp" placeholder="Your nickname for this group" value="${esc(alias)}"><button class="btn-f" onclick="setGroupAlias('${id}',document.getElementById('groupAliasInput').value.trim())">Save</button></div></div><div class="group-info-section"><div class="group-info-title">Themes</div><div class="group-theme-list">${Object.entries(THEME_META).map(([k,v])=>`<div class="group-theme-card ${theme===k?'on':''}" onclick="setGroupTheme('${id}','${k}')"><div class="group-theme-preview" style="background:${v[1]}"><div class="group-theme-bubble" style="background:${v[2]}"></div></div><div style="font-size:11px;font-weight:800">${v[0]}</div></div>`).join('')}</div></div><div class="group-info-section"><div class="group-info-title">Members</div><div class="group-member-list">${g.members.map(uid=>{const u=getUser(uid);return u?`<div class="group-member-item">${avatarHTML(u,34)}<div><b>${esc(u.username)}</b><div style="font-size:12px;color:var(--dim)">${uid===g.members[0]?'Creator':'Member'}</div></div></div>`:''}).join('')}</div></div></div>`;panel.classList.add('on')};
  window.setGroupTheme=setGTheme;window.setGroupAlias=setGAlias;
  const oldOpenGroup=window.openDMGroup;
  if(oldOpenGroup){window.openDMGroup=function(id){oldOpenGroup(id);setTimeout(()=>{const p=document.getElementById('chatPane');if(p){p.setAttribute('data-theme',gTheme(id));const sh=p.querySelector('.sh');const g=groups().find(x=>x.id===id);if(sh&&g&&!sh.querySelector('.group-info-btn')){const alias=gAlias(id);const title=sh.querySelector('b');if(title&&alias)title.textContent=alias;sh.insertAdjacentHTML('beforeend',`<button class="btn-o group-info-btn" onclick="openGroupInfo('${id}')">Info</button>`)}}},80)}};
})();

</script>
</body>
