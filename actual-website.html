<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>كُلِّيَّة — Koliya</title>
<meta name="description" content="The private, Carte-Étudiant-verified social network for Algerian university students. Streaks, badges, channels & campus life." />
<meta name="theme-color" content="#4F46E5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Koliya" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
<style>
:root{--accent:#4F46E5;--accent-h:#4338CA;--accent-lt:#EEF2FF;--accent-grad:linear-gradient(135deg,#667eea,#764ba2);--danger:#EF4444;--like:#F43F5E;--ok:#22C55E;--r:16px;--max:600px;--t:.25s cubic-bezier(.4,0,.2,1)}
:root{--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 20px rgba(0,0,0,.08);--shadow-lg:0 8px 40px rgba(0,0,0,.12)}
[data-theme="light"]{--bg:#fff;--card:#fff;--hover:#F5F5F5;--txt:#111;--dim:#888;--bd:#eee;--nav:rgba(255,255,255,.92)}
[data-theme="dark"]{--bg:#080808;--card:#141414;--hover:#1e1e1e;--txt:#f0f0f0;--dim:#666;--bd:#252525;--nav:rgba(8,8,8,.85)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;overflow:hidden;transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{font:inherit;color:var(--txt)}input::placeholder{color:var(--dim)}
img{max-width:100%;display:block}.hidden{display:none!important}
/* auth */
.auth{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--accent-grad);position:relative}
.auth-box{width:100%;max-width:400px;background:var(--card);border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:authIn .5s cubic-bezier(.2,.8,.2,1)}
.auth-h{text-align:center;margin-bottom:24px}
.logo{font-size:32px;font-weight:800;cursor:pointer;user-select:none;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.sub{color:var(--dim);font-size:12px;margin-top:2px}
.f{display:flex;flex-direction:column;gap:10px}
.inp{width:100%;background:var(--hover);border:1.5px solid transparent;border-radius:12px;padding:13px 15px;transition:border var(--t),background var(--t);font-size:15px}
.inp:focus{border-color:var(--accent);outline:none;background:var(--card);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.btn{background:var(--accent-grad);color:#fff;border-radius:12px;padding:13px;width:100%;font-weight:600;transition:transform var(--t),box-shadow var(--t);box-shadow:0 4px 14px rgba(79,70,229,.35);border:none}
.btn:hover{box-shadow:0 6px 20px rgba(79,70,229,.5);transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-g{background:var(--hover);color:var(--txt);border:1px solid var(--bd)}
.btn-r{background:var(--danger);color:#fff;border-radius:10px;padding:9px 16px;font-weight:600}
.sw{text-align:center;font-size:13px;color:var(--dim);margin-top:6px}.sw a{color:var(--accent);font-weight:600;cursor:pointer}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);opacity:.5;font-size:16px;cursor:pointer}
.gi{width:56px;height:56px;border-radius:50%;background:var(--accent-lt);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.gi svg{width:26px;height:26px}
/* layout */
.app{display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden}
.main{overflow-y:auto;overflow-x:hidden;border-left:1px solid var(--bd);height:100vh}
.view{max-width:var(--max);margin:0 auto;padding-bottom:70px}
.view.full{max-width:none;padding-bottom:0}
.side{height:100vh;border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 12px;background:var(--card);position:sticky;top:0}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;margin-top:16px}
.ni{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;font-size:15px;font-weight:500;transition:all var(--t);width:100%}
.ni:hover{background:var(--hover)}.ni.on{background:var(--accent-lt);color:var(--accent);font-weight:600}.ni.on svg{stroke-width:2.2}
.ni svg{width:23px;height:23px;flex-shrink:0}
.nd{position:relative}
.dot{position:absolute;top:-2px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--like);color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
.topbar{display:none}.bnav{display:none}
/* stories */
.stories{display:flex;gap:12px;padding:12px;overflow-x:auto;border-bottom:1px solid var(--bd);scrollbar-width:none}.stories::-webkit-scrollbar{display:none}
.st{flex-shrink:0;text-align:center;cursor:pointer}
.ring{width:62px;height:62px;border-radius:50%;padding:2.5px;background:linear-gradient(45deg,#4F46E5,#7C3AED,#EC4899)}
.ring.v{background:var(--bd)}
.ring>div{width:100%;height:100%;border-radius:50%;border:2.5px solid var(--card);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.st .l{font-size:11px;margin-top:3px;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* post */
.post{border-bottom:1px solid var(--bd);padding:16px 0;transition:background var(--t)}
.ph{display:flex;align-items:center;gap:10px;padding:0 14px}
.av{border-radius:50%;background:var(--hover);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);overflow:hidden;flex-shrink:0;position:relative}
.pt{padding:6px 14px 0;white-space:pre-wrap;word-break:break-word}
.pm{margin:8px 14px 0;border-radius:12px;overflow:hidden}.pm img,.pm video{width:100%}
.fc{display:flex;align-items:center;gap:10px;margin:8px 14px;padding:12px;background:var(--hover);border-radius:12px;text-decoration:none;color:var(--txt);border:1px solid var(--bd)}
.fi{width:38px;height:38px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.fn{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fs{color:var(--dim);font-size:11px}
.pa{display:flex;gap:18px;padding:8px 14px 0}
.act{display:flex;align-items:center;gap:4px;color:var(--dim);transition:transform var(--t);cursor:pointer}
.act:hover{transform:scale(1.15)}.act svg{width:20px;height:20px}
.act .c{font-size:12px;font-weight:600;color:var(--txt)}
.act.lk{color:var(--like)}.act.sv{color:var(--accent)}
.cm{font-size:13px;padding:2px 14px 0}.cm .u{font-weight:700;margin-right:5px}
.cb{display:flex;gap:6px;padding:6px 14px}
.cb input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--bd);padding:5px 0}.cb input:focus{outline:none;border-color:var(--accent)}
.cb button{color:var(--accent);font-weight:600;font-size:14px}
/* compose */
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--nav);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);z-index:5}
.compose-card{margin:12px 14px;padding:16px;background:var(--card);border:1px solid var(--bd);border-radius:18px;box-shadow:var(--shadow-sm);transition:box-shadow var(--t)}
.compose-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.compose-card-input{flex:1;background:var(--hover);border-radius:20px;padding:10px 16px;color:var(--dim);cursor:pointer;font-size:15px}
.compose-card-actions{display:flex;gap:16px;padding-top:10px;border-top:1px solid var(--bd-soft,var(--bd))}
.compose-act{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;transition:color var(--t)}
.compose-act:hover{color:var(--accent)}
.compose-act svg{width:18px;height:18px}
/* modal */
.ml{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.mb{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.mc{position:relative;background:var(--card);border-radius:24px;width:100%;max-width:540px;max-height:90vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .3s cubic-bezier(.2,.8,.2,1)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd)}
.tb{background:var(--hover);border-radius:18px;padding:7px 12px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.tb svg{width:16px;height:16px;color:var(--accent)}
/* channel */
.chc{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.chc:hover{background:var(--hover)}
.chi{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase}
.badge.public{background:rgba(34,197,94,.12);color:var(--ok)}.badge.private{background:var(--accent-lt);color:var(--accent)}
.chd-h{text-align:center;padding:20px 14px;border-bottom:1px solid var(--bd)}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--hover);border-radius:18px;padding:4px 10px;font-size:11px;color:var(--dim);margin:2px}
.tg{position:relative;width:40px;height:22px;flex-shrink:0}
.tg input{opacity:0;width:0;height:0}
.tg .sl{position:absolute;cursor:pointer;inset:0;background:var(--bd);border-radius:22px;transition:.3s}
.tg .sl:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.sl{background:var(--accent)}.tg input:checked+.sl:before{transform:translateX(18px)}
.empty{text-align:center;padding:60px 24px;color:var(--dim)}.empty h3{margin-bottom:8px;font-size:18px;font-weight:700}.empty p{font-size:14px;line-height:1.6}
.lr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}.lr:hover{background:var(--hover)}
.btn-o{background:var(--hover);color:var(--txt);border-radius:10px;padding:8px 16px;font-weight:500;font-size:14px;display:inline-flex;align-items:center;gap:5px}
.btn-o svg{width:16px;height:16px}
.btn-f{background:var(--accent);color:#fff;border-radius:10px;padding:8px 20px;font-weight:600;font-size:14px}
.btn-f.f{background:var(--hover);color:var(--txt)}
/* profile enhancements */
.link-pill{display:inline-flex;align-items:center;gap:4px;background:var(--accent-lt);color:var(--accent);padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;text-decoration:none;margin-bottom:4px;transition:filter var(--t)}
.link-pill:hover{filter:brightness(1.1)}
.profile-tabs{display:flex;border-top:1px solid var(--bd);margin-top:12px}
.ptab{flex:1;padding:12px;text-align:center;font-weight:600;font-size:14px;color:var(--dim);cursor:pointer;border-top:2px solid transparent}
.ptab.active{color:var(--accent);border-top-color:var(--accent)}
.grid-item-text{font-size:24px;color:var(--dim)}
/* POLLS */
.poll-card{margin:8px 14px;padding:14px;background:var(--hover);border-radius:12px;border:1px solid var(--bd)}
.poll-q{font-weight:600;font-size:14px;margin-bottom:10px}
.poll-opt{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border:1.5px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border var(--t);position:relative;overflow:hidden}
.poll-opt:hover{border-color:var(--accent)}
.poll-opt.voted{border-color:var(--accent)}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:var(--accent-lt);transition:width .5s;z-index:0}
.poll-opt>*{position:relative;z-index:1}
.poll-pct{font-size:12px;font-weight:700;color:var(--accent)}
.poll-total{text-align:center;color:var(--dim);font-size:12px;margin-top:8px}
/* EVENTS */
.event-card{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--bd);cursor:pointer}
.event-card:hover{background:var(--hover)}
.event-date{width:54px;height:54px;border-radius:12px;background:var(--accent);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.event-day{font-size:20px;font-weight:800;line-height:1}
.event-mon{font-size:10px;text-transform:uppercase;opacity:.8}
.event-info{flex:1;min-width:0}
.event-title{font-weight:600;font-size:15px;margin-bottom:2px}
.event-meta{color:var(--dim);font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.event-going{background:rgba(34,197,94,.12);color:var(--ok);font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600}
/* Q&A */
.qa-card{padding:14px;border-bottom:1px solid var(--bd)}
.qa-q{font-size:15px;font-weight:500;margin-bottom:8px;line-height:1.5}
.qa-anon{display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-size:12px;font-weight:600;margin-bottom:6px}
.qa-answers{color:var(--dim);font-size:13px;cursor:pointer}
.qa-answers:hover{text-decoration:underline}
/* HUB */
.hub-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--bd);border-radius:12px;margin:8px 14px;text-decoration:none;color:var(--txt);transition:border var(--t)}
.hub-card:hover{border-color:var(--accent)}
.hub-ic{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hub-meta{flex:1;min-width:0}
.hub-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hub-sub{color:var(--dim);font-size:12px}
.hub-type{background:var(--accent-lt);color:var(--accent);font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}
/* messages */
.msg-l{display:flex;height:calc(100vh - 52px)}
.cl{width:340px;border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0}
.cw{flex:1;display:none;flex-direction:column;height:100%;min-width:0}
@media(min-width:561px){.cw{display:flex!important}}
.cb2{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:5px}
.bub{max-width:72%;padding:9px 13px;border-radius:16px;font-size:14px;word-break:break-word}
.bub.me{align-self:flex-end;background:var(--accent-grad);color:#fff;border-bottom-right-radius:4px;box-shadow:0 1px 4px rgba(79,70,229,.3)}
.bub.th{align-self:flex-start;background:var(--hover);color:var(--txt);border-bottom-left-radius:4px}
.voice-msg{display:flex;align-items:center;gap:8px;min-width:160px;padding:2px 0}
.voice-play{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none}
.bub.me .voice-play{background:rgba(255,255,255,.25)}
.voice-wave{flex:1;height:22px;display:flex;align-items:center;gap:1.5px}
.voice-bar{flex:1;background:rgba(128,128,128,.3);border-radius:1px;min-height:3px;transition:all .2s}
.bub.me .voice-bar{background:rgba(255,255,255,.35)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.voice-time{font-size:11px;opacity:.7;white-space:nowrap}
.msg-time{font-size:10px;opacity:.5;margin-top:2px;text-align:right}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:6px 14px}
.typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:typingDot 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}
.notif-dot{position:absolute;top:-2px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--like);color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
.share-post-preview{border:1px solid var(--bd);border-left:3px solid var(--accent);border-radius:8px;padding:10px;margin:6px 0;font-size:13px;background:var(--hover)}
/* DOUBLE TAP LIKE HEART */
.heart-pop{position:fixed;z-index:999;pointer-events:none;font-size:80px;animation:heartFloat 1s ease-out forwards}
@keyframes heartFloat{0%{opacity:0;transform:scale(0) rotate(-15deg)}30%{opacity:.9;transform:scale(1.2) rotate(5deg)}60%{opacity:.9;transform:scale(1) rotate(0)}100%{opacity:0;transform:scale(1.3) translateY(-40px)}}
/* ONLINE DOT */
.online-dot{position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;background:var(--ok);border:2.5px solid var(--card);z-index:2}
/* MSG REACTIONS */
.msg-reaction{position:absolute;bottom:-8px;right:-4px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:1px 6px;font-size:13px;box-shadow:var(--shadow-sm);cursor:pointer;z-index:3}
.bub{position:relative}
.reaction-picker{display:flex;gap:8px;padding:8px;background:var(--card);border:1px solid var(--bd);border-radius:20px;box-shadow:var(--shadow);position:absolute;bottom:100%;left:0;margin-bottom:8px;z-index:10;animation:slideUp .2s}
.reaction-pick{font-size:22px;cursor:pointer;transition:transform .15s}
.reaction-pick:hover{transform:scale(1.3)}
/* POST DETAIL */
.post-detail-modal{max-width:900px!important}
.post-detail-layout{display:flex;max-height:80vh}
.post-detail-media{flex:1;background:#000;display:flex;align-items:center;justify-content:center;min-height:400px}
.post-detail-side{width:350px;display:flex;flex-direction:column;border-left:1px solid var(--bd)}
.post-detail-comments{flex:1;overflow-y:auto;padding:12px}
@media(max-width:600px){.post-detail-layout{flex-direction:column}.post-detail-side{width:100%;border-left:none;border-top:1px solid var(--bd)}.post-detail-media{min-height:200px;max-height:40vh}}
/* TYPING */
.typing-dots{display:flex;align-items:center;gap:3px;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:tdot 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
/* PULL TO REFRESH */
.ptr{position:relative;overflow:hidden}
.ptr-indicator{position:absolute;top:0;left:0;right:0;height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:height .2s;font-size:13px;color:var(--dim)}
.ptr-indicator svg{width:20px;height:20px;margin-right:6px;transition:transform .2s}
.ptr-indicator.spinning svg{animation:spin 1s linear infinite}
/* REPORT */
.report-modal{padding:0}
.report-opt{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background var(--t)}
.report-opt:hover{background:var(--hover)}
.msg-seen{font-size:11px;color:var(--accent);text-align:right;margin-top:2px;font-weight:500}
.edited-tag{font-size:11px;color:var(--dim);font-style:italic}
.report-opt input{accent-color:var(--accent)}
.ub{position:absolute;top:-2px;right:-2px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--like);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--card)}
/* story viewer */
.sv{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center}
/* fab */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent-grad);color:#fff;display:none;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(79,70,229,.45);z-index:40;cursor:pointer;transition:transform var(--t),box-shadow var(--t)}
.fab:hover{transform:scale(1.1) rotate(90deg);box-shadow:0 8px 28px rgba(79,70,229,.6)}
.fab svg{width:24px;height:24px}
/* create sheet (insta-style chooser) */
.ml.bottom{align-items:flex-end;padding:0}
.sheet{background:var(--card);width:100%;max-width:var(--max);border-radius:24px 24px 0 0;padding-bottom:max(14px,env(safe-area-inset-bottom));box-shadow:0 -12px 44px rgba(0,0,0,.28);animation:sheetUp .38s cubic-bezier(.2,.85,.25,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-grip{width:42px;height:4px;border-radius:3px;background:var(--bd);margin:10px auto 8px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:2px 20px 10px}
.sheet-head b{font-size:17px}
.create-opt{display:flex;align-items:center;gap:14px;padding:12px 20px;width:100%;text-align:left;transition:background var(--t)}
.create-opt:hover{background:var(--hover)}
.create-opt:active{background:var(--hover)}
.create-ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.14)}
.create-ic svg{width:22px;height:22px}
.co-t{font-weight:600;font-size:15px;line-height:1.2}
.co-s{font-size:12px;color:var(--dim);margin-top:2px}
.create-opt .chev{color:var(--dim);opacity:.5;flex-shrink:0}
/* toasts */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.t{background:var(--card);color:var(--txt);border:1px solid var(--bd);padding:12px 20px;border-radius:24px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);animation:pi .3s;display:flex;align-items:center;gap:8px}
.t.e{border-color:var(--danger);color:var(--danger)}.t.ok{border-color:var(--ok);color:var(--ok)}
@keyframes pi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skeleton{background:linear-gradient(90deg,var(--hover) 25%,var(--bd) 50%,var(--hover) 75%);background-size:200px 100%;animation:shimmer 1.5s infinite}
.sk-post{padding:16px 14px;border-bottom:1px solid var(--bd)}
.sk-avatar{width:36px;height:36px;border-radius:50%;animation:shimmer 1.5s infinite;background:var(--hover)}
.sk-line{height:10px;border-radius:5px;margin:8px 0;animation:shimmer 1.5s infinite;background:var(--hover)}
.sk-img{width:100%;height:200px;border-radius:12px;margin-top:8px;animation:shimmer 1.5s infinite;background:var(--hover)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes authIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.post{animation:slideUp .3s ease}
@keyframes storyProgress{from{width:0}to{width:100%}}
.ni{position:relative;overflow:hidden}
.ni::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:0;background:var(--accent);border-radius:2px;transition:height var(--t)}
.ni.on::before{height:20px}
.ef{display:inline-flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex-shrink:0}.ef img{border:2px solid transparent;border-radius:8px;transition:border .2s}
.typing-dots{display:flex;gap:3px;padding:4px}.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:tdot 1.4s infinite}.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}

.feed-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--nav)}
.feed-tab{flex:1;padding:12px;text-align:center;font-weight:600;font-size:14px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--t)}
.feed-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.trend-card{padding:14px 16px;border-bottom:1px solid var(--bd);cursor:pointer}.trend-card:hover{background:var(--hover)}
.trend-rank{font-size:12px;color:var(--dim)}.trend-tag{color:var(--accent);font-weight:700;font-size:16px;margin:2px 0}.trend-count{color:var(--dim);font-size:13px}
.anon-badge{background:var(--accent-lt);color:var(--accent);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.folder-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bd);cursor:pointer}.folder-card:hover{background:var(--hover)}
.folder-ic{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.folder-name{font-weight:600;font-size:15px}.folder-count{color:var(--dim);font-size:13px}
.pin-badge{display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-size:12px;font-weight:600;margin-bottom:4px}

/* GAMIFICATION */


/* ===== MINIMALIST GAMIFICATION ===== */
.flame-wrap{display:inline-flex;align-items:center;gap:6px}
.flame{width:18px;height:22px;position:relative;display:inline-block}
.flame svg{width:100%;height:100%}
.flame-body{fill:url(#flameGrad);transform-origin:bottom center;animation:flicker 2s ease-in-out infinite alternate}
@keyframes flicker{0%{transform:scaleY(1) scaleX(1) rotate(-2deg)}50%{transform:scaleY(1.08) scaleX(.95) rotate(2deg)}100%{transform:scaleY(.98) scaleX(1.02) rotate(-1deg)}}
.flame-glow{position:absolute;inset:0;background:radial-gradient(ellipse at bottom,rgba(245,158,11,.3),transparent 60%);filter:blur(4px);animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{0%{opacity:.4}100%{opacity:.7}}
.streak-num{font-weight:800;font-size:15px;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

/* CIRCULAR PROGRESS */
.circ-progress{width:48px;height:48px;position:relative;flex-shrink:0}
.circ-progress svg{transform:rotate(-90deg)}
.circ-bg{stroke:var(--hover);stroke-width:4;fill:none}
.circ-fill{stroke:url(#progGrad);stroke-width:4;fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.circ-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* BADGE CARD MINIMALIST */
.b-min{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--bd);transition:background .2s}
.b-min:hover{background:var(--hover)}
.b-min-ic{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;transition:transform .3s}
.b-min:hover .b-min-ic{transform:scale(1.1) rotate(5deg)}
.b-min-ic.earned{background:var(--accent-grad)}
.b-min-ic.locked{background:var(--hover);filter:grayscale(1);opacity:.4}
.b-min-info{flex:1;min-width:0}
.b-min-name{font-weight:600;font-size:14px}
.b-min-name.earned{color:var(--txt)}
.b-min-name.locked{color:var(--dim)}
.b-min-desc{color:var(--dim);font-size:12px;margin-top:1px}
.b-min-prog{height:3px;background:var(--hover);border-radius:2px;margin-top:6px;overflow:hidden}
.b-min-prog-fill{height:100%;background:var(--accent-grad);border-radius:2px;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.b-min-check{color:var(--ok);font-size:18px;opacity:0;transform:scale(0);transition:all .3s}
.b-min.earned .b-min-check{opacity:1;transform:scale(1)}

/* ACHIEVEMENT UNLOCK MODAL */
.ach-unlock{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.ach-card{background:var(--card);border-radius:24px;padding:40px 32px;text-align:center;max-width:340px;width:90%;animation:achPop .6s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden}
@keyframes achPop{0%{opacity:0;transform:scale(.5) translateY(40px)}100%{opacity:1;transform:none}}
.ach-shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent 0%,rgba(79,70,229,.08) 30%,transparent 60%);animation:shine 3s linear infinite;pointer-events:none}
@keyframes shine{to{transform:rotate(360deg)}}
.ach-icon-big{width:80px;height:80px;border-radius:24px;background:var(--accent-grad);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px;animation:bounce .5s ease .2s both}
@keyframes bounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.ach-title{font-size:20px;font-weight:800;margin-bottom:4px}
.ach-subtitle{color:var(--dim);font-size:14px;margin-bottom:20px}
.confetti{position:absolute;width:8px;height:8px;pointer-events:none}

/* LEADERBOARD MINIMALIST */
.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bd);transition:background .2s;cursor:pointer}
.lb-row:hover{background:var(--hover)}
.lb-rank{width:32px;text-align:center;font-weight:800;font-size:18px;color:var(--dim);flex-shrink:0}
.lb-rank.top1{color:#FBBF24;font-size:22px}.lb-rank.top2{color:#9CA3AF;font-size:20px}.lb-rank.top3{color:#D97706;font-size:20px}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:600;font-size:14px}
.lb-fac{color:var(--dim);font-size:12px}
.lb-score{font-weight:700;font-size:15px;color:var(--accent)}
.lb-score-bar{width:60px;height:4px;background:var(--hover);border-radius:2px;margin-top:4px;overflow:hidden}
.lb-score-fill{height:100%;background:var(--accent-grad);border-radius:2px;transition:width 1s}

/* COUNT UP */
.count-up{display:inline-block}

/* STATUS DOT (mood) */
.mood-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.mood-dot.studying{background:#3B82F6;box-shadow:0 0 8px rgba(59,130,246,.5)}
.mood-dot.chilling{background:#22C55E;box-shadow:0 0 8px rgba(34,197,94,.5)}
.mood-dot.busy{background:#EF4444;box-shadow:0 0 8px rgba(239,68,68,.5)}
.mood-dot.offline{background:var(--dim)}

/* FLASH NOTES */
.flash-note{background:var(--accent-grad);border-radius:14px;padding:16px;margin:8px 14px;color:#fff;position:relative;overflow:hidden}
.flash-timer{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.2);border-radius:8px;padding:2px 8px;font-size:11px;font-weight:600}

@media(max-width:1100px)
@media(max-width:1100px){.app{grid-template-columns:68px 1fr}.logo{display:none}.side{padding:14px 6px}.side::before{content:"🎓";font-size:24px;text-align:center;display:block;padding:6px}.ni{justify-content:center}.ni span:not(.dot){display:none}}
@media(max-width:560px){.app{grid-template-columns:1fr}.side{display:none}.main{border:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--nav);backdrop-filter:blur(12px);z-index:50}
.bnav{display:flex;justify-content:space-around;position:fixed;bottom:0;left:0;right:0;background:var(--nav);backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:8px 0;z-index:50}
.bn{flex:1;display:flex;justify-content:center;color:var(--dim);position:relative;padding:4px}.bn.on{color:var(--accent)}.bn svg{width:22px;height:22px}
.msg-l{flex-direction:column;height:calc(100vh - 110px)}.cl{width:100%;flex-shrink:0}.cl.sc{display:none}.cw{display:none!important}.cw.on{display:flex!important}
.fab{bottom:70px}.view{padding-bottom:60px}}
</style>

<script>
/* ===== CONFIG ===== */
const SUPA_URL="https://mveaedoxvmmscnkvenqh.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12ZWFlZG94dm1tc2Nua3ZlbnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODg2OTcsImV4cCI6MjA5ODg2NDY5N30.IWK2kiobIVQ8R_gpK6C-HWzD4n9Ex1cwvSP96nL5j5k";
const USE_SUPA = typeof supabase !== "undefined";
const sp = USE_SUPA ? supabase.createClient(SUPA_URL, SUPA_KEY) : null;
const COLORS = ["#4F46E5","#7C3AED","#EC4899","#F59E0B","#22C55E","#06B6D4","#EF4444","#8B5CF6"];

/* ===== GLOBAL STATE ===== */
let me = null;           // current logged-in user
let data = loadData();   // the local database
let activeChat = null;   // who you're DMing
let compImage = null;    // pending composer image
let compMedia = null;    // pending composer media (video/file)
let pollTimer = null;    // background poll

/* ===== HELPERS ===== */
function uid(p) { if(USE_SUPA&&crypto.randomUUID)return crypto.randomUUID(); return (p||"x")+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function timeAgo(t){const s=Math.floor((Date.now()-t)/1000);if(s<60)return"now";const m=Math.floor(s/60);if(m<60)return m+"m";const h=Math.floor(m/60);if(h<24)return h+"h";const d=Math.floor(h/24);if(d<7)return d+"d";return new Date(t).toLocaleDateString();}
function dayLabel(t){const d=new Date(t),n=new Date();if(d.toDateString()===n.toDateString())return"Today";const y=new Date();y.setDate(y.getDate()-1);return d.toDateString()===y.toDateString()?"Yesterday":d.toLocaleDateString(undefined,{month:"short",day:"numeric"});}
function avatarHTML(u,s){s=s||40;if(!u)return`<div class="av" style="width:${s}px;height:${s}px">?</div>`;const i=(u.name||u.username||"?").trim().split(/\s+/).map(x=>x[0]).slice(0,2).join("").toUpperCase();const c=COLORS[(u.id||"").charCodeAt(2)%COLORS.length]||COLORS[0];return u.avatar?`<div class="av" style="width:${s}px;height:${s}px;background-size:cover;background-position:center;background-image:url('${u.avatar}')"></div>`:`<div class="av" style="width:${s}px;height:${s}px;background:${c}">${i}</div>`;}
function toast(m,t){const w=document.getElementById("toast");const e=document.createElement("div");e.className="t "+(t||"");e.textContent=m;w.appendChild(e);setTimeout(()=>{e.style.opacity="0";e.style.transition="opacity .3s";setTimeout(()=>e.remove(),300)},2400);}
function openM(id){document.getElementById(id).classList.remove("hidden");}
function closeM(id){document.getElementById(id).classList.add("hidden");}
function modal(title,body){document.getElementById("genCard").innerHTML=`<div class="mh"><b>${title}</b><button onclick="closeM('genModal')" style="font-size:20px;color:var(--dim)">&times;</button></div><div style="max-height:70vh;overflow-y:auto">${body}</div>`;openM("genModal");}
function empty(t,s,b){return`<div class="empty"><h3>${t}</h3>${s?`<p>${s}</p>`:""}${b||""}</div>`;}

/* ===== DATA LAYER ===== */
function loadData() {
  if (USE_SUPA) return {users:[],posts:[],channels:[],messages:[],stories:[]};
  try { const r = localStorage.getItem("koliya_v4"); if(r) return JSON.parse(r); } catch(e){}
  return seed();
}
function saveLocal() { if(!USE_SUPA) try{localStorage.setItem("koliya_v4",JSON.stringify(data));}catch(e){} }
async function syncDB() {
  if(!USE_SUPA) return;
  try {
    const [pr,po,ch,ms,st] = await Promise.all([
      sp.from("profiles").select("*"),
      sp.from("posts").select("*").order("created_at",{ascending:false}),
      sp.from("channels").select("*"),
      sp.from("messages").select("*").order("created_at",{ascending:true}),
      sp.from("stories").select("*")
    ]);
    data.users = pr.data||[]; data.posts = po.data||[]; data.channels = ch.data||[]; data.stories = st.data||[];
    data.messages = (ms.data||[]).map(m=>({id:m.id,sender:m.sender_id,receiver:m.receiver_id,text:m.text,media:m.media,createdAt:new Date(m.created_at).getTime()}));
  } catch(e) { console.error("sync",e); }
}
function pushDB(table,row) { if(USE_SUPA) sp.from(table).insert(row).then(r=>{ if(r.error){console.error(table,r.error.message);toast("DB error — re-run schema SQL!","e");} }); }
function updateDB(table,id,patch) { if(USE_SUPA) sp.from(table).update(patch).eq("id",id).then(r=>{ if(r.error) console.error(table,r.error); }); }
function deleteDB(table,id) { if(USE_SUPA) sp.from(table).delete().eq("id",id); }

/* ===== USER MAPPING ===== */
function getUser(id) { const u = data.users.find(x=>x.id===id); return u?mapUser(u):null; }
function getUserByEmail(e) { return data.users.find(u=>(u.email||"").toLowerCase()===e.toLowerCase().trim())||null; }
function getUserByUsername(n) { return data.users.find(u=>(u.username||"").toLowerCase()===n.toLowerCase().trim())||null; }
function mapUser(u) {
  if(!u) return null;
  const supa = USE_SUPA && u.full_name!==undefined;
  return {
    id:u.id,
    name:supa?u.full_name:(u.name||""),
    username:u.username||"",
    email:u.email||"",
    studentCard:supa?u.student_card:(u.studentCard||""),
    faculty:u.faculty||"",
    avatar:supa?u.avatar_url:(u.avatar||null),
    banner:supa?u.banner_url:(u.banner||null),
    bio:u.bio||"",
    pronouns:supa?u.pronouns:(u.pronouns||""),
    website:supa?u.website:(u.website||""),
    github:supa?u.github:(u.github||""),
    linkedin:supa?u.linkedin:(u.linkedin||""),
    status:u.status||"pending",
    role:u.role||"student",
    following:u.following||[],
    followers:u.followers||[],
    blocked:u.blocked||[],
    lastSeen:supa?u.last_seen:(u.lastSeen||null)
  };
}
function allUsers() { return data.users.map(mapUser); }
function updateUser(id,patch) {
  const u = data.users.find(x=>x.id===id); if(!u) return null;
  const m={};
  if("name"in patch){u.name=u.full_name=patch.name;m.full_name=patch.name}
  if("bio"in patch){u.bio=patch.bio;m.bio=patch.bio}
  if("faculty"in patch){u.faculty=patch.faculty;m.faculty=patch.faculty}
  if("avatar"in patch){u.avatar=u.avatar_url=patch.avatar;m.avatar_url=patch.avatar}
  if("banner"in patch){u.banner=u.banner_url=patch.banner;m.banner_url=patch.banner}
  if("pronouns"in patch){u.pronouns=patch.pronouns;m.pronouns=patch.pronouns}
  if("website"in patch){u.website=patch.website;m.website=patch.website}
  if("github"in patch){u.github=patch.github;m.github=patch.github}
  if("linkedin"in patch){u.linkedin=patch.linkedin;m.linkedin=patch.linkedin}
  if("status"in patch){u.status=patch.status;m.status=patch.status}
  if("role"in patch){u.role=patch.role;m.role=patch.role}
  if("following"in patch){u.following=patch.following;m.following=patch.following}
  if("followers"in patch){u.followers=patch.followers;m.followers=patch.followers}
  if("blocked"in patch){u.blocked=patch.blocked;m.blocked=patch.blocked}
  if("closeFriends"in patch){u.close_friends=u.closeFriends=patch.closeFriends;m.close_friends=patch.closeFriends}
  if("mood"in patch){u.mood=patch.mood;m.mood=patch.mood}
  saveLocal(); if(USE_SUPA) updateDB("profiles",id,m); return mapUser(u);
}

/* ===== POSTS ===== */
function getPost(id){const p=data.posts.find(x=>x.id===id);return p?mapPost(p):null;}
function allPosts(){return data.posts.map(mapPost);}
function mapPost(p){
  const supa=USE_SUPA&&p.user_id!==undefined;
  return{ id:p.id, userId:supa?p.user_id:p.userId, text:p.text||"", image:supa?p.image_url:(p.image||null), media:p.media||null, channelId:supa?p.channel_id:(p.channelId||null), likes:p.likes||[], comments:p.comments||[], saved:p.saved||[], repostId:supa?p.repost_id:(p.repostId||null),anonymous:supa?(p.anonymous||false):(p.anonymous||false),pinned:supa?(p.pinned||false):(p.pinned||false), createdAt:new Date(p.created_at||p.createdAt||Date.now()).getTime() };
}
function createPost(o){
  const p={id:uid("p"),user_id:o.userId,text:o.text||"",image_url:o.image,media:o.media,channel_id:o.channelId,repost_id:o.repostId,likes:[],comments:[],saved:[],created_at:new Date().toISOString()};
  data.posts.unshift(p); saveLocal();
  if(USE_SUPA){const r={id:p.id,user_id:o.userId,text:p.text,image_url:o.image,channel_id:o.channelId,likes:[],comments:[],saved:[]};if(o.media)r.media=o.media;if(o.repostId)r.repost_id=o.repostId;pushDB("posts",r);}
  return mapPost(p);
}
function delPost(id){data.posts=data.posts.filter(p=>p.id!==id);saveLocal();deleteDB("posts",id);}
function toggleLike(pid,u){const p=data.posts.find(x=>x.id===pid);if(!p)return;if(!p.likes)p.likes=[];const i=p.likes.indexOf(u);if(i===-1)p.likes.push(u);else p.likes.splice(i,1);saveLocal();updateDB("posts",pid,{likes:p.likes});}
function toggleSave(pid,u){const p=data.posts.find(x=>x.id===pid);if(!p)return;if(!p.saved)p.saved=[];const i=p.saved.indexOf(u);if(i===-1)p.saved.push(u);else p.saved.splice(i,1);saveLocal();updateDB("posts",pid,{saved:p.saved});}
function addComment(pid,u,t){const p=data.posts.find(x=>x.id===pid);if(!p)return;if(!p.comments)p.comments=[];p.comments.push({id:uid("c"),userId:u,text:t,createdAt:Date.now()});saveLocal();updateDB("posts",pid,{comments:p.comments});}

/* ===== CHANNELS ===== */
function channels(){return data.channels.map(c=>({id:c.id,name:c.name,description:c.description||"",icon:c.icon||"📚",color:c.color||"#4F46E5",createdBy:c.created_by||c.createdBy,members:c.members||[],admins:c.admins||[c.created_by||c.createdBy],type:c.type||"public",postPerm:c.post_permission||c.postPerm||"all",muted:c.muted||[],createdAt:new Date(c.created_at||c.createdAt||Date.now()).getTime()}));}
function getChannel(id){return channels().find(c=>c.id===id)||null;}
function createChannelDB(o){const c={id:uid("ch"),name:o.name,description:o.description||"",icon:o.icon||"📚",color:o.color||"#4F46E5",created_by:o.createdBy,members:[o.createdBy],admins:[o.createdBy],type:o.type||"public",post_permission:o.postPerm||"all",muted:[],created_at:new Date().toISOString()};data.channels.push(c);saveLocal();if(USE_SUPA)pushDB("channels",{id:c.id,name:c.name,description:c.description,icon:c.icon,color:c.color,created_by:c.created_by,members:c.members,admins:c.admins,type:c.type,post_permission:c.post_permission,muted:[]});return c;}
function joinCh(cid,u){const c=data.channels.find(x=>x.id===cid);if(!c)return;if(!(c.members||[]).includes(u))c.members.push(u);saveLocal();updateDB("channels",cid,{members:c.members});}
function leaveCh(cid,u){const c=data.channels.find(x=>x.id===cid);if(!c)return;c.members=(c.members||[]).filter(m=>m!==u);saveLocal();updateDB("channels",cid,{members:c.members});}
function updChSetting(cid,key,val){const c=data.channels.find(x=>x.id===cid);if(!c)return;c[key]=val;saveLocal();const k=key==="postPerm"?"post_permission":key;updateDB("channels",cid,{[k]:val});}
function isMuted(cid,u){const c=data.channels.find(x=>x.id===cid);return c&&(c.muted||[]).includes(u);}
function toggleMute(cid,u){const c=data.channels.find(x=>x.id===cid);if(!c)return;if(!c.muted)c.muted=[];const i=c.muted.indexOf(u);if(i===-1)c.muted.push(u);else c.muted.splice(i,1);saveLocal();updateDB("channels",cid,{muted:c.muted});}
function canPost(cid,u){const c=channels().find(x=>x.id===cid);if(!c)return true;if(c.postPerm==="admins")return c.admins.includes(u);return c.members.includes(u);}

/* ===== STORIES ===== */
function stories(){return(data.stories||[]).filter(s=>Date.now()-new Date(s.created_at).getTime()<86400000).map(s=>({id:s.id,userId:s.user_id||s.userId,media:s.media,text:s.text||"",createdAt:new Date(s.created_at||s.createdAt||Date.now()).getTime()}));}
function storyUsers(){const seen=new Set();return stories().filter(s=>{if(seen.has(s.userId))return false;seen.add(s.userId);return true;});}
function storiesBy(uid_){return stories().filter(s=>s.userId===uid_).sort((a,b)=>a.createdAt-b.createdAt);}
function createStory(uid_,media,text,closeFriends){const s={id:uid("st"),user_id:uid_,media,text:text||"",created_at:new Date().toISOString()};if(!data.stories)data.stories=[];data.stories.push(s);saveLocal();s.close_friends=closeFriends||false;if(USE_SUPA)pushDB("stories",{id:s.id,user_id:uid_,media:s.media,text:s.text,close_friends:closeFriends||false});}
function hasNewStory(uid_){const k="str_"+uid_;const lr=parseInt(localStorage.getItem(k)||"0",10);return storiesBy(uid_).some(s=>s.createdAt>lr);}

/* ===== MESSAGES ===== */
function convoId(a,b){return[a,b].sort().join("__");}
function sendMsg(s,r,t,media){const m={id:uid("m"),sender:s,receiver:r,text:t,media:media||null,createdAt:Date.now()};data.messages.push({id:m.id,sender:s,receiver:r,text:t,media:media||null,createdAt:Date.now()});saveLocal();if(USE_SUPA)pushDB("messages",{id:m.id,sender_id:s,receiver_id:r,text:t,media:media||null});}
function getMsgs(a,b){const cid=convoId(a,b);return data.messages.filter(m=>convoId(m.sender,m.receiver)===cid).sort((x,y)=>x.createdAt-y.createdAt);}
function getConvos(u){const cm={};data.messages.forEach(m=>{const cid=convoId(m.sender,m.receiver);if(cid.includes(u)){const other=m.sender===u?m.receiver:m.sender;if(!cm[cid])cm[cid]={other,last:m};cm[cid].last=m;}});return Object.values(cm).sort((a,b)=>b.last.createdAt-a.last.createdAt);}
function unreadCount(other){const me_=me;if(!me_)return 0;const lr=parseInt(localStorage.getItem("rd_"+other)||"0",10);return getMsgs(me_.id,other).filter(m=>m.sender!==me_.id&&m.createdAt>lr).length;}
function totalUnread(){return getConvos(me.id).reduce((s,c)=>s+unreadCount(c.other),0);}

/* ===== SEED (demo mode only) ===== */
function seed(){

function compressImage(url,max,q){return new Promise(r=>{const i=new Image();i.onload=()=>{let w=i.naturalWidth,h=i.naturalHeight;if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);r(c.toDataURL("image/jpeg",q||0.72));};i.onerror=()=>r(url);i.src=url;});}
function checkVideoDuration(f){return new Promise(r=>{const v=document.createElement("video");v.preload="metadata";v.onloadedmetadata=()=>{r(v.duration);URL.revokeObjectURL(v.src);};v.onerror=()=>r(0);v.src=URL.createObjectURL(f);});}
function handleUpload(e,type){
  const f=e.target.files[0];if(!f)return;
  if(type==="image"){
    if(f.size>10*1024*1024)return toast("Max 10MB.","e");
    const r=new FileReader();r.onload=async ev=>{
      const c=await compressImage(ev.target.result,1080,0.72);
      compImage=c;compMedia=null;
      openImageEditor(c,"post");
    };r.readAsDataURL(f);
  } else if(type==="video"){
    if(f.size>30*1024*1024)return toast("Max 30MB.","e");
    checkVideoDuration(f).then(dur=>{
      if(dur>60)return toast("Video must be under 1 minute.","e");
      const r=new FileReader();r.onload=ev=>{
        compImage=null;compMedia={type:"video",data:ev.target.result,name:f.name,duration:dur};
        document.getElementById("compPrev").innerHTML="<video src='"+ev.target.result+"' controls style='border-radius:10px;max-height:200px;width:100%'><br><button onclick='clearUpload()' style='color:var(--dim);font-size:12px'>Remove</button>";
      };r.readAsDataURL(f);
    });
  } else {
    if(f.size>10*1024*1024)return toast("Max 10MB.","e");
    const r=new FileReader();r.onload=ev=>{
      compImage=null;compMedia={type:"file",data:ev.target.result,name:f.name};
      document.getElementById("compPrev").innerHTML="<div class=fc><div class=fi></div><div><div class=fn>"+esc(f.name)+"</div><div class=fs>"+(f.size/1024/1024).toFixed(1)+" MB</div></div></div><br><button onclick='clearUpload()' style='color:var(--dim);font-size:12px'>Remove</button>";
    };r.readAsDataURL(f);
  }
}
function clearUpload(){compImage=null;compMedia=null;document.getElementById("compPrev").innerHTML="";}

let editRotation=0,editFilter="none",editText="",editMode="post",editImgData=null,viewOnce=false;
function openImageEditor(data,mode){
  editImgData=data;editMode=mode||"post";editRotation=0;editFilter="none";editText="";viewOnce=false;
  const filters=[{n:"Original",c:"none"},{n:"Warm",c:"sepia(.3) saturate(1.3) hue-rotate(-10deg) brightness(1.05)"},{n:"Cool",c:"hue-rotate(180deg) saturate(.8) brightness(1.05)"},{n:"Vintage",c:"sepia(.5) contrast(1.1) brightness(.95) saturate(1.2)"},{n:"B&W",c:"grayscale(1) contrast(1.1)"},{n:"Vivid",c:"saturate(1.6) contrast(1.15)"}];
  const fh=filters.map((f,i)=>"<div class=ef "+(i===0?"style=border-color:var(--accent)":"")+" onclick='setFilter(this,\""+f.c+"\")'><img src="+data+" style=width:52px;height:52px;border-radius:8px;object-fit:cover;filter:"+f.c+"><div style=font-size:10px;color:var(--dim)>"+f.n+"</div></div>").join("");
  modal("Edit","<div style=padding:0><div style=background:#000;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center><img id=ep src="+data+" style=max-width:100%;max-height:300px;transform:rotate(0deg);filter:none></div><div style=display:flex;gap:6px;padding:10px;overflow-x:auto>"+fh+"</div><div style=display:flex;justify-content:space-around;padding:8px><div onclick=editRotate() style=text-align:center;color:var(--dim);cursor:pointer><svg width=22 height=22 viewBox=0 0 24 24 fill=none stroke=currentColor stroke-width=2><path d=M3 12a9 9 0 1 0 9-9/><path d=M3 4v5h5/></svg><div style=font-size:11px>Rotate</div></div>"+(mode==="dm"?"<div onclick=toggleVO() id=vob style=text-align:center;color:var(--dim);cursor:pointer><svg width=22 height=22 viewBox=0 0 24 24 fill=none stroke=currentColor stroke-width=2><path d=M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z/><circle cx=12 cy=12 r=3/></svg><div style=font-size:11px>View Once</div></div>":"")+"</div><div style=display:flex;gap:8px;padding:10px><button class=btn-g btn style=flex:1 onclick=closeM('genModal')>Cancel</button><button class=btn style=flex:2 onclick=applyEdit()>Send</button></div></div>");
  window._ef="none";
}
function editRotate(){editRotation=(editRotation+90)%360;document.getElementById("ep").style.transform="rotate("+editRotation+"deg)";}
function setFilter(el,css){document.querySelectorAll(".ef").forEach(x=>x.style.borderColor="transparent");el.style.borderColor="var(--accent)";document.getElementById("ep").style.filter=css;window._ef=css;}
function toggleVO(){viewOnce=!viewOnly;const b=document.getElementById("vob");if(viewOnce){b.style.color="var(--accent)";}else{b.style.color="var(--dim)";}}
function applyEdit(){
  const img=document.getElementById("ep");if(!img)return;
  const c=document.createElement("canvas");const ctx=c.getContext("2d");
  let w=img.naturalWidth,h=img.naturalHeight;
  if(editRotation===90||editRotation===270){const t=w;w=h;h=t;}
  const max=1080;if(w>max){h=Math.round(h*max/w);w=max;}
  c.width=w;c.height=h;
  ctx.translate(w/2,h/2);ctx.rotate(editRotation*Math.PI/180);
  ctx.filter=window._ef||"none";
  ctx.drawImage(img,-img.naturalWidth/2,-img.naturalHeight/2);
  const result=c.toDataURL("image/jpeg",0.72);
  if(editMode==="dm"){sendMsg(me.id,activeChat,"",{type:"image",data:result,viewOnce:viewOnce});showChat(activeChat);}
  else{compImage=result;compMedia=null;document.getElementById("compPrev").innerHTML="<img src="+result+" style=border-radius:10px;max-height:200px;width:100%;object-fit:cover><br><button onclick='clearUpload()' style='color:var(--dim);font-size:12px'>Remove</button>";}
  closeM("genModal");
}

/* CHAT ATTACH WITH COMPRESSION + EDITOR */
function chatAttach(e){
  const f=e.target.files[0];if(!f)return;
  if(f.type.startsWith("image/")){
    if(f.size>10*1024*1024)return toast("Max 10MB.","e");
    const r=new FileReader();r.onload=async ev=>{const c=await compressImage(ev.target.result,1080,0.72);openImageEditor(c,"dm");};r.readAsDataURL(f);
  } else if(f.type.startsWith("video/")){
    if(f.size>30*1024*1024)return toast("Max 30MB.","e");
    checkVideoDuration(f).then(dur=>{if(dur>60)return toast("Under 1 min only.","e");const r=new FileReader();r.onload=ev=>{sendMsg(me.id,activeChat,"",{type:"video",data:ev.target.result,name:f.name,duration:dur});showChat(activeChat);};r.readAsDataURL(f);});
  } else {
    if(f.size>10*1024*1024)return toast("Max 10MB.","e");
    const r=new FileReader();r.onload=ev=>{sendMsg(me.id,activeChat,"",{type:"file",data:ev.target.result,name:f.name});showChat(activeChat);};r.readAsDataURL(f);
  }
}

function strUpload(e){const f=e.target.files[0];if(!f)return;if(f.size>3*1024*1024)return toast("Max 3MB","e");const r=new FileReader();r.onload=ev=>{window._strM=ev.target.result;document.getElementById("strPrev").innerHTML=`<img src="${ev.target.result}" style="max-height:180px;border-radius:10px;width:100%;object-fit:cover">`;};r.readAsDataURL(f);}

let storyTimer=null;
function viewStory(uid_){
  const ss=storiesBy(uid_);if(!ss.length)return;const u=getUser(uid_);if(!u)return;
  try{localStorage.setItem("str_"+uid_,Date.now().toString());}catch(e){}
  let i=0;window._currentStoryUser=uid_;window._currentStoryIdx=0;const sv=document.getElementById("storyView");sv.classList.remove("hidden");
  function show(){const s=ss[i];if(!s){closeStory();return;}const prog=((i+1)/ss.length)*100;
    sv.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2)"><div style="height:100%;width:${prog}%;background:#fff;transition:width .1s"></div></div><div style="position:absolute;top:16px;left:20px;color:#fff;font-weight:600;z-index:2">${esc(u.username)}</div><button onclick="closeStory()" style="position:absolute;top:12px;right:20px;color:#fff;font-size:28px;z-index:3">&times;</button>${i>0?`<button onclick="prevStory()" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#fff;font-size:30px;z-index:2">&lsaquo;</button>`:""}${i<ss.length-1?`<button onclick="nextStory()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#fff;font-size:30px;z-index:2">&rsaquo;</button>`:""}${s.media?`<img src="${s.media}" style="max-width:90vw;max-height:85vh;border-radius:8px">`:`<div style="color:#fff;font-size:22px;text-align:center;padding:60px;max-width:500px">${esc(s.text)}</div>`}`;
    clearTimeout(storyTimer);storyTimer=setTimeout(()=>{i++;window._currentStoryIdx=i;show();},5000);
    // Add reply bar
    const replyBar=document.createElement('div');replyBar.style.cssText='position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:400px;display:flex;gap:8px';replyBar.innerHTML='<input placeholder=\'Reply to '+esc(u.username)+'...\' style=\'flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:10px 16px;color:#fff\' onkeydown=\'if(event.key===\\"Enter\\"){replyToStory(\\"'+uid+'\\",\\"'+s.id+'\\");this.value=\\"\\";}\'/>';
    sv.appendChild(replyBar);
  }
  window.nextStory=()=>{i++;show();};window.prevStory=()=>{i--;if(i<0)i=0;show();};
  show();
}
function highlightStory(){const s=storiesBy(window._currentStoryUser)[window._currentStoryIdx];if(s)addToHighlight(s.id,window._currentStoryUser);closeStory();}

function runSearch(q){const b=document.getElementById("expBody");q=q.trim().toLowerCase();
  if(!q){const sug=allUsers().filter(u=>u.status==="approved"&&u.id!==me.id&&!me.following.includes(u.id)&&!me.blocked.includes(u.id)).slice(0,8);let h=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600">SUGGESTED</div>`;h+=sug.map(u=>userRow(u)).join("")||empty("All caught up","");const ch=channels().slice(0,6);if(ch.length){h+=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600;margin-top:8px">CHANNELS</div>`;h+=ch.map(chRow).join("");}b.innerHTML=h;return;}
  const us=allUsers().filter(u=>u.status==="approved"&&u.id!==me.id&&(u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)||(u.faculty||"").toLowerCase().includes(q)));
  const cs=channels().filter(c=>c.name.toLowerCase().includes(q)||(c.description||"").toLowerCase().includes(q));
  let h="";if(us.length){h+=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600">STUDENTS</div>`+us.map(userRow).join("");}if(cs.length){h+=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600">CHANNELS</div>`+cs.map(chRow).join("");}b.innerHTML=h||empty("No results",`Nothing matches "${esc(q)}"`);}

function followUser(uid,btn){const u=getUser(uid);if(!u)return;if(me.blocked.includes(uid))return toast("Unblock first.","e");if(me.following.includes(uid)){me.following=me.following.filter(x=>x!==uid);u.followers=u.followers.filter(x=>x!==me.id);}else{me.following.push(uid);if(!u.followers.includes(me.id))u.followers.push(me.id);}updateUser(me.id,{following:me.following});updateUser(u.id,{followers:u.followers});me=getUser(me.id);try{localStorage.setItem("follow_time_"+me.id,Date.now().toString());}catch(e){}const f=me.following.includes(uid);if(btn){btn.textContent=f?"Following":"Follow";btn.className=f?"btn-o":"btn-f";}toast(f?"Following "+u.username:"Unfollowed");}

function renderMessages(c,arg){activeChat=null;const convos=getConvos(me.id);const list=convos.length?convos.map(cv=>{const o=getUser(cv.other);if(!o)return"";const uc=unreadCount(cv.other);return`<div class="lr" onclick="openChat('${cv.other}')"><div style="position:relative">${avatarHTML(o,44)}${uc?`<span class="ub">${uc}</span>`:""}</div><div style="flex:1"><div style="font-weight:${uc?700:600};font-size:14px">${esc(o.username)}</div><div style="color:var(--dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cv.last.media&&cv.last.media.type==="audio"?"🎙 Voice message":cv.last.media&&cv.last.media.type==="image"?"📷 Photo":cv.last.media&&cv.last.media.type==="video"?"🎬 Video":cv.last.media&&cv.last.media.type==="file"?"📄 "+(cv.last.media.name||"File"):(cv.last.text||"Say hi")}</div></div></div>`;}).join(""):empty("No messages","Find students to chat.");c.innerHTML=`<div class="sh"><b style="font-size:18px">Messages</b></div><div class="msg-l"><div class="cl" id="convList">${list}</div><div class="cw" id="chatPane">${empty("Your messages","Select a conversation.")}</div></div>`;if(USE_SUPA)syncDB().then(()=>{refreshConvList();updateBadges();});if(arg&&typeof arg==="string"&&arg!=="me")openChat(arg);}
function refreshConvList(){const convos=getConvos(me.id);const list=convos.length?convos.map(cv=>{const o=getUser(cv.other);if(!o)return"";const uc=unreadCount(cv.other);return`<div class="lr" onclick="openChat('${cv.other}')"><div style="position:relative">${avatarHTML(o,44)}${uc?`<span class="ub">${uc}</span>`:""}</div><div style="flex:1"><div style="font-weight:${uc?700:600};font-size:14px">${esc(o.username)}</div><div style="color:var(--dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cv.last.media&&cv.last.media.type==="audio"?"🎙 Voice message":cv.last.media&&cv.last.media.type==="image"?"📷 Photo":cv.last.media&&cv.last.media.type==="video"?"🎬 Video":cv.last.media&&cv.last.media.type==="file"?"📄 "+(cv.last.media.name||"File"):(cv.last.text||"Say hi")}</div></div></div>`;}).join(""):empty("No messages","");const el=document.getElementById("convList");if(el)el.innerHTML=list;updateBadges();}
function openChat(uid){
  if(USE_SUPA){const p=document.getElementById("chatPane");if(p){p.classList.add("on");p.innerHTML='<div class="empty">Loading...</div>';}const cl=document.getElementById("convList");if(cl)cl.classList.add("sc");activeChat=uid;syncDB().then(()=>{showChat(uid);refreshConvList();});}
  else showChat(uid);
}
function showChat(uid){const o=getUser(uid);if(!o)return;activeChat=uid;try{localStorage.setItem("rd_"+uid,Date.now().toString());}catch(e){}const msgs=getMsgs(me.id,uid);let ld=null,bs="";msgs.forEach(m=>{const dl=dayLabel(m.createdAt);if(dl!==ld){bs+=`<div style="text-align:center;color:var(--dim);font-size:11px;margin:6px 0">${dl}</div>`;ld=dl;}const mine=m.sender===me.id;let mc="";if(m.media&&m.media.type==="image"){mc+=`<img src="${m.media.data}" style="max-width:200px;border-radius:8px;margin-bottom:4px">`;}if(m.media&&m.media.type==="video"){mc+=`<video src="${m.media.data}" controls style="max-width:200px;border-radius:8px;margin-bottom:4px"></video>`;}if(m.media&&m.media.type==="file"){mc+=`<a href="${m.media.data}" download="${esc(m.media.name)}" style="color:inherit;text-decoration:underline;display:block;font-size:13px;margin-bottom:4px">📄 ${esc(m.media.name)}</a>`;}let reactionHTML="";
    if(m.reactions&&Object.keys(m.reactions).length>0){
      const counts={};
      Object.values(m.reactions).forEach(e=>{counts[e]=(counts[e]||0)+1;});
      reactionHTML=Object.entries(counts).map(([e,c])=>'<span class="msg-reaction">'+e+' '+(c>1?c:'')+'</span>').join("");
    }
    // Audio handling
    if(m.media&&m.media.type==="audio"){
      const dur=m.media.duration||0;let bars="";
      for(let bi=0;bi<16;bi++){bars+='<div class="voice-bar" style="height:'+(3+Math.abs(Math.sin(bi*0.7))*14)+'px"></div>';}
      mc+='<div class="voice-msg"><button class="voice-play" onclick="event.stopPropagation();playVoice(this,\''+m.media.data+'\')">▶</button><div class="voice-wave">'+bars+'</div><span class="voice-time">'+Math.floor(dur/60)+':'+String(dur%60).padStart(2,'0')+'</span></div>';
    }
    bs+='<div class="bub '+(mine?"me":"th")+'" ondblclick="toggleReactionPicker(event,\''+uid+'\','+msgs.indexOf(m)+')">'+mc+(m.text?esc(m.text):"")+'<div class="msg-time">'+new Date(m.createdAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+'</div>'+reactionHTML+'</div>';});const p=document.getElementById("chatPane");p.innerHTML=`<div class="sh" style="position:sticky;top:0"><button onclick="closeChat()">←</button>${avatarHTML(o,32)}${isOnline(uid)?'<div style="position:relative;display:inline-block">'+avatarHTML(o,32)+'<div class="online-dot" style="bottom:-2px;right:-2px"></div></div>':avatarHTML(o,32)}<div onclick="go('profile','${uid}')"><div style="font-weight:600;font-size:15px">${esc(o.username)}</div><div style="color:var(--dim);font-size:12px">${esc(o.name)}</div></div></div><div class="cb2" id="chatBody">${bs||empty("Say hi!","")}</div><div style="display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--bd);align-items:center"><label style="cursor:pointer;padding:8px;border-radius:50%;background:var(--hover)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.93 8.8l-8.57 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg><input type="file" accept="image/*,video/*,.pdf,.doc" hidden onchange="chatAttach(event)"></label><input id="msgInput" class="inp" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1"><button id="micBtn" onclick="toggleRecording()" style="padding:8px;border-radius:50%;background:var(--hover);cursor:pointer" title="Voice message"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button><button class="btn-f" onclick="sendChat()">Send</button></div><div id="recBar" class="hidden" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bd);background:var(--hover)"><div style="width:10px;height:10px;border-radius:50%;background:var(--danger);animation:pulse 1s infinite"></div><span id="recTime" style="font-size:14px;font-weight:600">0:00</span><span style="flex:1;color:var(--dim);font-size:13px">Recording...</span><button onclick="cancelRecording()" style="color:var(--danger);font-weight:600">Cancel</button><button onclick="stopAndSendRecording()" style="color:var(--accent);font-weight:600">Send</button></div>`;const cl=document.getElementById("convList");if(cl)cl.classList.add("sc");p.classList.add("on");const cb=document.getElementById("chatBody");if(cb)cb.scrollTop=cb.scrollHeight;updateBadges();setTimeout(()=>{const inp=document.getElementById("msgInput");if(inp){inp.focus();inp.addEventListener("input",onTyping);}markChatSeen("'+uid+'");},100);}
function sendChat(){if(!activeChat)return;const i=document.getElementById("msgInput");const t=i.value.trim();if(!t)return;sendMsg(me.id,activeChat,t);i.value="";const cb=document.getElementById("chatBody");if(cb){const d=document.createElement("div");d.className="bub me";d.textContent=t;cb.appendChild(d);cb.scrollTop=cb.scrollHeight;}}

function closeChat(){activeChat=null;const cl=document.getElementById("convList");if(cl)cl.classList.remove("sc");const p=document.getElementById("chatPane");if(p){p.classList.remove("on");p.innerHTML=empty("Your messages","Select a conversation.");}refreshConvList();}

/* ===== PROFILE ===== */
function renderProfile(c,id){
  const u=(id==="me"||!id)?me:getUser(id);
  if(!u){c.innerHTML=empty("User not found","");return;}
  const isMe=u.id===me.id;
  const ib=(me.blocked||[]).includes(u.id);
  const bm=(u.blocked||[]).includes(me.id);
  const fol=me.following.includes(u.id);
  
  const allUserPosts=allPosts().filter(p=>p.userId===u.id&&!p.channelId);
  const mediaPosts=allUserPosts.filter(p=>p.image||(p.media&&p.media.type!=="file"));
  const savedPosts=allUserPosts.filter(p=>(p.saved||[]).includes(me.id));
  
  let act="";
  if(isMe)act='<button class="btn-o" onclick="editProfile()">Edit Profile</button>';
  else if(bm)act='<span class="badge private">Blocked you</span>';
  else if(ib)act='<button class="btn-o" onclick="blockUser(\''+u.id+'\')">Unblock</button>';
  else act='<button class="'+(fol?'btn-o':'btn-f')+'" id="fb" onclick="followUser(\''+u.id+'\',this)">'+(fol?'Following':'Follow')+'</button><button class="btn-o" onclick="go(\'messages\',\''+u.id+'\')">Message</button>';

  let linksHTML='';
  if(u.website)linksHTML+='<a href="'+esc(u.website)+'" target="_blank" class="link-pill">🔗 Website</a>';
  if(u.github)linksHTML+='<a href="'+esc(u.github)+'" target="_blank" class="link-pill">💻 GitHub</a>';
  if(u.linkedin)linksHTML+='<a href="'+esc(u.linkedin)+'" target="_blank" class="link-pill">💼 LinkedIn</a>';

  const hasStory = storiesBy(u.id).length > 0;
  
  const h = `<div class="sh">${isMe?"":'<button onclick="goBack()" style="font-size:20px">←</button>'}<b style="font-size:16px">${esc(u.username)}</b></div>
  <div style="position:relative">
    ${u.banner?'<div style="height:160px;background:url(\''+u.banner+'\') center/cover"></div>':'<div style="height:100px;background:linear-gradient(135deg,var(--accent),var(--accent-h))"></div>'}
    <div style="padding:0 16px;margin-top:-36px;position:relative">
      <div class="ring ${hasStory?"":"v"}" ${hasStory?'onclick="viewStory(\''+u.id+'\')"':''} style="width:86px;height:86px">
        <div>${avatarHTML(u,80)}</div>
      </div>
      <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700;font-size:18px">${esc(u.name)} ${u.role==="admin"?'<span style="color:var(--accent)">✓</span>':""}</div>
          <div style="color:var(--dim);font-size:13px">${esc(u.faculty||"")} ${u.pronouns?'· '+esc(u.pronouns):''}</div>
        </div>
        ${act}
      </div>
    </div>
    <div style="padding:8px 16px">
      ${u.bio?'<div style="font-size:14px;margin-bottom:8px">${esc(u.bio)}</div>':''}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${linksHTML}</div>
      <div style="display:flex;gap:20px;margin-bottom:10px">
        <span><b>${allUserPosts.length}</b> <span style="color:var(--dim)">posts</span></span>
        <span><b>${mediaPosts.length}</b> <span style="color:var(--dim)">media</span></span>
        <span style="cursor:pointer" onclick="showFollowList('${u.id}','followers')"><b>${u.followers.length}</b> <span style="color:var(--dim)">followers</span></span>
      </div>
      <span style="background:var(--hover);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--dim);display:inline-block">🪪 ${esc(u.studentCard)}</span>
      ${!isMe&&!ib&&!bm?'<button onclick="blockUser(\''+u.id+'\')" style="color:var(--danger);font-size:12px;margin-top:8px;display:block">Block</button>':''}
    </div>
  </div>
  <div class="profile-tabs">
    <div class="ptab active" onclick="switchProfileTab('posts')">▦ Posts</div>
    <div class="ptab" onclick="switchProfileTab('media')">🖼 Media</div>
    ${isMe?'<div class="ptab" onclick="switchProfileTab(\'saved\')">🔖 Saved</div>':''}
  </div>
  <div id="profileGrid">${renderProfileGrid(allUserPosts)}</div>`;
  
  c.innerHTML = h;
}

function switchProfileTab(tab){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  const u = (curArg==="me"||!curArg) ? me : getUser(curArg);
  let posts = [];
  if(tab==='posts') posts = allPosts().filter(p=>p.userId===u.id&&!p.channelId);
  if(tab==='media') posts = allPosts().filter(p=>p.userId===u.id&&!p.channelId && (p.image || (p.media && p.media.type!=='file')));
  if(tab==='saved') posts = allPosts().filter(p=>p.userId===u.id&&!p.channelId && (p.saved||[]).includes(me.id));
  document.getElementById('profileGrid').innerHTML = renderProfileGrid(posts);
}

function renderProfileGrid(posts){
  if(!posts.length) return empty('Nothing here','');
  return '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px">'+posts.map(p=>{
    let content = '';
    if(p.image) content = '<img src="'+p.image+'" style="width:100%;height:100%;object-fit:cover">';
    else if(p.media && p.media.type==='video') content = '<div class="grid-item-text">🎬</div>';
    else if(p.media && p.media.type==='file') content = '<div class="grid-item-text">📄</div>';
    else content = '<div class="grid-item-text">'+esc((p.text||"").slice(0,40))+'</div>';
    return '<div onclick="openPostModal(\''+p.id+'\')" style="aspect-ratio:1;background:var(--hover);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden">'+content+'</div>';
  }).join('')+'</div>';
}
function openPostModal(id){const p=getPost(id);if(!p)return;modal("Post",postCard(p));}
function blockUser(uid){const u=getUser(uid);if(!u)return;if((me.blocked||[]).includes(uid)){me.blocked=me.blocked.filter(x=>x!==uid);updateUser(me.id,{blocked:me.blocked});me=getUser(me.id);toast("Unblocked "+u.username,"ok");}else{me.blocked.push(uid);me.following=me.following.filter(x=>x!==uid);u.followers=u.followers.filter(x=>x!==me.id);updateUser(me.id,{blocked:me.blocked,following:me.following});updateUser(uid,{followers:u.followers});me=getUser(me.id);toast("Blocked "+u.username);}go("profile",uid);}
function editProfile(){modal("Edit Profile",`<div style="padding:16px;display:flex;flex-direction:column;gap:12px">
  <div style="position:relative;margin-bottom:6px">${me.banner?`<img src="${me.banner}" style="width:100%;height:100px;object-fit:cover;border-radius:10px">`:`<div style="width:100%;height:70px;background:linear-gradient(135deg,var(--accent),var(--accent-h));border-radius:10px"></div>`}<label style="position:absolute;right:16px;top:8px;background:var(--card);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)">📷<input type="file" accept="image/*" hidden onchange="uploadBanner(event)"></label></div>
  <div style="display:flex;justify-content:center">${avatarHTML(me,72)}</div>
  <label class="tb" style="justify-content:center;display:flex;cursor:pointer">Change photo<input type="file" accept="image/*" hidden onchange="uploadAvatar(event)"></label>
  <input class="inp" id="eN" value="${esc(me.name)}" placeholder="Full Name">
  <input class="inp" id="ePr" value="${esc(me.pronouns)}" placeholder="Pronouns (e.g., he/him)">
  <input class="inp" id="eB" value="${esc(me.bio)}" placeholder="Bio">
  <input class="inp" id="eF" value="${esc(me.faculty)}" placeholder="Faculty / Major">
  <div style="height:1px;background:var(--bd);margin:6px 0"></div>
  <div style="font-size:13px;color:var(--dim);font-weight:600">LINKS</div>
  <input class="inp" id="eW" value="${esc(me.website)}" placeholder="Website URL">
  <input class="inp" id="eG" value="${esc(me.github)}" placeholder="GitHub URL">
  <input class="inp" id="eL" value="${esc(me.linkedin)}" placeholder="LinkedIn URL">
  <button class="btn" onclick="saveProfile()">Save Changes</button>
</div>`);}
function uploadAvatar(e){const f=e.target.files[0];if(!f)return;if(f.size>1.5*1024*1024)return toast("Max 1.5MB","e");const r=new FileReader();r.onload=ev=>{updateUser(me.id,{avatar:ev.target.result});me=getUser(me.id);closeM("genModal");toast("Updated!","ok");go("profile","me");};r.readAsDataURL(f);}
function uploadBanner(e){const f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024)return toast("Max 2MB","e");const r=new FileReader();r.onload=ev=>{updateUser(me.id,{banner:ev.target.result});me=getUser(me.id);closeM("genModal");toast("Banner updated!","ok");go("profile","me");};r.readAsDataURL(f);}
function saveProfile(){const n=document.getElementById("eN").value.trim(),pr=document.getElementById("ePr").value.trim(),b=document.getElementById("eB").value.trim(),f=document.getElementById("eF").value.trim(),w=document.getElementById("eW").value.trim(),g=document.getElementById("eG").value.trim(),l=document.getElementById("eL").value.trim();if(!n)return toast("Name required.","e");updateUser(me.id,{name:n,pronouns:pr,bio:b,faculty:f,website:w,github:g,linkedin:l});me=getUser(me.id);closeM("genModal");toast("Profile updated!","ok");go("profile","me");}

function renderAdmin(c){if(me.role!=="admin"){c.innerHTML=empty("Admins only","");return;}const pend=allUsers().filter(u=>u.status==="pending"),appr=allUsers().filter(u=>u.status==="approved"),ban=allUsers().filter(u=>u.status==="banned");

function refreshActiveChatBubbles(){
  if(!activeChat)return;
  // CRITICAL: Update read timestamp so badge clears
  try{localStorage.setItem("rd_"+activeChat,Date.now().toString());}catch(e){}
  const msgs=getMsgs(me.id,activeChat);

  const input=document.getElementById("msgInput");

  const inputVal=input?input.value:"";

  const atBottom=body.scrollHeight-body.scrollTop-body.clientHeight<80;
  let ld=null,bs="";

    if(m.media&&m.media.type==="audio"){
      const dur=m.media.duration||0;let bars="";

      mc+=`<div class="voice-msg"><button class="voice-play" onclick="event.stopPropagation();playVoice(this,'${m.media.data}')">▶</button><div class="voice-wave">${bars}</div><span class="voice-time">${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}</span></div>`;
    }

      const counts={};

  });
  body.innerHTML=bs;

  if(atBottom)body.scrollTop=body.scrollHeight;if(isTypingNow(activeChat)){const td=document.createElement("div");td.className="bub th";td.style.background="transparent";td.innerHTML="<div class=typing-dots><span></span><span></span><span></span></div>";body.appendChild(td);if(atBottom)body.scrollTop=body.scrollHeight;}if(isChatSeenBy(activeChat)){const st=document.createElement("div");st.style.cssText="font-size:11px;color:var(--accent);text-align:right;margin-top:2px";st.textContent="Seen";body.appendChild(st);}updateBadges();}

let mediaRecorder=null,audioChunks=[],recStart=0,recInterval=null,isRecording=false;
function toggleRecording(){if(isRecording){stopAndSendRecording();}else{startRecording();}}
async function startRecording(){
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});
  audioChunks=[];mediaRecorder=new MediaRecorder(s);
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
  mediaRecorder.start();isRecording=true;recStart=Date.now();
  document.getElementById("chatInputBar")?.classList.add("hidden");
  const rb=document.getElementById("recBar");if(rb)rb.classList.remove("hidden");
  recInterval=setInterval(()=>{const el=Math.floor((Date.now()-recStart)/1000);
  const e=document.getElementById("recTime");if(e)e.textContent=Math.floor(el/60)+":"+String(el%60).padStart(2,"0");
  if(el>=120)stopAndSendRecording();},200);
  }catch(e){toast("Microphone access denied.","e");}
}
function stopAndSendRecording(){
  if(!isRecording||!mediaRecorder)return;isRecording=false;clearInterval(recInterval);
  const dur=Math.floor((Date.now()-recStart)/1000);
  mediaRecorder.onstop=()=>{const blob=new Blob(audioChunks,{type:"audio/webm"});
  if(blob.size>5*1024*1024){toast("Too long (max 5MB).","e");resetRecUI();return;}
  const r=new FileReader();r.onload=ev=>{sendMsg(me.id,activeChat,"",{type:"audio",data:ev.target.result,duration:dur});showChat(activeChat);resetRecUI();};r.readAsDataURL(blob);};
  mediaRecorder.stop();
}
function cancelRecording(){if(!isRecording||!mediaRecorder)return;isRecording=false;clearInterval(recInterval);mediaRecorder.onstop=()=>{};mediaRecorder.stop();resetRecUI();}
function resetRecUI(){document.getElementById("chatInputBar")?.classList.remove("hidden");const rb=document.getElementById("recBar");if(rb)rb.classList.add("hidden");}

/* ===== ACTIVITY / NOTIFICATIONS ===== */
function allActivity(){
  const acts=[];
  allPosts().forEach(p=>{
    if(p.userId===me.id){
      (p.likes||[]).forEach(u=>{if(u!==me.id){const rawP=data.posts.find(x=>x.id===p.id);const likeTime=rawP&&rawP.likeTimestamps?rawP.likeTimestamps[u]:p.createdAt;acts.push({type:"like",userId:u,postId:p.id,text:(p.text||"").slice(0,40),createdAt:likeTime||p.createdAt});}});
      (p.comments||[]).forEach(c=>{if(c.userId!==me.id)acts.push({type:"comment",userId:c.userId,postId:p.id,text:c.text,createdAt:c.createdAt||Date.now()});});
    }
  });
  // Followers — use joinedAt as a proxy timestamp (stored on follow action)
  me.followers.forEach(fid=>{
    if(fid!==me.id){
      // Check if we have a stored follow timestamp
      const followTime=parseInt(localStorage.getItem("follow_time_"+fid)||"0",10);
      acts.push({type:"follow",userId:fid,text:"",createdAt:followTime||Date.now()-86400000});
    }
  });
  return acts.sort((a,b)=>b.createdAt-a.createdAt).slice(0,30);
}

  acts.forEach(a=>{

    const ic=a.type==="like"?"❤️":a.type==="comment"?"💬":a.type==="follow"?"➕":"";

    h+='<div class="lr" onclick="'+(a.type==="follow"?"go('profile','"+a.userId+"')":"openPostModal('"+a.postId+"');")+'">'+avatarHTML(u,40)+'<div style="flex:1"><div style="font-size:14px"><b>'+esc(u.username)+'</b> '+txt+'</div><div style="color:var(--dim);font-size:12px">'+timeAgo(a.createdAt)+'</div></div>'+ic+'</div>';
  });
