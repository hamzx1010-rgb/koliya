function submitReport(pid,reason){
  const p=getPost(pid);if(!p)return;
  const author=getUser(p.userId);
  // Store report in posts data
  if(!data.reports)data.reports=[];
  data.reports.push({id:uid("rpt"),postId:pid,reportedBy:me.id,authorId:p.userId,reason:reason,createdAt:Date.now()});
  saveLocal();
  if(USE_SUPA)pushDB("reports",{id:uid("rpt"),post_id:pid,post_text:(p.text||"").slice(0,200),post_author_id:p.userId,post_author_name:author?author.name:"Unknown",reported_by:me.id,reported_by_name:me.name,reason:reason,status:"pending"});
  closeM("genModal");
  toast("Report submitted. Admin will review.","ok");
}

/* ===== MESSAGE REACTIONS ===== */
function reactToMessage(convoPartnerId,msgIdx,emoji){
  const msgs=getMsgs(me.id,convoPartnerId);
  const m=msgs[msgIdx];if(!m)return;
  // Find the raw message and add reaction
  const raw=data.messages.find(x=>x.id===m.id);
  if(!raw)return;
  if(!raw.reactions)raw.reactions={};
  // Toggle reaction
  const existing=raw.reactions[me.id];
  if(existing===emoji){delete raw.reactions[me.id];}
  else{raw.reactions[me.id]=emoji;}
  saveLocal();
  if(USE_SUPA)updateDB("messages",m.id,{reactions:raw.reactions});
  showChat(convoPartnerId);
}
function toggleReactionPicker(e,convoPartnerId,msgIdx){
  // Close existing pickers
  document.querySelectorAll(".reaction-picker").forEach(p=>p.remove());
  const picker=document.createElement("div");
  picker.className="reaction-picker";
  picker.innerHTML=["❤️","😂","😮","😢","👍","🔥"].map(em=>'<span class="reaction-pick" onclick="reactToMessage(\''+convoPartnerId+'\','+msgIdx+',\''+em+'\')">'+em+'</span>').join("");
  e.target.parentElement.style.position="relative";
  e.target.parentElement.appendChild(picker);
  e.stopPropagation();
  setTimeout(()=>{document.addEventListener("click",function closer(){picker.remove();document.removeEventListener("click",closer);});},10);
}

/* ===== PULL TO REFRESH ===== */
let ptrStartY=0,ptrPulling=false;
function initPullToRefresh(){
  const main=document.getElementById("main");
  if(!main)return;
  main.addEventListener("touchstart",e=>{
    if(main.scrollTop<=0){ptrStartY=e.touches[0].clientY;ptrPulling=true;}
  },{passive:true});
  main.addEventListener("touchmove",e=>{
    if(!ptrPulling)return;
    const diff=e.touches[0].clientY-ptrStartY;
    if(diff>10&&diff<100){
      main.style.transform="translateY("+(diff*0.3)+"px)";
    }
  },{passive:true});
  main.addEventListener("touchend",e=>{
    if(!ptrPulling)return;
    ptrPulling=false;
    const diff=e.changedTouches[0].clientY-ptrStartY;
    main.style.transform="";
    if(diff>60){
      // Refresh
      if(USE_SUPA){toast("Refreshing...");syncDB().then(()=>{renderView(curView,curArg);toast("Updated!","ok");});}
      else{renderView(curView,curArg);}
    }
  },{passive:true});
}

/* ===== GAMIFICATION: STREAKS ===== */
function getStreak(uid){
  try{return parseInt(localStorage.getItem("streak_"+uid)||"0",10);}catch(e){return 0;}
}
function getLastActive(uid){
  try{return localStorage.getItem("lastactive_"+uid)||"";}catch(e){return"";}
}
function updateStreak(uid){
  const today=new Date().toDateString();
  const last=getLastActive(uid);
  if(last===today)return getStreak(uid);
  const yesterday=new Date(Date.now()-86400000).toDateString();
  let streak=getStreak(uid);
  if(last===yesterday){streak++;}
  else if(last!==today){streak=1;}
  try{localStorage.setItem("streak_"+uid,streak.toString());localStorage.setItem("lastactive_"+uid,today);}catch(e){}
  return streak;
}
function streakHTML(uid){
  const s=getStreak(uid);
  if(!s)return"";
  return '<span class="streak-badge"><span class="streak-flame">🔥</span> '+s+' day'+(s===1?"":"s")+'</span>';
}

/* ===== GAMIFICATION: LEADERBOARD ===== */
function getUserScore(uid){
  const u=getUser(uid);if(!u)return 0;
  const posts=allPosts().filter(p=>p.userId===uid&&!p.channelId).length;
  const likes=allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.likes||[]).length,0);
  const comments=allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.comments||[]).length,0);
  const followers=(u.followers||[]).length;
  return posts*5+likes*2+comments*3+followers*1;
}
function renderLeaderboard(c){
    const users=allUsers().filter(u=>u.status==="approved"&&u.role==="student");
    const scored=users.map(u=>({user:u,score:getUserScore(u.id)})).sort((a,b)=>b.score-a.score).slice(0,50);
    const maxScore=scored[0]?scored[0].score:1;
    let h='<div class="sh"><b style="font-size:18px">Ranking</b></div>';
    h+='<div style="padding:20px 16px;text-align:center"><p style="color:var(--dim);font-size:14px">Top contributors on campus</p></div>';
    scored.forEach((entry,i)=>{
      const u=entry.user;const rank=i+1;
      const rankClass=rank===1?"top1":rank===2?"top2":rank===3?"top3":"";
      const barWidth=Math.round(entry.score/maxScore*100);
      h+='<div class="lb-row" onclick="go(\'profile\',\''+u.id+'\')"><div class="lb-rank '+rankClass+'">'+rank+'</div>'+avatarHTML(u,36)+'<div class="lb-info"><div class="lb-name">'+esc(u.username)+'</div><div class="lb-fac">'+esc(u.faculty||"Student")+'</div><div class="lb-score-bar"><div class="lb-score-fill" style="width:'+barWidth+'%"></div></div></div><div class="lb-score">'+entry.score+'</div></div>';
    });
    c.innerHTML=h;
    // Animate score bars
    setTimeout(()=>{c.querySelectorAll('.lb-score-fill').forEach(b=>{const w=b.style.width;b.style.width='0';setTimeout(()=>b.style.width=w,50);});},100);
  }

/* ===== GAMIFICATION: BADGES ===== */
function getBadges(uid){
  const u=getUser(uid);if(!u)return[];
  const posts=allPosts().filter(p=>p.userId===uid&&!p.channelId).length;
  const likes=allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.likes||[]).length,0);
  const comments=allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.comments||[]).length,0);
  const files=allPosts().filter(p=>p.userId===uid&&p.media&&p.media.type==="file").length;
  const followers=(u.followers||[]).length;
  const storiesCount=storiesBy(uid).length;
  const events=(data.events||[]).filter(e=>e.createdBy===uid).length;
  
  const badges=[
    {id:"first_post",ic:"📝",name:"First Post",desc:"Share your first post",earned:posts>=1,progress:Math.min(posts,1)},
    {id:"social",ic:"💬",name:"Social Butterfly",desc:"Comment 10 times",earned:comments>=10,progress:Math.min(comments/10*100,100)},
    {id:"liked",ic:"❤️",name:"Popular",desc:"Get 50 total likes",earned:likes>=50,progress:Math.min(likes/50*100,100)},
    {id:"helper",ic:"🤝",name:"Helpful Student",desc:"Answer 5 questions",earned:comments>=5,progress:Math.min(comments/5*100,100)},
    {id:"sharer",ic:"📚",name:"Resource Provider",desc:"Share 5 files",earned:files>=5,progress:Math.min(files/5*100,100)},
    {id:"storyteller",ic:"📸",name:"Storyteller",desc:"Post 3 stories",earned:storiesCount>=3,progress:Math.min(storiesCount/3*100,100)},
    {id:"influencer",ic:"⭐",name:"Campus Voice",desc:"Get 100 followers",earned:followers>=100,progress:Math.min(followers/100*100,100)},
    {id:"organizer",ic:"📅",name:"Event Organizer",desc:"Create an event",earned:events>=1,progress:Math.min(events,1)*100},
    {id:"veteran",ic:"🎓",name:"Scholar",desc:"Post 20 times",earned:posts>=20,progress:Math.min(posts/20*100,100)},
  ];
  return badges;
}
function badgeCount(uid){return getBadges(uid).filter(b=>b.earned).length;}
function renderBadges(uid){
    const badges=getBadges(uid);
    return badges.map(b=>{
      const pct=Math.round(b.progress)||0;
      return '<div class="b-min '+(b.earned?"earned":"")+'"><div class="b-min-ic '+(b.earned?"earned":"locked")+'">'+b.ic+'</div><div class="b-min-info"><div class="b-min-name '+(b.earned?"earned":"locked")+'">'+b.name+'</div><div class="b-min-desc">'+b.desc+'</div>'+(b.earned?'':'<div class="b-min-prog"><div class="b-min-prog-fill" style="width:'+pct+'%"></div></div>')+'</div>'+(b.earned?'<svg class="b-min-check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>':'')+'</div>';
    }).join("");
  }

/* ===== PROFILE COMPLETION METER ===== */
function profileCompletion(u){
  let filled=0;let total=8;
  if(u.name)filled++;
  if(u.bio)filled++;
  if(u.faculty)filled++;
  if(u.avatar)filled++;
  if(u.banner)filled++;
  if(u.pronouns)filled++;
  if(u.website||u.github||u.linkedin)filled++;
  if(u.followers.length>0)filled++;
  return Math.round(filled/total*100);
}

/* ===== STORY HIGHLIGHTS ===== */
function getHighlights(uid){
  try{return JSON.parse(localStorage.getItem("highlights_"+uid)||"[]");}catch(e){return[];}
}
function saveHighlights(uid,hl){try{localStorage.setItem("highlights_"+uid,JSON.stringify(hl));}catch(e){}}
function addToHighlight(storyId,uid){
  const hl=getHighlights(uid);
  const story=stories().find(s=>s.id===storyId);if(!story)return;
  const name=prompt("Highlight name:");
  if(!name)return;
  hl.push({id:uid("hl"),name:name,media:story.media||null,text:story.text||"",createdAt:Date.now()});
  saveHighlights(uid,hl);
  toast("Added to highlights!","ok");
}
function viewHighlight(uid,hlId){
  const hl=getHighlights(uid).find(h=>h.id===hlId);if(!hl)return;
  const sv=document.getElementById("storyView");sv.classList.remove("hidden");
  sv.innerHTML='<div style="position:absolute;top:16px;left:20px;color:#fff;font-weight:600;z-index:2">'+esc(hl.name)+'</div><button onclick="closeStory()" style="position:absolute;top:12px;right:20px;color:#fff;font-size:28px;z-index:3">×</button>'+(hl.media?'<img src="'+hl.media+'" style="max-width:90vw;max-height:85vh;border-radius:8px">':'<div style="color:#fff;font-size:22px;text-align:center;padding:60px;max-width:500px">'+esc(hl.text)+'</div>');
}

/* ===== STORY POLLS ===== */
let storyPollVotes={};
function voteStoryPoll(option){
  storyPollVotes[option]=(storyPollVotes[option]||0)+1;
  const total=Object.values(storyPollVotes).reduce((a,b)=>a+b,0);
  document.querySelectorAll(".story-poll-opt").forEach((el,i)=>{
    const pct=Math.round((storyPollVotes[i+1]||0)/total*100)||0;
    el.querySelector(".story-poll-pct").textContent=pct+"%";
    el.querySelector(".story-poll-bar").style.width=pct+"%";
  });
}


/* ===== ACHIEVEMENT UNLOCK SYSTEM ===== */
let lastBadgeCount=0;
function checkBadgeUnlock(){
  if(!me)return;
  const current=badgeCount(me.id);
  if(current>lastBadgeCount&&lastBadgeCount>0){
    const badges=getBadges(me.id);
    const newlyEarned=badges.find((b,i)=>b.earned&&i>=lastBadgeCount);
    if(newlyEarned)showAchievementUnlock(newlyEarned);
  }
  lastBadgeCount=current;
}
function showAchievementUnlock(badge){
  const el=document.createElement("div");
  el.className="ach-unlock";
  el.innerHTML='<div class="ach-card"><div class="ach-shine"></div><div class="ach-icon-big">'+badge.ic+'</div><div class="ach-title">Achievement Unlocked!</div><div class="ach-subtitle">'+badge.name+' — '+badge.desc+'</div><button class="btn" onclick="this.parentElement.parentElement.remove()">Awesome!</button></div>';
  document.body.appendChild(el);
  // Confetti
  for(let i=0;i<30;i++){
    const c=document.createElement("div");
    c.className="confetti";
    const colors=["#4F46E5","#7C3AED","#EC4899","#F59E0B","#22C55E"];
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.left=Math.random()*100+"%";
    c.style.top="-10px";
    c.style.borderRadius=Math.random()>0.5?"50%":"2px";
    c.style.animation="confettiFall "+(1.5+Math.random()*1.5)+"s ease-out forwards";
    c.style.animationDelay=Math.random()*0.3+"s";
    el.appendChild(c);
  }
  setTimeout(()=>el.remove(),5000);
}
// Add confetti CSS dynamically
if(!document.getElementById("confettiCSS")){
  const cs=document.createElement("style");
  cs.id="confettiCSS";
  cs.textContent="@keyframes confettiFall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}";
  document.head.appendChild(cs);
}

/* ===== COUNT UP ANIMATION ===== */
function countUp(el,target,duration){
  duration=duration||1000;
  const start=0;const startTime=performance.now();
  function update(now){
    const progress=Math.min((now-startTime)/duration,1);
    const eased=1-Math.pow(1-progress,3);
    el.textContent=Math.round(start+(target-start)*eased);
    if(progress<1)requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

  createPost({userId:me.id,text:t,image:null,media:null,channelId:null,flash:true});
  closeM("genModal");toast("Flash note posted!","ok");go("feed");
}
function timeLeft(createdAt){
  const elapsed=Date.now()-createdAt;
  const remaining=86400000-elapsed;
  if(remaining<=0)return"expired";
  const h=Math.floor(remaining/3600000);
  const m=Math.floor((remaining%3600000)/60000);
  return h+"h "+m+"m left";
}

/* ===== BOOT ===== */
function boot(){try{const saved=localStorage.getItem("koliya_th");if(saved){document.body.setAttribute("data-theme",saved);}else{const h=new Date().getHours();if(h>=19||h<7)document.body.setAttribute("data-theme","dark");}}catch(e){}document.getElementById("auth").classList.remove("hidden");document.getElementById("app").classList.add("hidden");document.getElementById("fab").style.display="none";showAuth("login");tryRestore();}
document.addEventListener("DOMContentLoaded",boot);
/* ===== PWA: register service worker + handle install prompt ===== */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then(reg=>{
      // listen for updates
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing;
        if(nw) nw.addEventListener("statechange",()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller){
            toast("Update ready — refresh","ok");
          }
        });
      });
    }).catch(e=>console.warn("SW failed",e));
    // check for updates every 30 min
    setInterval(()=>{navigator.serviceWorker.getRegistration().then(r=>r&&r.update());},1800000);
  });
}
/* capture the Android "install app" prompt so we can trigger it ourselves */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();deferredPrompt=e;
  showInstallPrompt();
});
function showInstallPrompt(){
  if(!deferredPrompt)return;
  toast("Install كُلِّيَّة to your home screen");
}
window.addEventListener("appinstalled",()=>{deferredPrompt=null;toast("Installed! Find كُلِّيَّة on your home screen","ok");});
/* handle deep-link shortcuts (Compose / Messages / Leaderboard) */
(function(){
  const params=new URLSearchParams(location.search);
  const action=params.get("action");
  if(action){window._koliyaAction=action;}
})();

function goBack(){if(navStack.length){const prev=navStack.pop();curView=null;go(prev.view,prev.arg);}}
function renderView(view,arg){
  curView=view;curArg=arg;
  document.querySelectorAll(".ni,.bn").forEach(b=>b.classList.toggle("on",b.dataset.r===view));
  document.getElementById("fab").style.display=(view==="messages"||view==="feed")?"none":"flex";
  const c=document.getElementById("view");
  c.className="view"+(view==="messages"?" full":"");
  c.innerHTML="";
  if(view==="feed")renderFeed(c);
  else if(view==="explore")renderExplore(c);
  else if(view==="channels")renderChannels(c);
  else if(view==="channel")renderChannel(c,arg);
  else if(view==="messages")renderMessages(c,arg);
  else if(view==="events")renderEvents(c);
  else if(view==="qa")renderQA(c);
  else if(view==="hub")renderHub(c);
  else if(view==="saved")renderSaved(c);
  else if(view==="profile")renderProfile(c,arg);
  else if(view==="admin")renderAdmin(c);
  document.getElementById("main").scrollTop=0;
}
window.addEventListener("popstate",()=>goBack());
