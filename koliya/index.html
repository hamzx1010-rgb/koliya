<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>كُلِّيَّة — Koliya</title>
<meta name="theme-color" content="#4F46E5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Koliya" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="description" content="The private, Carte-Étudiant-verified social network for Algerian university students. Streaks, badges, channels & campus life." />
<link rel="manifest" href="manifest.json" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>

<link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="light">
<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#EF4444"/><stop offset="50%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#FBBF24"/></linearGradient><linearGradient id="progGrad"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs></svg>

<!-- AUTH -->
<div id="auth" class="auth">
<div class="auth-box">
<div class="auth-h"><div class="logo">كُلِّيَّة</div><div class="sub">KOLIYA · Student Network</div></div>
<div id="loginForm" class="f">
<div style="position:relative"><input class="inp" id="lemail" placeholder="Email" style="padding-right:36px"></div>
<div style="position:relative"><input type="password" class="inp" id="lpw" placeholder="Password" style="padding-right:36px"><button class="eye" onclick="let i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
<button class="btn" onclick="doLogin()">Log In</button>
<div class="sw">No account? <a onclick="showAuth('signup')">Request access</a></div>
</div>
<div id="signupForm" class="f hidden">
<input class="inp" id="sname" placeholder="Full name">
<input class="inp" id="suser" placeholder="Username">
<input class="inp" id="scard" placeholder="Carte Étudiant / بطاقة الطالب">
<input class="inp" id="sfac" placeholder="Faculty / Major">
<input class="inp" id="semail" placeholder="Gmail address">
<div style="position:relative"><input type="password" class="inp" id="spw" placeholder="Password (min 6 chars)" style="padding-right:36px"><button class="eye" onclick="let i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
<button class="btn" onclick="doSignup()">Submit</button>
<div class="sw">Already approved? <a onclick="showAuth('login')">Log in</a></div>
</div>
<div id="pendingForm" class="f hidden">
<div class="gi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
<h3 style="text-align:center;font-size:17px">Application received</h3>
<p style="text-align:center;color:var(--dim);font-size:14px">Awaiting admin approval.</p>
<button class="btn-g btn" onclick="showAuth('login')">Back</button>
</div>
<div id="rejectedForm" class="f hidden">
<div class="gi" style="background:rgba(239,68,68,.1);color:var(--danger)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
<h3 style="text-align:center;font-size:17px">Access denied</h3>
<button class="btn-g btn" onclick="showAuth('login')">Back</button>
</div>
</div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
<aside class="side">
<div class="logo" onclick="go('feed')">كُلِّيَّة</div>
<nav class="nav">
<button class="ni" data-r="feed" onclick="go('feed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></button>
<button class="ni" data-r="explore" onclick="go('explore')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explore</span></button>
<button class="ni" data-r="trending" onclick="go('trending')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 3v4h-4"/></svg><span>Trending</span></button>
<button class="ni" data-r="channels" onclick="go('channels')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg><span>Channels</span></button>
<button class="ni nd" data-r="messages" onclick="go('messages')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg><span>Messages</span><span class="dot" id="dot1"></span></button>
<button class="ni" data-r="leaderboard" onclick="go('leaderboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg><span>Ranking</span></button>
<button class="ni" data-r="saved" onclick="go('saved')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>Saved</span></button>
<button class="ni" data-r="events" onclick="go('events')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Events</span></button>
<button class="ni" data-r="qa" onclick="go('qa')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg><span>Q&A</span></button>
<button class="ni nd" data-r="activity" onclick="go('activity')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg><span>Activity</span><span class="notif-dot" id="notifDot"></span></button>
<button class="ni" data-r="profile" onclick="go('profile','me')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></button>
<button class="ni admin-only hidden" data-r="admin" onclick="go('admin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Admin</span></button>
</nav>
<div style="display:flex;flex-direction:column;gap:2px">
<button class="ni" data-r="settings" onclick="go('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Settings</span></button>
<button class="ni" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.65-.75 1.65-1.69 0-.44-.18-.84-.44-1.13-.29-.29-.44-.65-.44-1.13a1.64 1.64 0 0 1 1.67-1.67h1.99c3.05 0 5.56-2.5 5.56-5.55C21.97 6.01 17.46 2 12 2z"/></svg><span>Theme</span></button>
<button class="ni" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg><span>Log out</span></button>
</div>
</aside>
<main class="main" id="main">
<div class="topbar"><div class="logo" onclick="go('feed')">كُلِّيَّة</div></div>
<div id="view" class="view"></div>
<nav class="bnav">
<button class="bn" data-r="feed" onclick="go('feed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
<button class="bn" data-r="explore" onclick="go('explore')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
<button class="bn" data-r="channels" onclick="go('channels')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg></button>
<button class="bn nd" data-r="messages" onclick="go('messages')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg><span class="dot" id="dot2"></span></button>
<button class="bn" data-r="profile" onclick="go('profile','me')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
<button class="bn admin-only hidden" data-r="admin" onclick="go('admin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></button>
</nav>
</main>
</div>
<button class="fab" id="fab" onclick="openCreate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>

<!-- COMPOSER -->
<div id="compModal" class="ml hidden"><div class="mb" onclick="closeM('compModal')"></div><div class="mc"><div class="mh"><button onclick="closeM('compModal')" style="color:var(--dim)">Cancel</button><b>New Post</b><button class="btn" style="padding:6px 16px;width:auto" onclick="sharePost()">Share</button></div><div style="padding:14px"><textarea id="compText" class="inp" placeholder="Share something..." rows="4" style="resize:none"></textarea><div id="compPrev" style="margin-top:8px"></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px"><label class="tb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>Photo<input type="file" accept="image/*" hidden onchange="handleUpload(event,'image')"></label><label class="tb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>Video<input type="file" accept="video/*" hidden onchange="handleUpload(event,'video')"></label><label class="tb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>File<input type="file" accept=".pdf,.doc,.docx,.ppt,.pptx" hidden onchange="handleUpload(event,'file')"></label><button class="tb" onclick="openPollComposer()" style="border:none;display:inline-flex;align-items:center;gap:4px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Poll</button><select id="compCh" class="inp" style="width:auto;padding:7px 10px;border-radius:18px"><option value="">Feed</option></select></div></div></div></div>
<div id="createSheet" class="ml bottom hidden"><div class="mb" onclick="closeM('createSheet')"></div><div class="sheet" id="createBody"></div></div>
<div id="genModal" class="ml hidden"><div class="mb" onclick="closeM('genModal')"></div><div class="mc" id="genCard"></div></div>
<!-- STATIC CREATE MODAL (no dynamic JS strings = no escaping bugs) -->
<div id="createModal" class="ml hidden">
  <div class="mb" onclick="closeM('createModal')"></div>
  <div class="mc" style="max-width:420px">
    <div class="mh"><b>Create</b><button onclick="closeM('createModal')" style="font-size:24px;color:var(--dim);width:36px;height:36px;display:flex;align-items:center;justify-content:center">&times;</button></div>
    <div id="createOptions"></div>
  </div>
</div>
<div id="toast"></div>
<div id="storyView" class="sv hidden"></div>

<!-- GUIDE TOUR -->
<div class="guide-splash" id="guideSplash" style="display:none">
  <div class="guide-splash-inner">
    <div class="guide-splash-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div>
    <div class="guide-splash-logo">كُلِّيَّة</div>
    <div class="guide-splash-sub" id="guideSplashSub">Welcome to your campus</div>
  </div>
</div>
<div class="guide-overlay" id="guideOverlay"></div>
<div class="guide-spotlight" id="guideSpotlight"></div>
<div class="guide-card" id="guideCard" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
</html>
