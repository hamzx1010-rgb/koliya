<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>كُلِّيَّة — Koliya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
<style>
/* ==================== LIKED UI BASE (EXACT) ==================== */
:root{--accent:#4F46E5;--accent-h:#4338CA;--accent-lt:#EEF2FF;--accent-grad:linear-gradient(135deg,#667eea,#764ba2);--danger:#EF4444;--like:#F43F5E;--ok:#22C55E;--r:16px;--max:600px;--t:.25s cubic-bezier(.4,0,.2,1)}
:root{--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 20px rgba(0,0,0,.08);--shadow-lg:0 8px 40px rgba(0,0,0,.12)}
[data-theme="light"]{--bg:#fff;--card:#fff;--hover:#F5F5F5;--txt:#111;--dim:#888;--bd:#eee;--nav:rgba(255,255,255,.92)}
[data-theme="dark"]{--bg:#080808;--card:#141414;--hover:#1e1e1e;--txt:#f0f0f0;--dim:#666;--bd:#252525;--nav:rgba(8,8,8,.85)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji",sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;overflow:hidden;transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{font:inherit;color:var(--txt)}input::placeholder{color:var(--dim)}
img{max-width:100%;display:block}.hidden{display:none!important}

/* AUTH */
.auth{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--accent-grad);position:relative}
.auth-box{width:100%;max-width:400px;background:var(--card);border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:authIn .5s cubic-bezier(.2,.8,.2,1)}
.auth-h{text-align:center;margin-bottom:24px}
.logo{font-size:32px;font-weight:800;cursor:pointer;user-select:none;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.sub{color:var(--dim);font-size:12px;margin-top:2px}
.f{display:flex;flex-direction:column;gap:10px}
.inp{width:100%;background:var(--hover);border:1.5px solid transparent;border-radius:12px;padding:13px 15px;transition:border var(--t),background var(--t);font-size:15px}
.inp:focus{border-color:var(--accent);outline:none;background:var(--card);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.btn{background:var(--accent-grad);color:#fff;border-radius:12px;padding:13px;width:100%;font-weight:600;transition:transform var(--t),box-shadow var(--t);box-shadow:0 4px 14px rgba(79,70,229,.35);border:none}
.btn:hover{box-shadow:0 6px 20px rgba(79,70,229,.5);transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-g{background:var(--hover);color:var(--txt);border:1px solid var(--bd)}
.btn-r{background:var(--danger);color:#fff;border-radius:10px;padding:9px 16px;font-weight:600}
.sw{text-align:center;font-size:13px;color:var(--dim);margin-top:6px}.sw a{color:var(--accent);font-weight:600;cursor:pointer}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);opacity:.5;font-size:16px;cursor:pointer}
.gi{width:56px;height:56px;border-radius:50%;background:var(--accent-lt);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.gi svg{width:26px;height:26px}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden}
.main{overflow-y:auto;overflow-x:hidden;border-left:1px solid var(--bd);height:100vh}
.view{max-width:var(--max);margin:0 auto;padding-bottom:70px}
.view.full{max-width:none;padding-bottom:0}
.side{height:100vh;border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 12px;background:var(--card);position:sticky;top:0}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;margin-top:16px}
.ni{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;font-size:15px;font-weight:500;transition:all var(--t);width:100%}
.ni:hover{background:var(--hover)}.ni.on{background:var(--accent-lt);color:var(--accent);font-weight:600}.ni.on svg{stroke-width:2.2}
.ni svg{width:23px;height:23px;flex-shrink:0}
.nd{position:relative}
.dot{position:absolute;top:-2px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--like);color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
.topbar{display:none}.bnav{display:none}

/* STORIES */
.stories{display:flex;gap:12px;padding:12px;overflow-x:auto;border-bottom:1px solid var(--bd);scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.st{flex-shrink:0;text-align:center;cursor:pointer}
.ring{width:62px;height:62px;border-radius:50%;padding:2.5px;background:linear-gradient(45deg,#4F46E5,#7C3AED,#EC4899)}
.ring.v{background:var(--bd)}
.ring>div{width:100%;height:100%;border-radius:50%;border:2.5px solid var(--card);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.st .l{font-size:11px;margin-top:3px;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* POST */
.post{border-bottom:1px solid var(--bd);padding:16px 0;transition:background var(--t)}
.ph{display:flex;align-items:center;gap:10px;padding:0 14px}
.av{border-radius:50%;background:var(--hover);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);overflow:hidden;flex-shrink:0;position:relative}
.pt{padding:6px 14px 0;white-space:pre-wrap;word-break:break-word}
.pm{margin:8px 14px 0;border-radius:12px;overflow:hidden}.pm img,.pm video{width:100%}
.fc{display:flex;align-items:center;gap:10px;margin:8px 14px;padding:12px;background:var(--hover);border-radius:12px;text-decoration:none;color:var(--txt);border:1px solid var(--bd)}
.fi{width:38px;height:38px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.fn{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fs{color:var(--dim);font-size:11px}
.pa{display:flex;gap:18px;padding:8px 14px 0}
.act{display:flex;align-items:center;gap:4px;color:var(--dim);transition:transform var(--t);cursor:pointer}
.act:hover{transform:scale(1.15)}.act svg{width:20px;height:20px}
.act .c{font-size:12px;font-weight:600;color:var(--txt)}
.act.lk{color:var(--like)}.act.sv{color:var(--accent)}
.cm{font-size:13px;padding:2px 14px 0}.cm .u{font-weight:700;margin-right:5px}
.cb{display:flex;gap:6px;padding:6px 14px}
.cb input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--bd);padding:5px 0}.cb input:focus{outline:none;border-color:var(--accent)}
.cb button{color:var(--accent);font-weight:600;font-size:14px}

/* COMPOSE */
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--nav);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);z-index:5}
.compose-card{margin:12px 14px;padding:16px;background:var(--card);border:1px solid var(--bd);border-radius:18px;box-shadow:var(--shadow-sm);transition:box-shadow var(--t)}
.compose-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.compose-card-input{flex:1;background:var(--hover);border-radius:20px;padding:10px 16px;color:var(--dim);cursor:pointer;font-size:15px}
.compose-card-actions{display:flex;gap:16px;padding-top:10px;border-top:1px solid var(--bd-soft,var(--bd))}
.compose-act{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;transition:color var(--t)}
.compose-act:hover{color:var(--accent)}
.compose-act svg{width:18px;height:18px}

/* MODAL */
.ml{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.mb{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.mc{position:relative;background:var(--card);border-radius:24px;width:100%;max-width:540px;max-height:90vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .3s cubic-bezier(.2,.8,.2,1)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd)}
.tb{background:var(--hover);border-radius:18px;padding:7px 12px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.tb svg{width:16px;height:16px;color:var(--accent)}

/* CHANNEL */
.chc{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.chc:hover{background:var(--hover)}
.chi{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase}
.badge.public{background:rgba(34,197,94,.12);color:var(--ok)}.badge.private{background:var(--accent-lt);color:var(--accent)}
.chd-h{text-align:center;padding:20px 14px;border-bottom:1px solid var(--bd)}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--hover);border-radius:18px;padding:4px 10px;font-size:11px;color:var(--dim);margin:2px}
.tg{position:relative;width:40px;height:22px;flex-shrink:0}
.tg input{opacity:0;width:0;height:0}
.tg .sl{position:absolute;cursor:pointer;inset:0;background:var(--bd);border-radius:22px;transition:.3s}
.tg .sl:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.sl{background:var(--accent)}.tg input:checked+.sl:before{transform:translateX(18px)}
.empty{text-align:center;padding:60px 24px;color:var(--dim)}.empty h3{margin-bottom:8px;font-size:18px;font-weight:700}.empty p{font-size:14px;line-height:1.6}
.lr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}.lr:hover{background:var(--hover)}
.btn-o{background:var(--hover);color:var(--txt);border-radius:10px;padding:8px 16px;font-weight:500;font-size:14px;display:inline-flex;align-items:center;gap:5px}
.btn-o svg{width:16px;height:16px}
.btn-f{background:var(--accent);color:#fff;border-radius:10px;padding:8px 20px;font-weight:600;font-size:14px}
.btn-f.f{background:var(--hover);color:var(--txt)}

/* PROFILE + BANNER */
.profile-header{position:relative;margin-bottom:8px}
.banner{height:140px;background:linear-gradient(135deg,#667eea,#764ba2);position:relative;overflow:hidden}
.banner img{width:100%;height:100%;object-fit:cover}
.banner-edit{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.9);color:#111;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer}
.av-ring{position:absolute;left:16px;bottom:-24px;border:4px solid var(--card);border-radius:50%}
.profile-info{padding:36px 16px 12px 16px}
.profile-actions{display:flex;gap:8px;margin:12px 0}

/* MESSAGES */
.msg-l{display:flex;height:calc(100vh - 52px)}
.cl{width:280px;border-right:1px solid var(--bd);flex-shrink:0;overflow-y:auto;background:var(--card)}
.cl-h{padding:16px 14px 12px;border-bottom:1px solid var(--bd);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.ch-search{width:100%;background:var(--hover);border:none;border-radius:12px;padding:8px 12px;font-size:14px;margin:8px 0 12px}
.convo-list{padding:0 8px}
.convo{display:flex;gap:12px;padding:12px 10px;border-radius:14px;margin-bottom:2px;cursor:pointer;transition:background .15s}
.convo:hover{background:var(--hover)}
.convo.active{background:var(--accent-lt)}
.convo .av{width:44px;height:44px}
.convo-info{flex:1;min-width:0}
.convo-name{font-weight:600;font-size:14.5px}
.convo-last{font-size:13px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.convo-meta{font-size:11px;color:var(--dim);text-align:right;white-space:nowrap}
.cw{flex:1;display:flex;flex-direction:column;background:var(--card)}
.cw-h{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--card);z-index:10}
.cw-h .av{width:38px;height:38px}
.chat-body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.bub{max-width:78%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.35;position:relative}
.bub.th{background:var(--hover);border-bottom-left-radius:4px}
.bub.me{background:var(--accent);color:#fff;border-bottom-right-radius:4px;margin-left:auto}
.msg-time{font-size:10px;opacity:.65;margin-top:4px}
.bub.me .msg-time{opacity:.7}
.chat-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--bd);background:var(--card);position:sticky;bottom:0}
.chat-input input{flex:1;background:var(--hover);border:1px solid var(--bd);border-radius:20px;padding:11px 16px;font-size:15px}
.chat-input button{background:var(--accent);color:#fff;padding:0 18px;border-radius:20px;font-weight:600}

/* GAMIFICATION + STREAK */
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:#fef3c7;color:#854d0e;border-radius:999px;padding:1px 8px;font-size:12px;font-weight:700;margin-left:6px}
.streak-flame{font-size:16px;animation:flame 1.4s infinite alternate ease-in-out}
@keyframes flame{from{transform:scale(1)}to{transform:scale(1.15)}}

.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bd);transition:background .2s;cursor:pointer}
.lb-row:hover{background:var(--hover)}
.lb-rank{width:32px;text-align:center;font-weight:800;font-size:18px;color:var(--dim);flex-shrink:0}
.lb-rank.top1{color:#FBBF24;font-size:22px}.lb-rank.top2{color:#9CA3AF;font-size:20px}.lb-rank.top3{color:#D97706;font-size:20px}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:600;font-size:14px}
.lb-fac{color:var(--dim);font-size:12px}
.lb-score{font-weight:700;font-size:15px;color:var(--accent)}
.lb-score-bar{width:60px;height:4px;background:var(--hover);border-radius:2px;margin-top:4px;overflow:hidden}
.lb-score-fill{height:100%;background:var(--accent-grad);border-radius:2px;transition:width 1s}

/* DM PROFILE SHEET (INSTA STYLE) */
.dm-profile-sheet{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.dm-profile-sheet .sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.dm-profile-content{position:relative;width:100%;max-width:620px;background:var(--card);border-radius:22px 22px 0 0;padding-bottom:16px;box-shadow:0 -10px 40px rgba(0,0,0,.25);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.dm-profile-header{padding:16px;text-align:center;border-bottom:1px solid var(--bd)}
.dm-profile-header .big-av{width:86px;height:86px;margin:0 auto 8px;font-size:32px}
.dm-profile-actions{padding:4px 14px}
.dm-action{display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:14px;margin-bottom:2px;font-weight:600;cursor:pointer}
.dm-action:active{background:var(--hover)}
.dm-action.danger{color:var(--danger)}

.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:6px 14px}
.media-grid img,.media-grid video{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer}

/* STREAK TIMER */
.streak-timer{font-size:11px;font-weight:700;color:#c2410f;background:#fef3c7;padding:1px 6px;border-radius:5px;margin-left:5px;white-space:nowrap}

.streak-bar{display:flex;align-items:center;gap:8px;padding:5px 14px;background:linear-gradient(90deg,#fef3c7,#fefce8);border-bottom:1px solid #fde047;color:#854d0e;font-size:13px;font-weight:600}
.streak-bar.dark{background:linear-gradient(90deg,#451a03,#78350f);color:#fcd34d;border-bottom-color:#451a03}

/* BETTER ADD STORY */
.st.add-story .ring{border:3px dashed var(--accent)!important;background:var(--accent-lt)!important}
.st.add-story .ring > div{color:var(--accent);font-size:26px;font-weight:800}

/* ACTION BUTTONS - BIGGER + PLAYFUL */
.action-row{display:flex;gap:8px;padding:8px 14px 4px}
.action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--hover);padding:11px 10px;border-radius:16px;font-weight:700;font-size:14.5px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.action-btn:hover{background:#e8e8e8;transform:translateY(-1px)}
.action-btn:active{transform:scale(0.95);background:#ddd}
.action-btn .emoji{font-size:19px}

/* PLAYFUL ANIMATIONS */
.post,.chc,.convo,.st{animation:floatUp .28s ease forwards}
@keyframes floatUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.like-pop{animation:likePop .4s ease forwards}
@keyframes likePop{0%{transform:scale(1)}40%{transform:scale(1.55)}100%{transform:scale(1)}}
.btn:active, .action-btn:active, .ni:active{transform:scale(0.94)}
.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:999px;background:var(--accent-grad);color:white;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 10px 25px rgba(79,70,229,.4);z-index:60;transition:transform .2s}
.fab:active{transform:scale(0.88) rotate(12deg)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,0);background:#111;color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:500;box-shadow:0 6px 25px rgba(0,0,0,.3);z-index:999;animation:toastIn .3s forwards}
@keyframes toastIn{from{transform:translate(-50%,20px);opacity:0}}

/* BETTER EMOJIS (iOS style) */
.emoji, .streak-flame, .action-btn, .bub, .pt { font-family: -apple-system, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; }
.streak-flame { font-size: 1.2em; }

/* Bigger & playful everywhere */
.compose-act, .dm-action { transition: transform .1s, background .1s; }
.compose-act:active, .dm-action:active { transform: scale(0.96); }

@media(max-width:1100px){.app{grid-template-columns:68px 1fr}.logo{display:none}.side{padding:14px 6px}.side::before{content:"🎓";font-size:24px;text-align:center;display:block;padding:6px}.ni{justify-content:center}.ni span:not(.dot){display:none}}
@media(max-width:560px){.app{grid-template-columns:1fr}.side{display:none}.main{border:none}.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--nav);backdrop-filter:blur(12px);z-index:50}.bnav{display:flex;justify-content:space-around;position:fixed;bottom:0;left:0;right:0;background:var(--nav);backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:8px 0;z-index:50}.bn{flex:1;display:flex;justify-content:center;color:var(--dim);position:relative;padding:4px}.bn.on{color:var(--accent)}.bn svg{width:22px;height:22px}.msg-l{flex-direction:column;height:calc(100vh - 110px)}.cl{width:100%;flex-shrink:0}.cl.sc{display:none}.cw{display:none!important}.cw.on{display:flex!important}.fab{bottom:70px}.view{padding-bottom:60px}}
</style>
</head>
<body data-theme="light">

<!-- AUTH -->
<div id="auth" class="auth">
<div class="auth-box">
<div class="auth-h"><div class="logo">كُلِّيَّة</div><div class="sub">KOLIYA · Student Network</div></div>
<div id="loginForm" class="f">
<div style="position:relative"><input class="inp" id="lemail" placeholder="Email" value="sara@univ.dz" style="padding-right:36px"></div>
<div style="position:relative"><input type="password" class="inp" id="lpw" value="demo123" placeholder="Password" style="padding-right:36px"><button class="eye" onclick="let i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'">👁</button></div>
<button class="btn" onclick="doLogin()">Log In</button>
<div class="sw">No account? <a onclick="showAuth('signup')">Request access</a></div>
</div>
<div id="signupForm" class="f hidden">
<input class="inp" id="sname" placeholder="Full name" value="Sara Benali">
<input class="inp" id="suser" placeholder="Username" value="sara_cs">
<input class="inp" id="scard" placeholder="Carte Étudiant" value="20241234">

// ==================== UTILS ====================
function esc(str) { if(!str) return ""; return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function timeAgo(ts) {
  const d = typeof ts === "string" ? new Date(ts) : new Date(ts);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60)+"m";
  if (diff < 86400) return Math.floor(diff/3600)+"h";
  return Math.floor(diff/86400)+"d";
}
function getUser(id) { return data.users.find(u => u.id === id); }

// ==================== STREAKS ====================
function getStreak(uid){
  try{return parseInt(localStorage.getItem("streak_"+uid)||"0",10);}catch(e){return 0;}
}
function updateStreak(uid){
  const today=new Date().toDateString();
  const last=localStorage.getItem("lastactive_"+uid)||"";
  if(last===today)return getStreak(uid);
  const yesterday=new Date(Date.now()-86400000).toDateString();
  let streak=getStreak(uid);
  if(last===yesterday){streak++;}else if(last!==today){streak=1;}
  localStorage.setItem("streak_"+uid,streak); localStorage.setItem("lastactive_"+uid,today);
  return streak;
}
function streakHTML(uid){
  const s=getStreak(uid); if(!s)return"";
  return '<span class="streak-badge"><span class="streak-flame">🔥</span> '+s+' day'+(s===1?"":"s")+'</span>';
}

// DM Streak + Timer
function getDMStreak(a,b){
  const k=[a,b].sort().join("_");
  return parseInt(localStorage.getItem("dmstreak_"+k)||"0",10);
}
function updateDMStreak(a,b){
  const k=[a,b].sort().join("_");
  const today=new Date().toDateString();
  const last=localStorage.getItem("dm_last_"+k)||"";
  if(last===today) return getDMStreak(a,b);
  let s = getDMStreak(a,b);
  if(last === new Date(Date.now()-86400000).toDateString()) s++;
  else s=1;
  localStorage.setItem("dmstreak_"+k,s);
  localStorage.setItem("dm_last_"+k,today);
  return s;
}
function getStreakTimeLeft(a,b){
  const k=[a,b].sort().join("_");
  const last=localStorage.getItem("dm_last_"+k);
  if(!last) return null;
  const exp = new Date(new Date(last).getTime() + 86400000);
  const d = exp.getTime() - Date.now();
  if(d <= 0) return "ended";
  return Math.floor(d/(1000*60*60)) + "h " + Math.floor((d%(1000*60*60))/(1000*60)) + "m left";
}

    if(m.media?.type==="audio"){

    }
    let r="";
    if(m.reactions){const c={};Object.values(m.reactions).forEach(e=>c[e]=(c[e]||0)+1); r=Object.entries(c).map(([e,c])=>`<span class="msg-reaction">${e} ${c>1?c:""}</span>`).join("");}
    bs+=`<div class="bub ${mine?"me":"th"}" ondblclick="toggleReactionPicker(event,'${uid}',${msgs.indexOf(m)})">${mc}${m.text?esc(m.text):""}<div class="msg-time">${new Date(m.createdAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>${r}</div>`;
  });
  const streak = getDMStreak(me.id, uid);
  const time = streak>0 ? getStreakTimeLeft(me.id, uid) : "";
  const nick = localStorage.getItem("nick_"+me.id+"_"+uid) || o.username;

  const pane = document.getElementById("chatPane") || createChatPane();
  pane.innerHTML = `
    <div class="sh" style="position:sticky;top:0">
      <button onclick="closeChat()">←</button>
      <div onclick="showDMProfile('${uid}')" style="display:flex;align-items:center;gap:8px;cursor:pointer">
        ${avatarHTML(o,32)}
        <div>
          <div style="font-weight:600;font-size:15px">${esc(nick)}</div>
          <div style="color:var(--dim);font-size:12px">${esc(o.name)}</div>
          ${streak>0 ? `<div style="font-size:11px;color:#c2410f;font-weight:700">🔥 ${streak} day • ${time}</div>` : ""}
        </div>
      </div>
      <button onclick="showDMProfile('${uid}')" class="icon-btn" style="margin-left:auto">⋯</button>
    </div>
    <div class="cb2" id="chatBody" style="padding:12px 14px">${bs||empty("Say hi!","")}</div>
    <div style="display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--bd);align-items:center">
      <label style="cursor:pointer;padding:8px;border-radius:50%;background:var(--hover)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.93 8.8l-8.57 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg><input type="file" accept="image/*,video/*" hidden onchange="chatAttach(event)"></label>
      <input id="msgInput" class="inp" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1">
      <button onclick="toggleRecording()" style="padding:8px;border-radius:50%;background:var(--hover)">🎙️</button>
      <button class="btn-f" onclick="sendChat()">Send</button>
    </div>
    <div id="recBar" class="hidden" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bd);background:var(--hover)">
      <div style="width:10px;height:10px;border-radius:50%;background:var(--danger);animation:pulse 1s infinite"></div>
      <span id="recTime">0:00</span>

  const cl=document.getElementById("convList"); if(cl) cl.classList.add("sc");

function createChatPane() {
  const view = document.getElementById("view");
  view.innerHTML = `<div class="msg-l"><div class="cl" id="convList"></div><div class="cw" id="chatPane"></div></div>`;
  return document.getElementById("chatPane");
}

function getMsgs(a,b) {
  return (data.messages||[]).filter(m => 
    (m.sender===a && m.receiver===b) || (m.sender===b && m.receiver===a)
  ).sort((x,y)=> new Date(x.createdAt)-new Date(y.createdAt));
}

function sendChat(){
  const inp = document.getElementById("msgInput");
  if(!inp || !activeChat) return;
  const txt = inp.value.trim();
  if(!txt) return;
  
  const msg = {id:uid("m"), sender:me.id, receiver:activeChat, text:txt, createdAt:new Date().toISOString()};
  data.messages.push(msg);
  saveLocal();
  updateDMStreak(me.id, activeChat);
  
  inp.value = "";
  
  // Refresh chat
  showChat(activeChat);
  
  // Supabase push
  if (USE_SUPA && supabaseClient) {
    supabaseClient.from('messages').insert({
      id: msg.id,
      sender_id: me.id,
      receiver_id: activeChat,
      text: txt,
      created_at: msg.createdAt
    }).then(r => { if (r.error) console.log(r.error); });
  }
}

function closeChat(){
  activeChat = null;
  const cl=document.getElementById("convList"); if(cl) cl.classList.remove("sc");
  const pane = document.getElementById("chatPane");
  if(pane) pane.innerHTML = `<div style="padding:40px;color:var(--dim);text-align:center">Select a conversation.</div>`;
}

// ==================== FEED (HOME) ====================
function renderFeed(c){
  const visible = new Set([me.id, ...me.following]);
  let posts = allPosts().filter(p => !p.channelId && visible.has(p.userId));

  let h = `<div class="sh"><b style="font-size:18px">كُلِّيَّة</b><button onclick="openComposer()" style="font-size:22px;color:var(--accent)">+</button></div>`;

  // Stories
  const s = storyUsers().filter(x => me.following.includes(x.userId) || x.userId===me.id);
  if(s.length || me.following.length){
    h += `<div class="stories">
      <div class="st" onclick="addStory()"><div class="ring add-story"><div>+</div></div><div class="l">Add</div></div>`;
    s.forEach(x=>{ const u=getUser(x.userId); if(u) h+=`<div class="st" onclick="viewStory('${x.userId}')"><div class="ring"><div>${avatarHTML(u,57)}</div></div><div class="l">${esc(u.username)}</div></div>`; });
    h += `</div>`;
  }

  // Compose card
  h += `<div class="compose-card">
    <div class="compose-card-top">${avatarHTML(me,40)}
      <div class="compose-card-input" onclick="openComposer()">What's on your mind?</div>
    </div>
    <div class="compose-card-actions">
      <div class="compose-act" onclick="openComposer()">📷 Photo</div>
      <div class="compose-act" onclick="openComposer()">🎬 Video</div>
      <div class="compose-act" onclick="openComposer()">📄 File</div>
      <div class="compose-act" onclick="openAnonPost()">🎭 Anon</div>
    </div>
  </div>`;

  if(!posts.length) h += empty("Welcome!","Share your first post.");
  else h += posts.map(postCard).join("");
  
  c.innerHTML = h;
}

function postCard(p){
  const a = p.anonymous ? {username:"Anonymous", name:"Student", avatar:null, role:"student"} : getUser(p.userId);
  if(!a) return "";
  const lk = (p.likes||[]).includes(me.id);
  let media = "";
  if(p.image) media = `<div class="pm"><img src="${p.image}"></div>`;
  if(p.media && p.media.type==="video") media = `<div class="pm"><video src="${p.media.data}" controls></video></div>`;
  if(p.media && p.media.type==="file") media = `<a href="${p.media.data}" download class="fc"><div class="fi">📄</div><div><div class="fn">${esc(p.media.name)}</div></div></a>`;
  const cmt = (p.comments||[]).slice(-2).map(c=>{const cu=getUser(c.userId);return `<div class="cm"><span class="u">${esc((cu||{}).username)}</span>${esc(c.text)}</div>`}).join("");

  return `<div class="post">
    <div class="ph">${avatarHTML(a,36)}<div style="flex:1" onclick="go('profile','${p.userId}')"><b>${esc(a.username)}</b><div style="color:var(--dim);font-size:12px">${esc(a.name)} · ${timeAgo(p.createdAt)}</div></div></div>
    ${p.text?`<div class="pt">${esc(p.text)}</div>`:""}
    ${media}
    <div class="action-row">
      <div class="action-btn" onclick="likePost('${p.id}')">${lk?"❤️":"🤍"} <span>${(p.likes||[]).length||""}</span></div>
      <div class="action-btn" onclick="openPostDetail('${p.id}')">💬 <span>${(p.comments||[]).length||""}</span></div>
      <div class="action-btn" onclick="sharePostToDM('${p.id}')">📤</div>
      <div class="action-btn" onclick="savePost('${p.id}')">🔖</div>
      ${p.userId===me.id ? `<div class="action-btn" style="color:var(--danger)" onclick="delPrompt('${p.id}')">🗑️</div>` : ""}
    </div>
    ${cmt}
    <div class="cb"><input id="ci-${p.id}" placeholder="Comment..." onkeydown="if(event.key==='Enter')doComment('${p.id}',this.value,this)"><button onclick="doComment('${p.id}',document.getElementById('ci-${p.id}').value)">Post</button></div>
  </div>`;
}

function likePost(pid){
  const p = getPost(pid);
  if(!p) return;
  if(!p.likes) p.likes = [];
  const i = p.likes.indexOf(me.id);
  if(i === -1) p.likes.push(me.id);
  else p.likes.splice(i,1);
  saveLocal();
  if (USE_SUPA && supabaseClient) {
    supabaseClient.from('posts').update({likes: p.likes}).eq('id', pid);
  }
  const el = document.getElementById("view");
  if (el) renderFeed(el);
}

function savePost(pid){
  const p = getPost(pid);
  if(!p) return;
  if(!p.saved) p.saved = [];
  const i = p.saved.indexOf(me.id);
  if(i === -1) p.saved.push(me.id);
  else p.saved.splice(i,1);
  saveLocal();
  toast("Saved!");
}

function doComment(pid, txt, el){
  txt = txt.trim();
  if(!txt) return;
  const p = getPost(pid);
  if(!p) return;
  if(!p.comments) p.comments = [];
  p.comments.push({id:uid("c"), userId:me.id, text:txt, createdAt:new Date().toISOString()});
  saveLocal();
  if (USE_SUPA && supabaseClient) {
    supabaseClient.from('posts').update({comments: p.comments}).eq('id', pid);
  }
  if (el) el.value = "";
  const view = document.getElementById("view");
  if (view) renderFeed(view);
}

function delPrompt(id){
  modal("Delete post?", `<div style="padding:16px 16px 0"><p>Delete this post permanently?</p></div>
    <div style="padding:16px;display:flex;gap:10px">
      <button class="btn-g btn" style="flex:1" onclick="closeM('genModal')">Cancel</button>
      <button class="btn-r" style="flex:1" onclick="confirmDel('${id}')">Delete</button>
    </div>`);
}
function confirmDel(id){
  data.posts = data.posts.filter(p=>p.id!==id);
  saveLocal();
  if (USE_SUPA && supabaseClient) {
    supabaseClient.from('posts').delete().eq('id', id);
  }
  closeM("genModal");
  toast("Deleted.");
  const view = document.getElementById("view");
  if (view) renderFeed(view);
}

// ==================== STORIES ====================
function storyUsers(){
  if(!data.stories) data.stories = [];
  const seen = new Set();
  return data.stories.filter(s => {
    if(seen.has(s.userId)) return false;
    seen.add(s.userId);
    return true;
  });
}

function addStory(){
  modal("Add Story", `
    <div style="padding:18px">
      <div style="margin-bottom:12px;font-weight:600">Share a story</div>
      <div onclick="createTextStory()" class="action-btn" style="margin-bottom:8px">✏️ Write text story</div>
      <label class="action-btn" style="margin-bottom:8px">
        📷 Photo / Video
        <input type="file" accept="image/*,video/*" hidden onchange="uploadStory(event)">
      </label>
      <div onclick="closeM('genModal')" class="btn-g" style="width:100%;margin-top:8px;text-align:center;padding:11px">Cancel</div>
    </div>
  `);
}

function createTextStory(){
  const txt = prompt("What's your story?");
  if(!txt) return;
  if(!data.stories) data.stories = [];
  data.stories.push({id:uid("s"), userId:me.id, text:txt, createdAt:Date.now()});
  saveLocal();
  document.querySelector(".ml")?.remove();
  toast("Story posted!");
  go("feed");
}

function uploadStory(e){
  const f = e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    if(!data.stories) data.stories = [];
    data.stories.push({id:uid("s"), userId:me.id, media:ev.target.result, createdAt:Date.now()});
    saveLocal();
    document.querySelector(".ml")?.remove();
    toast("Story posted!");
    go("feed");
  };
  r.readAsDataURL(f);
}

function viewStory(uid){
  const stories = (data.stories||[]).filter(s=>s.userId===uid);
  if(!stories.length) return;
  const s = stories[stories.length-1];
  const el = document.createElement("div");
  el.style.cssText = "position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:300";
  el.innerHTML = `
    <div style="position:absolute;top:20px;left:20px;color:#fff;font-size:13px">Swipe down to close</div>
    <div onclick="event.stopImmediatePropagation()" style="max-width:92%;max-height:86%;background:#111;border-radius:16px;padding:16px;color:#fff;text-align:center">
      ${s.text ? `<div style="font-size:22px;padding:30px 10px">${esc(s.text)}</div>` : ""}
      ${s.media ? `<img src="${s.media}" style="max-width:100%;max-height:520px;border-radius:12px">` : ""}
      <div style="margin-top:18px;font-size:12px;opacity:.6">${getUser(uid)?.username}</div>
    </div>
  `;
  el.onclick = () => el.remove();
  document.body.appendChild(el);
}

// ==================== MESSAGES RENDER ====================
function renderMessages(c, target = null){
  if(target){ showChat(target); return; }
  
  let h = `<div class="sh"><b>Messages</b> <span style="font-size:13px;color:var(--dim);font-weight:400">Streaks are everything 🔥</span></div>`;
  
  const convos = {};
  (data.messages||[]).forEach(m=>{
    const other = m.sender===me.id ? m.receiver : m.sender;
    if(!convos[other]) convos[other]=[];
    convos[other].push(m);
  });
  
  const list = Object.keys(convos).map(id=>{
    const msgs = convos[id];
    const last = msgs[msgs.length-1];
    const u = getUser(id);
    const s = getDMStreak(me.id, id);
    return {id, u, last, s};
  }).sort((a,b)=> new Date(b.last.createdAt)-new Date(a.last.createdAt));
  
  if(!list.length){
    h += `<div class="empty"><h3>No chats yet</h3><p>Start a conversation to build your streak!</p></div>`;
  }else{
    list.forEach(p=>{
      const nick = localStorage.getItem("nick_"+me.id+"_"+p.id) || (p.u ? p.u.username : "User");
      h += `<div class="convo" onclick="go('messages','${p.id}')">
        ${avatarHTML(p.u, 50)}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-weight:700;font-size:15.5px">${esc(nick)}</span>
            ${p.s>0 ? `<span class="streak-badge" style="font-size:11px;padding:1px 6px">🔥 ${p.s}</span>` : ""}
          </div>
          <div style="font-size:13.5px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.last.text||"[media]")}</div>
        </div>
        <div style="font-size:11.5px;color:var(--dim);text-align:right;white-space:nowrap">${timeAgo(p.last.createdAt)}</div>
      </div>`;
    });
  }
  c.innerHTML = `<div class="msg-l"><div class="cl" id="convList">${h}</div><div class="cw" id="chatPane">${empty("Your messages","Select a chat.")}</div></div>`;
}

// ==================== LEADERBOARD ====================
function renderLeaderboard(c){
  const users = allUsers().filter(x=>x.status==="approved"&&x.role==="student");
  const scored = users.map(u=>({u,score:getUserScore(u.id)})).sort((a,b)=>b.score-a.score);
  
  let h = `<div class="sh"><b>Campus Ranking</b></div>`;
  scored.forEach((s,i)=>{
    h += `<div class="lb-row" onclick="go('profile','${s.u.id}')">
      <div style="width:32px;font-weight:800;font-size:18px;color:${i<3?'#f59e0b':''}">#${i+1}</div>
      ${avatarHTML(s.u,38)}
      <div style="flex:1"><b>${esc(s.u.username)}</b><div style="font-size:12.5px;color:var(--dim)">${esc(s.u.faculty)}</div></div>
      <div style="font-weight:800;color:var(--accent)">${s.score}</div>
    </div>`;
  });
  c.innerHTML = h;
}

function getUserScore(uid){
  const posts = allPosts().filter(p=>p.userId===uid).length;
  const likes = allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.likes||[]).length,0);
  return posts*5 + likes*2;
}

// ==================== EXPLORE / SEARCH ====================
function renderExplore(c){
  let h = `<div class="sh"><b>Explore Students</b></div>`;
  h += `<div style="padding:12px 14px"><input id="searchInp" class="inp" placeholder="Search students..." oninput="filterExplore(this.value)" style="width:100%"></div>`;
  
  const us = allUsers().filter(u=>u.id!==me.id&&u.status==="approved");
  h += us.map(u=>`
    <div class="lr" onclick="go('profile','${u.id}')">
      ${avatarHTML(u,42)}
      <div style="flex:1"><b>${esc(u.username)}</b><div style="font-size:13px;color:var(--dim)">${esc(u.faculty||'')}</div></div>
      <button onclick="event.stopImmediatePropagation();followUser('${u.id}',this)" class="btn-f">Follow</button>
    </div>
  `).join("");
  
  c.innerHTML = h;
  setTimeout(()=> {
    const inp = document.getElementById("searchInp");
    if(inp) inp.focus();
  }, 80);
}

function filterExplore(q){
  q = q.toLowerCase();
  const rows = document.querySelectorAll("#view .lr");
  rows.forEach(r => {
    const txt = r.textContent.toLowerCase();
    r.style.display = txt.includes(q) ? "" : "none";
  });
}

function followUser(id,btn){
  if(!me.following) me.following=[];
  if(me.following.includes(id)){
    me.following = me.following.filter(x=>x!==id);
    if(btn) btn.textContent = "Follow";
  } else {
    me.following.push(id);
    if(btn) btn.textContent = "Following";
  }
  saveLocal();
  if (USE_SUPA && supabaseClient) {
    supabaseClient.from('profiles').update({following: me.following}).eq('id', me.id);
  }
}

function saveProfileEdits(){

function updateUser(id, patch){
  const idx = data.users.findIndex(x => x.id === id);
  if(idx === -1) return;
  Object.assign(data.users[idx], patch);
  if(me && me.id === id) me = data.users[idx];
  saveLocal();
  if(USE_SUPA && supabaseClient){
    supabaseClient.from("profiles").update(patch).eq("id", id);
  }
}

// ==================== AUTH (SUPABASE + LOCAL) ====================
function showAuth(w){
  ["loginForm","signupForm","pendingForm","rejectedForm"].forEach(f=>{
    const el = document.getElementById(f);
    if(el) el.classList.add("hidden");
  });
  const target = document.getElementById(w+"Form");
  if(target) target.classList.remove("hidden");
}

async function doLogin(){
  const e = document.getElementById("lemail").value.trim();
  const p = document.getElementById("lpw").value;
  if(!e || !p) return toast("Enter email and password");
  
  if(USE_SUPA && supabaseClient){
    try {
      const { data: authData, error } = await supabaseClient.auth.signInWithPassword({email:e, password:p});
      if(error) return toast("Wrong credentials");
      
      await syncFromSupabase();
      const u = data.users.find(x => x.email === e && x.status === "approved");
      if(!u) return toast("Account not approved yet");
      me = u;
      localStorage.setItem("koliya_sess", me.id);
      enterApp();
    } catch(err){
      toast("Login error");
    }
  } else {
    // Local fallback
    const u = data.users.find(x => x.email === e && x.password === p);
    if(!u) return toast("Wrong credentials");
    if(u.status !== "approved") return toast("Account not approved");
    me = u;
    localStorage.setItem("koliya_sess", me.id);
    enterApp();
  }
}

async function doSignup(){
  const name = document.getElementById("sname").value.trim();
  const un = document.getElementById("suser").value.trim();
  const card = document.getElementById("scard").value.trim();
  const fac = document.getElementById("sfac").value.trim();
  const email = document.getElementById("semail").value.trim();
  const pw = document.getElementById("spw").value;
  
  if(!name || !un || !email || !pw) return toast("Fill all fields");
  
  if(USE_SUPA && supabaseClient){
    try {
      const { error } = await supabaseClient.auth.signUp({
        email, password: pw,
        options: { data: { full_name: name, username: un, student_card: card, faculty: fac } }
      });
      if(error) return toast(error.message);
      
      // Create pending profile
      const newUser = {id: "u_"+Date.now(), name, username:un, email, studentCard:card, faculty:fac, status:"pending", role:"student", followers:[], following:[], blocked:[]};
      data.users.push(newUser);
      saveLocal();
      
      showAuth("pending");
      toast("Request sent! Waiting for approval.");
    } catch(err){
      toast("Signup failed");
    }
  } else {
    // Local
    if(data.users.find(x=>x.email===email)) return toast("Email exists");
    const newUser = {id:uid("u"), name, username:un, email, password:pw, studentCard:card, faculty:fac, status:"pending", role:"student", followers:[], following:[], blocked:[]};
    data.users.push(newUser);
    saveLocal();
    showAuth("pending");
    toast("Request submitted!");
  }
}

function enterApp(){
  updateStreak(me.id);
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("fab").style.display = "flex";
  document.querySelectorAll(".admin-only").forEach(e=>e.classList.toggle("hidden", me.role !== "admin"));
  
  const topAv = document.getElementById("topAvatar");
  if(topAv) topAv.innerHTML = avatarHTML(me, 30);
  
  go("feed");
  startPoll();
  updateBadges();
}

function doLogout(){
  if(USE_SUPA && supabaseClient) supabaseClient.auth.signOut();
  localStorage.removeItem("koliya_sess");
  me = null;
  document.getElementById("app").classList.add("hidden");
  document.getElementById("auth").classList.remove("hidden");
  document.getElementById("fab").style.display = "none";

}

// ==================== SUPABASE SYNC ====================
async function syncFromSupabase(){
  if(!USE_SUPA || !supabaseClient) return;
  try {
    const [profilesRes, postsRes, msgsRes] = await Promise.all([
      supabaseClient.from("profiles").select("*"),
      supabaseClient.from("posts").select("*").order("created_at", {ascending:false}),
      supabaseClient.from("messages").select("*").order("created_at", {ascending:true})
    ]);
    
    if(profilesRes.data) data.users = profilesRes.data;
    if(postsRes.data) data.posts = postsRes.data;
    if(msgsRes.data) data.messages = msgsRes.data.map(m => ({
      id:m.id, sender:m.sender_id, receiver:m.receiver_id, text:m.text, media:m.media, createdAt:m.created_at
    }));
    
    saveLocal();
  } catch(e){ console.log("Sync error", e); }
}

// ==================== COMPOSER + POST ====================
function openComposer(){
  compImage = null; compMedia = null;
  document.getElementById("compText").value = "";
  document.getElementById("compPrev").innerHTML = "";
  
  const sel = document.getElementById("compCh");
  sel.innerHTML = `<option value="">Feed</option>` + (data.channels||[]).map(ch => `<option value="${ch.id}">${ch.icon||''} ${esc(ch.name)}</option>`).join("");
  
  document.getElementById("compModal").classList.remove("hidden");
}

function handleUpload(e, type){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    if(type === "image"){
      compImage = ev.target.result;
      compMedia = null;
      document.getElementById("compPrev").innerHTML = `<img src="${compImage}" style="max-height:180px;border-radius:10px">`;
    } else if(type === "video"){
      compMedia = {type:"video", data:ev.target.result, name:f.name};
      compImage = null;
      document.getElementById("compPrev").innerHTML = `<video src="${ev.target.result}" controls style="max-height:180px;border-radius:10px"></video>`;
    } else {
      compMedia = {type:"file", data:ev.target.result, name:f.name};
      compImage = null;
      document.getElementById("compPrev").innerHTML = `<div class="fc"><div class="fi">📄</div><div><div class="fn">${esc(f.name)}</div></div></div>`;
    }
  };
  r.readAsDataURL(f);
}

function submitPost(){
  const txt = document.getElementById("compText").value.trim();
  const ch = document.getElementById("compCh").value || null;
  if(!txt && !compImage && !compMedia) return toast("Write something or add media");
  
  const post = {
    id: uid("p"),
    userId: me.id,
    text: txt,
    image: compImage,
    media: compMedia,
    channelId: ch,
    likes: [],
    comments: [],
    saved: [],
    createdAt: new Date().toISOString()
  };
  data.posts.unshift(post);
  saveLocal();
  
  closeM("compModal");
  toast("Posted!");
  go("feed");
  
  if(USE_SUPA && supabaseClient){
    supabaseClient.from("posts").insert({
      id: post.id,
      user_id: me.id,
      text: txt,
      image_url: compImage,
      media: compMedia,
      channel_id: ch,
      likes: [],
      comments: [],
      created_at: post.createdAt
    });
  }
}

function addPollOpt(){
  const c = document.getElementById("pollOpts");
  const inp = document.createElement("input");
  inp.className = "inp";
  inp.placeholder = "Option " + (c.children.length + 1);
  c.appendChild(inp);
}

function submitPoll(){
  const q = document.getElementById("pollQ").value.trim();
  const opts = [...document.querySelectorAll("#pollOpts input")].map(i=>i.value.trim()).filter(Boolean);
  if(!q || opts.length < 2) return toast("Need question + 2 options");
  
  const poll = {question:q, options:opts, votes:{}};
  const post = {
    id:uid("p"), userId:me.id, text:q, image:null, media:null, channelId:null,
    likes:[], comments:[], saved:[], poll, createdAt:new Date().toISOString()
  };
  data.posts.unshift(post);
  saveLocal();
  closeM("genModal");
  toast("Poll posted!");
  go("feed");
}

function dayLabel(ts){
  const d = new Date(ts);
  const today = new Date();
  if(d.toDateString() === today.toDateString()) return "Today";
  return d.toLocaleDateString();
}

// ==================== INIT & ROUTER ====================
let curView = null, curArg = null;

function go(view, arg){
  curView = view; curArg = arg;
  const c = document.getElementById("view");
  c.innerHTML = "";
  
  if(view === "feed") renderFeed(c);
  else if(view === "explore") renderExplore(c);
  else if(view === "trending") renderTrending(c);
  else if(view === "messages") renderMessages(c, arg);
  else if(view === "leaderboard") renderLeaderboard(c);
  else if(view === "profile") renderProfile(c, arg);
  else if(view === "saved") renderSaved(c);
  else if(view === "events") renderEvents(c);
  else if(view === "qa") renderQA(c);
  else if(view === "hub") renderHub(c);
  else if(view === "channels") renderChannels(c);
  else c.innerHTML = `<div class="sh"><b>${view}</b></div>`;
  
  document.querySelectorAll(".ni,.bn").forEach(b => b.classList.toggle("on", b.dataset.r === view));
}

function updateBadges(){
  const unread = (data.messages||[]).filter(m => m.receiver === me.id && !localStorage.getItem("rd_"+m.sender)).length;
  const dot = document.getElementById("dot1");
  if(dot) {
    dot.style.display = unread > 0 ? "flex" : "none";
    dot.textContent = unread > 9 ? "9+" : unread;
  }
}

function startPoll(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    if(curView === "messages" && activeChat) {
      const body = document.getElementById("chatBody");
      if(body) showChat(activeChat);
    }
  }, 7000);
}
