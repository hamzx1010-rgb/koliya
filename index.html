<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>كُلِّيَّة — Koliya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
<style>
:root {
  --accent: #4F46E5; --accent-h: #4338CA; --accent-lt: #EEF2FF;
  --accent-grad: linear-gradient(135deg, #667eea, #764ba2);
  --danger: #EF4444; --like: #F43F5E; --ok: #22C55E;
  --r: 18px; --max: 620px; --t: .25s cubic-bezier(.4,0,.2,1);
}
:root { --shadow-sm: 0 1px 3px rgba(0,0,0,.08); --shadow: 0 4px 20px rgba(0,0,0,.08); --shadow-lg: 0 8px 40px rgba(0,0,0,.12); }
[data-theme="light"] { --bg:#fff; --card:#fff; --hover:#F5F5F5; --txt:#111; --dim:#888; --bd:#eee; --nav:rgba(255,255,255,.95); }
[data-theme="dark"] { --bg:#080808; --card:#141414; --hover:#1e1e1e; --txt:#f0f0f0; --dim:#666; --bd:#252525; --nav:rgba(8,8,8,.92); }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15.5px;line-height:1.45;overflow:hidden;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{font:inherit;color:var(--txt)} input::placeholder{color:var(--dim)}
img{max-width:100%;display:block} .hidden{display:none!important}

/* PREMIUM BUTTONS */
.btn { background:var(--accent-grad); color:#fff; border-radius:14px; padding:14px 20px; font-weight:700; font-size:15px; box-shadow:0 4px 14px rgba(79,70,229,.35); transition:all .2s; }
.btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,70,229,.5); }
.btn:active { transform:scale(0.97); }
.btn-g { background:var(--hover); color:var(--txt); border:1px solid var(--bd); border-radius:14px; padding:12px 18px; font-weight:600; }
.btn-o { background:var(--hover); color:var(--txt); border-radius:12px; padding:10px 18px; font-weight:600; }
.btn-f { background:var(--accent); color:white; border-radius:12px; padding:10px 20px; font-weight:700; }
.btn-small { padding:8px 14px; font-size:13.5px; border-radius:10px; font-weight:600; }

.icon-btn { width:38px; height:38px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:var(--hover); font-size:18px; transition:all .15s; }
.icon-btn:active { transform:scale(0.9); background:#ddd; }

.action-row { display:flex; gap:8px; padding:0 14px 12px; }
.action-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; background:var(--hover); padding:10px; border-radius:14px; font-weight:600; font-size:14px; }
.action-btn:active { background:#e0e0e0; }

/* AUTH */
.auth { height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--accent-grad); }
.auth-box { width:100%; max-width:400px; background:var(--card); border-radius:28px; padding:42px 32px; box-shadow:0 25px 70px rgba(0,0,0,.35); }
.logo { font-size:34px; font-weight:900; background:var(--accent-grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-1.5px; }
.sub { color:var(--dim); font-size:13px; margin-top:4px; }

/* LAYOUT */
.app { display:grid; grid-template-columns:240px 1fr; height:100vh; overflow:hidden; }
.main { overflow-y:auto; overflow-x:hidden; border-left:1px solid var(--bd); }
.view { max-width:var(--max); margin:0 auto; padding-bottom:80px; }
.side { height:100vh; border-right:1px solid var(--bd); padding:20px 12px; background:var(--card); position:sticky; top:0; }
.nav { display:flex; flex-direction:column; gap:2px; margin-top:16px; }
.ni { display:flex; align-items:center; gap:14px; padding:13px 16px; border-radius:16px; font-size:15.5px; font-weight:600; transition:all .15s; }
.ni:hover { background:var(--hover); }
.ni.on { background:var(--accent-lt); color:var(--accent); font-weight:700; }

/* STORIES — STUDENT FRIENDLY */
.stories { display:flex; gap:14px; padding:14px 14px 12px; overflow-x:auto; border-bottom:1px solid var(--bd); scrollbar-width:none; }
.stories::-webkit-scrollbar { display:none; }
.st { flex-shrink:0; text-align:center; cursor:pointer; }
.ring { width:68px; height:68px; border-radius:50%; padding:3px; background:linear-gradient(45deg,#4F46E5,#7C3AED,#EC4899); }
.ring.v { background:var(--bd); }
.ring > div { width:100%; height:100%; border-radius:50%; border:3px solid var(--card); overflow:hidden; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:22px; }
.st .l { font-size:11.5px; margin-top:5px; max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.add-story { border:3px dashed var(--accent) !important; background:var(--accent-lt) !important; }
.add-story > div { color:var(--accent); font-size:28px; }

/* POST — PREMIUM */
.post { border-bottom:1px solid var(--bd); padding:16px 0; }
.ph { display:flex; align-items:center; gap:10px; padding:0 14px; }
.av { border-radius:50%; background:var(--hover); display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--accent); overflow:hidden; }
.pt { padding:8px 14px 0; white-space:pre-wrap; word-break:break-word; line-height:1.4; }
.pm { margin:10px 14px 0; border-radius:16px; overflow:hidden; border:1px solid var(--bd); }
.pa { display:flex; gap:20px; padding:10px 14px 0; }
.act { display:flex; align-items:center; gap:6px; color:var(--dim); font-weight:600; transition:transform .15s; cursor:pointer; padding:4px; }
.act:hover { transform:scale(1.1); color:var(--accent); }
.act.lk { color:var(--like); }
.act .c { font-size:13px; font-weight:700; color:var(--txt); }

.cb { display:flex; gap:8px; padding:8px 14px; }
.cb input { flex:1; background:transparent; border:none; border-bottom:2px solid var(--bd); padding:6px 0; font-size:15px; }
.cb button { color:var(--accent); font-weight:700; font-size:15px; padding:0 4px; }

/* COMPOSE CARD */
.compose-card { margin:12px 14px; padding:16px; background:var(--card); border:1px solid var(--bd); border-radius:20px; box-shadow:var(--shadow-sm); }
.compose-card-input { background:var(--hover); border-radius:24px; padding:12px 18px; color:var(--dim); cursor:pointer; font-size:15.5px; }
.compose-act { display:flex; align-items:center; gap:6px; color:var(--dim); font-size:14px; font-weight:600; cursor:pointer; padding:8px 12px; border-radius:999px; background:var(--hover); }
.compose-act:active { background:#ddd; }

/* MESSAGES — PREMIUM */
.convo { display:flex; gap:13px; padding:14px 12px; border-radius:16px; margin:2px 0; cursor:pointer; transition:all .15s; }
.convo:hover { background:var(--hover); }
.convo .av { width:50px; height:50px; font-size:18px; }
.convo-name { font-weight:700; font-size:15.5px; }
.dm-streak-pill { background:#fef3c7; color:#854d0e; font-size:11.5px; padding:2px 8px; border-radius:999px; font-weight:700; display:inline-flex; align-items:center; gap:3px; }
.streak-bar { display:flex; align-items:center; gap:8px; padding:7px 16px; background:linear-gradient(90deg,#fef3c7,#fefce8); border-bottom:1px solid #fde047; color:#854d0e; font-size:13px; font-weight:700; }
.streak-bar.dark { background:linear-gradient(90deg,#451a03,#78350f); color:#fcd34d; }

/* STREAK TIMER */
.streak-timer { font-size:11px; font-weight:600; color:#c2410f; background:#fef3c7; padding:1px 7px; border-radius:6px; margin-left:6px; }

/* DM PROFILE SHEET (INSTA STYLE) */
.dm-profile-sheet { position:fixed; inset:0; z-index:200; display:flex; align-items:flex-end; justify-content:center; }
.dm-profile-sheet .sheet-bg { position:absolute; inset:0; background:rgba(0,0,0,.6); }
.dm-profile-content { position:relative; width:100%; max-width:620px; background:var(--card); border-radius:22px 22px 0 0; padding-bottom:20px; box-shadow:0 -10px 40px rgba(0,0,0,.25); animation:slideUp .3s ease; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.dm-profile-header { padding:16px; text-align:center; border-bottom:1px solid var(--bd); }
.dm-profile-header .big-av { width:92px; height:92px; margin:0 auto 12px; font-size:36px; }
.dm-profile-actions { padding:8px 16px; }
.dm-action { display:flex; align-items:center; gap:14px; padding:15px 12px; border-radius:14px; margin-bottom:4px; font-weight:600; }
.dm-action:active { background:var(--hover); }
.dm-action.danger { color:var(--danger); }

/* SHARED MEDIA GRID */
.media-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; padding:8px 14px; }
.media-grid img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer; }

/* BADGES & ACHIEVEMENTS */
.b-min { display:flex; gap:12px; align-items:center; padding:11px 13px; border-radius:16px; margin-bottom:7px; background:var(--card); border:1px solid var(--bd); }
.b-min.earned { background:var(--accent-lt); border-color:#c7d2fe; }
.b-min-ic { width:44px; height:44px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:23px; }
.b-min-ic.earned { background:#c7d2fe; color:var(--accent); }

/* LEADERBOARD + OTHER */
.lb-row { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--bd); cursor:pointer; }
.lb-row:hover { background:var(--hover); }

/* HOME IMPROVEMENTS */
.sh { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; font-weight:800; font-size:18.5px; position:sticky; top:0; background:var(--nav); z-index:10; backdrop-filter:blur(20px); }
.fab { position:fixed; bottom:90px; right:22px; width:58px; height:58px; border-radius:999px; background:var(--accent-grad); color:white; display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 10px 30px rgba(79,70,229,.45); z-index:70; transition:transform .2s; }
.fab:active { transform:scale(0.9); }

/* TOAST + MODALS */
.toast { position:fixed; bottom:22px; left:50%; transform:translate(-50%,0); background:#111; color:#fff; padding:11px 20px; border-radius:999px; font-size:14px; font-weight:600; box-shadow:0 6px 25px rgba(0,0,0,.3); z-index:999; }
.ml { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
.mc { background:var(--card); border-radius:24px; width:100%; max-width:560px; max-height:90vh; overflow:hidden; box-shadow:0 25px 70px rgba(0,0,0,.3); }

.empty { text-align:center; padding:70px 24px; color:var(--dim); }
.empty h3 { font-size:19px; margin-bottom:6px; color:var(--txt); }

/* STORY VIEW */
#storyView { position:fixed; inset:0; background:#000; z-index:300; display:none; align-items:center; justify-content:center; }

@media(max-width:560px){
  .app { grid-template-columns:1fr; }
  .side { display:none; }
  .topbar { display:flex; }
  .bnav { display:flex; }
  .fab { bottom:75px; }
}
</style>
</head>
<body data-theme="light">

<!-- AUTH -->
<div id="auth" class="auth">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo">كُلِّيَّة</div>
      <div class="sub">KOLIYA • Campus Network</div>
    </div>
    
    <div id="loginForm">
      <div style="position:relative;margin-bottom:10px">
        <input class="inp" id="lemail" placeholder="Email" value="sara@univ.dz" style="padding:14px 16px">

      <div style="position:relative;margin-bottom:16px">

</div>

<!-- APP -->
<div id="app" class="app hidden">
  <aside class="side">
    <div class="logo" onclick="go('feed')" style="font-size:26px;margin-bottom:12px">كُلِّيَّة</div>
    
    <nav class="nav">
      <button class="ni" data-r="feed" onclick="go('feed')"><span style="font-size:21px">🏠</span><span>Home</span></button>
      <button class="ni" data-r="explore" onclick="go('explore')"><span style="font-size:21px">🔎</span><span>Explore</span></button>

  <div class="main" id="main">

      <div class="logo" style="font-size:20px">كُلِّيَّة</div>

    <div onclick="go('feed')" class="bn" style="flex:1;text-align:center;padding:6px"><span style="font-size:21px">🏠</span></div>

</div>

<!-- FAB -->

<!-- Story Viewer -->

<script>
// ==================== STATE ====================
let me = null;
let data = { users: [], posts: [], messages: [], stories: [], channels: [], events: [], qa: [] };
let compImage = null, compMedia = null;
let pollTimer = null, activeChat = null;
let lastBadgeCount = 0;
let currentFeedTab = "foryou";

// Streak timer state
let streakTimers = {};

function saveLocal() { localStorage.setItem("koliya_data", JSON.stringify(data)); }
function loadLocal() { const s = localStorage.getItem("koliya_data"); if (s) data = JSON.parse(s); }
function uid(p = "id") { return p + "_" + Math.random().toString(36).slice(2, 10); }

// ==================== SEED ====================
function seedData() {
  if (data.users.length) return;
  const n = Date.now();
  
  data.users = [
    {id:"u_sara", name:"Sara Benali", username:"sara_cs", email:"sara@univ.dz", password:"demo123", studentCard:"20241234", faculty:"Computer Science", status:"approved", role:"student", followers:["u_youssef","u_leila"], following:["u_youssef","u_leila"], blocked:[], avatar:null, bio:"CS + ML • building things"},
    {id:"u_youssef", name:"Youssef Khelifi", username:"youssef_k", email:"youssef@univ.dz", password:"demo123", studentCard:"20241122", faculty:"Physics", status:"approved", role:"student", followers:["u_sara"], following:["u_sara","u_leila"], blocked:[], avatar:null, bio:"Physics & coffee"},
    {id:"u_leila", name:"Leila Mansouri", username:"leila_m", email:"leila@univ.dz", password:"demo123", studentCard:"20241301", faculty:"Biology", status:"approved", role:"student", followers:["u_sara","u_youssef"], following:["u_sara"], blocked:[], avatar:null, bio:"Future doctor 🩺"},
    {id:"u_admin", name:"Admin", username:"admin", email:"admin@koliya.dz", password:"admin123", studentCard:"0000", faculty:"Staff", status:"approved", role:"admin", followers:[], following:[]}
  ];
  
  data.channels = [
    {id:"ch1", name:"CS 2025", icon:"💻", color:"#4F46E5", members:["u_sara","u_youssef","u_leila"], type:"public"},
    {id:"ch2", name:"Study Tips", icon:"📚", color:"#22C55E", members:["u_sara","u_youssef","u_leila"], type:"public"}
  ];
  
  data.posts = [
    {id:"p1", userId:"u_sara", text:"Just finished my ML classifier! 89% accuracy 🔥 #CS #ML", likes:["u_youssef","u_leila"], comments:[{userId:"u_youssef", text:"Share code?", createdAt:n-30000000}], saved:[], createdAt:new Date(n-40000000).toISOString()},
    {id:"p2", userId:"u_youssef", text:"Anyone have good quantum notes?", likes:["u_sara"], comments:[], saved:[], createdAt:new Date(n-20000000).toISOString()}
  ];
  
  data.messages = [
    {id:"m1", sender:"u_youssef", receiver:"u_sara", text:"Hey, did you finish the assignment?", createdAt:n-3000000},
    {id:"m2", sender:"u_sara", receiver:"u_youssef", text:"Yeah, almost done!", createdAt:n-1000000}
  ];
  
  saveLocal();
}

// ==================== UTILS ====================
function esc(s){return s?String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])):'';}
function timeAgo(ts){const d=new Date(ts);const diff=(Date.now()-d)/1000;if(diff<60)return"now";if(diff<3600)return Math.floor(diff/60)+"m";if(diff<86400)return Math.floor(diff/3600)+"h";return Math.floor(diff/86400)+"d";}
function getUser(id){return data.users.find(u=>u.id===id);}
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2300);}
function modal(title,html){const el=document.createElement("div");el.className="ml";el.innerHTML=`<div class="mb" onclick="this.parentElement.remove()"></div><div class="mc"><div style="padding:14px 16px;border-bottom:1px solid var(--bd);font-weight:700;display:flex;justify-content:space-between"><span>${title}</span><span onclick="this.closest('.ml').remove()" style="font-size:24px;cursor:pointer">×</span></div><div>${html}</div></div>`;document.body.appendChild(el);}
function avatarHTML(u,size=40){if(!u)u={username:"?"};const ini=(u.username||"?").slice(0,2).toUpperCase();return `<div class="av" style="width:${size}px;height:${size}px;font-size:${size*0.42}px;background:${u.avatar?'transparent':'#6366f1'}">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`:ini}</div>`;}

// ==================== STREAKS + TIMER ====================
function getDMStreak(a,b){const k=[a,b].sort().join("_");return parseInt(localStorage.getItem("dmstreak_"+k)||"0",10);}
function updateDMStreak(a,b){const k=[a,b].sort().join("_");const today=new Date().toDateString();const last=localStorage.getItem("dm_last_"+k)||"";let s=getDMStreak(a,b);if(last===today)return s;if(last===new Date(Date.now()-86400000).toDateString())s++;else s=1;localStorage.setItem("dmstreak_"+k,s);localStorage.setItem("dm_last_"+k,today);return s;}

function getStreakExpiryTime(uid, partnerId){
  const key = [uid, partnerId].sort().join("_");
  const last = localStorage.getItem("dm_last_"+key);
  if(!last) return null;
  const lastDate = new Date(last);
  const expiry = new Date(lastDate.getTime() + 24*60*60*1000);
  return expiry;
}

function updateStreakTimer(partnerId){
  const expiry = getStreakExpiryTime(me.id, partnerId);
  if(!expiry) return;
  
  const el = document.getElementById("streak-timer-"+partnerId);
  if(!el) return;
  
  const now = new Date();
  const diff = expiry.getTime() - now.getTime();
  
  if(diff <= 0){
    el.textContent = "Streak ended";
    return;
  }
  
  const hours = Math.floor(diff / (1000*60*60));
  const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
  el.textContent = `${hours}h ${mins}m left`;
}

function showDMProfile(partnerId){
  const partner = getUser(partnerId);
  if(!partner) return;
  
  const dmStreak = getDMStreak(me.id, partnerId);
  const expiry = getStreakExpiryTime(me.id, partnerId);
  let timerHTML = "";
  
  if(dmStreak > 0 && expiry){
    const diff = expiry.getTime() - Date.now();
    const h = Math.floor(diff / (1000*60*60));
    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
    timerHTML = `<div style="color:#c2410f;font-size:12.5px;margin-top:2px">🔥 ${dmStreak} day streak • ${h}h ${m}m left</div>`;
  }
  
  // Get shared media
  const shared = (data.messages || []).filter(m => 
    (m.sender===me.id && m.receiver===partnerId) || 
    (m.sender===partnerId && m.receiver===me.id)
  ).filter(m => m.media && (m.media.type==="image" || m.media.type==="video"));
  
  const mediaHTML = shared.length ? `
    <div style="margin:12px 0 6px;padding:0 16px;font-weight:700;font-size:13.5px">Shared Media (${shared.length})</div>
    <div class="media-grid">
      ${shared.slice(0,9).map(m => {
        if(m.media.type==="image") return `<img src="${m.media.data}" onclick="viewSharedMedia('${m.media.data}')">`;
        return `<video src="${m.media.data}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px" controls></video>`;
      }).join("")}
    </div>` : `<div style="padding:16px;color:var(--dim);font-size:13.5px">No media shared yet</div>`;
  
  const html = `
    <div class="dm-profile-sheet" onclick="this.remove()">
      <div class="sheet-bg"></div>
      <div class="dm-profile-content" onclick="event.stopImmediatePropagation()">
        <div class="dm-profile-header">
          ${avatarHTML(partner,92)}
          <div style="font-size:20px;font-weight:800">${esc(partner.username)}</div>
          <div style="color:var(--dim);font-size:14px">${esc(partner.faculty)}</div>
          ${timerHTML}
        </div>
        
        <div class="dm-profile-actions">
          <div class="dm-action" onclick="editNickname('${partnerId}')">
            <span style="font-size:20px">✏️</span> 
            <span>Edit nickname</span>
          </div>
          <div class="dm-action" onclick="toggleMute('${partnerId}')">
            <span style="font-size:20px">🔕</span> 
            <span>Mute messages</span>
          </div>
          <div class="dm-action" onclick="toggleBlock('${partnerId}')">
            <span style="font-size:20px">🚫</span> 
            <span>Block</span>
          </div>
          <div class="dm-action" onclick="go('profile','${partnerId}');document.querySelector('.dm-profile-sheet').remove()">

        ${mediaHTML}
        
        <div style="padding:16px 16px 4px">
          <button onclick="document.querySelector('.dm-profile-sheet').remove()" class="btn-g" style="width:100%;padding:14px">Done</button>
        </div>
      </div>
    </div>
  `;
  
  document.body.insertAdjacentHTML("beforeend", html);
}

function editNickname(partnerId){
  const partner = getUser(partnerId);
  const current = localStorage.getItem("nick_"+me.id+"_"+partnerId) || partner.username;
  const newNick = prompt("Nickname for this chat:", current);
  if(newNick){
    localStorage.setItem("nick_"+me.id+"_"+partnerId, newNick);
    toast("Nickname updated");
    document.querySelector(".dm-profile-sheet")?.remove();
    if(activeChat) showChat(activeChat);
  }
}

function toggleMute(partnerId){
  let muted = JSON.parse(localStorage.getItem("muted_"+me.id) || "[]");
  if(muted.includes(partnerId)){
    muted = muted.filter(x=>x!==partnerId);
    toast("Unmuted");
  } else {
    muted.push(partnerId);
    toast("Muted");
  }
  localStorage.setItem("muted_"+me.id, JSON.stringify(muted));
  document.querySelector(".dm-profile-sheet")?.remove();
}

function toggleBlock(partnerId){
  if(!me.blocked) me.blocked = [];
  if(me.blocked.includes(partnerId)){
    me.blocked = me.blocked.filter(x=>x!==partnerId);
    toast("Unblocked");
  } else {
    me.blocked.push(partnerId);
    toast("Blocked");
  }
  saveLocal();
  document.querySelector(".dm-profile-sheet")?.remove();
  go("messages");
}

function viewSharedMedia(url){
  const v = document.createElement("div");
  v.style.cssText = "position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:400";
  v.innerHTML = `<img src="${url}" style="max-width:95%;max-height:90%;border-radius:12px">`;
  v.onclick = () => v.remove();
  document.body.appendChild(v);
}

function renderMessages(c, target = null){

  let h = `<div class="sh"><b>Messages</b> <span style="font-size:13px;color:var(--dim);font-weight:400">Streaks are everything 🔥</span></div>`;

    const other = m.sender===me.id ? m.receiver : m.sender;

  });
  
  const list = Object.keys(convos).map(id=>{
    const msgs = convos[id];
    const last = msgs[msgs.length-1];
    const u = getUser(id);
    const s = getDMStreak(me.id, id);
    return {id, u, last, s};
  }).sort((a,b)=> new Date(b.last.createdAt)-new Date(a.last.createdAt));
  
  if(!list.length){
    h += `<div class="empty"><h3>No chats yet</h3><p>Start a conversation to build your streak!</p></div>`;
  }else{
    list.forEach(p=>{

            <span style="font-weight:700;font-size:15.5px">${esc(nick)}</span>

        </div>
        <div style="font-size:11.5px;color:var(--dim);text-align:right;white-space:nowrap">${timeAgo(p.last.createdAt)}</div>
      </div>`;
    });
  }
  c.innerHTML = h;
}

function showChat(partnerId){
  const partner = getUser(partnerId);
  if(!partner) return;

  const msgs = (data.messages||[]).filter(m => (m.sender===me.id&&m.receiver===partnerId)||(m.sender===partnerId&&m.receiver===me.id)).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  const dmStreak = getDMStreak(me.id, partnerId);
  const nick = localStorage.getItem("nick_"+me.id+"_"+partnerId) || partner.username;
  
  let headerExtra = "";
  if(dmStreak > 0){
    headerExtra = `<div style="display:flex;align-items:center;gap:6px;margin-top:2px"><span class="dm-streak-pill"><span>🔥</span> ${dmStreak} day streak</span><span id="streak-timer-${partnerId}" class="streak-timer"></span></div>`;
  }
  
  let html = `<div class="cw on" style="height:100vh">
    <div class="cw-h" style="padding:12px 14px">
      <button onclick="go('messages')" style="font-size:24px;padding-right:8px">←</button>
      
      <div onclick="showDMProfile('${partnerId}')" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">
        ${avatarHTML(partner, 40)}
        <div>
          <div style="font-weight:700;font-size:16px">${esc(nick)}</div>
          ${headerExtra}
        </div>
      </div>
      
      <button onclick="showDMProfile('${partnerId}')" class="icon-btn" style="font-size:19px">⋯</button>
    </div>`;
  
  // Streak bar
  if(dmStreak > 0){
    const dark = document.body.getAttribute("data-theme")==="dark";
    html += `<div class="streak-bar ${dark?'dark':''}"><span style="font-size:18px">🔥</span> <span style="font-weight:800">${dmStreak} day streak</span><span style="margin-left:auto;font-size:12px;opacity:.7">Keep chatting!</span></div>`;
  }
  
  html += `<div id="chatBody" class="chat-body" style="padding-bottom:70px">`;
  
  msgs.forEach((m,idx)=>{
    const mine = m.sender===me.id;
    let media = "";
    if(m.media?.type==="image") media = `<img src="${m.media.data}" style="max-width:230px;border-radius:14px;margin-bottom:3px" onclick="this.requestFullscreen()">`;
    if(m.media?.type==="video") media = `<video src="${m.media.data}" controls style="max-width:230px;border-radius:14px"></video>`;
    if(m.media?.type==="file") media = `<a href="${m.media.data}" download style="color:inherit;text-decoration:underline">📄 ${esc(m.media.name)}</a>`;
    if(m.media?.type==="audio") media = `<div style="background:#fff3;padding:6px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:6px"><button onclick="playVoice(this,'${m.media.data}')" style="width:22px;height:22px;background:#4F46E5;color:white;border-radius:999px">▶</button> <span style="font-size:12px">Voice</span></div>`;
    
    html += `<div class="bub ${mine?"me":"th"}" style="margin-bottom:4px" ondblclick="toggleReactionPicker(event,'${partnerId}',${idx})">
      ${media}
      ${m.text ? esc(m.text) : ""}
      <div style="font-size:10px;opacity:.6;margin-top:2px">${new Date(m.createdAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
    </div>`;
  });
  
  html += `</div>
    <div style="position:fixed;bottom:0;left:0;right:0;max-width:620px;margin:0 auto;background:var(--card);border-top:1px solid var(--bd);padding:10px 14px">
      <div style="display:flex;gap:8px">
        <input id="msgInput" class="inp" placeholder="Message ${esc(nick)}..." style="flex:1;border-radius:999px;padding:12px 18px" onkeydown="if(event.key==='Enter')sendCurrentMsg()">
        <button onclick="sendCurrentMsg()" class="btn" style="padding:0 18px;border-radius:999px">Send</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="toggleRecording()" class="btn-small btn-g">🎙️</button>
        <button onclick="sendQuickSticker()" class="btn-small btn-g">😊</button>
        <button onclick="sendQuickNote()" class="btn-small btn-g">📝</button>
        <button onclick="sharePostToDMQuick()" class="btn-small btn-g">📤 Share post</button>
      </div>
    </div>
  </div>`;
  
  const view = document.getElementById("view");
  view.innerHTML = html;
  view.classList.add("full");
  
  setTimeout(()=>{
    const body = document.getElementById("chatBody");
    if(body) body.scrollTop = body.scrollHeight;
    
    // Start streak timer
    if(dmStreak > 0){
      updateStreakTimer(partnerId);
      if(streakTimers[partnerId]) clearInterval(streakTimers[partnerId]);
      streakTimers[partnerId] = setInterval(() => updateStreakTimer(partnerId), 60000);
    }
  }, 80);
}

function sendCurrentMsg(){
  const inp = document.getElementById("msgInput");
  if(!inp || !activeChat) return;
  const txt = inp.value.trim();
  if(!txt) return;
  
  sendMsg(me.id, activeChat, txt);
  inp.value = "";
  
  const newS = updateDMStreak(me.id, activeChat);
  setTimeout(()=>{
    if(activeChat) showChat(activeChat);
    if(newS > 1) toast(`🔥 ${newS} day streak!`);
  }, 90);
}

function sendMsg(sender, receiver, text, media=null){
  const msg = {id:uid("m"), sender, receiver, text:text||"", media, createdAt:new Date().toISOString()};
  data.messages.push(msg);
  saveLocal();
  updateDMStreak(sender, receiver);
  if(activeChat === receiver || activeChat === sender) showChat(activeChat);
}

function createTextStory(){
  const txt = prompt("What's your story?");
  if(!txt) return;
  if(!data.stories) data.stories = [];
  data.stories.push({id:uid("s"), userId:me.id, text:txt, createdAt:Date.now()});
  saveLocal();
  document.querySelector(".ml")?.remove();
  toast("Story posted!");
  go("feed");
}

function uploadStory(e){
  const f = e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    if(!data.stories) data.stories = [];
    data.stories.push({id:uid("s"), userId:me.id, media:ev.target.result, createdAt:Date.now()});
    saveLocal();
    document.querySelector(".ml")?.remove();
    toast("Story posted!");
    go("feed");
  };
  r.readAsDataURL(f);
}

function viewStory(uid){
  const stories = (data.stories||[]).filter(s=>s.userId===uid);

  const s = stories[stories.length-1];

    h += `<div class="event-card" onclick="eventDetail('${e.id}')">
      <div style="width:54px;height:54px;border-radius:12px;background:#4F46E5;color:white;text-align:center;padding-top:6px">
        <div style="font-size:20px;font-weight:800">${new Date(e.date).getDate()}</div>
      </div>
      <div style="flex:1"><b>${esc(e.title)}</b><div style="font-size:13px;color:var(--dim)">${e.location||""}</div></div>
    </div>`;
  });
  c.innerHTML = h;
}

function renderExplore(c){
  let h = `<div class="sh"><b>Explore Students</b></div>`;
  allUsers().filter(u=>u.id!==me.id&&u.status==="approved").forEach(u=>{
    h += `<div class="lr" onclick="go('profile','${u.id}')">
      ${avatarHTML(u,42)}
      <div style="flex:1"><b>${esc(u.username)}</b><div style="font-size:13px;color:var(--dim)">${esc(u.faculty)}</div></div>
      <button onclick="event.stopImmediatePropagation();followUser('${u.id}',this)" class="btn-small btn-f">Follow</button>
    </div>`;
  });
  c.innerHTML = h;
}

// ==================== BADGES ====================
function getBadges(uid){
  const posts = allPosts().filter(p=>p.userId===uid).length;
  const likes = allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.likes||[]).length,0);
  return [
    {ic:"📝", name:"First Post", earned:posts>=1},
    {ic:"❤️", name:"Popular", earned:likes>=30},
    {ic:"🔥", name:"7 Day Streak", earned:getStreak(uid)>=7},
    {ic:"💬", name:"Chatterbox", earned:(data.messages||[]).filter(m=>m.sender===uid).length>=15}
  ];
}
function renderBadges(uid){ return getBadges(uid).map(b=>`<div class="b-min ${b.earned?'earned':''}"><div class="b-min-ic ${b.earned?'earned':''}">${b.ic}</div><div><b>${b.name}</b></div></div>`).join(""); }

// ==================== BASIC FUNCTIONS ====================
function openComposer(){ modal("New Post", `<textarea id="compText" class="inp" placeholder="What's happening?" rows="3"></textarea><div style="margin-top:12px;display:flex;gap:8px"><button class="btn-g" onclick="closeMGen()">Cancel</button><button class="btn" onclick="submitPost()">Post</button></div>`); }
function submitPost(){ const t=document.getElementById("compText").value.trim(); if(!t)return; data.posts.unshift({id:uid("p"),userId:me.id,text:t,likes:[],comments:[],createdAt:new Date().toISOString()}); saveLocal(); document.querySelector(".ml")?.remove(); go("feed"); }
function likePost(pid){ const p = getPost(pid); if(!p.likes) p.likes=[]; const i=p.likes.indexOf(me.id); if(i===-1)p.likes.push(me.id); else p.likes.splice(i,1); saveLocal(); go(curView,curArg); }
function savePost(pid){ const p=getPost(pid); if(!p.saved)p.saved=[]; const i=p.saved.indexOf(me.id); if(i===-1)p.saved.push(me.id); else p.saved.splice(i,1); saveLocal(); toast("Saved!"); }
function openPostDetail(pid){ const p=getPost(pid); modal("Post", `<div style="padding:16px">${esc(p.text)}<div style="margin-top:20px"><button class="btn" onclick="document.querySelector('.ml').remove()">Close</button></div></div>`); }
function getPost(id){return data.posts.find(x=>x.id===id);}
function allPosts(){return data.posts||[];}
function allUsers(){return data.users||[];}
function getUserScore(uid){ return (allPosts().filter(p=>p.userId===uid).length*5) + (allPosts().filter(p=>p.userId===uid).reduce((s,p)=>s+(p.likes||[]).length,0)*2); }

function followUser(id,btn){ 
  if(!me.following)me.following=[]; 
  if(me.following.includes(id)) me.following=me.following.filter(x=>x!==id); 
  else me.following.push(id); 
  saveLocal(); 
  if(btn)btn.textContent="Following"; 
}

// More quick helpers
function addEvent(){ modal("New Event", `<input id="evT" class="inp" placeholder="Event title"><input id="evD" type="datetime-local" class="inp"><button class="btn" onclick="saveEvent()">Create</button>`); }
function saveEvent(){ const t=document.getElementById("evT").value; if(!t)return; if(!data.events)data.events=[]; data.events.push({id:uid("ev"),title:t,date:document.getElementById("evD").value,going:[me.id]}); saveLocal(); document.querySelector(".ml")?.remove(); go("events"); }

function sendQuickSticker(){ if(!activeChat)return; const s=["🔥","💯","👏","😂"][Math.floor(Math.random()*4)]; sendMsg(me.id,activeChat,s); }
function sendQuickNote(){ if(!activeChat)return; sendMsg(me.id,activeChat,"Good luck!"); }

function toggleTheme(){ const c=document.body.getAttribute("data-theme"); document.body.setAttribute("data-theme",c==="dark"?"light":"dark"); }

// ==================== AUTH & INIT ====================
function showAuth(w){ document.querySelectorAll("#loginForm,#signupForm").forEach(el=>el.classList.add("hidden")); document.getElementById(w+"Form").classList.remove("hidden"); }

function doLogin(){
  const e=document.getElementById("lemail").value, p=document.getElementById("lpw").value;
  const u = data.users.find(x=>x.email===e && x.password===p);
  if(!u) return toast("Wrong credentials");
  me = u; enterApp();
}

function doSignup(){
  const name=document.getElementById("sname").value;
  const un=document.getElementById("suser").value;
  const email=document.getElementById("semail").value;
  const pw=document.getElementById("spw").value;
  if(!name||!un||!email) return toast("Fill everything");
  data.users.push({id:uid("u"),name,username:un,email,password:pw,status:"approved",role:"student",followers:[],following:[]});
  saveLocal();
  toast("Account created!");
  me = data.users[data.users.length-1];
  enterApp();
}

function enterApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("fab").style.display="flex";
  go("feed");
  startPoll();
}

function doLogout(){ me=null; document.getElementById("app").classList.add("hidden"); document.getElementById("auth").classList.remove("hidden"); document.getElementById("fab").style.display="none"; }

let curView, curArg;
function go(view,arg){
  curView=view; curArg=arg;
  const c = document.getElementById("view");
  c.innerHTML="";
  if(view==="feed") renderFeed(c);
  else if(view==="messages") renderMessages(c,arg);
  else if(view==="profile") renderProfile(c,arg);
  else if(view==="leaderboard") renderLeaderboard(c);
  else if(view==="explore") renderExplore(c);
  else if(view==="events") renderEvents(c);
  else if(view==="qa") renderQA(c);
  else if(view==="hub") renderHub(c);
}

function startPoll(){ if(pollTimer)clearInterval(pollTimer); pollTimer=setInterval(()=>{ if(activeChat) showChat(activeChat); }, 9000); }

function getStreak(uid){ return parseInt(localStorage.getItem("streak_"+uid)||"0"); }

function init(){
  loadLocal(); seedData();
  const sess = localStorage.getItem("koliya_sess");
  if(sess){ const u=data.users.find(x=>x.id===sess); if(u){me=u; document.getElementById("auth").classList.add("hidden"); document.getElementById("app").classList.remove("hidden"); document.getElementById("fab").style.display="flex"; go("feed"); return; } }
  document.getElementById("loginForm").style.display="block";
}

function renderQA(c){ c.innerHTML=`<div class="sh"><b>Q&A</b> <button onclick="askPrompt()" class="btn-small btn-f">+</button></div><div class="empty">Ask questions here</div>`; }
function renderHub(c){ c.innerHTML=`<div class="sh"><b>Resources</b></div><div class="empty">Shared files appear here</div>`; }
function askPrompt(){ modal("Ask Question", `<textarea class="inp" id="qtext" placeholder="Your question..."></textarea><button class="btn" onclick="submitQA()">Ask</button>`); }
function submitQA(){ const t=document.getElementById("qtext").value; if(!t)return; if(!data.qa)data.qa=[]; data.qa.push({id:uid("qa"),userId:me.id,text:t,answers:[]}); saveLocal(); document.querySelector(".ml")?.remove(); go("qa"); }

function openAnonPost(){ modal("Anonymous", `<textarea class="inp" id="anonT"></textarea><button class="btn" onclick="postAnon()">Post</button>`); }
function postAnon(){ const t=document.getElementById("anonT").value; data.posts.unshift({id:uid("p"),userId:me.id,text:t,anonymous:true,likes:[],comments:[],createdAt:new Date().toISOString()}); saveLocal(); document.querySelector(".ml")?.remove(); go("feed"); }

function closeMGen(){ document.querySelector(".ml")?.remove(); }

window.onload = init;
</script>
</body>
</html>
