<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>كُلِّيَّة — Koliya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
<style>
:root{--accent:#4F46E5;--accent-h:#4338CA;--accent-lt:#EEF2FF;--danger:#EF4444;--like:#F43F5E;--ok:#22C55E;--r:14px;--max:600px;--t:.2s ease}
[data-theme="light"]{--bg:#fff;--card:#fff;--hover:#F5F5F5;--txt:#111;--dim:#888;--bd:#eee;--nav:rgba(255,255,255,.92)}
[data-theme="dark"]{--bg:#0b0b0b;--card:#171717;--hover:#222;--txt:#f5f5f5;--dim:#888;--bd:#2a2a2a;--nav:rgba(11,11,11,.92)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.4;overflow:hidden;transition:background var(--t),color var(--t)}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{font:inherit;color:var(--txt)}input::placeholder{color:var(--dim)}
img{max-width:100%;display:block}.hidden{display:none!important}
/* auth */
.auth{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:36px 28px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.auth-h{text-align:center;margin-bottom:24px}
.logo{font-size:30px;font-weight:800;cursor:pointer;user-select:none}
.sub{color:var(--dim);font-size:12px;margin-top:2px}
.f{display:flex;flex-direction:column;gap:10px}
.inp{width:100%;background:var(--hover);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;transition:border var(--t)}
.inp:focus{border-color:var(--accent);outline:none}
.btn{background:var(--accent);color:#fff;border-radius:12px;padding:12px;width:100%;font-weight:600;transition:filter var(--t)}
.btn:hover{filter:brightness(1.1)}.btn:active{transform:scale(.98)}
.btn-g{background:var(--hover);color:var(--txt);border:1px solid var(--bd)}
.btn-r{background:var(--danger);color:#fff;border-radius:10px;padding:9px 16px;font-weight:600}
.sw{text-align:center;font-size:13px;color:var(--dim);margin-top:6px}.sw a{color:var(--accent);font-weight:600;cursor:pointer}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);opacity:.5;font-size:16px;cursor:pointer}
.gi{width:56px;height:56px;border-radius:50%;background:var(--accent-lt);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.gi svg{width:26px;height:26px}
/* layout */
.app{display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden}
.main{overflow-y:auto;overflow-x:hidden;border-left:1px solid var(--bd);height:100vh}
.view{max-width:var(--max);margin:0 auto;padding-bottom:70px}
.view.full{max-width:none;padding-bottom:0}
.side{height:100vh;border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:16px 10px;background:var(--card);position:sticky;top:0}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;margin-top:16px}
.ni{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:12px;font-size:15px;font-weight:500;transition:background var(--t);width:100%}
.ni:hover{background:var(--hover)}.ni.on{background:var(--accent-lt);color:var(--accent)}
.ni svg{width:23px;height:23px;flex-shrink:0}
.nd{position:relative}
.dot{position:absolute;top:-2px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--like);color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
.topbar{display:none}.bnav{display:none}
/* stories */
.stories{display:flex;gap:12px;padding:12px;overflow-x:auto;border-bottom:1px solid var(--bd);scrollbar-width:none}.stories::-webkit-scrollbar{display:none}
.st{flex-shrink:0;text-align:center;cursor:pointer}
.ring{width:62px;height:62px;border-radius:50%;padding:2.5px;background:linear-gradient(45deg,#4F46E5,#7C3AED,#EC4899)}
.ring.v{background:var(--bd)}
.ring>div{width:100%;height:100%;border-radius:50%;border:2.5px solid var(--card);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.st .l{font-size:11px;margin-top:3px;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* post */
.post{border-bottom:1px solid var(--bd);padding:14px 0}
.ph{display:flex;align-items:center;gap:10px;padding:0 14px}
.av{border-radius:50%;background:var(--hover);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);overflow:hidden;flex-shrink:0}
.pt{padding:6px 14px 0;white-space:pre-wrap;word-break:break-word}
.pm{margin:8px 14px 0;border-radius:12px;overflow:hidden}.pm img,.pm video{width:100%}
.fc{display:flex;align-items:center;gap:10px;margin:8px 14px;padding:12px;background:var(--hover);border-radius:12px;text-decoration:none;color:var(--txt);border:1px solid var(--bd)}
.fi{width:38px;height:38px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.fn{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fs{color:var(--dim);font-size:11px}
.pa{display:flex;gap:18px;padding:8px 14px 0}
.act{display:flex;align-items:center;gap:4px;color:var(--dim);transition:transform var(--t);cursor:pointer}
.act:hover{transform:scale(1.15)}.act svg{width:20px;height:20px}
.act .c{font-size:12px;font-weight:600;color:var(--txt)}
.act.lk{color:var(--like)}.act.sv{color:var(--accent)}
.cm{font-size:13px;padding:2px 14px 0}.cm .u{font-weight:700;margin-right:5px}
.cb{display:flex;gap:6px;padding:6px 14px}
.cb input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--bd);padding:5px 0}.cb input:focus{outline:none;border-color:var(--accent)}
.cb button{color:var(--accent);font-weight:600;font-size:14px}
/* compose */
.sh{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--nav);backdrop-filter:blur(12px);z-index:5}
.fb{display:flex;align-items:center;gap:10px;padding:10px 14px}
.fb>div{flex:1;background:var(--hover);border-radius:20px;padding:10px 16px;color:var(--dim);cursor:pointer}
/* modal */
.ml{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.mb{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.mc{position:relative;background:var(--card);border-radius:18px;width:100%;max-width:540px;max-height:90vh;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd)}
.tb{background:var(--hover);border-radius:18px;padding:7px 12px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.tb svg{width:16px;height:16px;color:var(--accent)}
/* channel */
.chc{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.chc:hover{background:var(--hover)}
.chi{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase}
.badge.public{background:rgba(34,197,94,.12);color:var(--ok)}.badge.private{background:var(--accent-lt);color:var(--accent)}
.chd-h{text-align:center;padding:20px 14px;border-bottom:1px solid var(--bd)}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--hover);border-radius:18px;padding:4px 10px;font-size:11px;color:var(--dim);margin:2px}
.tg{position:relative;width:40px;height:22px;flex-shrink:0}
.tg input{opacity:0;width:0;height:0}
.tg .sl{position:absolute;cursor:pointer;inset:0;background:var(--bd);border-radius:22px;transition:.3s}
.tg .sl:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.sl{background:var(--accent)}.tg input:checked+.sl:before{transform:translateX(18px)}
.empty{text-align:center;padding:50px 20px;color:var(--dim)}.empty h3{margin-bottom:4px;font-size:17px}
.lr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}.lr:hover{background:var(--hover)}
.btn-o{background:var(--hover);color:var(--txt);border-radius:10px;padding:8px 16px;font-weight:500;font-size:14px;display:inline-flex;align-items:center;gap:5px}
.btn-o svg{width:16px;height:16px}
.btn-f{background:var(--accent);color:#fff;border-radius:10px;padding:8px 20px;font-weight:600;font-size:14px}
.btn-f.f{background:var(--hover);color:var(--txt)}
/* messages */
.msg-l{display:flex;height:calc(100vh - 52px)}
.cl{width:340px;border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0}
.cw{flex:1;display:none;flex-direction:column;height:100%;min-width:0}
.cb2{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:5px}
.bub{max-width:72%;padding:9px 13px;border-radius:16px;font-size:14px;word-break:break-word}
.bub.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.bub.th{align-self:flex-start;background:var(--hover);color:var(--txt);border-bottom-left-radius:4px}
.ub{position:absolute;top:-2px;right:-2px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--like);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--card)}
/* story viewer */
.sv{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center}
/* fab */
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(79,70,229,.4);z-index:40;cursor:pointer;transition:transform var(--t)}
.fab:hover{transform:scale(1.1)}
.fab svg{width:24px;height:24px}
/* toasts */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.t{background:var(--card);color:var(--txt);border:1px solid var(--bd);padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;box-shadow:0 2px 12px rgba(0,0,0,.1);animation:pi .3s}
.t.e{border-color:var(--danger);color:var(--danger)}.t.ok{border-color:var(--ok);color:var(--ok)}
@keyframes pi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@media(max-width:1100px){.app{grid-template-columns:68px 1fr}.logo{display:none}.side{padding:14px 6px}.side::before{content:"🎓";font-size:24px;text-align:center;display:block;padding:6px}.ni{justify-content:center}.ni span:not(.dot){display:none}}
@media(max-width:560px){.app{grid-template-columns:1fr}.side{display:none}.main{border:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--nav);backdrop-filter:blur(12px);z-index:50}
.bnav{display:flex;justify-content:space-around;position:fixed;bottom:0;left:0;right:0;background:var(--nav);backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:8px 0;z-index:50}
.bn{flex:1;display:flex;justify-content:center;color:var(--dim);position:relative;padding:4px}.bn.on{color:var(--accent)}.bn svg{width:22px;height:22px}
.msg-l{flex-direction:column;height:calc(100vh - 110px)}.cl{width:100%}.cl.sc{display:none}.cw.on{display:flex}
.fab{bottom:70px}.view{padding-bottom:60px}}
</style>
</head>
<body data-theme="light">

<!-- AUTH -->
<div id="auth" class="auth">
<div class="auth-box">
<div class="auth-h"><div class="logo">كُلِّيَّة</div><div class="sub">KOLIYA · Student Network</div></div>
<div id="loginForm" class="f">
<div style="position:relative"><input class="inp" id="lemail" placeholder="Email" style="padding-right:36px"></div>
<div style="position:relative"><input type="password" class="inp" id="lpw" placeholder="Password" style="padding-right:36px"><button class="eye" onclick="let i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'">👁</button></div>
<button class="btn" onclick="doLogin()">Log In</button>
<div class="sw">No account? <a onclick="showAuth('signup')">Request access</a></div>
</div>
<div id="signupForm" class="f hidden">
<input class="inp" id="sname" placeholder="Full name">
<input class="inp" id="suser" placeholder="Username">
<input class="inp" id="scard" placeholder="Carte Étudiant / بطاقة الطالب">
<input class="inp" id="sfac" placeholder="Faculty / Major">
<input class="inp" id="semail" placeholder="Gmail address">
<div style="position:relative"><input type="password" class="inp" id="spw" placeholder="Password (min 6 chars)" style="padding-right:36px"><button class="eye" onclick="let i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'">👁</button></div>
<button class="btn" onclick="doSignup()">Submit</button>
<div class="sw">Already approved? <a onclick="showAuth('login')">Log in</a></div>
</div>
<div id="pendingForm" class="f hidden">
<div class="gi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
<h3 style="text-align:center;font-size:17px">Application received</h3>
<p style="text-align:center;color:var(--dim);font-size:14px">Awaiting admin approval.</p>
<button class="btn-g btn" onclick="showAuth('login')">Back</button>
</div>
<div id="rejectedForm" class="f hidden">
<div class="gi" style="background:rgba(239,68,68,.1);color:var(--danger)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
<h3 style="text-align:center;font-size:17px">Access denied</h3>
<button class="btn-g btn" onclick="showAuth('login')">Back</button>
</div>
</div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
<aside class="side">
<div class="logo" onclick="go('feed')">كُلِّيَّة</div>
<nav class="nav">
<button class="ni" data-r="feed" onclick="go('feed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></button>
<button class="ni" data-r="explore" onclick="go('explore')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Explore</span></button>
<button class="ni" data-r="channels" onclick="go('channels')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg><span>Channels</span></button>
<button class="ni nd" data-r="messages" onclick="go('messages')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg><span>Messages</span><span class="dot" id="dot1"></span></button>
<button class="ni" data-r="saved" onclick="go('saved')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>Saved</span></button>
<button class="ni" data-r="profile" onclick="go('profile','me')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></button>
<button class="ni admin-only hidden" data-r="admin" onclick="go('admin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Admin</span></button>
</nav>
<div style="display:flex;flex-direction:column;gap:2px">
<button class="ni" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.65-.75 1.65-1.69 0-.44-.18-.84-.44-1.13-.29-.29-.44-.65-.44-1.13a1.64 1.64 0 0 1 1.67-1.67h1.99c3.05 0 5.56-2.5 5.56-5.55C21.97 6.01 17.46 2 12 2z"/></svg><span>Theme</span></button>
<button class="ni" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg><span>Log out</span></button>
</div>
</aside>
<main class="main" id="main">
<div class="topbar"><div class="logo" onclick="go('feed')">كُلِّيَّة</div></div>
<div id="view" class="view"></div>
<nav class="bnav">
<button class="bn" data-r="feed" onclick="go('feed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
<button class="bn" data-r="explore" onclick="go('explore')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
<button class="bn" data-r="channels" onclick="go('channels')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg></button>
<button class="bn nd" data-r="messages" onclick="go('messages')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg><span class="dot" id="dot2"></span></button>
<button class="bn" data-r="profile" onclick="go('profile','me')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
<button class="bn admin-only hidden" data-r="admin" onclick="go('admin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></button>
</nav>
</main>
</div>

/* ===== HELPERS ===== */
function uid(p) { if(USE_SUPA&&crypto.randomUUID)return crypto.randomUUID(); return (p||"x")+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function timeAgo(t){const s=Math.floor((Date.now()-t)/1000);if(s<60)return"now";const m=Math.floor(s/60);if(m<60)return m+"m";const h=Math.floor(m/60);if(h<24)return h+"h";const d=Math.floor(h/24);if(d<7)return d+"d";return new Date(t).toLocaleDateString();}
function dayLabel(t){const d=new Date(t),n=new Date();if(d.toDateString()===n.toDateString())return"Today";const y=new Date();y.setDate(y.getDate()-1);return d.toDateString()===y.toDateString()?"Yesterday":d.toLocaleDateString(undefined,{month:"short",day:"numeric"});}
function avatarHTML(u,s){s=s||40;if(!u)return`<div class="av" style="width:${s}px;height:${s}px">?</div>`;const i=(u.name||u.username||"?").trim().split(/\s+/).map(x=>x[0]).slice(0,2).join("").toUpperCase();const c=COLORS[(u.id||"").charCodeAt(2)%COLORS.length]||COLORS[0];return u.avatar?`<div class="av" style="width:${s}px;height:${s}px;background-size:cover;background-position:center;background-image:url('${u.avatar}')"></div>`:`<div class="av" style="width:${s}px;height:${s}px;background:${c}">${i}</div>`;}
function toast(m,t){const w=document.getElementById("toast");const e=document.createElement("div");e.className="t "+(t||"");e.textContent=m;w.appendChild(e);setTimeout(()=>{e.style.opacity="0";e.style.transition="opacity .3s";setTimeout(()=>e.remove(),300)},2400);}

/* ===== DATA LAYER ===== */
function loadData() {
  if (USE_SUPA) return {users:[],posts:[],channels:[],messages:[],stories:[]};
  try { const r = localStorage.getItem("koliya_v4"); if(r) return JSON.parse(r); } catch(e){}
  return seed();
}
function saveLocal() { if(!USE_SUPA) try{localStorage.setItem("koliya_v4",JSON.stringify(data));}catch(e){} }
async function syncDB() {
  if(!USE_SUPA) return;
  try {
    const [pr,po,ch,ms,st] = await Promise.all([
      sp.from("profiles").select("*"),
      sp.from("posts").select("*").order("created_at",{ascending:false}),
      sp.from("channels").select("*"),
      sp.from("messages").select("*").order("created_at",{ascending:true}),
      sp.from("stories").select("*")
    ]);
    data.users = pr.data||[]; data.posts = po.data||[]; data.channels = ch.data||[]; data.stories = st.data||[];
    data.messages = (ms.data||[]).map(m=>({id:m.id,sender:m.sender_id,receiver:m.receiver_id,text:m.text,createdAt:new Date(m.created_at).getTime()}));
  } catch(e) { console.error("sync",e); }
}
function pushDB(table,row) { if(USE_SUPA) sp.from(table).insert(row).then(r=>{ if(r.error){console.error(table,r.error.message);toast("DB error — re-run schema SQL!","e");} }); }
function updateDB(table,id,patch) { if(USE_SUPA) sp.from(table).update(patch).eq("id",id).then(r=>{ if(r.error) console.error(table,r.error); }); }
function deleteDB(table,id) { if(USE_SUPA) sp.from(table).delete().eq("id",id); }

/* ===== USER MAPPING ===== */
function getUser(id) { const u = data.users.find(x=>x.id===id); return u?mapUser(u):null; }
function getUserByEmail(e) { return data.users.find(u=>(u.email||"").toLowerCase()===e.toLowerCase().trim())||null; }
function getUserByUsername(n) { return data.users.find(u=>(u.username||"").toLowerCase()===n.toLowerCase().trim())||null; }
function mapUser(u) {
  if(!u) return null;
  const supa = USE_SUPA && u.full_name!==undefined;
  return { id:u.id, name:supa?u.full_name:(u.name||""), username:u.username||"", email:u.email||"", studentCard:supa?u.student_card:(u.studentCard||""), faculty:u.faculty||"", avatar:supa?u.avatar_url:(u.avatar||null), bio:u.bio||"", status:u.status||"pending", role:u.role||"student", following:u.following||[], followers:u.followers||[], blocked:u.blocked||[] };
}
function allUsers() { return data.users.map(mapUser); }
function updateUser(id,patch) {
  const u = data.users.find(x=>x.id===id); if(!u) return null;
  const m={};
  if("name"in patch){u.name=u.full_name=patch.name;m.full_name=patch.name}
  if("bio"in patch){u.bio=patch.bio;m.bio=patch.bio}
  if("faculty"in patch){u.faculty=patch.faculty;m.faculty=patch.faculty}
  if("avatar"in patch){u.avatar=u.avatar_url=patch.avatar;m.avatar_url=patch.avatar}
  if("status"in patch){u.status=patch.status;m.status=patch.status}
  if("role"in patch){u.role=patch.role;m.role=patch.role}
  if("following"in patch){u.following=patch.following;m.following=patch.following}
  if("followers"in patch){u.followers=patch.followers;m.followers=patch.followers}
  if("blocked"in patch){u.blocked=patch.blocked;m.blocked=patch.blocked}
  saveLocal(); if(USE_SUPA) updateDB("profiles",id,m); return mapUser(u);
}

/* ===== POSTS ===== */
function getPost(id){const p=data.posts.find(x=>x.id===id);return p?mapPost(p):null;}
function allPosts(){return data.posts.map(mapPost);}
function mapPost(p){
  const supa=USE_SUPA&&p.user_id!==undefined;
  return{ id:p.id, userId:supa?p.user_id:p.userId, text:p.text||"", image:supa?p.image_url:(p.image||null), media:p.media||null, channelId:supa?p.channel_id:(p.channelId||null), likes:p.likes||[], comments:p.comments||[], saved:p.saved||[], repostId:supa?p.repost_id:(p.repostId||null), createdAt:new Date(p.created_at||p.createdAt||Date.now()).getTime() };
}
function createPost(o){
  const p={id:uid("p"),user_id:o.userId,text:o.text||"",image_url:o.image,media:o.media,channel_id:o.channelId,repost_id:o.repostId,likes:[],comments:[],saved:[],created_at:new Date().toISOString()};
  data.posts.unshift(p); saveLocal();
  if(USE_SUPA){const r={id:p.id,user_id:o.userId,text:p.text,image_url:o.image,channel_id:o.channelId,likes:[],comments:[],saved:[]};if(o.media)r.media=o.media;if(o.repostId)r.repost_id=o.repostId;pushDB("posts",r);}
  return mapPost(p);
}
function delPost(id){data.posts=data.posts.filter(p=>p.id!==id);saveLocal();deleteDB("posts",id);}
function toggleLike(pid,u){const p=data.posts.find(x=>x.id===pid);if(!p)return;if(!p.likes)p.likes=[];const i=p.likes.indexOf(u);if(i===-1)p.likes.push(u);else p.likes.splice(i,1);saveLocal();updateDB("posts",pid,{likes:p.likes});}
function toggleSave(pid,u){const p=data.posts.find(x=>x.id===pid);if(!p)return;if(!p.saved)p.saved=[];const i=p.saved.indexOf(u);if(i===-1)p.saved.push(u);else p.saved.splice(i,1);saveLocal();updateDB("posts",pid,{saved:p.saved});}
function addComment(pid,u,t){const p=data.posts.find(x=>x.id===pid);if(!p)return;if(!p.comments)p.comments=[];p.comments.push({id:uid("c"),userId:u,text:t,createdAt:Date.now()});saveLocal();updateDB("posts",pid,{comments:p.comments});}

/* ===== CHANNELS ===== */
function channels(){return data.channels.map(c=>({id:c.id,name:c.name,description:c.description||"",icon:c.icon||"📚",color:c.color||"#4F46E5",createdBy:c.created_by||c.createdBy,members:c.members||[],admins:c.admins||[c.created_by||c.createdBy],type:c.type||"public",postPerm:c.post_permission||c.postPerm||"all",muted:c.muted||[],createdAt:new Date(c.created_at||c.createdAt||Date.now()).getTime()}));}
function getChannel(id){return channels().find(c=>c.id===id)||null;}
function createChannelDB(o){const c={id:uid("ch"),name:o.name,description:o.description||"",icon:o.icon||"📚",color:o.color||"#4F46E5",created_by:o.createdBy,members:[o.createdBy],admins:[o.createdBy],type:o.type||"public",post_permission:o.postPerm||"all",muted:[],created_at:new Date().toISOString()};data.channels.push(c);saveLocal();if(USE_SUPA)pushDB("channels",{id:c.id,name:c.name,description:c.description,icon:c.icon,color:c.color,created_by:c.created_by,members:c.members,admins:c.admins,type:c.type,post_permission:c.post_permission,muted:[]});return c;}
function joinCh(cid,u){const c=data.channels.find(x=>x.id===cid);if(!c)return;if(!(c.members||[]).includes(u))c.members.push(u);saveLocal();updateDB("channels",cid,{members:c.members});}
function leaveCh(cid,u){const c=data.channels.find(x=>x.id===cid);if(!c)return;c.members=(c.members||[]).filter(m=>m!==u);saveLocal();updateDB("channels",cid,{members:c.members});}
function updChSetting(cid,key,val){const c=data.channels.find(x=>x.id===cid);if(!c)return;c[key]=val;saveLocal();const k=key==="postPerm"?"post_permission":key;updateDB("channels",cid,{[k]:val});}
function isMuted(cid,u){const c=data.channels.find(x=>x.id===cid);return c&&(c.muted||[]).includes(u);}
function toggleMute(cid,u){const c=data.channels.find(x=>x.id===cid);if(!c)return;if(!c.muted)c.muted=[];const i=c.muted.indexOf(u);if(i===-1)c.muted.push(u);else c.muted.splice(i,1);saveLocal();updateDB("channels",cid,{muted:c.muted});}
function canPost(cid,u){const c=channels().find(x=>x.id===cid);if(!c)return true;if(c.postPerm==="admins")return c.admins.includes(u);return c.members.includes(u);}

/* ===== STORIES ===== */
function stories(){return(data.stories||[]).filter(s=>Date.now()-new Date(s.created_at).getTime()<86400000).map(s=>({id:s.id,userId:s.user_id||s.userId,media:s.media,text:s.text||"",createdAt:new Date(s.created_at||s.createdAt||Date.now()).getTime()}));}
function storyUsers(){const seen=new Set();return stories().filter(s=>{if(seen.has(s.userId))return false;seen.add(s.userId);return true;});}
function storiesBy(uid_){return stories().filter(s=>s.userId===uid_).sort((a,b)=>a.createdAt-b.createdAt);}
function createStory(uid_,media,text){const s={id:uid("st"),user_id:uid_,media,text:text||"",created_at:new Date().toISOString()};if(!data.stories)data.stories=[];data.stories.push(s);saveLocal();if(USE_SUPA)pushDB("stories",{id:s.id,user_id:uid_,media:s.media,text:s.text});}
function hasNewStory(uid_){const k="str_"+uid_;const lr=parseInt(localStorage.getItem(k)||"0",10);return storiesBy(uid_).some(s=>s.createdAt>lr);}

/* ===== MESSAGES ===== */
function convoId(a,b){return[a,b].sort().join("__");}
function sendMsg(s,r,t){const m={id:uid("m"),sender:s,receiver:r,text:t,createdAt:Date.now()};data.messages.push({id:m.id,sender:s,receiver:r,text:t,createdAt:Date.now()});saveLocal();if(USE_SUPA)pushDB("messages",{id:m.id,sender_id:s,receiver_id:r,text:t});}
function getMsgs(a,b){const cid=convoId(a,b);return data.messages.filter(m=>convoId(m.sender,m.receiver)===cid).sort((x,y)=>x.createdAt-y.createdAt);}
function getConvos(u){const cm={};data.messages.forEach(m=>{const cid=convoId(m.sender,m.receiver);if(cid.includes(u)){const other=m.sender===u?m.receiver:m.sender;if(!cm[cid])cm[cid]={other,last:m};cm[cid].last=m;}});return Object.values(cm).sort((a,b)=>b.last.createdAt-a.last.createdAt);}
function unreadCount(other){const me_=me;if(!me_)return 0;const lr=parseInt(localStorage.getItem("rd_"+other)||"0",10);return getMsgs(me_.id,other).filter(m=>m.sender!==me_.id&&m.createdAt>lr).length;}
function totalUnread(){return getConvos(me.id).reduce((s,c)=>s+unreadCount(c.other),0);}

/* ===== AUTH ===== */
function showAuth(w){["loginForm","signupForm","pendingForm","rejectedForm"].forEach(f=>document.getElementById(f).classList.add("hidden"));document.getElementById(w+"Form").classList.remove("hidden");}
async function tryRestore(){
  if(USE_SUPA){const{data:{session}}=await sp.auth.getSession();if(session){await syncDB();const u=getUser(session.user.id);if(u&&u.status==="approved"){me=u;enterApp();return true;}}return false;}
  const sid=localStorage.getItem("koliya_sess");if(sid){const u=getUser(sid);if(u&&u.status==="approved"){me=u;enterApp();return true;}localStorage.removeItem("koliya_sess");}return false;
}
async function doLogin(){
  const e=document.getElementById("lemail").value.trim(),p=document.getElementById("lpw").value;
  if(!e||!p)return toast("Enter email and password.","e");
  if(USE_SUPA){const{data,error}=await sp.auth.signInWithPassword({email:e,password:p});if(error)return toast("Wrong email or password.","e");await syncDB();const u=getUser(data.user.id);if(!u)return toast("Profile not found.","e");if(u.status==="pending"){sp.auth.signOut();return showAuth("pending");}if(u.status==="rejected"){sp.auth.signOut();return showAuth("rejected");}if(u.status==="banned"){sp.auth.signOut();return toast("Account banned.","e");}me=u;enterApp();return;}
  const u=getUserByEmail(e);if(!u||u.password!==p)return toast("Wrong email or password.","e");if(u.status==="pending")return showAuth("pending");if(u.status!=="approved")return toast("Not approved yet.","e");me=mapUser(u);localStorage.setItem("koliya_sess",u.id);enterApp();
}
async function doSignup(){
  const name=document.getElementById("sname").value.trim(),un=document.getElementById("suser").value.trim(),card=document.getElementById("scard").value.trim(),fac=document.getElementById("sfac").value.trim(),email=document.getElementById("semail").value.trim(),pw=document.getElementById("spw").value;
  if(!name||!un||!card||!email||!pw)return toast("Fill all fields.","e");
  if(un.includes(" "))return toast("No spaces in username.","e");
  if(!/^[a-z0-9._]+$/i.test(un))return toast("Username: letters/numbers/._ only.","e");
  if(!/@gmail\.com$/i.test(email))return toast("Use @gmail.com address.","e");
  if(pw.length<6)return toast("Password min 6 characters.","e");
  if(getUserByEmail(email))return toast("Email already registered.","e");
  if(getUserByUsername(un))return toast("Username taken.","e");
  if(USE_SUPA){const{error}=await sp.auth.signUp({email,password:pw,options:{data:{username:un,full_name:name,student_card:card,faculty:fac}}});if(error)return toast("Signup failed: "+error.message,"e");await new Promise(r=>setTimeout(r,1500));await syncDB();showAuth("pending");toast("Application submitted!","ok");return;}
  data.users.push({id:uid("u"),name,username:un,email,password:pw,studentCard:card,faculty:fac,status:"pending",role:"student",followers:[],following:[],blocked:[]});saveLocal();showAuth("pending");toast("Application submitted!","ok");
}
function doLogout(){if(USE_SUPA)sp.auth.signOut();localStorage.removeItem("koliya_sess");me=null;document.getElementById("app").classList.add("hidden");document.getElementById("auth").classList.remove("hidden");document.getElementById("fab").style.display="none";showAuth("login");stopPoll();toast("Logged out.");}

/* ===== APP ENTRY ===== */
function enterApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("fab").style.display="flex";
  document.querySelectorAll(".admin-only").forEach(e=>e.classList.toggle("hidden",me.role!=="admin"));
  go("feed");
  if(USE_SUPA) syncDB().then(()=>{me=getUser(me.id);updateBadges();});
  startPoll();
}

/* ===== ROUTER ===== */
let curView=null,curArg=null;
let navStack=[];
function go(view,arg){
  if(curView)navStack.push({view:curView,arg:curArg});
  curView=view;curArg=arg;
  document.querySelectorAll(".ni,.bn").forEach(b=>b.classList.toggle("on",b.dataset.r===view));
  document.getElementById("fab").style.display=view==="messages"?"none":"flex";
  const c=document.getElementById("view");
  c.className="view"+(view==="messages"?" full":"");
  c.innerHTML="";
  if(view==="feed")renderFeed(c);
  else if(view==="explore")renderExplore(c);
  else if(view==="channels")renderChannels(c);
  else if(view==="channel")renderChannel(c,arg);
  else if(view==="messages")renderMessages(c,arg);
  else if(view==="saved")renderSaved(c);
  else if(view==="profile")renderProfile(c,arg);
  else if(view==="admin")renderAdmin(c);
  document.getElementById("main").scrollTop=0;
  if(USE_SUPA&&view!=="messages"){
    const snap={p:allPosts().length,u:allUsers().length,c:channels().length,m:totalUnread()};
    syncDB().then(()=>{
      me=getUser(me.id);
      const now={p:allPosts().length,u:allUsers().length,c:channels().length,m:totalUnread()};
      updateBadges();
      if(JSON.stringify(snap)!==JSON.stringify(now)&&curView===view)go(view,arg);
    });
  }
}

function renderFeed(c){
  const users=allUsers().filter(u=>u.status==="approved").map(u=>u.id);
  const visible=new Set([me.id,...me.following,...users]);
  let posts=allPosts().filter(p=>!p.channelId&&visible.has(p.userId));
  // stories
  let s=storyUsers().filter(x=>me.following.includes(x.userId)||x.userId===me.id);
  let h=`<div class="sh"><b style="font-size:18px">كُلِّيَّة</b><button onclick="openComposer()" style="font-size:20px;color:var(--accent)">✏️</button></div>`;
  if(s.length||me.following.length){
    h+=`<div class="stories"><div class="st" onclick="addStory()"><div class="ring" style="background:none;border:2px dashed var(--bd)"><div style="background:var(--hover)">${avatarHTML(me,57)}</div></div><div class="l">You</div></div>`;
    s.forEach(x=>{const u=getUser(x.userId);if(!u)return;h+=`<div class="st" onclick="viewStory('${x.userId}')"><div class="ring ${hasNewStory(x.userId)?"":"v"}"><div>${avatarHTML(u,57)}</div></div><div class="l">${esc(u.username)}</div></div>`;});
    me.following.filter(uid=>!s.some(x=>x.userId===uid)).slice(0,8).forEach(uid=>{const u=getUser(uid);if(!u)return;h+=`<div class="st" onclick="go('profile','${uid}')"><div class="ring v"><div>${avatarHTML(u,57)}</div></div><div class="l">${esc(u.username)}</div></div>`;});

/* ===== COMPOSER ===== */
function openComposer(){
  compImage=null;compMedia=null;
  document.getElementById("compText").value="";document.getElementById("compPrev").innerHTML="";
  const sel=document.getElementById("compCh");
  sel.innerHTML=`<option value="">Feed</option>`+channels().filter(c=>c.members.includes(me.id)&&canPost(c.id,me.id)).map(c=>`<option value="${c.id}">${c.icon} ${esc(c.name)}</option>`).join("");
  openM("compModal");setTimeout(()=>document.getElementById("compText").focus(),100);
}
function handleUpload(e,type){
  const f=e.target.files[0];if(!f)return;
  const lim={image:3,video:15,file:10}[type];
  if(f.size>lim*1024*1024)return toast(`Max ${lim}MB`,"e");
  const r=new FileReader();r.onload=ev=>{
    if(type==="image"){compImage=ev.target.result;compMedia=null;document.getElementById("compPrev").innerHTML=`<img src="${compImage}" style="border-radius:10px;max-height:220px;width:100%;object-fit:cover"><button onclick="clearUpload()" style="color:var(--dim);font-size:12px;margin-top:4px">Remove</button>`;}
    else{compImage=null;compMedia={type,data:ev.target.result,name:f.name};const ic=type==="video"?"🎬":"📄";document.getElementById("compPrev").innerHTML=`<div class="fc"><div class="fi">${ic}</div><div><div class="fn">${esc(f.name)}</div><div class="fs">${(f.size/1024/1024).toFixed(1)} MB</div></div></div><button onclick="clearUpload()" style="color:var(--dim);font-size:12px;margin-top:4px">Remove</button>`;}
  };r.readAsDataURL(f);
}
function clearUpload(){compImage=null;compMedia=null;document.getElementById("compPrev").innerHTML="";}
function sharePost(){
  const t=document.getElementById("compText").value.trim(),ch=document.getElementById("compCh").value;
  if(!t&&!compImage&&!compMedia)return toast("Write something or add media.","e");
  createPost({userId:me.id,text:t,image:compImage,media:compMedia,channelId:ch||null});
  closeM("compModal");toast("Posted!","ok");go("feed");
}
function likePost(id){toggleLike(id,me.id);const el=document.getElementById("post-"+id);if(el)el.outerHTML=postCard(getPost(id));}

/* ===== STORIES ===== */
function addStory(){modal("Add story",`<div style="padding:16px;display:flex;flex-direction:column;gap:10px"><input class="inp" id="strText" placeholder="Text (optional)"><label class="tb" style="justify-content:center;display:flex;cursor:pointer">Upload photo<input type="file" accept="image/*" hidden onchange="strUpload(event)"></label><div id="strPrev"></div><button class="btn" onclick="postStory()">Add to story</button></div>`);window._strM=null;}
function strUpload(e){const f=e.target.files[0];if(!f)return;if(f.size>3*1024*1024)return toast("Max 3MB","e");const r=new FileReader();r.onload=ev=>{window._strM=ev.target.result;document.getElementById("strPrev").innerHTML=`<img src="${ev.target.result}" style="max-height:180px;border-radius:10px;width:100%;object-fit:cover">`;};r.readAsDataURL(f);}

let storyTimer=null;
function viewStory(uid_){
  const ss=storiesBy(uid_);if(!ss.length)return;const u=getUser(uid_);if(!u)return;
  try{localStorage.setItem("str_"+uid_,Date.now().toString());}catch(e){}
  let i=0;const sv=document.getElementById("storyView");sv.classList.remove("hidden");
  function show(){const s=ss[i];if(!s){closeStory();return;}const prog=((i+1)/ss.length)*100;
    sv.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2)"><div style="height:100%;width:${prog}%;background:#fff;transition:width .1s"></div></div><div style="position:absolute;top:16px;left:20px;color:#fff;font-weight:600;z-index:2">${esc(u.username)}</div><button onclick="closeStory()" style="position:absolute;top:12px;right:20px;color:#fff;font-size:28px;z-index:3">&times;</button>${i>0?`<button onclick="prevStory()" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#fff;font-size:30px;z-index:2">&lsaquo;</button>`:""}${i<ss.length-1?`<button onclick="nextStory()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#fff;font-size:30px;z-index:2">&rsaquo;</button>`:""}${s.media?`<img src="${s.media}" style="max-width:90vw;max-height:85vh;border-radius:8px">`:`<div style="color:#fff;font-size:22px;text-align:center;padding:60px;max-width:500px">${esc(s.text)}</div>`}`;
    clearTimeout(storyTimer);storyTimer=setTimeout(()=>{i++;show();},5000);
  }
  window.nextStory=()=>{i++;show();};window.prevStory=()=>{i--;if(i<0)i=0;show();};

function runSearch(q){const b=document.getElementById("expBody");q=q.trim().toLowerCase();
  if(!q){const sug=allUsers().filter(u=>u.status==="approved"&&u.id!==me.id&&!me.following.includes(u.id)&&!me.blocked.includes(u.id)).slice(0,8);let h=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600">SUGGESTED</div>`;h+=sug.map(u=>userRow(u)).join("")||empty("All caught up","");const ch=channels().slice(0,6);if(ch.length){h+=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600;margin-top:8px">CHANNELS</div>`;h+=ch.map(chRow).join("");}b.innerHTML=h;return;}
  const us=allUsers().filter(u=>u.status==="approved"&&u.id!==me.id&&(u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)||(u.faculty||"").toLowerCase().includes(q)));

function userRow(u){const f=me.following.includes(u.id);return`<div class="lr" onclick="go('profile','${u.id}')">${avatarHTML(u,42)}<div style="flex:1"><div style="font-weight:600;font-size:14px">${esc(u.username)}</div><div style="color:var(--dim);font-size:13px">${esc(u.name)} · ${esc(u.faculty||"")}</div></div><button class="${f?"btn-o":"btn-f"}" onclick="event.stopPropagation();followUser('${u.id}',this)">${f?"Following":"Follow"}</button></div>`;}
function chRow(c){return`<div class="chc" onclick="go('channel','${c.id}')"><div class="chi" style="background:${c.color}">${c.icon}</div><div style="flex:1"><div style="font-weight:600">${esc(c.name)} <span class="badge ${c.type==="private"?"private":"public"}">${c.type}</span></div><div style="color:var(--dim);font-size:13px">${c.members.length} members</div></div></div>`;}
function followUser(uid,btn){const u=getUser(uid);if(!u)return;if(me.blocked.includes(uid))return toast("Unblock first.","e");if(me.following.includes(uid)){me.following=me.following.filter(x=>x!==uid);u.followers=u.followers.filter(x=>x!==me.id);}else{me.following.push(uid);if(!u.followers.includes(me.id))u.followers.push(me.id);}updateUser(me.id,{following:me.following});updateUser(u.id,{followers:u.followers});me=getUser(me.id);const f=me.following.includes(uid);if(btn){btn.textContent=f?"Following":"Follow";btn.className=f?"btn-o":"btn-f";}toast(f?"Following "+u.username:"Unfollowed");}

function renderChannels(c){const mine=channels().filter(ch=>ch.members.includes(me.id));const disc=channels().filter(ch=>!ch.members.includes(me.id)&&ch.type!=="private");let h=`<div class="sh"><b style="font-size:18px">Channels</b><button onclick="openCreateChannel()" style="font-size:22px;color:var(--accent)">+</button></div>`;h+=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600">YOUR CHANNELS ${mine.length?"("+mine.length+")":""}</div>`;if(mine.length)h+=mine.map(chCard).join("");else h+=empty("No channels","Create one or join below.");if(disc.length){h+=`<div style="padding:10px 14px;color:var(--dim);font-size:12px;font-weight:600;margin-top:8px">DISCOVER</div>`+disc.map(chCard).join("");}c.innerHTML=h;}

function chSettings(id){const ch=getChannel(id);modal("Settings",`<div class="lr"><div style="flex:1"><div style="font-weight:600;font-size:14px">Admins only post</div><div style="color:var(--dim);font-size:12px">Restrict posting</div></div><label class="tg"><input type="checkbox" ${ch.postPerm==="admins"?"checked":""} onchange="updChSetting('${id}','postPerm',this.checked?'admins':'all');toast('Updated')"><span class="sl"></span></label></div><div class="lr"><div style="flex:1"><div style="font-weight:600;font-size:14px">Private</div><div style="color:var(--dim);font-size:12px">Invite only</div></div><label class="tg"><input type="checkbox" ${ch.type==="private"?"checked":""} onchange="updChSetting('${id}','type',this.checked?'private':'public');toast('Updated')"><span class="sl"></span></label></div>`);}
function addMember(id){const ch=getChannel(id);const cands=allUsers().filter(u=>u.status==="approved"&&!ch.members.includes(u.id));if(!cands.length)return toast("No one to add.","e");const rows=cands.map(u=>`<div class="lr" onclick="joinCh('${id}','${u.id}');closeM('genModal');toast('Added!','ok');go('channel','${id}')">${avatarHTML(u,42)}<div style="flex:1"><div style="font-weight:600">${esc(u.username)}</div></div><button class="btn-f" style="padding:5px 12px">Add</button></div>`).join("");modal("Add member · "+ch.name,rows);}

/* ===== MESSAGES ===== */
function renderMessages(c,arg){activeChat=null;const convos=getConvos(me.id);const list=convos.length?convos.map(cv=>{const o=getUser(cv.other);if(!o)return"";const uc=unreadCount(cv.other);return`<div class="lr" onclick="openChat('${cv.other}')"><div style="position:relative">${avatarHTML(o,44)}${uc?`<span class="ub">${uc}</span>`:""}</div><div style="flex:1"><div style="font-weight:${uc?700:600};font-size:14px">${esc(o.username)}</div><div style="color:var(--dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(cv.last.text||"Say hi")}</div></div></div>`;}).join(""):empty("No messages","Find students to chat.");c.innerHTML=`<div class="sh"><b style="font-size:18px">Messages</b></div><div class="msg-l"><div class="cl" id="convList">${list}</div><div class="cw" id="chatPane" style="display:flex">${empty("Your messages","Select a conversation.")}</div></div>`;if(USE_SUPA)syncDB().then(()=>{refreshConvList();updateBadges();});if(arg&&typeof arg==="string"&&arg!=="me")openChat(arg);}
function refreshConvList(){const convos=getConvos(me.id);const list=convos.length?convos.map(cv=>{const o=getUser(cv.other);if(!o)return"";const uc=unreadCount(cv.other);return`<div class="lr" onclick="openChat('${cv.other}')"><div style="position:relative">${avatarHTML(o,44)}${uc?`<span class="ub">${uc}</span>`:""}</div><div style="flex:1"><div style="font-weight:${uc?700:600};font-size:14px">${esc(o.username)}</div><div style="color:var(--dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(cv.last.text||"Say hi")}</div></div></div>`;}).join(""):empty("No messages","");const el=document.getElementById("convList");if(el)el.innerHTML=list;updateBadges();}
function openChat(uid){
  if(USE_SUPA){const p=document.getElementById("chatPane");if(p){p.classList.add("on");p.innerHTML='<div class="empty">Loading...</div>';}const cl=document.getElementById("convList");if(cl)cl.classList.add("sc");activeChat=uid;syncDB().then(()=>{showChat(uid);refreshConvList();});}
  else showChat(uid);
}
function showChat(uid){const o=getUser(uid);if(!o)return;activeChat=uid;try{localStorage.setItem("rd_"+uid,Date.now().toString());}catch(e){}const msgs=getMsgs(me.id,uid);let ld=null,bs="";msgs.forEach(m=>{const dl=dayLabel(m.createdAt);if(dl!==ld){bs+=`<div style="text-align:center;color:var(--dim);font-size:11px;margin:6px 0">${dl}</div>`;ld=dl;}const mine=m.sender===me.id;bs+=`<div class="bub ${mine?"me":"th"}">${esc(m.text)}</div>`;});const p=document.getElementById("chatPane");p.innerHTML=`<div class="sh" style="position:sticky;top:0"><button onclick="closeChat()">←</button>${avatarHTML(o,32)}<div onclick="go('profile','${uid}')"><div style="font-weight:600;font-size:15px">${esc(o.username)}</div><div style="color:var(--dim);font-size:12px">${esc(o.name)}</div></div></div><div class="cb2" id="chatBody">${bs||empty("Say hi!","")}</div><div style="display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--bd)"><input id="msgInput" class="inp" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1"><button class="btn-f" onclick="sendChat()">Send</button></div>`;const cl=document.getElementById("convList");if(cl)cl.classList.add("sc");p.classList.add("on");const cb=document.getElementById("chatBody");if(cb)cb.scrollTop=cb.scrollHeight;updateBadges();setTimeout(()=>document.getElementById("msgInput")?.focus(),100);}
function sendChat(){if(!activeChat)return;const i=document.getElementById("msgInput");const t=i.value.trim();if(!t)return;sendMsg(me.id,activeChat,t);i.value="";const cb=document.getElementById("chatBody");if(cb){const d=document.createElement("div");d.className="bub me";d.textContent=t;cb.appendChild(d);cb.scrollTop=cb.scrollHeight;}}
function closeChat(){activeChat=null;const cl=document.getElementById("convList");if(cl)cl.classList.remove("sc");const p=document.getElementById("chatPane");if(p){p.classList.remove("on");p.innerHTML=empty("Your messages","Select a conversation.");}refreshConvList();}

/* ===== PROFILE ===== */
function renderProfile(c,id){const u=(id==="me"||!id)?me:getUser(id);if(!u){c.innerHTML=empty("User not found","");return;}const isMe=u.id===me.id;const ib=(me.blocked||[]).includes(u.id);const bm=(u.blocked||[]).includes(me.id);const fol=me.following.includes(u.id);const ps=allPosts().filter(p=>p.userId===u.id&&!p.channelId);
  let act="";if(isMe)act=`<button class="btn-o" onclick="editProfile()">Edit profile</button>`;else if(bm)act=`<span class="badge private">Blocked you</span>`;else if(ib)act=`<button class="btn-o" onclick="blockUser('${u.id}')">Unblock</button>`;else act=`<button class="${fol?"btn-o":"btn-f"}" id="fb" onclick="followUser('${u.id}',this)">${fol?"Following":"Follow"}</button><button class="btn-o" onclick="go('messages','${u.id}')">Message</button>`;
  c.innerHTML=`<div class="sh">${isMe?"":`<button onclick="goBack()" style="font-size:20px">←</button>`}<b style="font-size:16px">${esc(u.username)}</b></div><div style="padding:18px 14px"><div style="display:flex;gap:30px;align-items:center">${avatarHTML(u,76)}<div style="flex:1"><div style="font-weight:700;font-size:19px">${esc(u.username)}</div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">${act}</div></div></div><div style="display:flex;gap:24px;margin-top:16px"><span><b>${ps.length}</b> <span style="color:var(--dim)">posts</span></span><span><b>${u.followers.length}</b> <span style="color:var(--dim)">followers</span></span><span><b>${u.following.length}</b> <span style="color:var(--dim)">following</span></span></div><div style="margin-top:12px;font-weight:600">${esc(u.name)}</div><div style="color:var(--accent);font-size:13px;font-weight:600">${esc(u.faculty||"")}</div>${u.bio?`<div style="font-size:14px;margin-top:4px">${esc(u.bio)}</div>`:""}<div style="margin-top:6px"><span style="background:var(--hover);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--dim)">🪪 ${esc(u.studentCard)}</span></div>${!isMe&&!ib&&!bm?`<button onclick="blockUser('${u.id}')" style="color:var(--danger);font-size:12px;margin-top:8px">Block</button>`:""}</div>${ps.length?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px">${ps.map(p=>`<div onclick="openPostModal('${p.id}')" style="aspect-ratio:1;background:var(--hover);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden">${p.image?`<img src="${p.image}" style="width:100%;height:100%;object-fit:cover">`:`<div style="padding:8px;font-size:11px;color:var(--dim);text-align:center">${esc((p.text||"").slice(0,40))}</div>`}</div>`).join("")}</div>`:empty("No posts","")}`;
}
function openPostModal(id){const p=getPost(id);if(!p)return;modal("Post",postCard(p));}
function blockUser(uid){const u=getUser(uid);if(!u)return;if((me.blocked||[]).includes(uid)){me.blocked=me.blocked.filter(x=>x!==uid);updateUser(me.id,{blocked:me.blocked});me=getUser(me.id);toast("Unblocked "+u.username,"ok");}else{me.blocked.push(uid);me.following=me.following.filter(x=>x!==uid);u.followers=u.followers.filter(x=>x!==me.id);updateUser(me.id,{blocked:me.blocked,following:me.following});updateUser(uid,{followers:u.followers});me=getUser(me.id);toast("Blocked "+u.username);}go("profile",uid);}
function editProfile(){modal("Edit profile",`<div style="padding:16px;display:flex;flex-direction:column;gap:10px"><div style="display:flex;justify-content:center">${avatarHTML(me,76)}</div><label class="tb" style="justify-content:center;display:flex;cursor:pointer">Change photo<input type="file" accept="image/*" hidden onchange="uploadAvatar(event)"></label><input class="inp" id="eN" value="${esc(me.name)}" placeholder="Name"><input class="inp" id="eB" value="${esc(me.bio)}" placeholder="Bio"><input class="inp" id="eF" value="${esc(me.faculty)}" placeholder="Faculty"><button class="btn" onclick="saveProfile()">Save</button></div>`);}
function uploadAvatar(e){const f=e.target.files[0];if(!f)return;if(f.size>1.5*1024*1024)return toast("Max 1.5MB","e");const r=new FileReader();r.onload=ev=>{updateUser(me.id,{avatar:ev.target.result});me=getUser(me.id);closeM("genModal");toast("Updated!","ok");go("profile","me");};r.readAsDataURL(f);}
function saveProfile(){const n=document.getElementById("eN").value.trim(),b=document.getElementById("eB").value.trim(),f=document.getElementById("eF").value.trim();if(!n)return toast("Name required.","e");updateUser(me.id,{name:n,bio:b,faculty:f});me=getUser(me.id);closeM("genModal");toast("Saved!","ok");go("profile","me");}

/* ===== ADMIN ===== */
let adminTab="pending";
function renderAdmin(c){if(me.role!=="admin"){c.innerHTML=empty("Admins only","");return;}const pend=allUsers().filter(u=>u.status==="pending"),appr=allUsers().filter(u=>u.status==="approved"),ban=allUsers().filter(u=>u.status==="banned");
  c.innerHTML=`<div class="sh"><b style="font-size:18px">Admin</b></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px"><div style="background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--accent)">${pend.length}</div><div style="color:var(--dim);font-size:11px">Pending</div></div><div style="background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--ok)">${appr.length}</div><div style="color:var(--dim);font-size:11px">Approved</div></div><div style="background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--danger)">${ban.length}</div><div style="color:var(--dim);font-size:11px">Banned</div></div></div><div style="display:flex;border-bottom:1px solid var(--bd)"><div style="flex:1;padding:11px;text-align:center;font-weight:600;cursor:pointer;border-bottom:2px solid ${adminTab==="pending"?"var(--accent)":"transparent"};color:${adminTab==="pending"?"var(--accent)":"var(--dim)"}" onclick="setAdminTab('pending')">Pending ${pend.length?"("+pend.length+")":""}</div><div style="flex:1;padding:11px;text-align:center;font-weight:600;cursor:pointer;border-bottom:2px solid ${adminTab==="approved"?"var(--accent)":"transparent"};color:${adminTab==="approved"?"var(--accent)":"var(--dim)"}" onclick="setAdminTab('approved')">Students</div><div style="flex:1;padding:11px;text-align:center;font-weight:600;cursor:pointer;border-bottom:2px solid ${adminTab==="banned"?"var(--accent)":"transparent"};color:${adminTab==="banned"?"var(--accent)":"var(--dim)"}" onclick="setAdminTab('banned')">Banned</div></div><div id="adminBody"></div>`;drawAdmin();}
function setAdminTab(t){adminTab=t;go("admin");}
function drawAdmin(){const b=document.getElementById("adminBody");if(!b)return;const list=allUsers().filter(u=>u.status===adminTab&&u.role!=="admin");if(!list.length){b.innerHTML=empty("All clear","No "+adminTab+" users.");return;}b.innerHTML=list.map(u=>{let a="";if(u.status==="pending")a=`<div style="display:flex;gap:5px"><button class="btn-f" style="padding:5px 10px;font-size:12px" onclick="approveUser('${u.id}')">Approve</button><button class="btn-r" style="padding:5px 10px;font-size:12px" onclick="rejectUser('${u.id}')">Reject</button></div>`;else if(u.status==="approved")a=`<button class="btn-o" style="color:var(--danger);padding:5px 10px;font-size:12px" onclick="banUser('${u.id}')">Ban</button>`;else a=`<button class="btn-o" style="padding:5px 10px;font-size:12px" onclick="approveUser('${u.id}')">Unban</button>`;return`<div class="lr" onclick="go('profile','${u.id}')">${avatarHTML(u,42)}<div style="flex:1"><div style="font-weight:600;font-size:14px">${esc(u.name)}</div><div style="color:var(--dim);font-size:12px">@${esc(u.username)} · ${esc(u.faculty||"—")}</div><div style="color:var(--dim);font-size:11px">🪪 ${esc(u.studentCard)}</div></div>${a}</div>`;}).join("");}
function approveUser(id){updateUser(id,{status:"approved"});toast("Approved!","ok");drawAdmin();}
function rejectUser(id){updateUser(id,{status:"rejected"});toast("Rejected.");drawAdmin();}
function banUser(id){updateUser(id,{status:"banned"});toast("Banned.");drawAdmin();}

/* ===== BADGES ===== */
function updateBadges(){const t=totalUnread();["dot1","dot2"].forEach(id=>{const e=document.getElementById(id);if(e){e.textContent=t>99?"99+":t;e.style.display=t?"flex":"none";}});}

/* ===== POLLING (live updates) ===== */
function startPoll(){stopPoll();pollTimer=setInterval(async()=>{
  if(!USE_SUPA)return;
  const before={p:allPosts().length,m:data.messages.length,s:(data.stories||[]).length};
  await syncDB();me=getUser(me.id);updateBadges();
  const after={p:allPosts().length,m:data.messages.length,s:(data.stories||[]).length};
  if(before.m===after.m&&before.p===after.p&&before.s===after.s)return;
  if(curView==="messages"){
    refreshConvList();
    if(activeChat){refreshActiveChatBubbles();}
  }
  else if(curView!=="messages"){renderView(curView,curArg);}
},5000);}
function refreshActiveChatBubbles(){
  if(!activeChat)return;
  const msgs=getMsgs(me.id,activeChat);
  const body=document.getElementById("chatBody");
  const input=document.getElementById("msgInput");
  if(!body)return;
  const inputVal=input?input.value:"";
  const inputFocus=input?document.activeElement===input:false;
  const atBottom=body.scrollHeight-body.scrollTop-body.clientHeight<80;
  let ld=null,bs="";
  msgs.forEach(m=>{const dl=dayLabel(m.createdAt);if(dl!==ld){bs+=`<div style="text-align:center;color:var(--dim);font-size:11px;margin:6px 0">${dl}</div>`;ld=dl;}const mine=m.sender===me.id;bs+=`<div class="bub ${mine?"me":"th"}">${esc(m.text)}</div>`;});
  body.innerHTML=bs;
  if(input){input.value=inputVal;if(inputFocus)input.focus();}
  if(atBottom)body.scrollTop=body.scrollHeight;
}
function stopPoll(){if(pollTimer)clearInterval(pollTimer);pollTimer=null;}

/* ===== BOOT ===== */
function boot(){try{document.body.setAttribute("data-theme",localStorage.getItem("koliya_th")||"light");}catch(e){}document.getElementById("auth").classList.remove("hidden");document.getElementById("app").classList.add("hidden");document.getElementById("fab").style.display="none";showAuth("login");tryRestore();}
document.addEventListener("DOMContentLoaded",boot);
function goBack(){if(navStack.length){const prev=navStack.pop();curView=null;go(prev.view,prev.arg);}}
function renderView(view,arg){
  curView=view;curArg=arg;
  document.querySelectorAll(".ni,.bn").forEach(b=>b.classList.toggle("on",b.dataset.r===view));
  document.getElementById("fab").style.display=view==="messages"?"none":"flex";
  const c=document.getElementById("view");
  c.className="view"+(view==="messages"?" full":"");
  c.innerHTML="";
  if(view==="feed")renderFeed(c);
  else if(view==="explore")renderExplore(c);
  else if(view==="channels")renderChannels(c);
  else if(view==="channel")renderChannel(c,arg);
  else if(view==="messages")renderMessages(c,arg);
  else if(view==="saved")renderSaved(c);
  else if(view==="profile")renderProfile(c,arg);
  else if(view==="admin")renderAdmin(c);
  document.getElementById("main").scrollTop=0;
}
window.addEventListener("popstate",()=>goBack());
