<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>كُلِّيَّة — Koliya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
<style>
/* ==================== YOUR ORIGINAL STYLES (UNCHANGED) ==================== */
:root{--accent:#4F46E5;--accent-h:#4338CA;--accent-lt:#EEF2FF;--accent-grad:linear-gradient(135deg,#667eea,#764ba2);--danger:#EF4444;--like:#F43F5E;--ok:#22C55E;--r:16px;--max:600px;--t:.25s cubic-bezier(.4,0,.2,1)}
:root{--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 20px rgba(0,0,0,.08);--shadow-lg:0 8px 40px rgba(0,0,0,.12)}
[data-theme="light"]{--bg:#fff;--card:#fff;--hover:#F5F5F5;--txt:#111;--dim:#888;--bd:#eee;--nav:rgba(255,255,255,.92)}
[data-theme="dark"]{--bg:#080808;--card:#141414;--hover:#1e1e1e;--txt:#f0f0f0;--dim:#666;--bd:#252525;--nav:rgba(8,8,8,.85)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;overflow:hidden;transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{font:inherit;color:var(--txt)}input::placeholder{color:var(--dim)}
img{max-width:100%;display:block}.hidden{display:none!important}

/* auth */
.auth{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--accent-grad);position:relative}
.auth-box{width:100%;max-width:400px;background:var(--card);border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:authIn .5s cubic-bezier(.2,.8,.2,1)}
.auth-h{text-align:center;margin-bottom:24px}
.logo{font-size:32px;font-weight:800;cursor:pointer;user-select:none;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.sub{color:var(--dim);font-size:12px;margin-top:2px}
.f{display:flex;flex-direction:column;gap:10px}
.inp{width:100%;background:var(--hover);border:1.5px solid transparent;border-radius:12px;padding:13px 15px;transition:border var(--t),background var(--t);font-size:15px}
.inp:focus{border-color:var(--accent);outline:none;background:var(--card);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.btn{background:var(--accent-grad);color:#fff;border-radius:12px;padding:13px;width:100%;font-weight:600;transition:transform var(--t),box-shadow var(--t);box-shadow:0 4px 14px rgba(79,70,229,.35);border:none}
.btn:hover{box-shadow:0 6px 20px rgba(79,70,229,.5);transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-g{background:var(--hover);color:var(--txt);border:1px solid var(--bd)}
.btn-r{background:var(--danger);color:#fff;border-radius:10px;padding:9px 16px;font-weight:600}
.sw{text-align:center;font-size:13px;color:var(--dim);margin-top:6px}.sw a{color:var(--accent);font-weight:600;cursor:pointer}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);opacity:.5;font-size:16px;cursor:pointer}
.gi{width:56px;height:56px;border-radius:50%;background:var(--accent-lt);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.gi svg{width:26px;height:26px}

/* layout */
.app{display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden}
.main{overflow-y:auto;overflow-x:hidden;border-left:1px solid var(--bd);height:100vh}
.view{max-width:var(--max);margin:0 auto;padding-bottom:70px}
.view.full{max-width:none;padding-bottom:0}
.side{height:100vh;border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 12px;background:var(--card);position:sticky;top:0}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;margin-top:16px}
.ni{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;font-size:15px;font-weight:500;transition:all var(--t);width:100%}
.ni:hover{background:var(--hover)}.ni.on{background:var(--accent-lt);color:var(--accent);font-weight:600}.ni.on svg{stroke-width:2.2}
.ni svg{width:23px;height:23px;flex-shrink:0}
.nd{position:relative}
.dot{position:absolute;top:-2px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--like);color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
.topbar{display:none}.bnav{display:none}

/* stories */
.stories{display:flex;gap:12px;padding:12px;overflow-x:auto;border-bottom:1px solid var(--bd);scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.st{flex-shrink:0;text-align:center;cursor:pointer}
.ring{width:62px;height:62px;border-radius:50%;padding:2.5px;background:linear-gradient(45deg,#4F46E5,#7C3AED,#EC4899)}
.ring.v{background:var(--bd)}
.ring>div{width:100%;height:100%;border-radius:50%;border:2.5px solid var(--card);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.st .l{font-size:11px;margin-top:3px;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* post */
.post{border-bottom:1px solid var(--bd);padding:16px 0;transition:background var(--t)}
.ph{display:flex;align-items:center;gap:10px;padding:0 14px}
.av{border-radius:50%;background:var(--hover);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);overflow:hidden;flex-shrink:0;position:relative}
.pt{padding:6px 14px 0;white-space:pre-wrap;word-break:break-word}
.pm{margin:8px 14px 0;border-radius:12px;overflow:hidden}.pm img,.pm video{width:100%}
.fc{display:flex;align-items:center;gap:10px;margin:8px 14px;padding:12px;background:var(--hover);border-radius:12px;text-decoration:none;color:var(--txt);border:1px solid var(--bd)}
.fi{width:38px;height:38px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.fn{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fs{color:var(--dim);font-size:11px}
.pa{display:flex;gap:18px;padding:8px 14px 0}
.act{display:flex;align-items:center;gap:4px;color:var(--dim);transition:transform var(--t);cursor:pointer}
.act:hover{transform:scale(1.15)}.act svg{width:20px;height:20px}
.act .c{font-size:12px;font-weight:600;color:var(--txt)}
.act.lk{color:var(--like)}.act.sv{color:var(--accent)}
.cm{font-size:13px;padding:2px 14px 0}.cm .u{font-weight:700;margin-right:5px}
.cb{display:flex;gap:6px;padding:6px 14px}
.cb input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--bd);padding:5px 0}.cb input:focus{outline:none;border-color:var(--accent)}
.cb button{color:var(--accent);font-weight:600;font-size:14px}

/* compose */
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--nav);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);z-index:5}
.compose-card{margin:12px 14px;padding:16px;background:var(--card);border:1px solid var(--bd);border-radius:18px;box-shadow:var(--shadow-sm);transition:box-shadow var(--t)}
.compose-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.compose-card-input{flex:1;background:var(--hover);border-radius:20px;padding:10px 16px;color:var(--dim);cursor:pointer;font-size:15px}
.compose-card-actions{display:flex;gap:16px;padding-top:10px;border-top:1px solid var(--bd-soft,var(--bd))}
.compose-act{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;transition:color var(--t)}
.compose-act:hover{color:var(--accent)}
.compose-act svg{width:18px;height:18px}

/* modal */
.ml{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.mb{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.mc{position:relative;background:var(--card);border-radius:24px;width:100%;max-width:540px;max-height:90vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .3s cubic-bezier(.2,.8,.2,1)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd)}
.tb{background:var(--hover);border-radius:18px;padding:7px 12px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.tb svg{width:16px;height:16px;color:var(--accent)}

/* channel */
.chc{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.chc:hover{background:var(--hover)}
.chi{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase}
.badge.public{background:rgba(34,197,94,.12);color:var(--ok)}.badge.private{background:var(--accent-lt);color:var(--accent)}
.chd-h{text-align:center;padding:20px 14px;border-bottom:1px solid var(--bd)}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--hover);border-radius:18px;padding:4px 10px;font-size:11px;color:var(--dim);margin:2px}
.tg{position:relative;width:40px;height:22px;flex-shrink:0}
.tg input{opacity:0;width:0;height:0}
.tg .sl{position:absolute;cursor:pointer;inset:0;background:var(--bd);border-radius:22px;transition:.3s}
.tg .sl:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.sl{background:var(--accent)}.tg input:checked+.sl:before{transform:translateX(18px)}
.empty{text-align:center;padding:60px 24px;color:var(--dim)}.empty h3{margin-bottom:8px;font-size:18px;font-weight:700}.empty p{font-size:14px;line-height:1.6}
.lr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}.lr:hover{background:var(--hover)}
.btn-o{background:var(--hover);color:var(--txt);border-radius:10px;padding:8px 16px;font-weight:500;font-size:14px;display:inline-flex;align-items:center;gap:5px}
.btn-o svg{width:16px;height:16px}
.btn-f{background:var(--accent);color:#fff;border-radius:10px;padding:8px 20px;font-weight:600;font-size:14px}
.btn-f.f{background:var(--hover);color:var(--txt)}

/* profile enhancements */
.link-pill{display:inline-flex;align-items:center;gap:4px;background:var(--accent-lt);color:var(--accent);padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;text-decoration:none;margin-bottom:4px;transition:filter var(--t)}
.link-pill:hover{filter:brightness(1.1)}
.profile-tabs{display:flex;border-top:1px solid var(--bd);margin-top:12px}
.ptab{flex:1;padding:12px;text-align:center;font-weight:600;font-size:14px;color:var(--dim);cursor:pointer;border-top:2px solid transparent}
.ptab.active{color:var(--accent);border-top-color:var(--accent)}
.grid-item-text{font-size:24px;color:var(--dim)}

/* POLLS */
.poll-card{margin:8px 14px;padding:14px;background:var(--hover);border-radius:12px;border:1px solid var(--bd)}
.poll-q{font-weight:600;font-size:14px;margin-bottom:10px}
.poll-opt{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border:1.5px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border var(--t);position:relative;overflow:hidden}
.poll-opt:hover{border-color:var(--accent)}
.poll-opt.voted{border-color:var(--accent)}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:var(--accent-lt);transition:width .5s;z-index:0}
.poll-opt>*{position:relative;z-index:1}
.poll-pct{font-size:12px;font-weight:700;color:var(--accent)}
.poll-total{text-align:center;color:var(--dim);font-size:12px;margin-top:8px}

/* EVENTS */
.event-card{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--bd);cursor:pointer}
.event-card:hover{background:var(--hover)}
.event-date{width:54px;height:54px;border-radius:12px;background:var(--accent);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.event-day{font-size:20px;font-weight:800;line-height:1}
.event-mon{font-size:10px;text-transform:uppercase;opacity:.8}
.event-info{flex:1;min-width:0}
.event-title{font-weight:600;font-size:15px;margin-bottom:2px}
.event-meta{color:var(--dim);font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.event-going{background:rgba(34,197,94,.12);color:var(--ok);font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600}

/* Q&A */
.qa-card{padding:14px;border-bottom:1px solid var(--bd)}
.qa-q{font-size:15px;font-weight:500;margin-bottom:8px;line-height:1.5}
.qa-anon{display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-size:12px;font-weight:600;margin-bottom:6px}
.qa-answers{color:var(--dim);font-size:13px;cursor:pointer}
.qa-answers:hover{text-decoration:underline}

/* HUB */
.hub-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--bd);border-radius:12px;margin:8px 14px;text-decoration:none;color:var(--txt);transition:border var(--t)}
.hub-card:hover{border-color:var(--accent)}
.hub-ic{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hub-meta{flex:1;min-width:0}
.hub-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hub-sub{color:var(--dim);font-size:12px}
.hub-type{background:var(--accent-lt);color:var(--accent);font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}

/* messages */
.msg-l{display:flex;height:calc(100vh - 52px)}
.cl{width:280px;border-right:1px solid var(--bd);flex-shrink:0;overflow-y:auto;background:var(--card)}
.cl-h{padding:16px 14px 12px;border-bottom:1px solid var(--bd);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.ch-search{width:100%;background:var(--hover);border:none;border-radius:12px;padding:8px 12px;font-size:14px;margin:8px 0 12px}
.convo-list{padding:0 8px}
.convo{display:flex;gap:12px;padding:12px 10px;border-radius:14px;margin-bottom:2px;cursor:pointer;transition:background .15s}
.convo:hover{background:var(--hover)}
.convo.active{background:var(--accent-lt)}
.convo .av{width:44px;height:44px}
.convo-info{flex:1;min-width:0}
.convo-name{font-weight:600;font-size:14.5px}
.convo-last{font-size:13px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.convo-meta{font-size:11px;color:var(--dim);text-align:right;white-space:nowrap}
.cw{flex:1;display:flex;flex-direction:column;background:var(--card)}
.cw-h{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--card);z-index:10}
.cw-h .av{width:38px;height:38px}
.chat-body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.bub{max-width:78%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.35;position:relative}
.bub.th{background:var(--hover);border-bottom-left-radius:4px}
.bub.me{background:var(--accent);color:#fff;border-bottom-right-radius:4px;margin-left:auto}
.msg-time{font-size:10px;opacity:.65;margin-top:4px}
.bub.me .msg-time{opacity:.7}
.chat-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--bd);background:var(--card);position:sticky;bottom:0}
.chat-input input{flex:1;background:var(--hover);border:1px solid var(--bd);border-radius:20px;padding:11px 16px;font-size:15px}
.chat-input button{background:var(--accent);color:#fff;padding:0 18px;border-radius:20px;font-weight:600}

/* ORIGINAL GAMIFICATION */
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:#fef3c7;color:#854d0e;border-radius:999px;padding:1px 8px;font-size:12px;font-weight:700;margin-left:6px}
.streak-flame{font-size:16px;animation:flame 1.4s infinite alternate ease-in-out}
@keyframes flame{from{transform:scale(1)}to{transform:scale(1.15)}}

.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bd);transition:background .2s;cursor:pointer}
.lb-row:hover{background:var(--hover)}
.lb-rank{width:32px;text-align:center;font-weight:800;font-size:18px;color:var(--dim);flex-shrink:0}
.lb-rank.top1{color:#FBBF24;font-size:22px}.lb-rank.top2{color:#9CA3AF;font-size:20px}.lb-rank.top3{color:#D97706;font-size:20px}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:600;font-size:14px}
.lb-fac{color:var(--dim);font-size:12px}
.lb-score{font-weight:700;font-size:15px;color:var(--accent)}
.lb-score-bar{width:60px;height:4px;background:var(--hover);border-radius:2px;margin-top:4px;overflow:hidden}
.lb-score-fill{height:100%;background:var(--accent-grad);border-radius:2px;transition:width 1s}

.b-min{display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:14px;margin-bottom:7px;background:var(--card);border:1px solid var(--bd)}
.b-min.earned{background:var(--accent-lt);border-color:#c7d2fe}
.b-min-ic{width:42px;height:42px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.b-min-ic.locked{background:var(--hover);color:var(--dim);opacity:.65}
.b-min-ic.earned{background:#c7d2fe;color:var(--accent)}
.b-min-info{flex:1;min-width:0}
.b-min-name{font-weight:700;font-size:14px}
.b-min-name.locked{color:var(--dim)}
.b-min-desc{font-size:12px;color:var(--dim)}
.b-min-prog{width:100%;height:5px;background:var(--bd);border-radius:999px;margin-top:5px;overflow:hidden}
.b-min-prog-fill{height:100%;background:var(--accent-grad);transition:width .6s cubic-bezier(.2,.9,.3,1)}
.b-min-check{color:#22c55e;margin-left:4px}

.ach-unlock{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(6px)}
.ach-card{background:var(--card);border-radius:22px;padding:28px 24px;max-width:300px;text-align:center;box-shadow:0 25px 70px rgba(0,0,0,.3);position:relative;overflow:hidden}
.ach-shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.45) 50%,transparent 70%);animation:shine 1.4s forwards}
@keyframes shine{to{transform:translateX(200%) translateY(200%)}}

.count-up{display:inline-block}
.mood-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.mood-dot.studying{background:#3B82F6;box-shadow:0 0 8px rgba(59,130,246,.5)}
.mood-dot.chilling{background:#22C55E;box-shadow:0 0 8px rgba(34,197,94,.5)}
.mood-dot.busy{background:#EF4444;box-shadow:0 0 8px rgba(239,68,68,.5)}
.mood-dot.offline{background:var(--dim)}
.flash-note{background:var(--accent-grad);border-radius:14px;padding:16px;margin:8px 14px;color:#fff;position:relative;overflow:hidden}
.flash-timer{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.2);border-radius:8px;padding:2px 8px;font-size:11px;font-weight:600}

@keyframes pop{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes floatUp{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.post,.chc,.convo{animation:floatUp .25s ease forwards}
.like-pop{animation:likePop .35s ease forwards}
@keyframes likePop{0%{transform:scale(1)}40%{transform:scale(1.45)}100%{transform:scale(1)}}

.ni{transition:transform .15s ease}
.ni:active{transform:scale(0.96)}

.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:999px;background:var(--accent-grad);color:white;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 10px 25px rgba(79,70,229,.4);z-index:60;transition:transform .2s}
.fab:active{transform:scale(0.92)}

/* Big, obvious action buttons for students */
.action-row {
  display: flex;
  gap: 8px;
  padding: 8px 14px 4px;
}
.action-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: var(--hover);
  padding: 9px 8px;
  border-radius: 14px;
  font-weight: 600;
  font-size: 13.5px;
  cursor: pointer;
  transition: all .1s;
}
.action-btn:active {
  background: #ddd;
  transform: scale(0.98);
}

/* Instagram-style DM profile sheet */
.dm-profile-sheet {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.dm-profile-sheet .sheet-bg { position: absolute; inset: 0; background: rgba(0,0,0,.55); }
.dm-profile-content {
  position: relative;
  width: 100%;
  max-width: 620px;
  background: var(--card);
  border-radius: 22px 22px 0 0;
  padding-bottom: 16px;
  box-shadow: 0 -10px 40px rgba(0,0,0,.25);
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.dm-profile-header { padding: 16px; text-align: center; border-bottom: 1px solid var(--bd); }
.dm-profile-header .big-av { width: 86px; height: 86px; margin: 0 auto 8px; font-size: 32px; }
.dm-profile-actions { padding: 4px 14px; }
.dm-action {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 10px; border-radius: 14px; margin-bottom: 2px; font-weight: 600; cursor: pointer;
}
.dm-action:active { background: var(--hover); }
.dm-action.danger { color: var(--danger); }

.media-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  padding: 6px 14px;
}
.media-grid img, .media-grid video {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

/* Streak timer in DM header */
.streak-timer {
  font-size: 11px;
  font-weight: 700;
  color: #c2410f;
  background: #fef3c7;
  padding: 1px 6px;
  border-radius: 5px;
  margin-left: 5px;
  white-space: nowrap;
}

.streak-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 14px;
  background: linear-gradient(90deg, #fef3c7, #fefce8);
  border-bottom: 1px solid #fde047;
  color: #854d0e;
  font-size: 13px; font-weight: 600;
}
.streak-bar.dark {
  background: linear-gradient(90deg, #451a03, #78350f);
  color: #fcd34d;
  border-bottom-color: #451a03;
}

/* Better stories Add button */
.st.add-story .ring {
  border: 3px dashed var(--accent) !important;

}
.st.add-story .ring > div {

/* Small icon buttons */
.icon-btn {

  background: var(--hover); display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.icon-btn:active { transform: scale(0.9); }

  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60)+"m";
  if (diff < 86400) return Math.floor(diff/3600)+"h";

// ==================== YOUR ORIGINAL GAMIFICATION (KEPT) ====================
function getStreak(uid){
  try{return parseInt(localStorage.getItem("streak_"+uid)||"0",10);}catch(e){return 0;}
}
function updateStreak(uid){
  const today=new Date().toDateString();
  const last=localStorage.getItem("lastactive_"+uid)||"";
  if(last===today)return getStreak(uid);
  const yesterday=new Date(Date.now()-86400000).toDateString();
  let streak=getStreak(uid);
  if(last===yesterday){streak++;}else if(last!==today){streak=1;}
  localStorage.setItem("streak_"+uid,streak); localStorage.setItem("lastactive_"+uid,today);
  return streak;
}
function streakHTML(uid){
  const s=getStreak(uid); if(!s)return"";
  return '<span class="streak-badge"><span class="streak-flame">🔥</span> '+s+' day'+(s===1?"":"s")+'</span>';
}

// Per-DM Streak + Timer (NEW - safe addition)
function getDMStreak(a,b){
  const k=[a,b].sort().join("_");
  return parseInt(localStorage.getItem("dmstreak_"+k)||"0",10);
}
function updateDMStreak(a,b){
  const k=[a,b].sort().join("_");
  const today=new Date().toDateString();
  const last=localStorage.getItem("dm_last_"+k)||"";
  if(last===today) return getDMStreak(a,b);
  let s = getDMStreak(a,b);
  if(last === new Date(Date.now()-86400000).toDateString()) s++;
  else s=1;
  localStorage.setItem("dmstreak_"+k,s);
  localStorage.setItem("dm_last_"+k,today);
  return s;
}
function getStreakTimeLeft(a,b){
  const k=[a,b].sort().join("_");
  const last=localStorage.getItem("dm_last_"+k);
  if(!last) return null;
  const exp = new Date(new Date(last).getTime() + 86400000);
  const d = exp.getTime() - Date.now();
  if(d <= 0) return "ended";
  return Math.floor(d/(1000*60*60)) + "h " + Math.floor((d%(1000*60*60))/(1000*60)) + "m left";
}

function editNickname(pid){
  const u = getUser(pid);
  const cur = localStorage.getItem("nick_"+me.id+"_"+pid) || u.username;

  if(v){ localStorage.setItem("nick_"+me.id+"_"+pid, v); document.querySelector(".dm-profile-sheet")?.remove(); if(activeChat) showChat(activeChat); }

function toggleMute(pid){
  let m = JSON.parse(localStorage.getItem("muted_"+me.id)||"[]");
  m.includes(pid) ? m = m.filter(x=>x!==pid) : m.push(pid);
  localStorage.setItem("muted_"+me.id, JSON.stringify(m));
  document.querySelector(".dm-profile-sheet")?.remove();
  toast("Updated");
}
function toggleBlock(pid){
  if(!me.blocked) me.blocked=[];
  me.blocked.includes(pid) ? me.blocked = me.blocked.filter(x=>x!==pid) : me.blocked.push(pid);

  document.querySelector(".dm-profile-sheet")?.remove();

}

  const lk = p.likes.includes(me.id);

      <div class="action-btn" onclick="openPostDetail('${p.id}')">💬 ${(p.comments||[]).length||""}</div>

}
