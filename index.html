<!DOCTYPE html>
<!--
=================================================================================
 KOLIYA — SUPABASE SETUP SQL  (run this whole block in Supabase SQL Editor)
=================================================================================
-- Extensions
create extension if not exists "uuid-ossp";

-- PROFILES
create table if not exists profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  full_name text, username text unique, email text, student_card text, faculty text,
  bio text, avatar_url text, banner_url text, pronouns text, website text, github text, linkedin text,
  is_private boolean default false,
  status text default 'pending', role text default 'student',
  following text[] default '{}', followers text[] default '{}', blocked text[] default '{}',
  pinned_badges text[] default '{}', status_text text, exam_mode boolean default false,
  streak int default 0, last_streak_date date, streak_freeze int default 1,
  year text, "group" text, modules text, skills text, can_help_with text,
  last_seen timestamptz default now(), typing timestamptz,
  created_at timestamptz default now()
);

-- POSTS
create table if not exists posts (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid references profiles(id) on delete cascade,
  text text, image_url text, media jsonb, channel_id text, repost_id uuid, reply_to uuid,
  likes text[] default '{}', comments jsonb default '[]', saved text[] default '{}', helpful text[] default '{}',
  poll jsonb, anonymous boolean default false, pinned boolean default false, flash boolean default false,
  edited_at timestamptz, created_at timestamptz default now()
);

-- CHANNELS
create table if not exists channels (
  id uuid primary key default uuid_generate_v4(),
  name text, description text, icon text, color text, created_by uuid,
  members text[] default '{}', admins text[] default '{}', type text default 'public',
  post_permission text default 'all', muted text[] default '{}', created_at timestamptz default now()
);

-- MESSAGES
create table if not exists messages (
  id uuid primary key default uuid_generate_v4(),
  sender_id uuid, receiver_id uuid, text text, media jsonb, reactions jsonb default '{}',
  seen boolean default false, reply_to uuid, delivered_at timestamptz, seen_at timestamptz,
  edited_at timestamptz, deleted boolean default false, created_at timestamptz default now()
);

-- STORIES
create table if not exists stories (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid, media text, text text, close_friends boolean default false,
  views text[] default '{}', highlight boolean default false, created_at timestamptz default now()
);

-- EVENTS
create table if not exists events (
  id uuid primary key default uuid_generate_v4(),
  title text, description text, date timestamptz, location text, created_by uuid,
  going text[] default '{}', image_url text, created_at timestamptz default now()
);
create table if not exists event_messages (
  id uuid primary key default uuid_generate_v4(), event_id uuid, sender_id uuid, text text, media jsonb,
  created_at timestamptz default now()
);

-- Q&A
create table if not exists qa (
  id uuid primary key default uuid_generate_v4(), user_id uuid, text text, anonymous boolean default false,
  faculty text, answers jsonb default '[]', created_at timestamptz default now()
);

-- DM GROUPS
create table if not exists dm_groups (
  id uuid primary key default uuid_generate_v4(), name text, owner_id uuid,
  members text[] default '{}', admins text[] default '{}', created_at timestamptz default now()
);
create table if not exists dm_group_messages (
  id uuid primary key default uuid_generate_v4(), group_id uuid, sender_id uuid, text text, media jsonb,
  created_at timestamptz default now()
);

-- REQUESTS
create table if not exists follow_requests (
  id uuid primary key default uuid_generate_v4(), from_id uuid, to_id uuid, status text default 'pending',
  created_at timestamptz default now(), unique(from_id,to_id)
);
create table if not exists dm_requests (
  id uuid primary key default uuid_generate_v4(), from_id uuid, to_id uuid, text text, status text default 'pending',
  created_at timestamptz default now(), unique(from_id,to_id)
);

-- REPORTS
create table if not exists reports (
  id uuid primary key default uuid_generate_v4(), post_id uuid, post_text text, post_author_id uuid,
  reported_by uuid, reason text, status text default 'pending', created_at timestamptz default now()
);

-- RLS
alter table profiles enable row level security;
alter table posts enable row level security;
alter table channels enable row level security;
alter table messages enable row level security;
alter table stories enable row level security;
alter table events enable row level security;
alter table event_messages enable row level security;
alter table qa enable row level security;
alter table dm_groups enable row level security;
alter table dm_group_messages enable row level security;
alter table follow_requests enable row level security;
alter table dm_requests enable row level security;
alter table reports enable row level security;

create policy "profiles read" on profiles for select using (true);
create policy "profiles self upsert" on profiles for insert with check (auth.uid() = id);
create policy "profiles self update" on profiles for update using (auth.uid() = id or auth.uid() in (select id from profiles where role='admin'));

create policy "posts read" on posts for select using (true);
create policy "posts insert own" on posts for insert with check (auth.uid() = user_id);
create policy "posts update own" on posts for update using (auth.uid() = user_id);
create policy "posts delete own" on posts for delete using (auth.uid() = user_id);

create policy "channels read" on channels for select using (true);
create policy "channels insert" on channels for insert with check (auth.uid() is not null);
create policy "channels update admin" on channels for update using (auth.uid() = created_by or auth.uid() = any(admins));

create policy "messages participants read" on messages for select using (auth.uid() = sender_id or auth.uid() = receiver_id);
create policy "messages insert self" on messages for insert with check (auth.uid() = sender_id);
create policy "messages update participants" on messages for update using (auth.uid() = sender_id or auth.uid() = receiver_id);

create policy "stories read" on stories for select using (true);
create policy "stories insert own" on stories for insert with check (auth.uid() = user_id);
create policy "stories update own" on stories for update using (auth.uid() = user_id);

create policy "events read" on events for select using (true);
create policy "events insert" on events for insert with check (auth.uid() is not null);
create policy "events update creator" on events for update using (auth.uid() = created_by);

create policy "event_messages read" on event_messages for select using (true);
create policy "event_messages insert" on event_messages for insert with check (auth.uid() is not null);

create policy "qa read" on qa for select using (true);
create policy "qa insert" on qa for insert with check (auth.uid() is not null);
create policy "qa update" on qa for update using (true);

create policy "dm_groups member read" on dm_groups for select using (auth.uid() = any(members) or auth.uid() = owner_id);
create policy "dm_groups insert" on dm_groups for insert with check (auth.uid() = owner_id);
create policy "dm_groups update" on dm_groups for update using (auth.uid() = owner_id or auth.uid() = any(admins));

create policy "dm_group_messages read" on dm_group_messages for select using (
  exists (select 1 from dm_groups g where g.id = group_id and (auth.uid() = any(g.members) or auth.uid() = g.owner_id))
);
create policy "dm_group_messages insert" on dm_group_messages for insert with check (auth.uid() = sender_id);

create policy "follow_requests read" on follow_requests for select using (auth.uid() = from_id or auth.uid() = to_id);
create policy "follow_requests insert" on follow_requests for insert with check (auth.uid() = from_id);
create policy "follow_requests update" on follow_requests for update using (auth.uid() = to_id or auth.uid() = from_id);

create policy "dm_requests read" on dm_requests for select using (auth.uid() = from_id or auth.uid() = to_id);
create policy "dm_requests insert" on dm_requests for insert with check (auth.uid() = from_id);
create policy "dm_requests update" on dm_requests for update using (auth.uid() = to_id or auth.uid() = from_id);

create policy "reports insert" on reports for insert with check (auth.uid() is not null);
create policy "reports read" on reports for select using (auth.uid() = reported_by or auth.uid() in (select id from profiles where role='admin'));
create policy "reports update admin" on reports for update using (auth.uid() in (select id from profiles where role='admin'));

=================================================================================

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Koliya — the private, student-verified social network</title>
<meta name="theme-color" content="#4F46E5">
<meta name="description" content="Koliya — the private, student-verified social network.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --accent:#4F46E5; --accent-h:#4338CA; --accent-lt:#EEF2FF;
  --accent-grad:linear-gradient(135deg,#667eea,#764ba2);
  --premium-grad:linear-gradient(135deg,#4F46E5 0%,#7C3AED 48%,#EC4899 100%);
  --danger:#EF4444; --like:#F43F5E; --ok:#22C55E;
  --bg:#fff; --card:#fff; --card2:#fafafa; --hover:#F5F5F5; --txt:#111; --dim:#888; --bd:#eee; --nav:rgba(255,255,255,.92);
  --r-card:22px; --r-btn:14px; --r-pill:999px;
  --sh-sm:0 1px 3px rgba(0,0,0,.08); --sh-md:0 4px 20px rgba(0,0,0,.08); --sh-lg:0 8px 40px rgba(0,0,0,.12);
  --ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#080808; --card:#141414; --card2:#111827; --hover:#1e1e1e; --txt:#f0f0f0; --dim:#8b8b8b; --bd:#252525; --nav:rgba(8,8,8,.85);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);transition:background .25s var(--ease),color .25s var(--ease);}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;color:var(--txt);background:var(--card2);border:1px solid var(--bd);border-radius:var(--r-btn);padding:11px 14px;outline:none;transition:border .2s var(--ease);width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
::placeholder{color:var(--dim);}
.hidden{display:none!important;}
.flex{display:flex;} .col{flex-direction:column;} .center{align-items:center;justify-content:center;} .between{justify-content:space-between;} .gap8{gap:8px;} .gap12{gap:12px;} .gap4{gap:4px;} .wrap{flex-wrap:wrap;}
.dim{color:var(--dim);}
.grow{flex:1;}

/* buttons */
.btn{border:none;border-radius:var(--r-pill);padding:11px 20px;font-weight:700;font-size:14.5px;transition:.2s var(--ease);display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--accent-grad);color:#fff;box-shadow:var(--sh-sm);}
.btn-primary:hover{filter:brightness(1.07);}
.btn-ghost{background:var(--hover);color:var(--txt);}
.btn-outline{background:transparent;color:var(--txt);border:1.5px solid var(--bd);}
.btn-danger{background:var(--danger);color:#fff;}
.btn:disabled{opacity:.55;pointer-events:none;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:transparent;border:none;display:flex;align-items:center;justify-content:center;color:var(--txt);transition:.2s;}
.icon-btn:hover{background:var(--hover);}
svg{display:block;}

/* pill tabs */
.tabs-row{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;}
.tab-pill{flex-shrink:0;padding:9px 18px;border-radius:999px;background:var(--hover);color:var(--dim);font-weight:700;font-size:13.5px;border:none;transition:.25s var(--ease);position:relative;}
.tab-pill.active{background:var(--accent-grad);color:#fff;box-shadow:0 3px 14px rgba(79,70,229,.35);}

/* cards */
.card{background:var(--card);border-radius:var(--r-card);box-shadow:var(--sh-sm);border:1px solid var(--bd);position:relative;overflow:hidden;}
.card-accent::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--premium-grad);}
.hero{position:relative;overflow:hidden;border-radius:24px;background:var(--premium-grad);color:#fff;padding:28px 24px;}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.14);}
.hero::before{width:180px;height:180px;top:-80px;right:-60px;}
.hero::after{width:120px;height:120px;bottom:-60px;left:10%;}

/* avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;background:var(--accent-grad);overflow:hidden;position:relative;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.dot-online{position:absolute;bottom:0;right:0;width:28%;height:28%;min-width:9px;min-height:9px;background:var(--ok);border-radius:50%;border:2px solid var(--card);}

/* empty state */
.empty-state{border:1.5px dashed var(--bd);border-radius:20px;padding:40px 20px;text-align:center;color:var(--dim);}
.empty-state svg{margin:0 auto 12px;opacity:.5;}
.empty-state h3{color:var(--txt);margin:0 0 4px;font-size:16px;}

/* toast */
#toastHost{position:fixed;bottom:26px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:9999;pointer-events:none;}
.toast{pointer-events:auto;background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-lg);display:flex;align-items:center;gap:8px;animation:toastIn .25s var(--ease);max-width:90vw;}
[data-theme="light"] .toast{background:#111;}
.toast.ok{background:var(--ok);} .toast.e{background:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* modal */
#modalHost{position:fixed;inset:0;z-index:9998;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);opacity:0;transition:.25s var(--ease);}
.modal-box{position:relative;background:var(--card);border-radius:24px;max-width:480px;width:92vw;max-height:88vh;overflow-y:auto;box-shadow:var(--sh-lg);transform:translateY(16px) scale(.97);opacity:0;transition:.25s var(--ease);}
#modalHost.open{pointer-events:auto;}
#modalHost.open .modal-backdrop{opacity:1;}
#modalHost.open .modal-box{transform:translateY(0) scale(1);opacity:1;}
.modal-sheet .modal-box{position:absolute;bottom:0;left:0;right:0;width:100%;max-width:600px;margin:0 auto;border-radius:24px 24px 0 0;transform:translateY(100%);max-height:92vh;}
#modalHost.modal-sheet.open .modal-box{transform:translateY(0);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 8px;position:sticky;top:0;background:var(--card);z-index:2;}
.modal-head h3{margin:0;font-size:17px;}
.modal-body{padding:8px 18px 20px;}

/* skeleton */
.skel{background:linear-gradient(90deg,var(--hover) 25%,var(--bd) 37%,var(--hover) 63%);background-size:400% 100%;animation:skel 1.4s ease infinite;border-radius:10px;}
@keyframes skel{0%{background-position:100% 50%}100%{background-position:0 50%}}

/* app shell */
#appRoot{display:none;min-height:100vh;}
#sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--bd);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:width .25s var(--ease);}
#sidebar.folded{width:76px;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 22px;font-weight:900;font-size:21px;}
.brand .logo{width:36px;height:36px;border-radius:11px;background:var(--premium-grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:14px;font-weight:700;color:var(--txt);margin-bottom:2px;transition:.2s;position:relative;}
.nav-item:hover{background:var(--hover);}
.nav-item.active{background:var(--accent-lt);color:var(--accent);}
[data-theme="dark"] .nav-item.active{background:rgba(79,70,229,.18);color:#a5b4fc;}
.nav-item .badge{margin-left:auto;background:var(--like);color:#fff;font-size:11px;font-weight:800;border-radius:999px;padding:1px 7px;}
#sidebar.folded .nav-label,#sidebar.folded .brand-text{display:none;}
#mainWrap{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{display:none;position:sticky;top:0;z-index:50;background:var(--nav);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:12px 16px;align-items:center;justify-content:space-between;}
#mainView{flex:1;width:100%;}
.feed-wrap{max-width:600px;margin:0 auto;min-height:100vh;border-left:1px solid var(--bd);border-right:1px solid var(--bd);}
#bottomNav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--nav);backdrop-filter:blur(14px);border-top:1px solid var(--bd);z-index:60;padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;color:var(--dim);font-size:10.5px;font-weight:700;position:relative;}
.bn-item.active{color:var(--accent);}

@media (max-width:560px){
  #sidebar{display:none;}
  #topbar{display:flex;}
  #bottomNav{display:flex;}
  #mainView{padding-bottom:70px;}
  .feed-wrap{border:none;}
}
@media (min-width:561px){
  #appRoot{display:flex;}
  .feed-wrap{padding:0 0 40px;}
}

/* sticky headers */
.view-head{position:sticky;top:0;z-index:20;background:var(--nav);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:14px 18px;}
.view-head h2{margin:0;font-size:19px;font-weight:800;}

/* posts */
.post-row{border-bottom:1px solid var(--bd);padding:14px 18px;transition:.2s;}
.post-row:hover{background:var(--hover);}
.post-head{display:flex;gap:10px;}
.post-body{margin-left:50px;}
.post-text{white-space:pre-wrap;word-break:break-word;line-height:1.45;font-size:15px;}
.post-media{border-radius:16px;margin-top:8px;overflow:hidden;max-height:460px;background:var(--hover);}
.post-media img,.post-media video{width:100%;max-height:460px;object-fit:cover;display:block;}
.post-actions{display:flex;gap:22px;margin-top:10px;color:var(--dim);}
.post-act-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--dim);background:transparent;border:none;transition:.2s;}
.post-act-btn:hover{color:var(--accent);}
.post-act-btn.liked{color:var(--like);}
.post-act-btn.saved{color:var(--accent);}
.mention,.hashtag{color:var(--accent);font-weight:700;}
.heart-pop{position:absolute;font-size:60px;pointer-events:none;animation:heartpop .8s var(--ease) forwards;}
@keyframes heartpop{0%{transform:scale(0);opacity:0;}25%{transform:scale(1.2);opacity:1;}45%{transform:scale(.95);}100%{transform:scale(1);opacity:0;}}

/* story rail */
.story-rail{display:flex;gap:14px;padding:14px 18px;overflow-x:auto;border-bottom:1px solid var(--bd);}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;width:66px;}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2.5px;background:var(--premium-grad);}
.story-ring.seen{background:var(--bd);}
.story-ring .avatar{width:100%;height:100%;border:2.5px solid var(--card);}
.story-item span{font-size:11px;font-weight:600;color:var(--dim);max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* chat */
.dm-wrap{display:flex;height:calc(100vh - 0px);}
.conv-list{width:340px;flex-shrink:0;border-right:1px solid var(--bd);overflow-y:auto;}
.conv-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bd);align-items:center;transition:.2s;position:relative;}
.conv-item:hover,.conv-item.active{background:var(--hover);}
.conv-name{font-weight:700;font-size:14.5px;}
.conv-preview{font-size:12.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.conv-unread{background:var(--accent);color:#fff;font-size:10.5px;font-weight:800;border-radius:999px;min-width:19px;height:19px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.chat-pane{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-head{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--bd);}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:3px;}
.bubble-row{display:flex;max-width:75%;margin-bottom:6px;}
.bubble-row.me{align-self:flex-end;flex-direction:row-reverse;}
.bubble{padding:9px 13px;border-radius:18px;font-size:14.5px;line-height:1.4;position:relative;background:var(--hover);color:var(--txt);word-break:break-word;}
.bubble-row.me .bubble{background:var(--accent-grad);color:#fff;}
.bubble-meta{font-size:10px;color:var(--dim);margin-top:3px;display:flex;gap:4px;align-items:center;}
.bubble-row.me .bubble-meta{justify-content:flex-end;}
.chat-input-bar{display:flex;gap:8px;align-items:flex-end;padding:12px 16px;border-top:1px solid var(--bd);}
.chat-input-bar textarea{resize:none;max-height:120px;border-radius:20px;}
.reply-preview{background:var(--hover);border-left:3px solid var(--accent);border-radius:8px;padding:6px 10px;font-size:12.5px;margin-bottom:6px;}
.typing-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--dim);margin-right:2px;animation:typingBounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;} .typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}
.folder-row{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--bd);}
@media (max-width:560px){
  .dm-wrap{height:auto;}
  .conv-list{width:100%;border-right:none;}
  .conv-list.chat-open{display:none;}
  .chat-pane.hidden-mobile{display:none;}
}

/* leaderboard */
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bd);}
.lb-rank{width:28px;text-align:center;font-weight:900;color:var(--dim);}
.lb-bar-wrap{flex:1;height:8px;background:var(--hover);border-radius:99px;overflow:hidden;margin-top:4px;}
.lb-bar{height:100%;background:var(--accent-grad);border-radius:99px;transition:width 1s var(--ease);width:0;}
.podium{display:flex;align-items:flex-end;gap:10px;padding:20px 16px 8px;justify-content:center;}
.podium .p-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.podium .p-bar{width:76px;border-radius:14px 14px 0 0;background:var(--accent-grad);display:flex;align-items:flex-start;justify-content:center;padding-top:8px;color:#fff;font-weight:800;}

/* badges */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.badge-card{background:var(--card2);border-radius:18px;padding:16px 10px;text-align:center;border:1px solid var(--bd);transition:.2s;}
.badge-card.locked{opacity:.35;filter:grayscale(1);}
.badge-icon{width:52px;height:52px;border-radius:16px;background:var(--premium-grad);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:#fff;}
.badge-name{font-size:12px;font-weight:700;}

/* profile */
.profile-cover{height:150px;border-radius:0 0 24px 24px;position:relative;background:var(--accent-grad);}
.profile-top{padding:0 18px;margin-top:-42px;display:flex;align-items:flex-end;justify-content:space-between;}
.stat-row{display:flex;gap:22px;padding:14px 18px;}
.stat-item{display:flex;flex-direction:column;}
.stat-item b{font-size:17px;}
.stat-item span{font-size:12px;color:var(--dim);}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.grid3 .cell{aspect-ratio:1;background:var(--hover);overflow:hidden;}
.grid3 .cell img,.grid3 .cell video{width:100%;height:100%;object-fit:cover;}

/* auth */
#authRoot{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{width:100%;max-width:410px;}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:26px;}
.auth-logo .logo{width:46px;height:46px;border-radius:14px;background:var(--premium-grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:22px;}
.auth-logo b{font-size:24px;font-weight:900;}
.field{margin-bottom:12px;}
.field label{font-size:12.5px;font-weight:700;color:var(--dim);display:block;margin-bottom:5px;}
.auth-error{background:rgba(239,68,68,.1);color:var(--danger);padding:10px 14px;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:12px;}
.link-btn{background:none;border:none;color:var(--accent);font-weight:700;font-size:13px;padding:0;}

.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-dark{border:2px solid rgba(0,0,0,.15);border-top-color:var(--accent);width:22px;height:22px;animation:spin .7s linear infinite;}

.section-title{font-weight:800;font-size:14px;padding:16px 18px 6px;color:var(--dim);text-transform:uppercase;letter-spacing:.03em;}
.settings-item{display:flex;align-items:center;justify-content:between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--bd);}
.switch{width:44px;height:26px;border-radius:99px;background:var(--bd);position:relative;transition:.25s;flex-shrink:0;}
.switch.on{background:var(--accent);}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.25s var(--ease);box-shadow:var(--sh-sm);}
.switch.on::after{transform:translateX(18px);}

.fade-up{animation:fadeUp .35s var(--ease);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>

/* =========================================================================
   UTILITIES
   ========================================================================= */
function $(s,el){return (el||document).querySelector(s);}
function $all(s,el){return Array.from((el||document).querySelectorAll(s));}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function uid(){return 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36);}
function timeAgo(d){
  const s=(Date.now()-new Date(d).getTime())/1000;
  if(s<60)return 'now';
  if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';
  if(s<604800)return Math.floor(s/86400)+'d';
  return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function richText(t){
  if(!t)return '';
  let s = esc(t);
  s = s.replace(/(^|\s)@([a-zA-Z0-9._]+)/g,'$1<span class="mention" onclick="event.stopPropagation();openUserByUsername(\'$2\')">@$2</span>');
  s = s.replace(/(^|\s)#([a-zA-Z0-9_]+)/g,'$1<span class="hashtag" onclick="event.stopPropagation();searchHashtag(\'$2\')">#$2</span>');
  return s;
}
const AV_COLORS=['#4F46E5','#7C3AED','#EC4899','#F43F5E','#F59E0B','#22C55E','#06B6D4','#8B5CF6','#0EA5E9'];
function avColor(seed){let h=0;for(let i=0;i<(seed||'').length;i++)h=(h*31+seed.charCodeAt(i))>>>0;return AV_COLORS[h%AV_COLORS.length];}
function initials(name){if(!name)return '?';return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function avatarHTML(p,size){
  size=size||40;
  const url=p&&p.avatar_url;
  const online = p && isOnline(p);
  const style=`width:${size}px;height:${size}px;font-size:${size*0.38}px;background:${url?'transparent':avColor(p&&(p.username||p.id)||'?')}`;
  return `<div class="avatar" style="${style}">${url?`<img src="${esc(url)}" alt="">`:esc(initials(p&&p.full_name||''))}${online?'<span class="dot-online"></span>':''}</div>`;
}
function isOnline(p){ if(!p||!p.last_seen) return false; return (Date.now()-new Date(p.last_seen).getTime())<30000; }
function getProfile(id){ return S.profiles.get(id) || {id,full_name:'Unknown',username:'unknown'}; }
function displayName(p){ return p.full_name || p.username || 'Student'; }

function toast(msg,type){
  const host=$('#toastHost');
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  host.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(8px)';t.style.transition='.25s';setTimeout(()=>t.remove(),260);},2400);
}

function openModal(html,opts){
  opts=opts||{};
  const host=$('#modalHost');
  host.className = opts.sheet ? 'modal-sheet' : '';
  host.innerHTML = `<div class="modal-backdrop" onclick="closeModal()"></div><div class="modal-box" role="dialog">${html}</div>`;
  requestAnimationFrame(()=>host.classList.add('open'));
  document.body.style.overflow='hidden';
}
function closeModal(){
  const host=$('#modalHost');
  host.classList.remove('open');
  document.body.style.overflow='';
  setTimeout(()=>{host.innerHTML='';},220);
}
function modalHead(title){
  return `<div class="modal-head"><h3>${esc(title)}</h3><button class="icon-btn" aria-label="Close" onclick="closeModal()">${svg('close')}</button></div>`;
}

function emptyState(icon,title,sub,cta){
  return `<div class="empty-state fade-up">${icon||''}<h3>${esc(title)}</h3><p style="margin:0 0 14px;font-size:13.5px;">${esc(sub||'')}</p>${cta||''}</div>`;
}
function skeletonPost(){
  return `<div class="post-row"><div class="post-head"><div class="skel" style="width:42px;height:42px;border-radius:50%;"></div><div style="flex:1"><div class="skel" style="width:40%;height:12px;margin-bottom:8px;"></div><div class="skel" style="width:90%;height:12px;margin-bottom:6px;"></div><div class="skel" style="width:70%;height:12px;"></div></div></div></div>`;
}

/* theme */
function applyTheme(){
  let t=S.theme;
  if(t==='auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light';
  document.body.setAttribute('data-theme',t);
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{ if(S.theme==='auto')applyTheme(); });
applyTheme();

/* =========================================================================
   AUTH — bulletproof session restore + self-healing profile
   ========================================================================= */
async function restoreSession(){
  if(!CONFIGURED){ renderConfigWarning(); return; }
  let session=null;
  for(let i=0;i<6;i++){
    try{
      const {data} = await sb.auth.getSession();
      if(data && data.session){ session=data.session; break; }
    }catch(e){ console.warn('getSession attempt failed',e); }
    await sleep(400);
  }
  if(session && session.user){ await onAuthed(session.user); }
  else { renderAuth('login'); }

  sb.auth.onAuthStateChange((event,sess)=>{
    if(event==='SIGNED_IN' && sess && sess.user){ onAuthed(sess.user); }
    if(event==='SIGNED_OUT'){ S.user=null; S.profile=null; renderAuth('login'); }
  });
}

function mapAuthError(err){
  const m=((err&&err.message)||'').toLowerCase();
  if(m.includes('invalid login')||m.includes('invalid credentials')) return 'Wrong email or password.';
  if(m.includes('email not confirmed')) return 'Email not confirmed yet — check your inbox, or resend it below.';
  if(m.includes('rate limit')||m.includes('too many')) return 'Too many attempts — wait a moment.';
  if(m.includes('network')||m.includes('fetch')) return 'Network problem. Check your connection and retry.';
  return (err&&err.message) || 'Something went wrong. Please try again.';
}

async function onAuthed(user){
  try{
    S.user=user;
    let profile=null;
    try{
      const {data} = await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
      profile=data;
    }catch(e){ console.warn('profile fetch failed',e); }
    if(!profile){
      const meta=user.user_metadata||{};
      const upsertObj={
        id:user.id, full_name:meta.full_name||'Student', username:meta.username||('user'+user.id.slice(0,6)),
        email:user.email, student_card:meta.student_card||'', faculty:meta.faculty||'',
        status:'pending', role:'student', following:[], followers:[], blocked:[]
      };
      try{
        const {data:np} = await sb.from('profiles').upsert(upsertObj).select().maybeSingle();
        profile = np || upsertObj;
      }catch(e){ console.warn('profile self-heal failed',e); profile=upsertObj; }
    }
    S.profile=profile;
    if(profile.status==='pending') return renderAuth('pending');
    if(profile.status==='rejected') return renderAuth('rejected');
    if(profile.status==='banned') return renderAuth('banned');
    await enterApp();
  }catch(err){
    console.error('onAuthed failed',err);
    toast('Loading your account failed — retrying','e');
    setTimeout(()=>onAuthed(user),1500);
  }
}

    btn.disabled=false; btn.textContent='Sign in';

async function doSignup(fields,btn){
  const {full_name,username,student_card,faculty,email,password}=fields;
  if(!full_name||!username||!student_card||!faculty||!email||!password){ showAuthErr('Please fill in every field.'); return; }
  if(!/^[a-zA-Z0-9._]+$/.test(username)){ showAuthErr('Username may only contain letters, numbers, dots and underscores.'); return; }
  if(!/^[^\s@]+@gmail\.com$/i.test(email)){ showAuthErr('Please use a valid @gmail.com address.'); return; }
  if(password.length<6){ showAuthErr('Password must be at least 6 characters.'); return; }
  try{
    btn.disabled=true; btn.innerHTML='<span class="spin"></span> Creating account…';
    const {data,error} = await sb.auth.signUp({email,password,options:{data:{full_name,username,student_card,faculty}}});
    if(error) throw error;
    if(data.user){
      try{
        await sb.from('profiles').upsert({id:data.user.id,full_name,username,student_card,faculty,email,status:'pending',role:'student',following:[],followers:[],blocked:[]});
      }catch(e){ console.warn(e); }
    }
    renderAuth('pending');
  }catch(err){
    showAuthErr(mapAuthError(err));
    btn.disabled=false; btn.textContent='Create account';
  }
}

  const b=$('#authErrBox');
  if(b){ b.style.display='block'; b.textContent=msg; }

/* =========================================================================
   DATA LOADING — Promise.allSettled so one failing table never wipes others
   ========================================================================= */
async function loadAllData(){
  const results = await Promise.allSettled([
    sb.from('profiles').select('*'),
    sb.from('posts').select('*').order('created_at',{ascending:false}).limit(200),
    sb.from('channels').select('*'),
    sb.from('messages').select('*').or(`sender_id.eq.${S.user.id},receiver_id.eq.${S.user.id}`).order('created_at',{ascending:true}),
    sb.from('stories').select('*').order('created_at',{ascending:false}),
    sb.from('events').select('*').order('date',{ascending:true}),
    sb.from('qa').select('*').order('created_at',{ascending:false}),
    sb.from('dm_groups').select('*'),
    sb.from('follow_requests').select('*'),
    sb.from('dm_requests').select('*'),
  ]);
  const [pr,po,ch,ms,st,ev,qa,dg,fr,dr] = results;
  if(pr.status==='fulfilled' && pr.value.data){ S.profiles=new Map(pr.value.data.map(p=>[p.id,p])); S.profile = S.profiles.get(S.user.id) || S.profile; }
  if(po.status==='fulfilled' && po.value.data) S.posts=po.value.data;
  if(ch.status==='fulfilled' && ch.value.data) S.channels=ch.value.data;
  if(ms.status==='fulfilled' && ms.value.data) S.messages=ms.value.data;
  if(st.status==='fulfilled' && st.value.data) S.stories=st.value.data;
  if(ev.status==='fulfilled' && ev.value.data) S.events=ev.value.data;
  if(qa.status==='fulfilled' && qa.value.data) S.qas=qa.value.data;
  if(dg.status==='fulfilled' && dg.value.data) S.dmGroups=dg.value.data;
  if(fr.status==='fulfilled' && fr.value.data) S.followReqs=fr.value.data;
  if(dr.status==='fulfilled' && dr.value.data) S.dmReqs=dr.value.data;
  results.forEach(r=>{ if(r.status==='rejected') console.warn('optional table load failed',r.reason); });
}

/* =========================================================================
   REALTIME
   ========================================================================= */
function initRealtime(){
  try{
    sb.channel('rt-messages')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>handleNewMessage(p.new))
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},p=>handleUpdateMessage(p.new))
      .subscribe(status=>{ S.realtimeOK = status==='SUBSCRIBED'; });
    sb.channel('rt-posts')
      .on('postgres_changes',{event:'*',schema:'public',table:'posts'},p=>handlePostChange(p))
      .subscribe();
    sb.channel('rt-profiles')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},p=>handleProfileChange(p.new))
      .subscribe();
    sb.channel('rt-follow_requests')
      .on('postgres_changes',{event:'*',schema:'public',table:'follow_requests'},p=>handleFollowReqChange(p))
      .subscribe();
    sb.channel('rt-dm_requests')
      .on('postgres_changes',{event:'*',schema:'public',table:'dm_requests'},p=>handleDmReqChange(p))
      .subscribe();
    sb.channel('rt-dmgroupmsgs')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'dm_group_messages'},p=>handleGroupMessage(p.new))
      .subscribe();
  }catch(e){ console.warn('realtime init failed, relying on polling',e); }
}
function startPolling(){
  setInterval(async ()=>{
    if(!S.user) return;
    try{
      const {data:msgs} = await sb.from('messages').select('*').or(`sender_id.eq.${S.user.id},receiver_id.eq.${S.user.id}`).order('created_at',{ascending:true});
      if(msgs){ S.messages=msgs; if(S.view==='messages') renderMain(); }
      const {data:posts} = await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(200);
      if(posts){ S.posts=posts; if(S.view==='home') renderMain(); }
    }catch(e){ /* silent — offline tolerant */ }
  },7000);
}
function handleNewMessage(m){
  if(m.sender_id!==S.user.id && m.receiver_id!==S.user.id) return;
  if(!S.messages.find(x=>x.id===m.id)) S.messages.push(m);
  const peer = m.sender_id===S.user.id ? m.receiver_id : m.sender_id;
  const chatOpen = S.view==='messages' && S.activeChatType==='dm' && S.activeChat===peer && document.hasFocus();
  if(chatOpen){
    if(m.receiver_id===S.user.id) markSeen(m.id);
    renderMain();
  } else {
    if(m.receiver_id===S.user.id){
      notifyIncoming(getProfile(m.sender_id), m.text || '📎 Attachment');
    }
    if(S.view==='messages') renderMain();
  }
}
function handleUpdateMessage(m){
  const i=S.messages.findIndex(x=>x.id===m.id);
  if(i>-1) S.messages[i]=m; else S.messages.push(m);
  if(S.view==='messages') renderMain();
}
function handlePostChange(p){
  if(p.eventType==='INSERT'){ if(!S.posts.find(x=>x.id===p.new.id)) S.posts.unshift(p.new); }
  else if(p.eventType==='UPDATE'){ const i=S.posts.findIndex(x=>x.id===p.new.id); if(i>-1) S.posts[i]=p.new; }
  else if(p.eventType==='DELETE'){ S.posts=S.posts.filter(x=>x.id!==p.old.id); }
  if(S.view==='home'||S.view==='profile') renderMain();
}
function handleProfileChange(p){
  S.profiles.set(p.id,p);
  if(p.id===S.user.id) S.profile=p;
  if(S.view==='messages') updateTypingUI();
}
function handleFollowReqChange(p){
  loadFollowReqs();
}
function handleDmReqChange(p){
  loadDmReqs();
}
function handleGroupMessage(m){
  toast('New group message','ok');
  if(S.view==='messages') renderMain();
}
async function loadFollowReqs(){ try{ const {data}=await sb.from('follow_requests').select('*'); if(data) S.followReqs=data; renderShellBadges(); }catch(e){} }
async function loadDmReqs(){ try{ const {data}=await sb.from('dm_requests').select('*'); if(data) S.dmReqs=data; renderShellBadges(); if(S.view==='messages')renderMain(); }catch(e){} }

function notifyIncoming(sender,text){
  playBeep();
  toast(`${displayName(sender)}: ${text.slice(0,40)}`);
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification(displayName(sender), {body:text, icon:'icon.svg'}); }catch(e){}
  }
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine'; o.frequency.value=880; g.gain.value=0.08;
    o.connect(g); g.connect(ctx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
    o.stop(ctx.currentTime+0.36);
  }catch(e){}
}

/* =========================================================================
   MEDIA UPLOAD / COMPRESSION
   ========================================================================= */
async function compressImage(file,maxDim){
  maxDim=maxDim||1080;
  return new Promise((resolve)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>{ img.onload=()=>{
      let {width,height}=img;
      if(width>height && width>maxDim){ height=height*maxDim/width; width=maxDim; }
      else if(height>maxDim){ width=width*maxDim/height; height=maxDim; }
      const canvas=document.createElement('canvas'); canvas.width=width; canvas.height=height;
      const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,width,height);
      canvas.toBlob(blob=>resolve(blob), 'image/jpeg', 0.82);
    }; img.src=e.target.result; };
    reader.readAsDataURL(file);
  });
}
async function uploadToStorage(blob,pathPrefix,ext){
  const path = `${pathPrefix}/${S.user.id}/${Date.now()}.${ext}`;
  const {data,error} = await sb.storage.from('media').upload(path, blob, {upsert:true});
  if(error) throw error;
  const {data:pub} = sb.storage.from('media').getPublicUrl(path);
  return pub.publicUrl;
}
async function handleMediaFile(file){
  if(!file) return null;
  const isImg=file.type.startsWith('image/'), isVid=file.type.startsWith('video/');
  if(isImg && file.size>10*1024*1024) toast('Compressing large image…');
  if(isVid && file.size>30*1024*1024){ toast('Video too large (max 30MB).','e'); return null; }
  try{
    if(isImg){
      const blob=await compressImage(file,1080);
      const url=await uploadToStorage(blob,'images','jpg');
      return {type:'image',url};
    } else if(isVid){
      const url=await uploadToStorage(file,'videos', (file.name.split('.').pop()||'mp4'));
      return {type:'video',url};
    } else {
      const url=await uploadToStorage(file,'files', (file.name.split('.').pop()||'bin'));
      return {type:'file',url,name:file.name};
    }
  }catch(e){ console.error(e); toast('Upload failed — check your Storage bucket "media" exists.','e'); return null; }
}

function computeScore(p){
  const posts=S.posts.filter(x=>x.user_id===p.id);
  const likes=posts.reduce((a,x)=>a+((x.likes||[]).length),0);
  const comments=posts.reduce((a,x)=>a+((x.comments||[]).length),0);
  const helpful=posts.reduce((a,x)=>a+((x.helpful||[]).length),0);
  const followers=(p.followers||[]).length;
  const streak=p.streak||0;
  return streak*3 + posts.length*5 + likes*1 + comments*2 + helpful*6 + followers*1;
}

async function bumpStreak(){
  const today=new Date().toISOString().slice(0,10);

  const newStreak = S.profile.last_streak_date===yesterday ? (S.profile.streak||0)+1 : 1;
  S.profile.streak=newStreak; S.profile.last_streak_date=today;
  try{ await sb.from('profiles').update({streak:newStreak,last_streak_date:today}).eq('id',S.user.id); }catch(e){}

  {id:'first_post',name:'First Post',test:p=>S.posts.some(x=>x.user_id===p.id)},

  {id:'helpful',name:'Helpful',test:p=>S.posts.filter(x=>x.user_id===p.id).reduce((a,x)=>a+((x.helpful||[]).length),0)>=5},
  {id:'resource',name:'Resource Provider',test:p=>S.posts.filter(x=>x.user_id===p.id && x.media && x.media.type==='file').length>=5},
  {id:'storyteller',name:'Storyteller',test:p=>S.stories.filter(s=>s.user_id===p.id).length>=3},

  {id:'scholar',name:'Scholar',test:p=>S.posts.filter(x=>x.user_id===p.id).length>=20},
];
function earnedBadges(p){ return BADGES.filter(b=>b.test(p)); }
function checkBadges(){
  const earned=earnedBadges(S.profile).map(b=>b.id);

function searchKeyNav(e){
  const items=$all('#searchResults .conv-item');
  let idx=items.findIndex(i=>i.classList.contains('active'));
  if(e.key==='ArrowDown'){ e.preventDefault(); if(idx>-1)items[idx].classList.remove('active'); idx=Math.min(idx+1,items.length-1); items[idx]&&items[idx].classList.add('active'); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(idx>-1)items[idx].classList.remove('active'); idx=Math.max(idx-1,0); items[idx]&&items[idx].classList.add('active'); }
  else if(e.key==='Enter'){ if(idx>-1) items[idx].click(); }
}

async function followUser(targetId){
  const target=getProfile(targetId);
  if(target.is_private){
    try{ await sb.from('follow_requests').upsert({from_id:S.user.id,to_id:targetId,status:'pending'}); toast('Follow request sent','ok'); }catch(e){ toast('Could not send request','e'); }
    return;
  }
  S.profile.following=[...new Set([...(S.profile.following||[]),targetId])];
  target.followers=[...new Set([...(target.followers||[]),S.user.id])];
  renderMain();
  try{
    await sb.from('profiles').update({following:S.profile.following}).eq('id',S.user.id);
    await sb.from('profiles').update({followers:target.followers}).eq('id',targetId);
  }catch(e){ toast('Follow failed to save','e'); }
}
async function unfollowUser(targetId){
  const target=getProfile(targetId);
  S.profile.following=(S.profile.following||[]).filter(x=>x!==targetId);
  target.followers=(target.followers||[]).filter(x=>x!==S.user.id);
  renderMain();
  try{
    await sb.from('profiles').update({following:S.profile.following}).eq('id',S.user.id);
    await sb.from('profiles').update({followers:target.followers}).eq('id',targetId);
  }catch(e){}
}
async function acceptFollowReq(reqId,fromId){
  try{ await sb.from('follow_requests').update({status:'accepted'}).eq('id',reqId); }catch(e){}
  const target=getProfile(fromId);
  target.following=[...new Set([...(target.following||[]),S.user.id])];
  S.profile.followers=[...new Set([...(S.profile.followers||[]),fromId])];
  try{ await sb.from('profiles').update({following:target.following}).eq('id',fromId); await sb.from('profiles').update({followers:S.profile.followers}).eq('id',S.user.id); }catch(e){}
  loadFollowReqs(); toast('Follow request accepted','ok');
}
async function declineFollowReq(reqId){
  try{ await sb.from('follow_requests').delete().eq('id',reqId); }catch(e){}
  loadFollowReqs();
}

/* =========================================================================
   MESSAGES (DMs, groups, channels unified chat pane)
   ========================================================================= */
function conversationPeerIds(){
  const set=new Set();
  S.messages.forEach(m=>{ if(m.sender_id===S.user.id) set.add(m.receiver_id); if(m.receiver_id===S.user.id) set.add(m.sender_id); });
  return [...set];
}
function lastMsgWith(peerId){
  const ms=S.messages.filter(m=>(m.sender_id===peerId&&m.receiver_id===S.user.id)||(m.sender_id===S.user.id&&m.receiver_id===peerId));
  return ms[ms.length-1];
}
function unreadWith(peerId){
  return S.messages.filter(m=>m.sender_id===peerId&&m.receiver_id===S.user.id&&!m.seen).length;
}
function renderMessages(wrap){
  const isMobile = window.innerWidth<=560;
  const folders=[['all','All'],['pinned','Pinned'],['unread','Unread'],['study','Study'],['muted','Muted'],['requests','Requests']];
  const showList = !isMobile || !S.activeChat;
  const showChat = !isMobile || !!S.activeChat;
  wrap.innerHTML = `<div class="dm-wrap">

      <div class="view-head flex between"><h2>Messages</h2><button class="icon-btn" onclick="openNewChat()">${svg('plus')}</button></div>
      <div class="folder-row">${folders.map(([id,l])=>{
        let count=0;
        if(id==='unread') count=unreadDmCount();
        if(id==='requests') count=S.dmReqs.filter(r=>r.to_id===S.user.id&&r.status==='pending').length;
        return `<button class="tab-pill ${S.dmFolder===id?'active':''}" onclick="setDmFolder('${id}')">${l}${count?` (${count})`:''}</button>`;
      }).join('')}</div>
      <div id="convListInner"></div>
    </div>
    <div class="chat-pane ${!showChat?'hidden-mobile':''}" id="chatPane"></div>
  </div>`;
  renderConvList();
  if(S.activeChat) renderChatPane(); else if(!isMobile) $('#chatPane').innerHTML = emptyState('','Select a conversation','Pick someone from the list to start chatting.');
}
function setDmFolder(id){ S.dmFolder=id; renderMain(); }
function renderConvList(){
  const host=$('#convListInner'); if(!host) return;
  if(S.dmFolder==='requests'){
    const reqs=S.dmReqs.filter(r=>r.to_id===S.user.id&&r.status==='pending');
    host.innerHTML = reqs.length? reqs.map(r=>{ const p=getProfile(r.from_id); return `<div class="conv-item">${avatarHTML(p,44)}<div class="grow"><div class="conv-name">${esc(displayName(p))}</div><div class="conv-preview">${esc(r.text||'wants to message you')}</div></div>

      <button class="icon-btn" style="color:var(--danger);" onclick="declineDmReq('${r.id}')">${svg('close')}</button></div>`; }).join('') : emptyState('','No requests','Message requests from private accounts appear here.');
    return;
  }
  let peers=conversationPeerIds();
  const groups=S.dmGroups.filter(g=>(g.members||[]).includes(S.user.id));
  if(S.dmFolder==='pinned') peers=peers.filter(p=>S.pinnedChats.includes(p));
  if(S.dmFolder==='unread') peers=peers.filter(p=>unreadWith(p)>0);
  if(S.dmFolder==='muted') peers=peers.filter(p=>S.mutedChats.includes(p));
  if(S.dmFolder==='study') peers=peers.filter(p=>(S.folders.Study||[]).includes(p));
  peers.sort((a,b)=>{ const la=lastMsgWith(a), lb=lastMsgWith(b); return new Date(lb?lb.created_at:0)-new Date(la?la.created_at:0); });
  let html='';
  if(S.dmFolder==='all'||S.dmFolder==='study'){
    html += groups.map(g=>`<div class="conv-item ${S.activeChat===g.id&&S.activeChatType==='group'?'active':''}" onclick="openChat('${g.id}','group')">
      <div class="avatar" style="width:44px;height:44px;">${esc(initials(g.name))}</div>
      <div class="grow"><div class="conv-name">${esc(g.name)}</div><div class="conv-preview">${(g.members||[]).length} members</div></div>
    </div>`).join('');
  }
  html += peers.map(pid=>{
    const p=getProfile(pid); const last=lastMsgWith(pid); const un=unreadWith(pid);
    const nick=S.nicknames[pid];
    return `<div class="conv-item ${S.activeChat===pid&&S.activeChatType==='dm'?'active':''}" onclick="openChat('${pid}','dm')">
      ${avatarHTML(p,44)}
      <div class="grow" style="min-width:0;"><div class="conv-name">${esc(nick||displayName(p))}${S.pinnedChats.includes(pid)?' '+svg('pin'):''}</div><div class="conv-preview">${last?esc((last.sender_id===S.user.id?'You: ':'')+(last.text||'📎 Attachment')):''}</div></div>
      ${un?`<span class="conv-unread">${un}</span>`:''}
    </div>`;
  }).join('');
  host.innerHTML = html || emptyState('','No conversations','Search for a classmate to start chatting.',`<button class="btn btn-primary" onclick="openNewChat()">New chat</button>`);
}

function tickHTML(m){

  if(m.seen) return `<span style="color:#60a5fa;">${svg('checkD')}</span>`;
  if(m.delivered_at) return svg('checkD');
  return svg('check');

function bubbleHTML(m,peer){
  const mine=m.sender_id===S.user.id;
  let body='';
  if(m.media && m.media.type==='image') body=`<img src="${esc(m.media.url)}" style="max-width:220px;border-radius:12px;display:block;">`;

  else if(m.media && m.media.type==='video') body=`<video src="${esc(m.media.url)}" style="max-width:220px;border-radius:12px;" controls></video>`;
  else if(m.media && m.media.type==='file') body=`<a href="${esc(m.media.url)}" target="_blank" style="text-decoration:underline;">${svg('bookmark')} ${esc(m.media.name||'File')}</a>`;
  else body = richText(m.text||'');
  const replyPrev = m.reply_to ? (()=>{ const rm=S.messages.find(x=>x.id===m.reply_to); return rm?`<div class="reply-preview" onclick="jumpToMsg('${rm.id}')">${esc((rm.text||'📎').slice(0,50))}</div>`:''; })() : '';
  return `<div class="bubble-row ${mine?'me':''}" id="msg-${m.id}" ondblclick="reactToMsg('${m.id}',event)">

async function sendCurrentMessage(){
  const input=$('#chatInput'); if(!input) return;
  const text=input.value.trim(); if(!text) return;
  input.value=''; autoGrow(input);
  if(S.activeChatType==='dm') await sendMessageTo(S.activeChat,text,null,S.replyTo);
  else if(S.activeChatType==='group') await sendGroupMessage(S.activeChat,text);
  else if(S.activeChatType==='channel') await sendChannelPost(S.activeChat,text);
  S.replyTo=null;

async function sendMessageTo(peerId,text,media,replyTo){
  const tempId='temp-'+uid();
  const optimistic={id:tempId,sender_id:S.user.id,receiver_id:peerId,text,media:media||null,seen:false,reply_to:replyTo?replyTo.id:null,created_at:new Date().toISOString(),reactions:{},_pending:true};
  S.messages.push(optimistic);
  if(S.view==='messages') renderMain();
  bumpQuest('dm');
  try{
    if(!canMessage(peerId)){
      await sb.from('dm_requests').upsert({from_id:S.user.id,to_id:peerId,text,status:'pending'});
      toast('Message request sent','ok');
      S.messages=S.messages.filter(m=>m.id!==tempId);
      if(S.view==='messages') renderMain();
      return;
    }
    const {data,error} = await sb.from('messages').insert({sender_id:S.user.id,receiver_id:peerId,text,media:media||null,reply_to:replyTo?replyTo.id:null,reactions:{}}).select().single();
    if(error) throw error;
    const i=S.messages.findIndex(m=>m.id===tempId); if(i>-1) S.messages[i]=data;
    if(S.view==='messages') renderMain();
  }catch(e){
    console.error(e);
    const m=S.messages.find(x=>x.id===tempId); if(m) m._error=true;
    toast('Message failed to send','e');
    if(S.view==='messages') renderMain();
  }
}
async function sendDmRequest(peerId){
  const t=$('#dmReqText').value.trim();
  try{ await sb.from('dm_requests').upsert({from_id:S.user.id,to_id:peerId,text:t||'Hi!',status:'pending'}); toast('Request sent','ok'); renderChatPane(); }catch(e){ toast('Could not send request','e'); }
}
async function markSeen(msgId){
  try{ await sb.from('messages').update({seen:true,seen_at:new Date().toISOString()}).eq('id',msgId); }catch(e){}
  const m=S.messages.find(x=>x.id===msgId); if(m){ m.seen=true; }
}
function jumpToMsg(id){ const el=document.getElementById('msg-'+id); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.background='var(--accent-lt)'; setTimeout(()=>el.style.background='',900); } }
function reactToMsg(id,ev){
  const emojis=['❤️','😂','😮','😢','👍','🔥'];
  const box=document.createElement('div');
  box.style.cssText='position:absolute;background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:6px 10px;display:flex;gap:6px;box-shadow:var(--sh-md);z-index:50;';
  box.style.left=Math.max(8,ev.clientX-100)+'px'; box.style.top=(ev.clientY-50)+'px';
  box.innerHTML=emojis.map(e=>`<span style="cursor:pointer;font-size:18px;" onclick="applyReaction('${id}','${e}')">${e}</span>`).join('');
  document.body.appendChild(box);
  setTimeout(()=>document.addEventListener('click',function h(){box.remove();document.removeEventListener('click',h);}),50);

async function applyReaction(id,emo){
  const m=S.messages.find(x=>x.id===id); if(!m) return;
  m.reactions=m.reactions||{};
  m.reactions[emo]=m.reactions[emo]||[];
  if(m.reactions[emo].includes(S.user.id)) m.reactions[emo]=m.reactions[emo].filter(u=>u!==S.user.id);
  else m.reactions[emo].push(S.user.id);
  renderChatPane();
  try{ await sb.from('messages').update({reactions:m.reactions}).eq('id',id); }catch(e){}
}

/* voice recording */
async function startRecording(e){
  if(e&&e.cancelable) e.preventDefault();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.recChunks=[];
    S.recorder=new MediaRecorder(stream);
    S.recStart=Date.now();
    S.recorder.ondataavailable=ev=>S.recChunks.push(ev.data);
    S.recorder.start();
    $('#micBtn') && $('#micBtn').style.background='var(--danger)';
    toast('Recording…');
  }catch(e){ toast('Microphone access denied','e'); }
}
function cancelRecordingIfActive(){ if(S.recorder && S.recorder.state==='recording'){ S.recorder.stop(); } }
async function stopRecording(e){
  if(e&&e.cancelable) e.preventDefault();
  if(!S.recorder || S.recorder.state!=='recording') return;
  const duration=Math.round((Date.now()-S.recStart)/1000);
  await new Promise(resolve=>{
    S.recorder.onstop=resolve;
    S.recorder.stop();
  });
  $('#micBtn') && ($('#micBtn').style.background='');
  if(duration<1){ return; }
  const blob=new Blob(S.recChunks,{type:'audio/webm'});
  try{
    const url=await uploadToStorage(blob,'voice','webm');
    const media={type:'voice',url,duration};
    if(S.activeChatType==='dm') await sendMessageTo(S.activeChat,'',media);
    else if(S.activeChatType==='group') await sendGroupMessage(S.activeChat,'',media);
  }catch(err){ toast('Voice note failed to upload','e'); }
}

function openCreateEvent(){
  openModal(`${modalHead('New event')}<div class="modal-body">
    <div class="field"><label>Title</label><input id="evTitle"></div>
    <div class="field"><label>Date &amp; time</label><input id="evDate" type="datetime-local"></div>
    <div class="field"><label>Location</label><input id="evLoc"></div>

    <button class="btn btn-primary" style="width:100%;" onclick="createEvent()">Create event</button>
  </div>`);
}
async function createEvent(){
  const title=$('#evTitle').value.trim(); if(!title){ toast('Title required','e'); return; }
  const date=$('#evDate').value; const location=$('#evLoc').value.trim(); const description=$('#evDesc').value.trim();
  try{ const {data}=await sb.from('events').insert({title,date,location,description,created_by:S.user.id,going:[S.user.id]}).select().single(); if(data){ S.events.push(data); closeModal(); renderMain(); bumpBadgeCheck(); } }
  catch(e){ toast('Could not create event','e'); }
}
function bumpBadgeCheck(){ checkBadges(); }
async function toggleGoing(id){
  const e=S.events.find(x=>x.id===id); if(!e) return;
  const going=(e.going||[]).includes(S.user.id);
  e.going = going ? (e.going||[]).filter(u=>u!==S.user.id) : [...(e.going||[]),S.user.id];
  renderMain();
  try{ await sb.from('events').update({going:e.going}).eq('id',id); }catch(e){}
}
function openEventDetail(id){
  const e=S.events.find(x=>x.id===id); if(!e) return;
  const creator=getProfile(e.created_by);
  openModal(`${modalHead(e.title)}<div class="modal-body">
    <p class="dim" style="font-size:13px;">${new Date(e.date).toLocaleString()} · ${esc(e.location||'')}</p>
    <p style="font-size:14px;">${esc(e.description||'')}</p>
    <p class="dim" style="font-size:12px;">Organized by ${esc(displayName(creator))}</p>
    <button class="btn ${((e.going||[]).includes(S.user.id))?'btn-ghost':'btn-primary'}" style="width:100%;margin:10px 0;" onclick="toggleGoing('${id}');closeModal();openEventDetail('${id}')">${(e.going||[]).includes(S.user.id)?'Going ✓':'RSVP going'}</button>

    <div id="eventChat" style="max-height:30vh;overflow-y:auto;margin-bottom:8px;"></div>
    <div class="flex gap8"><input id="eventChatInput" placeholder="Message attendees…" onkeydown="if(event.key==='Enter')sendEventMsg('${id}')"><button class="btn btn-primary" onclick="sendEventMsg('${id}')">Send</button></div>
  </div>`);
  loadEventChat(id);
}
async function loadEventChat(id){
  try{ const {data}=await sb.from('event_messages').select('*').eq('event_id',id).order('created_at',{ascending:true});
    const host=$('#eventChat'); if(!host) return;
    host.innerHTML=(data||[]).map(m=>{ const p=getProfile(m.sender_id); return `<div style="margin-bottom:8px;font-size:13px;"><b>${esc(displayName(p))}:</b> ${richText(m.text)}</div>`; }).join('') || '<p class="dim" style="font-size:12.5px;">No messages yet.</p>';
  }catch(e){}
}
async function sendEventMsg(id){
  const input=$('#eventChatInput'); const text=input.value.trim(); if(!text) return; input.value='';
  try{ await sb.from('event_messages').insert({event_id:id,sender_id:S.user.id,text}); loadEventChat(id); }catch(e){ toast('Failed to send','e'); }
}

function renderQA(wrap){
  wrap.innerHTML=`<div class="feed-wrap">
    <div class="view-head flex between"><h2>Q&amp;A</h2><button class="icon-btn" onclick="openAskQA()">${svg('plus')}</button></div>
    <div id="qaList" style="padding:14px 18px;"></div>
  </div>`;
  const host=$('#qaList');
  if(!S.qas.length){ host.innerHTML=emptyState('','No questions yet','Ask something — anonymously if you like.',`<button class="btn btn-primary" onclick="openAskQA()">Ask a question</button>`); return; }
  host.innerHTML = S.qas.map(q=>{
    const author = q.anonymous ? {full_name:'Anonymous'} : getProfile(q.user_id);
    return `<div class="card fade-up" style="padding:14px;margin-bottom:12px;">
      <div class="flex gap8"><div class="dim" style="font-size:12.5px;">${esc(displayName(author))} · ${esc(q.faculty||'')} · ${timeAgo(q.created_at)}</div></div>
      <p style="font-size:14.5px;margin:6px 0;">${richText(q.text)}</p>
      <div class="dim" style="font-size:12px;">${(q.answers||[]).length} answers</div>
      <div style="margin-top:8px;">${(q.answers||[]).map(a=>{ const ap=getProfile(a.user_id); return `<div style="background:var(--hover);border-radius:10px;padding:8px 10px;margin-bottom:6px;font-size:13px;"><b>${esc(displayName(ap))}:</b> ${richText(a.text)}</div>`; }).join('')}</div>
      <div class="flex gap8" style="margin-top:6px;"><input placeholder="Write an answer…" id="ans-${q.id}" onkeydown="if(event.key==='Enter')answerQA('${q.id}')"><button class="btn btn-ghost" onclick="answerQA('${q.id}')">Answer</button></div>
    </div>`;
  }).join('');
}
function openAskQA(){
  openModal(`${modalHead('Ask a question')}<div class="modal-body">
    <textarea id="qaText" rows="3" placeholder="What do you want to ask?"></textarea>
    <label class="flex gap4" style="font-size:12.5px;margin:8px 0;"><input type="checkbox" id="qaAnon" style="width:auto;"> Ask anonymously</label>
    <button class="btn btn-primary" style="width:100%;" onclick="submitQA()">Post question</button>
  </div>`);
}
async function submitQA(){
  const text=$('#qaText').value.trim(); if(!text){ toast('Write a question first','e'); return; }
  const anon=$('#qaAnon').checked;
  try{ const {data}=await sb.from('qa').insert({user_id:S.user.id,text,anonymous:anon,faculty:S.profile.faculty,answers:[]}).select().single(); if(data){ S.qas.unshift(data); closeModal(); renderMain(); } }
  catch(e){ toast('Could not post question','e'); }
}
async function answerQA(id){
  const input=$('#ans-'+id); const text=input.value.trim(); if(!text) return;
  const q=S.qas.find(x=>x.id===id); q.answers=q.answers||[]; q.answers.push({user_id:S.user.id,text,created_at:new Date().toISOString()});
  renderMain();
  try{ await sb.from('qa').update({answers:q.answers}).eq('id',id); bumpBadgeCheck(); }catch(e){ toast('Answer failed to save','e'); }
}

function leaderboardList(scope){
  let list=[...S.profiles.values()].filter(p=>p.status==='approved'||p.id===S.user.id);
  if(scope==='faculty') list=list.filter(p=>p.faculty===S.profile.faculty);
  return list.map(p=>({...p,score:computeScore(p)})).sort((a,b)=>b.score-a.score);
}
function renderLeaderboard(wrap){
  wrap.innerHTML=`<div class="feed-wrap">
    <div class="view-head"><h2>Leaderboard</h2></div>
    <div class="tabs-row">
      <button class="tab-pill active" data-lbscope="global" onclick="setLbScope('global',this)">Global</button>

function setLbScope(scope,btn){ $all('[data-lbscope]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderLbBody(scope); }
function renderLbBody(scope){

  host.innerHTML = `
    <div class="podium">
      ${[1,0,2].map(i=>top3[i]?`<div class="p-col"><div style="position:relative;">${avatarHTML(top3[i],52)}<span style="position:absolute;top:-8px;right:-4px;font-size:16px;">${i===0?'🥇':i===1?'🥈':'🥉'}</span></div><b style="font-size:12px;">${esc(displayName(top3[i]).split(' ')[0])}</b><div class="p-bar" style="height:${i===0?90:i===1?70:56}px;">${top3[i].score}</div></div>`:'').join('')}
    </div>

  `;
  setTimeout(()=>{ $all('.lb-bar').forEach(b=>{ b.style.width=b.style.width; }); },50);
}

  </div>`;
}
async function togglePrivate(){ S.profile.is_private=!S.profile.is_private; renderMain(); try{ await sb.from('profiles').update({is_private:S.profile.is_private}).eq('id',S.user.id); }catch(e){} }
function setTheme(t){ S.theme=t; localStorage.setItem('koliya_theme',t); applyTheme(); }
function requestNotifPerm(){
  if(!('Notification' in window)){ toast('Notifications not supported','e'); return; }
  Notification.requestPermission().then(p=>{ if(p==='granted'){ toast('Notifications enabled','ok'); new Notification('Koliya',{body:'You will now get notified of new messages.'}); } renderMain(); });
}
function copyInvite(){
  const link=location.origin+location.pathname+'?ref='+S.user.id;
  navigator.clipboard && navigator.clipboard.writeText(link).then(()=>toast('Invite link copied','ok')).catch(()=>toast(link));
}
function openBlocked(){
  const blocked=(S.profile.blocked||[]).map(getProfile);
  openModal(`${modalHead('Blocked accounts')}<div class="modal-body">${blocked.length?blocked.map(p=>`<div class="conv-item" style="border-radius:12px;">${avatarHTML(p,36)}<span class="grow">${esc(displayName(p))}</span><button class="btn btn-ghost" onclick="unblockUser('${p.id}')">Unblock</button></div>`).join(''):emptyState('','No blocked accounts','')}</div>`);
}
async function unblockUser(id){
  S.profile.blocked=(S.profile.blocked||[]).filter(x=>x!==id);
  try{ await sb.from('profiles').update({blocked:S.profile.blocked}).eq('id',S.user.id); }catch(e){}
  openBlocked();
}

/* =========================================================================
   ADMIN
   ========================================================================= */
let adminTab='pending';
function renderAdmin(wrap){
  const all=[...S.profiles.values()];
  wrap.innerHTML=`<div class="feed-wrap">
    <div class="view-head"><h2>Admin</h2></div>
    <div class="tabs-row">
      <button class="tab-pill ${adminTab==='pending'?'active':''}" onclick="setAdminTab('pending')">Pending</button>
      <button class="tab-pill ${adminTab==='approved'?'active':''}" onclick="setAdminTab('approved')">Approved</button>
      <button class="tab-pill ${adminTab==='banned'?'active':''}" onclick="setAdminTab('banned')">Banned</button>
      <button class="tab-pill ${adminTab==='reports'?'active':''}" onclick="setAdminTab('reports')">Reports</button>
    </div>
    <div id="adminBody" style="padding:14px 18px;"></div>
  </div>`;
  renderAdminBody();
}
function setAdminTab(t){ adminTab=t; renderMain(); }
async function renderAdminBody(){
  const host=$('#adminBody');
  if(adminTab==='reports'){
    try{
      const {data}=await sb.from('reports').select('*').order('created_at',{ascending:false});
      host.innerHTML=(data&&data.length)?data.map(r=>`<div class="card" style="padding:12px;margin-bottom:10px;"><p style="font-size:13.5px;">${esc(r.post_text||'')}</p><p class="dim" style="font-size:11.5px;">Status: ${esc(r.status)}</p><div class="flex gap8"><button class="btn btn-danger" onclick="resolveReport('${r.id}','${r.post_id}','delete')">Delete post</button><button class="btn btn-ghost" onclick="resolveReport('${r.id}',null,'dismiss')">Dismiss</button></div></div>`).join('') : emptyState('','No reports','');
    }catch(e){ host.innerHTML=emptyState('','Could not load reports',''); }
    return;
  }
  const list=[...S.profiles.values()].filter(p=>p.status===adminTab);
  host.innerHTML = list.length? list.map(p=>`<div class="conv-item" style="border-radius:14px;">${avatarHTML(p,40)}<div class="grow"><div class="conv-name">${esc(displayName(p))}</div><div class="conv-preview">${esc(p.faculty||'')} · Carte: ${esc(p.student_card||'')}</div></div>
    ${adminTab==='pending'?`<button class="icon-btn" style="color:var(--ok);" onclick="setUserStatus('${p.id}','approved')">${svg('check')}</button><button class="icon-btn" style="color:var(--danger);" onclick="setUserStatus('${p.id}','rejected')">${svg('close')}</button>`
    :adminTab==='approved'?`<button class="btn btn-danger" onclick="setUserStatus('${p.id}','banned')">Ban</button>`
    :`<button class="btn btn-ghost" onclick="setUserStatus('${p.id}','approved')">Unban</button>`}
  </div>`).join('') : emptyState('','Nothing here','');
}
async function setUserStatus(id,status){
  try{ await sb.from('profiles').update({status}).eq('id',id); const p=S.profiles.get(id); if(p)p.status=status; toast('Updated','ok'); renderAdminBody(); }catch(e){ toast('Update failed','e'); }
}
async function resolveReport(reportId,postId,action){
  try{
    if(action==='delete' && postId){ await sb.from('posts').delete().eq('id',postId); S.posts=S.posts.filter(p=>p.id!==postId); }
    await sb.from('reports').update({status:'resolved'}).eq('id',reportId);
    toast('Report resolved','ok'); renderAdminBody();
  }catch(e){ toast('Could not resolve report','e'); }
}

/* =========================================================================
   BOOT
   ========================================================================= */
restoreSession();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
</script>
